<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard Final - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold-gradient: linear-gradient(45deg, #FFD700, #FFCC00, #FFB900, #FDB931);
            --primary-blue: #0056b3;
            --dark-blue: #003366;
            --overlay: rgba(0, 0, 0, 0.6);
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; overflow-x: hidden; }

        .leaderboard-container { 
            background: white; width: 100%; max-width: 450px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 20px; position: relative; 
            overflow: hidden; border-top: 8px solid var(--primary-blue); min-height: 90vh;
            display: flex; flex-direction: column; z-index: 5;
        }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stars-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .leaderboard-header { text-align: center; margin-bottom: 20px; position: relative; z-index: 5; }
        .rules-icon { position: absolute; left: 0; top: 5px; color: var(--primary-blue); font-size: 24px; cursor: pointer; }
        .title { color: var(--dark-blue); margin: 0; font-size: 20px; font-weight: 800; text-transform: uppercase; }

        .filter-section { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; position: relative; z-index: 10;
        }
        .full-width { grid-column: span 2; }
        select { 
            padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f9; font-size: 12px; width: 100%;
        }

        /* --- Podium --- */
        .podium-section { 
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 10px; margin: 20px 0 40px 0; position: relative; z-index: 5; height: 180px;
        }
        .podium-card { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .rank-badge { font-size: 24px; font-weight: 900; display: block; font-style: italic; }
        .gold .rank-badge { color: #FFB900; }
        .silver .rank-badge { color: #A9A9A9; }
        .bronze .rank-badge { color: #CD7F32; }

        .medal-icon { font-size: 45px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
        .gold .medal-icon { color: #FFD700; font-size: 55px; }
        .silver .medal-icon { color: #C0C0C0; }
        .bronze .medal-icon { color: #CD7F32; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .podium-name { font-size: 12px; font-weight: bold; color: var(--dark-blue); margin-bottom: 8px; }
        .clickable-pts { 
            background: var(--primary-blue); color: white; border-radius: 20px; 
            padding: 6px 12px; font-size: 11px; font-weight: 800; cursor: pointer;
        }
        .gold .clickable-pts { background: var(--gold-gradient); color: #4d3a00; }

        /* --- List --- */
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fff; border: 1px solid #eee; border-left: 6px solid var(--primary-blue);
            margin-bottom: 10px; padding: 12px; border-radius: 15px; position: relative; z-index: 5;
        }
        .rank-name { font-weight: bold; color: #333; flex: 1; font-size: 14px; margin-left: 10px; }
        .list-pts { background: var(--primary-blue); color: white; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 11px; }

        .btn-back { 
            width: 100%; padding: 18px; background: var(--dark-blue); color: white; 
            border: none; font-weight: bold; border-radius: 0 0 30px 30px; 
            margin-top: auto; cursor: pointer; position: relative; z-index: 10;
        }

        /* --- Modal --- */
        #customModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; width: 90%; max-width: 350px; border-radius: 25px; padding: 25px; text-align: center;
        }
        .modal-body { text-align: left; white-space: pre-line; margin: 15px 0; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <canvas id="confetti-canvas"></canvas>
    <div class="stars-container" id="stars-layer"></div>

    <div class="leaderboard-header">
        <div class="rules-icon" onclick="openModal('rules')"><i class="fa-solid fa-circle-question"></i></div>
        <h2 class="title">LEADERBOARD</h2>
        <p style="font-size: 12px; color: #888; margin-top: 5px;">Periode: April 2026</p>
    </div>

    <div class="filter-section">
        <select class="full-width"><option>Per Orangan (Jemaat)</option></select>
        <select><option>Semua Lokasi</option></select>
        <select><option>Semua Kategori</option></select>
    </div>

    <div id="podium-ui" class="podium-section"></div>
    <div id="list-ui" class="ranking-list"></div>

    <button class="btn-back" onclick="window.location.href='menu.html'"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</button>
</div>

<div id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <div class="modal-body" id="modalBody"></div>
        <button style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--primary-blue); color:white; font-weight:bold;" onclick="closeModal()">MENGERTI</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
    // 1. KONFIGURASI (Ganti dengan Key Anda)
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        databaseURL: "https://PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "PROJECT_ID",
    };

    // Inisialisasi aman
    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    } catch(e) { console.error("Firebase Init Error"); }

    const dummyData = [
        { name: "JC 5", points: 243, history: "10x Hadir, 5x Pelayanan" },
        { name: "UMUM", points: 110, history: "8x Hadir" },
        { name: "JC 1", points: 50, history: "4x Hadir" },
        { name: "Boby Daniel", points: 30, history: "6x Baca Alkitab" },
        { name: "Yohanes", points: 25, history: "1x Pelayanan" }
    ];

    // 2. FUNGSI RENDER UTAMA
    function renderBoard(users) {
        const podium = document.getElementById('podium-ui');
        const list = document.getElementById('list-ui');

        const p = [
            users[0] || {name: "-", points: 0},
            users[1] || {name: "-", points: 0},
            users[2] || {name: "-", points: 0}
        ];

        // Susunan Podium: 2 - 1 - 3
        podium.innerHTML = `
            <div class="podium-card silver">
                <span class="rank-badge">2</span>
                <i class="fa-solid fa-medal medal-icon"></i>
                <div class="podium-name">${p[1].name}</div>
                <div class="clickable-pts" onclick="openModal('history','${p[1].name}','${p[1].history}')">${p[1].points} Pts</div>
            </div>
            <div class="podium-card gold">
                <span class="rank-badge">1</span>
                <i class="fa-solid fa-trophy medal-icon"></i>
                <div class="podium-name">${p[0].name}</div>
                <div class="clickable-pts" onclick="openModal('history','${p[0].name}','${p[0].history}')">${p[0].points} Pts</div>
            </div>
            <div class="podium-card bronze">
                <span class="rank-badge">3</span>
                <i class="fa-solid fa-award medal-icon"></i>
                <div class="podium-name">${p[2].name}</div>
                <div class="clickable-pts" onclick="openModal('history','${p[2].name}','${p[2].history}')">${p[2].points} Pts</div>
            </div>
        `;

        list.innerHTML = '';
        users.slice(3).forEach((user, i) => {
            list.innerHTML += `
                <div class="rank-item">
                    <span style="font-weight:900;">${i+4}.</span>
                    <span class="rank-name">${user.name}</span>
                    <div class="list-pts">${user.points} POIN</div>
                </div>
            `;
        });
    }

    // 3. STARTUP LOGIC
    window.onload = () => {
        // Jalankan Efek
        initStars();
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

        // Cek Firebase
        if (db) {
            db.ref('leaderboard').on('value', (snap) => {
                const val = snap.val();
                const users = val ? Object.values(val).sort((a,b) => b.points - a.points) : dummyData;
                renderBoard(users);
            }, (err) => { renderBoard(dummyData); });
        } else {
            renderBoard(dummyData);
        }
    };

    // UI Helper
    function openModal(type, name='', history='') {
        document.getElementById('customModal').style.display = 'flex';
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        if(type === 'rules') {
            title.innerText = "Aturan Poin";
            body.innerText = "Alkitab: 5\nHadir: 10\nLatihan: 15\nPelayanan: 25";
        } else {
            title.innerText = "Riwayat " + name;
            body.innerText = history || "Belum ada riwayat.";
        }
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    function initStars() {
        const container = document.getElementById('stars-layer');
        for(let i=0; i<15; i++) {
            const s = document.createElement('i');
            s.className = 'fa-solid fa-star';
            s.style.cssText = `position:absolute; color:#FFD700; left:${Math.random()*100}%; top:${Math.random()*100}%; font-size:8px; opacity:0.5;`;
            container.appendChild(s);
        }
    }
</script>
</body>
</html>
