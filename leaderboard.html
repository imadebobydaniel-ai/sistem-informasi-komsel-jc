<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS diletakkan di bawah untuk kerapihan */
    </style>
</head>
<body>

<div class="leaderboard-container">
    <div class="leaderboard-header">
        <div class="rules-icon" onclick="showRules()"><i class="fa-solid fa-circle-question"></i></div>
        <h2 class="title"><i class="fa-solid fa-crown"></i> LEADERBOARD</h2>
        <p class="periode">Periode: April 2026</p>
    </div>

    <div class="filter-section">
        <select id="filter-segmen" onchange="updateLeaderboard()">
            <option value="gereja">Per Gereja (Wilayah)</option>
            <option value="komsel">Per Komsel</option>
            <option value="orangan" selected>Per Orangan (Jemaat)</option>
        </select>

        <select id="filter-kategori" onchange="updateLeaderboard()">
            <option value="semua">Semua Kategori</option>
            <option value="pw">Praise & Worship (PW)</option>
            <option value="multimedia">Multimedia</option>
            <option value="wl-singer">WL & Singer</option>
            <option value="sound">Sound Engineering</option>
            <option value="tamborin">Tamborin & Flag</option>
            <option value="choirs">Choirs</option>
        </select>
    </div>

    <div class="podium-section">
        <div class="podium-card silver">
            <div class="medal-icon"><i class="fa-solid fa-medal"></i></div>
            <div class="podium-name" id="rank-2-name">UMUM</div>
            <div class="podium-points" onclick="showHistory('USER_ID_2')">110 Pts</div>
        </div>

        <div class="podium-card gold">
            <div class="medal-icon"><i class="fa-solid fa-trophy"></i></div>
            <div class="podium-name" id="rank-1-name">JC 5</div>
            <div class="podium-points" onclick="showHistory('USER_ID_1')">243 Pts</div>
        </div>

        <div class="podium-card bronze">
            <div class="medal-icon"><i class="fa-solid fa-award"></i></div>
            <div class="podium-name" id="rank-3-name">JC 1</div>
            <div class="podium-points" onclick="showHistory('USER_ID_3')">50 Pts</div>
        </div>
    </div>

    <div class="ranking-list" id="ranking-container">
        <div class="rank-item">
            <div class="rank-info">
                <span class="rank-number">4.</span>
                <span class="rank-name">JC</span>
            </div>
            <div class="rank-points-capsule" onclick="showHistory('USER_ID_4')">
                30 POIN
            </div>
        </div>
        </div>

    <button class="btn-back-menu"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</button>
</div>

</body>
</html>
