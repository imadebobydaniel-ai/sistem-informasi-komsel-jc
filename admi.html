<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Database Administrator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-section { display: flex; justify-content: space-between; border-bottom: 2px solid red; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-keluar { background: #666; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; cursor: pointer; margin-right: 5px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: red; color: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .mode-edit { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; }
        /* Styling untuk dropdown golongan darah */
        .select-edit { padding: 5px; border-radius: 4px; border: 1px solid orange; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2><i class="fa-solid fa-database"></i> Database Administrator</h2>
        <button class="btn-keluar" id="logout"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="location.reload()">Refresh</button>
        <button id="btnEdit" class="btn-tool">Edit Data</button>
        <button id="btnHapus" class="btn-tool">Hapus</button>
        <input type="text" id="cari" placeholder=" Cari Nama..." style="padding: 10px; width: 250px;">
    </div>

    <table>
        <thead>
            <tr>
                <th><input type="checkbox" id="pilihSemua"></th>
                <th>Nama Lengkap</th>
                <th>Email</th>
                <th>Nomor HP</th>
                <th>Alamat</th>
                <th>Jabatan</th>
                <th>Gol. Darah</th>
            </tr>
        </thead>
        <tbody id="isiTabel">
            <tr>
                <td><input type="checkbox" class="cek"></td>
                <td class="bisa-edit">Boby Daniel</td>
                <td class="bisa-edit">boby.daniel4@gmail.com</td>
                <td class="bisa-edit">081283393576</td>
                <td class="bisa-edit">Jl. Tanah Hitam, Abe Pantai</td>
                <td class="bisa-edit">Ketua Komsel</td>
                <td class="darah-cell">AB</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. FUNGSI KELUAR (LOGOUT)
    document.getElementById('logout').onclick = function() {
        window.location.href = "index.html";
    };

    // 2. FUNGSI EDIT (DENGAN DROPDOWN GOL DARAH)
    document.getElementById('btnEdit').onclick = function() {
        let diceklis = document.querySelectorAll('.cek:checked');
        if (diceklis.length === 0) return alert("Centang datanya dulu, Bang!");

        diceklis.forEach(function(checkbox) {
            let baris = checkbox.closest('tr');
            
            // Edit Kolom Teks Biasa
            let kolomTeks = baris.querySelectorAll('.bisa-edit');
            kolomTeks.forEach(function(td) {
                td.contentEditable = "true";
                td.classList.add('mode-edit');
            });

            // Edit Kolom Golongan Darah (Dropdown)
            let cellDarah = baris.querySelector('.darah-cell');
            if (!cellDarah.querySelector('select')) {
                let currentVal = cellDarah.innerText;
                let options = ['O', 'A', 'B', 'AB', 'AB+'];
                let selectHtml = `<select class="select-edit">`;
                options.forEach(opt => {
                    selectHtml += `<option value="${opt}" ${opt === currentVal ? 'selected' : ''}>${opt}</option>`;
                });
                selectHtml += `</select>`;
                cellDarah.innerHTML = selectHtml;
            }
        });
        alert("Mode Edit Aktif. Untuk Golongan Darah silakan pilih dari menu.");
    };

    // 3. FUNGSI HAPUS
    document.getElementById('btnHapus').onclick = function() {
        let diceklis = document.querySelectorAll('.cek:checked');
        if (diceklis.length === 0) return alert("Pilih data yang mau dihapus!");
        if (confirm("Hapus data ini?")) {
            diceklis.forEach(cb => cb.closest('tr').remove());
        }
    };

    // 4. FUNGSI CARI (SEARCH)
    document.getElementById('cari').onkeyup = function() {
        let kata = this.value.toLowerCase();
        let baris = document.querySelectorAll('#isiTabel tr');
        baris.forEach(row => {
            let teks = row.innerText.toLowerCase();
            row.style.display = teks.includes(kata) ? "" : "none";
        });
    };

    // 5. PILIH SEMUA
    document.getElementById('pilihSemua').onclick = function() {
        let semua = document.querySelectorAll('.cek');
        semua.forEach(cb => cb.checked = this.checked);
    };
</script>

</body>
</html>
