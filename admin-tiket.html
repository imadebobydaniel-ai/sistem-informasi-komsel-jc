<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tiket Masuk - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .card-stats { border-left: 5px solid #0d6efd; }
        .btn-action { padding: 5px 10px; border-radius: 4px; border: none; color: white; margin-right: 3px; }
        .btn-view { background-color: #0dcaf0; }
        .btn-done { background-color: #198754; }
        .btn-delete { background-color: #dc3545; }
        
        /* Modal Style */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-card { background: white; width: 90%; max-width: 450px; border-radius: 8px; overflow: hidden; }
        .ticket-header { background: #0d6efd; color: white; padding: 15px; text-align: center; }
        .ticket-body { padding: 20px; font-size: 14px; }
        .btn-red-custom { 
            background: #dc3545; color: white; border: none; padding: 10px; 
            border-radius: 5px; font-weight: bold; width: 100%; margin-bottom: 8px;
        }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Portal Tiket Masuk</h4>
        <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">Refresh Data</button>
    </div>

    <div class="row mb-4">
        <div class="col-md-3"><div class="card shadow-sm p-3 mb-2 card-stats">Total Tiket<h3 id="totalTiket">0</h3></div></div>
        <div class="col-md-3"><div class="card shadow-sm p-3 mb-2" style="border-left: 5px solid #ffc107;">Doa<h3 id="countDoa">0</h3></div></div>
        <div class="col-md-3"><div class="card shadow-sm p-3 mb-2" style="border-left: 5px solid #dc3545;">Masalah<h3 id="countProblem">0</h3></div></div>
        <div class="col-md-3"><div class="card shadow-sm p-3 mb-2" style="border-left: 5px solid #198754;">Saran<h3 id="countSaran">0</h3></div></div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">Daftar Detail Tiket</div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>No Tiket</th>
                        <th>Kategori</th>
                        <th>Pengirim</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tiketData"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalDetail" class="modal-overlay">
    <div class="modal-card">
        <div id="captureArea">
            <div class="ticket-header">
                <h6 class="mb-0">DETAIL TIKET</h6>
                <small id="det-nomor"></small>
            </div>
            <div class="ticket-body">
                <p><strong>Pengirim:</strong> <span id="det-nama"></span></p>
                <p><strong>Kategori:</strong> <span id="det-kategori"></span></p>
                <hr>
                <p><strong>ISI PESAN:</strong></p>
                <div id="det-pesan" class="p-2 border rounded bg-light"></div>
            </div>
        </div>
        <div class="p-3 border-top">
            <button onclick="copyTicketText()" class="btn-red-custom">COPY TEXT</button>
            <button onclick="shareAsImage()" class="btn-red-custom">BAGIKAN JPG (WhatsApp)</button>
            <button onclick="closeModal()" class="btn btn-secondary w-100 mt-2">TUTUP</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function loadTickets() {
        db.collection("saran_masukan").where("jc", "==", "JC 5").orderBy("timestamp", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('tiketData');
            tbody.innerHTML = "";
            let cDoa = 0, cProb = 0, cSaran = 0, total = 0;

            snap.forEach((doc) => {
                const t = doc.data();
                const id = doc.id;
                total++;
                if(t.kategori === "Permohonan Doa") cDoa++;
                else if(t.kategori === "Masalah Aplikasi") cProb++;
                else if(t.kategori === "Saran & Masukan") cSaran++;

                tbody.innerHTML += `
                    <tr>
                        <td class="small">${t.nomor_tiket || '-'}</td>
                        <td><span class="badge bg-info text-dark">${t.kategori}</span></td>
                        <td>${t.nama}</td>
                        <td><span class="badge ${t.status === 'Selesai' ? 'bg-success' : 'bg-warning'}">${(t.status || 'PROSES').toUpperCase()}</span></td>
                        <td>
                            <button class="btn-action btn-view" title="Lihat Detail" onclick="showDetail('${id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn-action btn-done" title="Tandai Selesai" onclick="updateStatus('${id}')"><i class="fas fa-check"></i></button>
                            <button class="btn-action btn-delete" title="Hapus" onclick="deleteTicket('${id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('totalTiket').innerText = total;
            document.getElementById('countDoa').innerText = cDoa;
            document.getElementById('countProblem').innerText = cProb;
            document.getElementById('countSaran').innerText = cSaran;
        });
    }

    function showDetail(id) {
        db.collection("saran_masukan").doc(id).get().then(doc => {
            const d = doc.data();
            document.getElementById('det-nomor').innerText = d.nomor_tiket || '-';
            document.getElementById('det-nama').innerText = d.nama;
            document.getElementById('det-kategori').innerText = d.kategori;
            document.getElementById('det-pesan').innerText = d.isi_saran;
            document.getElementById('modalDetail').style.display = 'flex';
        });
    }

    function updateStatus(id) {
        if(confirm("Tandai tiket ini sebagai Selesai?")) {
            db.collection("saran_masukan").doc(id).update({ status: "Selesai" });
        }
    }

    function closeModal() { document.getElementById('modalDetail').style.display = 'none'; }

    function copyTicketText() {
        const t = `DETAIL TIKET\nNo: ${document.getElementById('det-nomor').innerText}\nPengirim: ${document.getElementById('det-nama').innerText}\nIsi: ${document.getElementById('det-pesan').innerText}`;
        navigator.clipboard.writeText(t).then(() => alert("Teks berhasil disalin!"));
    }

    function shareAsImage() {
        const area = document.getElementById('captureArea');
        html2canvas(area).then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], "tiket-boby.jpg", { type: "image/jpeg" });
                if (navigator.share) {
                    navigator.share({ title: 'Kirim Tiket', files: [file] });
                } else {
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL();
                    link.download = 'tiket-boby.jpg';
                    link.click();
                }
            }, 'image/jpeg');
        });
    }

    function deleteTicket(id) { if(confirm("Hapus data ini selamanya?")) db.collection("saran_masukan").doc(id).delete(); }

    window.onload = loadTickets;
</script>
</body>
</html>
