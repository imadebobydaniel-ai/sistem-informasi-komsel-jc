<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tiket - Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .card-stats { border-left: 5px solid #0d6efd; }
        .sla-urgent { color: #dc3545; font-weight: bold; }
        .sla-normal { color: #198754; }
        @media print { .no-print { display: none; } }
        
        .btn-delete {
            background: #dc3545; color: white; border: none;
            padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .btn-delete:hover { background: #a71d2a; }
        .btn-view {
            background: #0dcaf0; color: white; border: none;
            padding: 4px 8px; border-radius: 4px; cursor: pointer;
        }
        .btn-update {
            background: #198754; color: white; border: none;
            padding: 4px 8px; border-radius: 4px; cursor: pointer;
        }
        .clickable-cat {
            cursor: pointer; color: #0d6efd; text-decoration: underline;
        }
        .badge-proses { background-color: #fd7e14; }
        .badge-selesai { background-color: #198754; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4 no-print">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="fas fa-ticket-alt me-2"></i> Portal Tiket Masuk</span>
        <a href="admin.html" class="btn btn-light btn-sm"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
    </div>
</nav>

<div class="container-fluid px-4" id="contentToExport">
    <div class="row mb-4 no-print">
        <div class="col-md-3">
            <div class="card card-stats shadow-sm p-3">
                <small class="text-muted">Total Tiket</small>
                <h3 id="totalTiket">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm p-3" style="border-left: 5px solid #ffc107;">
                <small class="text-muted">Permohonan Doa</small>
                <h3 id="countDoa">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm p-3" style="border-left: 5px solid #dc3545;">
                <small class="text-muted">Problem Aplikasi</small>
                <h3 id="countProblem">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm p-3" style="border-left: 5px solid #198754;">
                <small class="text-muted">Saran & Masukan</small>
                <h3 id="countSaran">0</h3>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4 no-print">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
                <select class="form-select w-auto" id="filterKategori" onchange="loadTickets()">
                    <option value="">Semua Kategori</option>
                    <option value="Permohonan Doa">Permohonan Doa</option>
                    <option value="Masalah Aplikasi">Masalah Aplikasi</option>
                    <option value="Saran & Masukan">Saran & Masukan</option>
                </select>
            </div>
            <div class="btn-group">
                <button onclick="exportPDF()" class="btn btn-danger"><i class="fas fa-file-pdf"></i> Export PDF</button>
                <button onclick="window.print()" class="btn btn-dark"><i class="fas fa-print"></i> Print</button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">Daftar Detail Tiket (Koleksi: saran_masukan)</div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="tiketTable">
                <thead class="table-light">
                    <tr>
                        <th>No Tiket</th>
                        <th>Kategori</th>
                        <th>Tanggal Masuk</th>
                        <th>Tanggal Close</th>
                        <th>Durasi SLA</th>
                        <th>Pengirim</th>
                        <th>Status</th>
                        <th class="no-print">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tiketData"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // Fungsi Hitung SLA (Durasi)
    function hitungSLA(masukStr, timestamp) {
        if (!timestamp) return "Sedang Berjalan";
        
        // Mengubah string tanggal "23/3/2026" menjadi objek Date
        const parts = masukStr.split('/');
        const dMasuk = new Date(parts[2], parts[1] - 1, parts[0]);
        const dSelesai = timestamp.toDate();
        
        const diffMs = dSelesai - dMasuk;
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        
        return diffDays > 0 ? `${diffDays} Hari` : "Hari yang sama";
    }

    // Fungsi Load Data Real-time dari koleksi 'saran_masukan'
    function loadTickets() {
        const filterVal = document.getElementById('filterKategori').value;

        db.collection("saran_masukan").orderBy("timestamp", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('tiketData');
            tbody.innerHTML = "";
            
            let cDoa = 0, cProb = 0, cSaran = 0, total = 0;

            snap.forEach((doc) => {
                const t = doc.data();
                const id = doc.id;

                // Hitung Statistik
                if(t.kategori === "Permohonan Doa") cDoa++;
                if(t.kategori === "Masalah Aplikasi") cProb++;
                if(t.kategori === "Saran & Masukan") cSaran++;
                total++;

                // Filter Kategori
                if(filterVal !== "" && t.kategori !== filterVal) return;

                const sla = (t.status === 'Selesai' || t.status === 'proses') ? 
                             hitungSLA(t.tanggal_kirim, t.timestamp) : "-";
                
                const statusClass = t.status === 'Selesai' ? 'badge-selesai' : 'badge-proses';

                tbody.innerHTML += `
                    <tr>
                        <td><small class="text-muted">${t.nomor_tiket || '-'}</small></td>
                        <td class="clickable-cat" onclick="showDetail('${id}')">
                            <span class="badge bg-info text-dark">${t.kategori}</span>
                        </td>
                        <td>${t.tanggal_kirim} <br><small>${t.jam_kirim || ''}</small></td>
                        <td>${t.status === 'Selesai' ? t.tanggal_kirim : '-'}</td>
                        <td class="${t.status === 'Selesai' ? 'sla-normal' : 'sla-urgent'}">${t.status === 'Selesai' ? 'Selesai' : 'Proses'}</td>
                        <td><b>${t.nama}</b><br><small>${t.jc || '-'}</small></td>
                        <td>
                            <span class="badge ${statusClass}">${t.status ? t.status.toUpperCase() : 'PROSES'}</span>
                        </td>
                        <td class="no-print">
                            <div class="d-flex gap-1">
                                <button class="btn-view" onclick="showDetail('${id}')" title="Lihat Detail"><i class="fas fa-eye"></i></button>
                                ${t.status !== 'Selesai' ? `<button class="btn-update" onclick="updateStatus('${id}')" title="Selesaikan"><i class="fas fa-check"></i></button>` : ''}
                                <button class="btn-delete" onclick="deleteTicket('${id}')" title="Hapus"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalTiket').innerText = total;
            document.getElementById('countDoa').innerText = cDoa;
            document.getElementById('countProblem').innerText = cProb;
            document.getElementById('countSaran').innerText = cSaran;
        });
    }

    // Popup Detail
    function showDetail(id) {
        db.collection("saran_masukan").doc(id).get().then(doc => {
            if (doc.exists) {
                const d = doc.data();
                alert(`
DETAIL TIKET [${d.nomor_tiket}]
---------------------------------
Pengirim : ${d.nama}
Email    : ${d.email}
JC       : ${d.jc}
Kategori : ${d.kategori}

PESAN:
"${d.isi_saran}"

Status   : ${d.status || 'proses'}
                `);
            }
        });
    }

    // Update Status ke Selesai
    function updateStatus(id) {
        if(confirm("Tandai tiket ini sebagai Selesai?")) {
            db.collection("saran_masukan").doc(id).update({
                status: "Selesai"
            }).then(() => alert("Status diperbarui!"));
        }
    }

    // Hapus Tiket
    function deleteTicket(id) {
        if(confirm("Hapus tiket ini secara permanen?")) {
            db.collection("saran_masukan").doc(id).delete().then(() => {
                alert("Tiket dihapus.");
            });
        }
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const element = document.getElementById('contentToExport');
        
        await html2canvas(element).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            doc.addImage(imgData, 'PNG', 10, 10, 280, 150);
            doc.save('Laporan_Tiket_Saran_Masukan.pdf');
        });
    }

    window.onload = loadTickets;
</script>
</body>
</html>
