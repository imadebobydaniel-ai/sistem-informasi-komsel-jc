<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saran & Tiket - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --emas: #D4AF37; --putih: #ffffff; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; /* Paksa tetap di tinggi layar */
            overflow: hidden; /* Cegah scroll body */
        }

        .container { 
            width: 100%; 
            max-width: 380px; 
            background: var(--putih); 
            padding: 20px; /* Dikurangi agar lebih kompak */
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 5px solid var(--emas);
            box-sizing: border-box;
            max-height: 95vh; /* Maksimal tinggi container agar tidak lewat frame */
            display: flex;
            flex-direction: column;
        }

        h3 { color: var(--biru-tua); margin: 0 0 15px 0; font-size: 16px; text-transform: uppercase; }

        .user-box { 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            text-align: left; 
            border: 1px solid #ddd; 
            font-size: 12px; 
        }

        select, textarea { 
            width: 100%; 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            margin-bottom: 12px; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none; 
        }

        /* Tinggi textarea dikurangi agar tombol naik */
        textarea { 
            height: 100px; 
            flex-grow: 1; /* Biar fleksibel */
            resize: none; 
            background: #fafafa; 
        }

        .btn-kirim { 
            width: 100%; 
            background: var(--biru-tua); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 15px; 
            cursor: pointer; 
        }

        .btn-back { 
            display: inline-block; 
            margin-top: 15px; 
            text-decoration: none; 
            color: #888; 
            font-size: 13px; 
            padding: 5px;
        }

        /* Perbaikan untuk Success Screen */
        #success-screen { display: none; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="form-screen">
        <h3><i class="fa-solid fa-envelope-open-text"></i> Kirim Masukan</h3>
        
        <div class="user-box">
            <div>Pengirim: <b id="txt-nama">Memuat...</b></div>
            <div>Komsel: <b id="txt-komsel">Memuat...</b></div>
        </div>

        <select id="kategori-tiket">
            <option value="Saran & Masukan">💡 Saran & Masukan Umum</option>
            <option value="Permohonan Doa">🙏 Permohonan Doa (SLA)</option>
            <option value="Konseling">🤝 Konseling / Curhat</option>
            <option value="Masalah Aplikasi">⚠️ Lapor Masalah Teknis</option>
        </select>

        <textarea id="pesan-tiket" placeholder="Tuliskan pesan Anda di sini..."></textarea>

        <button class="btn-kirim" onclick="prosesKirim()" id="btn-submit">
            KIRIM SEKARANG
        </button>

        <a href="menu.html" class="btn-back">Batal / Kembali</a>
    </div>

    <div id="success-screen">
        <i class="fa-solid fa-circle-check" style="font-size: 40px; color: #28a745; margin-bottom: 10px;"></i>
        <h2 style="color: var(--biru-tua); font-size: 18px;">Berhasil!</h2>
        <p style="color: #666; font-size: 13px;">Pesan Anda sedang diproses.</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    // Konfigurasi Firebase kamu...
    // Fungsi window.onload & prosesKirim() tetap sama...
</script>
</body>
</html>
