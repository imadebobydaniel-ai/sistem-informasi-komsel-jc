<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capaian Doa Komsel - JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru: #003366; --emas: #D4AF37; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        
        .header { background: var(--biru); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--emas); position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; }

        /* Tombol Add Doa */
        .btn-add { background: var(--emas); color: var(--biru); padding: 12px; border-radius: 10px; border: none; font-weight: bold; width: 100%; margin-bottom: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Popup Block Display (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 15px; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 20px; cursor: pointer; color: #999; }

        .form-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--biru); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn-submit { background: var(--biru); color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* Tampilan Tiket di List */
        .ticket-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--emas); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .ticket-id { font-size: 11px; color: #888; font-weight: bold; }
        .ticket-status { float: right; font-size: 10px; padding: 3px 8px; border-radius: 5px; }
        .status-waiting { background: #fff3cd; color: #856404; }
        .status-answered { background: #d4edda; color: #155724; }
        .sla-timer { font-size: 12px; color: #e67e22; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <a href="menu.html" style="color:white; float:left;"><i class="fa-solid fa-arrow-left"></i></a>
    <h3 style="margin:0;">CAPAIAN DOA KOMSEL</h3>
</div>

<div class="container">
    <button class="btn-add" onclick="openModal()"><i class="fa-solid fa-plus"></i> ADD DOA BARU</button>
    
    <div id="list-doa">
        </div>
</div>

<div id="doaModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 style="color: var(--biru); margin-top: 0;">Input Pokok Doa</h3>
        
        <div class="form-group">
            <label>Nomor Tiket (Otomatis)</label>
            <input type="text" id="ticketNo" readonly style="background: #eee;">
        </div>
        
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="namaLengkap" readonly>
        </div>

        <div class="form-group">
            <label>Pilih JC</label>
            <select id="jcSelect">
                <option value="JC1">JC1</option>
                <option value="JC2">JC2</option>
                <option value="JC3">JC3</option>
                <option value="JC4">JC4</option>
                <option value="JC5">JC5</option>
            </select>
        </div>

        <div class="form-group">
            <label>Pokok Doa</label>
            <textarea id="pokokDoa" rows="3" placeholder="Tuliskan permohonan doa..."></textarea>
        </div>

        <div class="form-group">
            <label>Tanggal Input</label>
            <input type="text" id="tglInput" readonly>
        </div>

        <button class="btn-submit" onclick="simpanDoa()">KIRIM KE SURGA</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Firebase Config Bapak...
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const modal = document.getElementById("doaModal");
    const today = new Date();

    function openModal() {
        modal.style.display = "flex";
        // Set Nama & Tanggal Otomatis
        document.getElementById('namaLengkap').value = localStorage.getItem("userName");
        document.getElementById('tglInput').value = today.toLocaleDateString('id-ID');
        
        // Generate Nomor Tiket Sederhana (Bisa dikembangkan dengan counter di DB)
        const randomNo = Math.floor(Math.random() * 900) + 100;
        document.getElementById('ticketNo').value = `NK-JC-DOA-${randomNo}-2026`;
    }

    function closeModal() { modal.style.display = "none"; }

    async function simpanDoa() {
        const dataDoa = {
            ticketId: document.getElementById('ticketNo').value,
            nama: document.getElementById('namaLengkap').value,
            jc: document.getElementById('jcSelect').value,
            pokokDoa: document.getElementById('pokokDoa').value,
            tglInput: firebase.firestore.Timestamp.now(),
            status: "Proses",
            tglCapaian: null,
            totalHari: 0
        };

        await db.collection("laporan_doa").add(dataDoa);
        alert("Doa Berhasil Terdaftar!");
        closeModal();
    }

    // Fungsi untuk menghitung hari (SLA Clock)
    function hitungSLA(tglStart, tglEnd) {
        const start = tglStart.toDate();
        const end = tglEnd ? tglEnd.toDate() : new Date();
        const diffTime = Math.abs(end - start);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        return diffDays;
    }
    
    // Nanti ditambahkan fungsi real-time listener untuk menampilkan listnya...
</script>
</body>
</html>
