<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tiket Doa Komsel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru: #003366; --emas: #D4AF37; --bg: #f4f7fa; --merah: #d32f2f; --hijau: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--biru); color: white; padding: 20px 15px; text-align: center; font-weight: bold; border-bottom: 3px solid var(--emas); flex-shrink: 0; }
        
        .container { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        .btn-tambah { background: var(--emas); color: var(--biru); width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
        
        /* Card Tiket Doa */
        .card-tiket { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--emas); box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .no-tiket { font-size: 10px; color: #888; font-weight: bold; margin-bottom: 5px; }
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .pending { background: #fff3e0; color: #ef6c00; }
        .answered { background: #e8f5e9; color: var(--hijau); }
        
        .sla-info { font-size: 11px; color: #555; background: #eee; padding: 5px 10px; border-radius: 5px; margin-top: 10px; display: inline-block; }
        
        .aksi-buttons { margin-top: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-aksi { border: none; background: none; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-check { color: var(--hijau); font-weight: bold; }
        .btn-edit { color: var(--biru); }
        .btn-hapus { color: var(--merah); }

        .nav-bawah { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 0; display: flex; justify-content: center; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); }
        .btn-kembali { background: var(--merah); color: white; text-decoration: none; padding: 12px 60px; border-radius: 30px; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-end; }
        .modal-content { background: white; width: 100%; padding: 25px; border-radius: 25px 25px 0 0; box-sizing: border-box; }
        textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin: 15px 0; font-family: inherit; resize: none; }
    </style>
</head>
<body>

<header>SISTEM TIKET DOA KOMSEL</header>

<div class="container">
    <div id="labelJC" style="font-size: 12px; font-weight: bold; color: var(--biru); margin-bottom: 10px;">TIKET DOA JC-5</div>
    <button class="btn-tambah" onclick="bukaModal()"><i class="fa-solid fa-ticket"></i> INPUT TIKET DOA BARU</button>
    <div id="displayTiket">Memuat daftar tiket...</div>
</div>

<div class="nav-bawah">
    <a href="menu.html" class="btn-kembali">KEMBALI</a>
</div>

<div id="modalInput" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin: 0; color: var(--biru);">Input Pergumulan Doa</h3>
        <input type="hidden" id="editId">
        <textarea id="isiDoa" rows="4" placeholder="Tuliskan pokok doa Anda..."></textarea>
        <button id="btnSimpan" onclick="simpanTiket()" style="width: 100%; background: var(--biru); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold;">KIRIM TIKET</button>
        <button onclick="tutupModal()" style="width: 100%; background: none; border: none; color: #999; margin-top: 10px;">Batal</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userJC = localStorage.getItem("userJC") || "5";
    const userName = localStorage.getItem("userName") || "User";

    function bukaModal(id = '', text = '') {
        document.getElementById('editId').value = id;
        document.getElementById('isiDoa').value = text;
        document.getElementById('modalTitle').innerText = id ? "Edit Tiket Doa" : "Input Pergumulan Doa";
        document.getElementById('btnSimpan').innerText = id ? "SIMPAN PERUBAHAN" : "KIRIM TIKET";
        document.getElementById('modalInput').style.display = 'flex';
    }

    function tutupModal() { document.getElementById('modalInput').style.display = 'none'; }

    async function simpanTiket() {
        const text = document.getElementById('isiDoa').value;
        const id = document.getElementById('editId').value;
        if (!text) return alert("Isi doa tidak boleh kosong");

        try {
            if (id) {
                await db.collection("laporan_doa").doc(id).update({ pokokDoa: text });
            } else {
                await db.collection("laporan_doa").add({
                    nama: userName,
                    jc: userJC,
                    pokokDoa: text,
                    tglInput: firebase.firestore.FieldValue.serverTimestamp(),
                    terjawab: false,
                    tglTerjawab: null
                });
            }
            tutupModal();
        } catch (e) { alert("Error: " + e.message); }
    }

    async function tandaiTerjawab(id) {
        if(confirm("Apakah doa ini sudah terjawab?")) {
            await db.collection("laporan_doa").doc(id).update({
                terjawab: true,
                tglTerjawab: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }

    async function hapusTiket(id) {
        if(confirm("Hapus tiket doa ini?")) {
            await db.collection("laporan_doa").doc(id).delete();
        }
    }

    function hitungSLA(tglStart, tglEnd) {
        const start = tglStart.toDate();
        const end = tglEnd ? tglEnd.toDate() : new Date();
        const diffTime = Math.abs(end - start);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        return diffDays + " Hari";
    }

    db.collection("laporan_doa").where("jc", "==", userJC).orderBy("tglInput", "desc").onSnapshot((snapshot) => {
        const container = document.getElementById('displayTiket');
        container.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const id = doc.id;
            const statusClass = data.terjawab ? 'answered' : 'pending';
            const statusText = data.terjawab ? 'TERJAWAB' : 'PROSES';
            const sla = data.tglInput ? hitungSLA(data.tglInput, data.tglTerjawab) : "-";

            container.innerHTML += `
                <div class="card-tiket">
                    <div class="no-tiket">TIKET #${id.substring(0,8).toUpperCase()}</div>
                    <div class="status-badge ${statusClass}">${statusText}</div>
                    <h4 style="margin:5px 0; color:var(--biru)">${data.nama}</h4>
                    <p style="margin:0; font-size:13px;">${data.pokokDoa}</p>
                    <div class="sla-info">
                        <i class="fa-regular fa-clock"></i> SLA: ${sla} 
                        ${data.terjawab ? ` | <i class="fa-solid fa-calendar-check"></i> Selesai` : ''}
                    </div>
                    <div class="aksi-buttons">
                        ${!data.terjawab ? `<button class="btn-aksi btn-check" onclick="tandaiTerjawab('${id}')"><i class="fa-solid fa-circle-check"></i> Terjawab</button>` : ''}
                        <button class="btn-aksi btn-edit" onclick="bukaModal('${id}', '${data.pokokDoa}')"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                        <button class="btn-aksi btn-hapus" onclick="hapusTiket('${id}')"><i class="fa-solid fa-trash"></i> Hapus</button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
