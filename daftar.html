<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Konfigurasi Firebase (Tetap gunakan yang sudah ada)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // Fungsi Utama: Daftar Sekarang (Sesuai Struktur Form di Gambar)
    async function daftarSekarang() {
        // Mengambil elemen berdasarkan ID yang ada di form
        const nama = document.getElementById('nama_lengkap').value;
        const no_hp = document.getElementById('nomor_hp').value;
        const email = document.getElementById('email_anggota').value;
        const password = document.getElementById('buat_password').value;
        const gol_darah = document.getElementById('pilih_golongan_darah').value;
        const komsel = document.getElementById('pilih_lokasi_jc').value;
        const status_nikah = document.getElementById('pilih_status_pernikahan').value;
        const jabatan = "Anggota Komsel"; // Default awal sesuai database

        if (!nama || !email || !password) {
            alert("Mohon lengkapi Nama, Email, dan Password!");
            return;
        }

        try {
            // Simpan ke Koleksi "users" agar sinkron dengan Admin Portal
            await db.collection("users").add({
                nama: nama,
                email: email,
                no_hp: no_hp,
                password: password,
                gol_darah: gol_darah,
                komsel: komsel,
                status_nikah: status_nikah,
                jabatan: jabatan,
                tanggal_daftar: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Pendaftaran Berhasil! Data sudah masuk ke Database Administrator.");
            window.location.href = "login.html"; // Arahkan kembali ke login
            
        } catch (error) {
            console.error("Error pendaftaran: ", error);
            alert("Gagal mendaftar: " + error.message);
        }
    }

    // Pasangkan fungsi ke tombol "Daftar Sekarang"
    document.addEventListener('DOMContentLoaded', () => {
        const btnDaftar = document.querySelector('.btn-daftar-sekarang'); // Sesuaikan class tombol di HTML Abang
        if(btnDaftar) {
            btnDaftar.onclick = daftarSekarang;
        }
    });
</script>
