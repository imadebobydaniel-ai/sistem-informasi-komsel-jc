<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anggota - Pondok Pemulihan</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .form-container h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; color: #666; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-daftar { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #2ed573; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-kembali { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #666; color: white; margin-top: 10px; cursor: pointer; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Daftar Anggota</h2>
    
    <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama_lengkap" placeholder="Nama Lengkap">
    </div>
    <div class="input-group">
        <label>Nomor HP</label>
        <input type="text" id="nomor_hp" placeholder="Nomor HP">
    </div>
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email_anggota" placeholder="Email">
    </div>
    <div class="input-group">
        <label>Buat Password</label>
        <input type="password" id="buat_password" placeholder="Password">
    </div>
    <div class="input-group">
        <label>Golongan Darah</label>
        <select id="pilih_golongan_darah">
            <option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option>
        </select>
    </div>
    <div class="input-group">
        <label>Lokasi JC</label>
        <select id="pilih_lokasi_jc">
            <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option><option value="JC 3">JC 3</option><option value="JC 4">JC 4</option><option value="JC 5">JC 5</option><option value="Sentani">Sentani</option>
        </select>
    </div>
    <div class="input-group">
        <label>Status Pernikahan</label>
        <select id="pilih_status_pernikahan">
            <option value="Single">Single</option><option value="Menikah">Menikah</option><option value="Cerai">Cerai</option>
        </select>
    </div>

    <button class="btn-daftar" onclick="daftarSekarang()">Daftar Sekarang</button>
    <a href="login.html" class="btn-kembali">Kembali</a>
</div>

<script>
    // Konfigurasi Database Abang
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Fungsi Registrasi & Sinkronisasi
    async function daftarSekarang() {
        const data = {
            nama: document.getElementById('nama_lengkap').value,
            no_hp: document.getElementById('nomor_hp').value,
            email: document.getElementById('email_anggota').value,
            password: document.getElementById('buat_password').value,
            gol_darah: document.getElementById('pilih_golongan_darah').value,
            komsel: document.getElementById('pilih_lokasi_jc').value,
            status_nikah: document.getElementById('pilih_status_pernikahan').value,
            jabatan: "Anggota Komsel", // Default awal
            tanggal_daftar: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!data.nama || !data.email || !data.password) return alert("Lengkapi Nama, Email, dan Password!");

        try {
            await db.collection("users").add(data);
            alert("Berhasil mendaftar! Data sudah tersinkron ke Administrator.");
            window.location.href = "login.html";
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
