<script>
    // ... config Firebase tetap sama ...
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    if (!userEmail) {
        window.location.replace("index.html");
    } else {
        db.collection("users").where("email", "==", userEmail)
            .onSnapshot((querySnapshot) => {
                if (!querySnapshot.empty) {
                    const data = querySnapshot.docs[0].data();
                    if (data.fotoUrl) { document.getElementById('view-foto').src = data.fotoUrl; }
                    
                    // PERBAIKAN INTEGRASI: Mencoba semua kemungkinan nama field di database
                    // 1. Nomor Komsel (NK)
                    document.getElementById("no_komsel").innerText = data.no_komsel || data.nk || data.nomor_komsel || data.NK || "-";
                    
                    // 2. Golongan Darah
                    document.getElementById("gol_darah").innerText = data.gol_darah || data.golongan_darah || data.golonganDarah || data.goldar || "-";

                    // 3. Data lainnya (Tetap Konsisten)
                    document.getElementById("nama_lengkap").innerText = data.nama || data.nama_lengkap || "-";
                    document.getElementById("jabatan").innerText = data.jabatan || data.peran || "-";
                    document.getElementById("email_aktif").innerText = data.email || "-";
                    document.getElementById("no_hp").innerText = data.no_hp || data.whatsapp || "-";
                    document.getElementById("lokasi_komsel").innerText = data.komsel ? "JC " + data.komsel : (data.lokasi_komsel || "-");
                    document.getElementById("alamat").innerText = data.alamat || "-";
                }
            });
    }

    // Fungsi Upload Foto (Tetap menggunakan Base64 agar tidak error Storage)
    async function uploadFoto(input) {
        const file = input.files[0];
        if (!file || !userEmail) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const max_size = 800;

                if (width > height) {
                    if (width > max_size) { height *= max_size / width; width = max_size; }
                } else {
                    if (height > max_size) { width *= max_size / height; height = max_size; }
                }

                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                try {
                    const snap = await db.collection("users").where("email", "==", userEmail).get();
                    if (!snap.empty) {
                        await db.collection("users").doc(snap.docs[0].id).update({
                            fotoUrl: compressedBase64
                        });
                        
                        // Notifikasi Puji Tuhan
                        const notif = document.getElementById('notif-block');
                        if(notif) {
                            notif.style.display = 'block';
                            setTimeout(() => { notif.style.display = 'none'; }, 3000);
                        }
                    }
                } catch (err) {
                    console.error("Gagal update:", err);
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
