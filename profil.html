<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Profil - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .profile-container { background: white; width: 100%; max-width: 400px; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding-bottom: 25px; }
        .profile-header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; }
        
        .photo-section { text-align: center; padding: 30px 0; }
        .photo-circle { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #00ff88; margin: 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f8f9fa; }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .info-section { padding: 0 25px 20px; }
        .data-box { margin-bottom: 18px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .data-label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .data-value { font-size: 16px; color: #333; font-weight: 500; }

        .action-area { padding: 0 25px; }
        .btn-back { background: #333; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 14px; display: block; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-header">Biodata Anggota Komsel</div>
    
    <div class="photo-section">
        <div class="photo-circle">
            <img id="view-foto" src="https://via.placeholder.com/150?text=..." alt="Foto Profil">
        </div>
    </div>

    <div class="info-section">
        <div class="data-box">
            <div class="data-label">Nomor Komsel (NK)</div>
            <div id="view-nk" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Nama Lengkap</div>
            <div id="view-nama" class="data-value">Memuat data...</div>
        </div>
        <div class="data-box">
            <div class="data-label">Jabatan / Peran</div>
            <div id="view-jabatan" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Email Aktif</div>
            <div id="view-email" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Nomor HP (WhatsApp)</div>
            <div id="view-hp" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Lokasi Komsel JC</div>
            <div id="view-jc" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Golongan Darah</div>
            <div id="view-goldar" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Alamat</div>
            <div id="view-alamat" class="data-value">-</div>
        </div>
    </div>

    <div class="action-area">
        <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    async function loadAutomaticProfile() {
        if (!userEmail) { window.location.href = "index.html"; return; }

        const snap = await db.collection("users").where("email", "==", userEmail).get();
        if (!snap.empty) {
            const d = snap.docs[0].data();
            
            // Mapping data otomatis dari Firebase ke View
            document.getElementById('view-nk').innerText = d.nomor_komsel || "-";
            document.getElementById('view-nama').innerText = d.nama || "-";
            document.getElementById('view-jabatan').innerText = d.jabatan || "-";
            document.getElementById('view-email').innerText = d.email || "-";
            document.getElementById('view-hp').innerText = d.no_hp || "-";
            document.getElementById('view-jc').innerText = "JC " + (d.komsel || "-");
            document.getElementById('view-goldar').innerText = d.gol_darah || d.goldar || "-";
            document.getElementById('view-alamat').innerText = d.alamat || "-";
            
            if (d.fotoUrl) {
                document.getElementById('view-foto').src = d.fotoUrl;
            }
        }
    }

    loadAutomaticProfile();
</script>
</body>
</html>
