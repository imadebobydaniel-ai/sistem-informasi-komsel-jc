<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pengaturan - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --biru-muda: #00e6e6;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; color: #333; }
        
        .settings-card {
            background: white;
            max-width: 450px;
            margin: auto;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-top: 5px solid var(--biru-safir);
        }

        h2 { color: var(--biru-tua); font-weight: 800; text-align: center; margin-bottom: 25px; font-size: 20px; text-transform: uppercase; }
        h2 i { color: var(--emas-lux); margin-right: 8px; }

        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 8px; color: var(--biru-tua); }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd;
            box-sizing: border-box; font-size: 14px; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--biru-safir); outline: none; box-shadow: 0 0 8px rgba(0,86,179,0.2); }

        /* Style Toggle Switch */
        .switch-group {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #eee;
        }
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--hijau-zamrud); }
        input:checked + .slider:before { transform: translateX(21px); }

        .btn-save {
            width: 100%; background: var(--biru-safir); color: white; border: none;
            padding: 15px; border-radius: 50px; font-weight: bold; margin-top: 20px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,86,179,0.3); transition: 0.3s;
        }
        .btn-save:active { transform: scale(0.98); }

        .btn-delete {
            width: 100%; background: #dc3545; color: white; border: none;
            padding: 12px; border-radius: 50px; font-weight: bold; margin-top: 10px;
            cursor: pointer; font-size: 13px;
        }

        .info-box {
            background: #eef6ff; border-left: 4px solid var(--biru-muda);
            padding: 15px; border-radius: 12px; margin-top: 25px; font-size: 12px; text-align: left;
        }

        .back-link { display: block; margin-top: 25px; text-decoration: none; color: var(--biru-safir); font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="settings-card">
        <h2><i class="fa-solid fa-user-gear"></i> Pengaturan Akun</h2>
        
        <div class="input-group">
            <label>Email Baru</label>
            <input type="email" id="new-email" placeholder="Masukkan email baru">
        </div>

        <div class="input-group">
            <label>Password Baru</label>
            <input type="password" id="new-password" placeholder="Masukkan password baru">
        </div>

        <div class="input-group">
            <label>Lokasi Komsel</label>
            <select id="lokasi-komsel">
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <div class="switch-group">
            <label style="font-weight: bold; font-size: 13px; color: var(--biru-tua);">Suara Notifikasi Alkitab (22:00)</label>
            <label class="switch">
                <input type="checkbox" id="toggle-suara">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-group">
            <label style="font-weight: bold; font-size: 13px; color: var(--biru-tua);">Aktifkan Popup Notifikasi</label>
            <label class="switch">
                <input type="checkbox" id="toggle-popup">
                <span class="slider"></span>
            </label>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>Logout Otomatis</label>
            <select id="auto-logout">
                <option value="0">Matikan</option>
                <option value="30">30 Menit</option>
                <option value="60">60 Menit</option>
            </select>
        </div>

        <button class="btn-save" onclick="saveSettings()">SIMPAN PERUBAHAN</button>
        <button class="btn-delete">HAPUS AKUN PERMANEN</button>

        <div class="info-box">
            <strong style="color: var(--biru-safir);"><i class="fa-solid fa-circle-info"></i> Info Pengembang</strong><br>
            Aplikasi ini dikembangkan untuk memudahkan pelaporan pembacaan Alkitab secara realtime bagi Komsel JC Pondok Pemulihan Papua.
        </div>

        <a href="menu.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>
    </div>

    <audio id="sirine-audio" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>

    <script>
        // --- BAGIAN LOGIC UNTUK LOGOUT OTOMATIS & NOTIFIKASI ---

let timeout;
const pesanNotif = document.getElementById('notif-pesan'); // Pastikan ada elemen ini di HTML Bapak

function resetTimer() {
    clearTimeout(timeout);
    
    // Ambil durasi dari pilihan dropdown (misal: 30 menit)
    const durasiMenit = parseInt(document.getElementById('logout-select').value) || 30;
    const durasiMS = durasiMenit * 60 * 1000;

    timeout = setTimeout(() => {
        // Proses Logout Otomatis
        localStorage.clear(); // Hapus data login
        window.location.href = 'login.html'; // Pindah ke halaman login
    }, durasiMS);
}

// Jalankan deteksi aktivitas di HP (sentuhan layar)
window.onload = resetTimer;
document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
document.ontouchstart = resetTimer; // Sangat penting untuk penggunaan di HP

function simpanPengaturan() {
    // 1. Simpan data ke localStorage agar tersimpan permanen
    const durasi = document.getElementById('logout-select').value;
    localStorage.setItem('durasiLogout', durasi);

    // 2. GANTI ALERT DENGAN BLOCK DISPLAY
    // Alih-alih muncul popup "OK", kita munculkan teks di bawah tombol
    pesanNotif.style.display = 'block';
    pesanNotif.innerText = '✅ Pengaturan Berhasil Disimpan!';
    
    // Hilangkan pesan setelah 3 detik secara otomatis
    setTimeout(() => {
        pesanNotif.style.display = 'none';
    }, 3000);
}
        // Memuat Pengaturan Saat Halaman Dibuka
        window.onload = function() {
            document.getElementById('toggle-suara').checked = localStorage.getItem('suaraNotif') === 'true';
            document.getElementById('toggle-popup').checked = localStorage.getItem('popupNotif') === 'true';
            document.getElementById('auto-logout').value = localStorage.getItem('timeoutValue') || "0";
            
            // Jalankan sistem monitoring
            startInactivityTimer();
            startNotificationCheck();
        };

        function saveSettings() {
            const suara = document.getElementById('toggle-suara').checked;
            const popup = document.getElementById('toggle-popup').checked;
            const timeout = document.getElementById('auto-logout').value;

            localStorage.setItem('suaraNotif', suara);
            localStorage.setItem('popupNotif', popup);
            localStorage.setItem('timeoutValue', timeout);

            alert("Pengaturan Berhasil Disimpan!");
            location.reload();
        }

        // --- LOGIKA LOGOUT OTOMATIS ---
        let idleTimer;
        function startInactivityTimer() {
            const minutes = parseInt(localStorage.getItem('timeoutValue'));
            if (minutes > 0) {
                const ms = minutes * 60 * 1000;
                resetTimer(ms);
                window.onmousemove = () => resetTimer(ms);
                window.onkeypress = () => resetTimer(ms);
                window.ontouchstart = () => resetTimer(ms);
            }
        }

        function resetTimer(ms) {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                alert("Sesi berakhir karena tidak ada aktivitas.");
                localStorage.clear();
                window.location.href = 'index.html';
            }, ms);
        }

        // --- LOGIKA NOTIFIKASI JAM 10 MALAM (22:00) ---
        function startNotificationCheck() {
            setInterval(() => {
                const now = new Date();
                if (now.getHours() === 22 && now.getMinutes() === 0 && now.getSeconds() === 0) {
                    executeNotification();
                }
            }, 1000);
        }

        function executeNotification() {
            const suaraAktif = localStorage.getItem('suaraNotif') === 'true';
            const popupAktif = localStorage.getItem('popupNotif') === 'true';

            if (suaraAktif) {
                document.getElementById('sirine-audio').play();
            }

            if (popupAktif) {
                alert("🔔 PENGINGAT: Harap segera laporkan pembacaan Alkitab Anda hari ini!");
            }
        }
    </script>
</body>
</html>
