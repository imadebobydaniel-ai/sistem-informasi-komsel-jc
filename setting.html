<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-utama: #0056b3; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .setting-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; border-top: 5px solid var(--biru-utama); }
        .header { text-align: center; margin-bottom: 25px; color: var(--biru-utama); font-weight: bold; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: var(--biru-utama); color: white; width: 100%; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { background: #003d80; }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--biru-utama); font-size: 14px; font-weight: bold; }
        
        /* Notifikasi Block Display */
        #notif-block {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); color: white; padding: 30px; border-radius: 15px;
            text-align: center; z-index: 10000; width: 80%; max-width: 300px;
            border: 2px solid var(--biru-utama);
        }
    </style>
</head>
<body>

<div id="notif-block">
    <i class="fa-solid fa-circle-check" style="font-size: 40px; color: #2ecc71; margin-bottom: 15px;"></i>
    <p id="notif-text" style="margin: 0;">Password dan Email Berhasil diupdate</p>
    <p style="font-size: 12px; margin-top: 10px; color: #aaa;">Mengalihkan ke Login...</p>
</div>

<div class="setting-container">
    <div class="header"><i class="fa-solid fa-user-gear"></i> PENGATURAN AKUN</div>
    
    <div class="form-group">
        <label>Email Baru</label>
        <input type="email" id="newEmail" placeholder="Masukkan email baru">
    </div>

    <div class="form-group">
        <label>Password Baru</label>
        <input type="password" id="newPassword" placeholder="Masukkan password baru">
    </div>

    <button class="btn-save" onclick="updateAkun()">SIMPAN PERUBAHAN</button>
    
    <a href="menu.html" class="back-link">← Kembali ke Menu</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase (Tetap sesuai milik Bapak)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const oldEmail = localStorage.getItem("userEmail");

    async function updateAkun() {
        const newEmail = document.getElementById("newEmail").value;
        const newPassword = document.getElementById("newPassword").value;

        if (!newEmail || !newPassword) {
            alert("Harap isi Email dan Password baru!");
            return;
        }

        try {
            // 1. Cari dokumen user berdasarkan email lama
            const snap = await db.collection("users").where("email", "==", oldEmail).get();

            if (!snap.empty) {
                const docId = snap.docs[0].id;

                // 2. Update di Database
                await db.collection("users").doc(docId).update({
                    email: newEmail,
                    password: newPassword // Pastikan nama field sesuai di DB Bapak
                });

                // 3. Munculkan Notif Block
                document.getElementById("notif-block").style.display = "block";

                // 4. Hapus sesi & Arahkan ke Login setelah 3 detik
                setTimeout(() => {
                    localStorage.clear();
                    window.location.replace("index.html");
                }, 3000);
            } else {
                alert("Data user tidak ditemukan.");
            }
        } catch (error) {
            alert("Gagal update: " + error.message);
        }
    }
</script>
</body>
</html>
