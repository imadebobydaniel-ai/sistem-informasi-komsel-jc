<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pengaturan - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366; --biru-safir: #0056b3; --biru-muda: #00e6e6;
            --hijau-zamrud: #2ecc71; --emas-lux: #D4AF37; --putih-bg: #f4f7fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; color: #333; }
        .settings-card {
            background: white; max-width: 450px; margin: auto; border-radius: 25px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 5px solid var(--biru-safir);
        }
        h2 { color: var(--biru-tua); font-weight: 800; text-align: center; margin-bottom: 25px; font-size: 18px; text-transform: uppercase; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 8px; color: var(--biru-tua); }
        .input-group select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; font-size: 14px; }
        .btn-save {
            width: 100%; background: var(--biru-safir); color: white; border: none;
            padding: 15px; border-radius: 50px; font-weight: bold; margin-top: 20px; cursor: pointer;
        }
        /* Notifikasi Block Display */
        #notif-pesan {
            display: none; color: #0d9488; font-weight: bold; margin-top: 15px; 
            text-align: center; background: #f0fdfa; padding: 10px; border-radius: 12px; font-size: 13px;
        }
        .back-link { display: block; margin-top: 25px; text-decoration: none; color: var(--biru-safir); font-weight: bold; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <div class="settings-card">
        <h2><i class="fa-solid fa-user-gear"></i> Pengaturan Akun</h2>
        
        <div class="input-group">
            <label>Lokasi Komsel</label>
            <select id="lokasi-komsel">
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <div class="input-group">
            <label>Logout Otomatis (Keamanan)</label>
            <select id="auto-logout">
                <option value="0">Matikan</option>
                <option value="30">30 Menit</option>
                <option value="60">60 Menit</option>
            </select>
        </div>

        <button class="btn-save" onclick="saveSettings()">SIMPAN PERUBAHAN</button>
        <div id="notif-pesan"></div>

        <a href="menu.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>
    </div>

    <script>
        let idleTimer;

        // 1. FUNGSI LOAD (Dijalankan sekali saat buka halaman)
        window.onload = function() {
            // Muat data tersimpan
            document.getElementById('lokasi-komsel').value = localStorage.getItem('userJC') || "JC 1";
            const savedTimeout = localStorage.getItem('timeoutValue') || "0";
            document.getElementById('auto-logout').value = savedTimeout;

            // Jalankan monitor hanya jika nilainya BUKAN "0"
            if (savedTimeout !== "0") {
                startMonitoring(parseInt(savedTimeout));
            }
        };

        // 2. FUNGSI SIMPAN (Tanpa Alert Popup)
        function saveSettings() {
            const jc = document.getElementById('lokasi-komsel').value;
            const timeoutVal = document.getElementById('auto-logout').value;

            localStorage.setItem('userJC', jc);
            localStorage.setItem('timeoutValue', timeoutVal);

            // Tampilkan notifikasi teks (Block Display)
            const pesan = document.getElementById('notif-pesan');
            pesan.style.display = 'block';
            pesan.innerHTML = '✅ Pengaturan Berhasil Diperbarui!';
            
            setTimeout(() => { 
                pesan.style.display = 'none'; 
                location.reload(); // Refresh untuk mengaktifkan timer baru
            }, 1500);
        }

        // 3. SISTEM MONITORING (Anti Instant Logout)
        function startMonitoring(minutes) {
            const ms = minutes * 60 * 1000;
            
            // Fungsi untuk reset timer saat ada aktivitas
            const resetAction = () => {
                clearTimeout(idleTimer);
                idleTimer = setTimeout(() => {
                    localStorage.clear();
                    window.location.href = 'login.html';
                }, ms);
            };

            // Daftarkan event aktivitas (Termasuk sentuhan HP)
            window.onmousemove = resetAction;
            window.onkeypress = resetAction;
            window.ontouchstart = resetAction;
            window.onclick = resetAction;

            // Jalankan pertama kali
            resetAction();
        }
    </script>
</body>
</html>
