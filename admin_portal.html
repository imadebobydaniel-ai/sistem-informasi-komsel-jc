<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { background: #ff003c; color: white; padding: 12px; text-align: left; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-aktif { color: green; font-weight: bold; }
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .btn-refresh { background: #2ed573; }
        .btn-keluar { background: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <h2><i class="fas fa-database"></i> Database Administrator</h2>
        <div>
            <button class="btn btn-refresh" onclick="muatData()">Refresh Data</button>
            <button class="btn btn-keluar" onclick="window.location.href='index.html'">Keluar</button>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Jabatan</th>
                    <th>Lokasi JC</th>
                    <th>Gol. Darah</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="dataBody">
                <tr><td colspan="8" style="text-align:center;">Mengambil data dari Firestore...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Konfigurasi Firebase Abang
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(); // MENGGUNAKAN FIRESTORE

    function muatData() {
        const tbody = document.getElementById('dataBody');
        
        // Mengambil koleksi 'users'
        db.collection("users").get().then((querySnapshot) => {
            tbody.innerHTML = "";
            if (querySnapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='8' style='text-align:center;'>Database Kosong (Koleksi 'users' tidak ditemukan).</td></tr>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const v = doc.data();
                // Nama field disesuaikan dengan screenshot Firestore Abang
                tbody.innerHTML += `
                    <tr>
                        <td>${v.nama || '-'}</td>
                        <td>${v.email || '-'}</td>
                        <td>${v.password || '-'}</td>
                        <td>${v.no_hp || '-'}</td>
                        <td>${v.jabatan || '-'}</td>
                        <td>${v.komsel || '-'}</td>
                        <td>${v.gol_darah || '-'}</td>
                        <td class="status-aktif">Aktif</td>
                    </tr>`;
            });
        }).catch((error) => {
            console.error("Error mengambil data: ", error);
            tbody.innerHTML = `<tr><td colspan='8' style='text-align:center; color:red;'>Error: ${error.message}</td></tr>`;
        });
    }

    // Jalankan saat halaman dibuka
    muatData();
</script>
</body>
</html>
