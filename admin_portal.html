<div id="modalEdit" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center;">
    <div style="background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); color: #333;">
        <h3 style="margin-top: 0; border-bottom: 2px solid #0084ff; padding-bottom: 10px;">Edit Data Anggota</h3>
        
        <div style="margin-bottom: 12px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Nama Lengkap:</label>
            <input type="text" id="editNama" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 12px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Alamat Email:</label>
            <input type="email" id="editEmail" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 12px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Password:</label>
            <input type="text" id="editPassword" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 12px;">
            <label style="display:block; font-weight:bold; font-size:13px;">No HP / WhatsApp:</label>
            <input type="text" id="editHP" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 12px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Golongan Darah:</label>
            <select id="editGolDarah" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
            </select>
        </div>

        <div style="margin-bottom: 12px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Jabatan:</label>
            <select id="editJabatan" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Wakil Ketua">Wakil Ketua</option>
                <option value="Pengerja">Pengerja</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Komsel JC:</label>
            <select id="editKomsel" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option><option value="JC 3">JC 3</option><option value="JC 4">JC 4</option><option value="JC 5">JC 5</option>
            </select>
        </div>

        <button onclick="simpanPerubahan()" style="width:100%; background:#0084ff; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:10px;">Simpan Perubahan</button>
        <button onclick="tutupModal()" style="width:100%; background:#6c757d; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">Batal</button>
    </div>
</div>
