<style>
    /* Background Hitam Transparan */
    .modal {
        display: none; 
        position: fixed; 
        z-index: 9999; 
        left: 0; 
        top: 0; 
        width: 100%; 
        height: 100%; 
        background-color: rgba(0, 0, 0, 0.6); 
        align-items: center; 
        justify-content: center;
        backdrop-filter: blur(4px); /* Efek blur dikit biar keren */
    }

    /* Kotak Putih Modal */
    .modal-content {
        background-color: #ffffff;
        padding: 25px;
        border-radius: 15px;
        width: 90%;
        max-width: 450px; /* Dikunci biar tidak meluber */
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        position: relative;
        animation: animasimasuk 0.3s ease-out;
    }

    @keyframes animasimasuk {
        from { transform: translateY(-30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .modal-content h3 {
        margin-top: 0;
        color: #1c1e21;
        border-bottom: 2px solid #0084ff;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
        text-align: left;
    }

    .form-group label {
        display: block;
        font-weight: bold;
        font-size: 13px;
        margin-bottom: 5px;
        color: #444;
    }

    .form-group input, 
    .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box; /* WAJIB: Biar gak nendang keluar */
        font-size: 14px;
        transition: border 0.3s;
    }

    .form-group input:focus, 
    .form-group select:focus {
        border-color: #0084ff;
        outline: none;
    }

    .btn-save {
        width: 100%;
        background: #0084ff;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: background 0.3s;
    }

    .btn-save:hover { background: #0073dd; }

    .btn-cancel {
        width: 100%;
        background: #6c757d;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 8px;
    }
</style>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3>Edit Data Anggota</h3>
        
        <div class="form-group">
            <label>Nama Lengkap:</label>
            <input type="text" id="editNama">
        </div>

        <div class="form-group">
            <label>Alamat Email:</label>
            <input type="email" id="editEmail">
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="text" id="editPassword">
        </div>

        <div class="form-group">
            <label>No HP / WhatsApp:</label>
            <input type="text" id="editHP">
        </div>

        <div class="form-group">
            <label>Golongan Darah:</label>
            <select id="editGolDarah">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>

        <div class="form-group">
            <label>Jabatan (Pilih):</label>
            <select id="editJabatan">
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Wakil Ketua">Wakil Ketua</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Pengerja">Pengerja</option>
            </select>
        </div>

        <div class="form-group">
            <label>Komsel JC (Pilih):</label>
            <select id="editKomsel">
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <button class="btn-save" onclick="simpanPerubahan()">Simpan Perubahan</button>
        <button class="btn-cancel" onclick="tutupModal()">Batal</button>
    </div>
</div>

<script>
    function bukaEditTerpilih() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        if (terpilih.length !== 1) {
            alert("Pilih (centang) satu data saja untuk diedit!");
            return;
        }

        const row = terpilih[0].closest('tr');
        
        // Pindahkan data dari tabel ke input modal
        document.getElementById('editNama').value = row.cells[1].innerText;
        document.getElementById('editEmail').value = row.cells[2].innerText;
        document.getElementById('editPassword').value = row.cells[3].innerText;
        document.getElementById('editHP').value = row.cells[4].innerText;
        document.getElementById('editGolDarah').value = row.cells[5].innerText;
        document.getElementById('editJabatan').value = row.cells[6].innerText;
        document.getElementById('editKomsel').value = row.cells[7].innerText;

        window.rowTarget = row;
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function simpanPerubahan() {
        if (!window.rowTarget) return;
        
        const row = window.rowTarget;
        row.cells[1].innerText = document.getElementById('editNama').value;
        row.cells[2].innerText = document.getElementById('editEmail').value;
        row.cells[3].innerText = document.getElementById('editPassword').value;
        row.cells[4].innerText = document.getElementById('editHP').value;
        row.cells[5].innerText = document.getElementById('editGolDarah').value;
        row.cells[6].innerText = document.getElementById('editJabatan').value;
        row.cells[7].innerText = document.getElementById('editKomsel').value;

        alert("Data berhasil diperbarui!");
        tutupModal();
    }

    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
        // Reset checkbox biar tidak nyangkut
        document.querySelectorAll('.pilih-item').forEach(c => c.checked = false);
        // Reset checkbox master jika ada
        const master = document.getElementById('checkAll');
        if(master) master.checked = false;
    }

    // Menutup modal jika user klik di luar kotak putih
    window.onclick = function(event) {
        const modal = document.getElementById('modalEdit');
        if (event.target == modal) {
            tutupModal();
        }
    }
</script>
