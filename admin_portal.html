<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Pondok Pemulihan Papua</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf-plugin-autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1200px; margin: auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #0084ff; padding-bottom: 10px; margin-bottom: 25px; }
        .header-flex h2 { margin: 0; color: #333; }
        
        .btn-logout { background: #6c757d; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-logout:hover { background: #5a6268; }

        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; color: white; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #e74c3c; }
        .btn-edit { background: #f1c40f; color: #333; }
        .btn-delete { background: #34495e; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th { background: #0084ff; color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; color: #555; }
        tr:hover { background: #f9f9f9; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: #0084ff; color: white; width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #bdc3c7; color: white; width: 100%; margin-top: 8px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2><i class="fas fa-user-shield"></i> Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar / Kembali</a>
    </div>

    <div class="toolbar">
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <button class="btn btn-pdf" onclick="eksporKePDF()">Export PDF</button>
        <button class="btn btn-edit" onclick="bukaModalEdit()">Edit Terpilih</button>
        <button class="btn btn-delete" onclick="hapusData()">Hapus Terpilih</button>
    </div>

    <div class="table-wrapper">
        <table id="tabelData">
            <thead>
                <tr>
                    <th style="width: 30px;"><input type="checkbox" id="checkAll" onclick="pilihSemua(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No. HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>Bukadong821</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                </tr>
                <tr>
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>Budi Santoso</td>
                    <td>budi@gmail.com</td>
                    <td>User123</td>
                    <td>08123456789</td>
                    <td>O</td>
                    <td>Ketua Komsel</td>
                    <td>JC 1</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal-overlay">
    <div class="modal-box">
        <h3 style="margin-top:0; color:#0084ff;">Edit Data Anggota</h3>
        <div class="form-group"><label>Nama Lengkap:</label><input type="text" id="editNama"></div>
        <div class="form-group"><label>Email:</label><input type="email" id="editEmail"></div>
        <div class="form-group"><label>Password:</label><input type="text" id="editPassword"></div>
        <div class="form-group"><label>No HP:</label><input type="text" id="editHP"></div>
        <div class="form-group">
            <label>Gol. Darah:</label>
            <select id="editGolDarah"><option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option></select>
        </div>
        <div class="form-group">
            <label>Jabatan:</label>
            <select id="editJabatan">
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Wakil Ketua">Wakil Ketua</option>
                <option value="Pengerja">Pengerja</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
            </select>
        </div>
        <div class="form-group">
            <label>Komsel JC:</label>
            <select id="editKomsel">
                <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option><option value="JC 3">JC 3</option><option value="JC 4">JC 4</option><option value="JC 5">JC 5</option>
            </select>
        </div>
        <button class="btn-save" onclick="simpanData()">Simpan Perubahan</button>
        <button class="btn-cancel" onclick="tutupModal()">Batal</button>
    </div>
</div>

<script>
    function pilihSemua(master) {
        document.querySelectorAll('.pilih-item').forEach(cb => cb.checked = master.checked);
    }

    function bukaModalEdit() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        if (terpilih.length !== 1) return alert("Pilih satu data saja!");
        const baris = terpilih[0].closest('tr');
        document.getElementById('editNama').value = baris.cells[1].innerText;
        document.getElementById('editEmail').value = baris.cells[2].innerText;
        document.getElementById('editPassword').value = baris.cells[3].innerText;
        document.getElementById('editHP').value = baris.cells[4].innerText;
        document.getElementById('editGolDarah').value = baris.cells[5].innerText;
        document.getElementById('editJabatan').value = baris.cells[6].innerText;
        document.getElementById('editKomsel').value = baris.cells[7].innerText;
        window.barisTarget = baris;
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function simpanData() {
        const b = window.barisTarget;
        b.cells[1].innerText = document.getElementById('editNama').value;
        b.cells[2].innerText = document.getElementById('editEmail').value;
        b.cells[3].innerText = document.getElementById('editPassword').value;
        b.cells[4].innerText = document.getElementById('editHP').value;
        b.cells[5].innerText = document.getElementById('editGolDarah').value;
        b.cells[6].innerText = document.getElementById('editJabatan').value;
        b.cells[7].innerText = document.getElementById('editKomsel').value;
        tutupModal();
    }

    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
        document.querySelectorAll('.pilih-item').forEach(c => c.checked = false);
    }

    function hapusData() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        if (terpilih.length === 0) return alert("Pilih data dulu!");
        if (confirm("Hapus data terpilih?")) terpilih.forEach(cb => cb.closest('tr').remove());
    }

    // FUNGSI PDF FIX - MENGGUNAKAN ID 'tabelData'
    function eksporKePDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Daftar Anggota Pondok Pemulihan", 14, 15);
            doc.autoTable({ 
                html: '#tabelData', 
                startY: 20, 
                theme: 'grid',
                columns: [
                    {header: 'Nama', dataKey: 'nama'},
                    {header: 'Email', dataKey: 'email'},
                    {header: 'Password', dataKey: 'pass'},
                    {header: 'No HP', dataKey: 'hp'},
                    {header: 'Gol', dataKey: 'gol'},
                    {header: 'Jabatan', dataKey: 'jab'},
                    {header: 'Komsel', dataKey: 'kom'}
                ]
            });
            doc.save("Data_Anggota.pdf");
        } catch (e) {
            alert("Gagal Export PDF: Pastikan koneksi internet aktif untuk memuat library.");
        }
    }
</script>
</body>
</html>
