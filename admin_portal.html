<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrator - Pondok Pemulihan Papua</title>
    <style>
        /* CSS UTAMA DASHBOARD */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1c1e21; border-bottom: 2px solid #0084ff; padding-bottom: 10px; }
        
        /* CSS MODAL (AGAR TIDAK KACAU) */
        .modal {
            display: none; 
            position: fixed;
            z-index: 9999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            text-align: left;
        }
        .modal-content label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #333;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; /* Kunci agar tidak meluber */
        }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn-simpan { flex: 1; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-batal { flex: 1; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* TABEL */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0084ff; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Administrator</h2>
    <button onclick="window.location.href='index.html'" style="padding: 10px; margin-bottom: 10px; cursor:pointer;">← Kembali</button>

    <div id="tabelData">
        <table>
            <thead>
                <tr>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="bodyTabel">
                <tr>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td><button onclick="bukaModalEdit('id123', {nama_lengkap: 'Imade boby', email: 'imade.bobydaniel@gmail.com'})">Edit</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3 style="color: #0084ff; text-align: center; border-bottom: 2px solid #0084ff; padding-bottom: 10px; margin-top:0;">Edit Data Anggota</h3>
        
        <form id="formEdit">
            <label>Nama Lengkap:</label>
            <input type="text" id="editNama" required>

            <label>Alamat Email:</label>
            <input type="email" id="editEmail">

            <label>Password:</label>
            <input type="text" id="editPassword">

            <label>Nomor HP / WhatsApp:</label>
            <input type="text" id="editNoHP">

            <label>Golongan Darah:</label>
            <select id="editGolDarah">
                <option value="">-- Pilih --</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>

            <label>Jabatan:</label>
            <select id="editJabatan">
                <option value="">-- Pilih --</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Pengurus">Pengurus</option>
            </select>

            <label>Komsel JC:</label>
            <input type="text" id="editKomsel">

            <div class="btn-group">
                <button type="submit" class="btn-simpan">Simpan Perubahan</button>
                <button type="button" onclick="tutupModal()" class="btn-batal">Batal</button>
            </div>
        </form>
    </div>
</div>

<script>
    // FUNGSI UNTUK MEMBUKA MODAL
    function bukaModalEdit(id, data) {
        document.getElementById('editNama').value = data.nama_lengkap || '';
        document.getElementById('editEmail').value = data.email || '';
        document.getElementById('editPassword').value = data.password || '';
        document.getElementById('editNoHP').value = data.no_hp || '';
        document.getElementById('editGolDarah').value = data.gol_darah || '';
        document.getElementById('editJabatan').value = data.jabatan || '';
        document.getElementById('editKomsel').value = data.komsel_jc || '';

        document.getElementById('formEdit').setAttribute('data-id', id);
        document.getElementById('modalEdit').style.display = 'flex';
    }

    // FUNGSI UNTUK MENUTUP MODAL
    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
    }

    // Mencegah error blank saat submit
    document.getElementById('formEdit').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Data siap diupdate ke Firebase!');
        tutupModal();
    });
</script>

</body>
</html>
