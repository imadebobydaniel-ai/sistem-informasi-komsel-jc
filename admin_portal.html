<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff003c; padding-bottom: 15px; margin-bottom: 25px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .btn-refresh { background: #2ed573; }
        .btn-edit { background: #ffa502; }
        .btn-delete { background: #2f3542; }
        .btn-logout { background: #666; text-decoration: none; }
        .table-container { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        th { background: #ff003c; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 550px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { margin-bottom: 10px; }
        .field label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .field input, .field select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-database"></i> Database Administrator</h2>
        <a href="index.html" class="btn btn-logout">Keluar</a>
    </div>

    <div class="toolbar">
        <button class="btn btn-refresh" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
        <button class="btn btn-edit" onclick="bukaEditModal()"><i class="fas fa-edit"></i> Edit Data</button>
        <button class="btn btn-delete" onclick="hapusTerpilih()"><i class="fas fa-trash"></i> Hapus</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" onclick="toggleAll(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>No HP</th>
                    <th>Alamat</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Gol. Darah</th>
                    <th>Lokasi JC</th>
                    <th>Jabatan</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="dataBody">
                <tr id="loadingRow"><td colspan="10" style="text-align:center;">Mengambil data dari Firebase...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3>Edit Data Anggota</h3>
        <input type="hidden" id="edId">
        <div class="grid-form">
            <div class="field full-width"><label>Nama:</label><input type="text" id="edNama"></div>
            <div class="field"><label>No HP:</label><input type="text" id="edHP"></div>
            <div class="field"><label>Gol. Darah:</label>
                <select id="edDarah">
                    <option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option>
                </select>
            </div>
            <div class="field full-width"><label>Alamat:</label><input type="text" id="edAlamat"></div>
            <div class="field"><label>Email:</label><input type="email" id="edEmail"></div>
            <div class="field"><label>Password:</label><input type="text" id="edPass"></div>
            <div class="field"><label>Lokasi JC:</label>
                <select id="edLokasi">
                    <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option><option value="JC 3">JC 3</option><option value="JC 4">JC 4</option><option value="JC 5">JC 5</option>
                </select>
            </div>
            <div class="field"><label>Jabatan:</label>
                <select id="edJabatan">
                    <option value="Ketua Komsel">Ketua Komsel</option><option value="Wakil Ketua">Wakil Ketua</option><option value="Anggota">Anggota</option>
                </select>
            </div>
        </div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn btn-refresh" style="flex:1" onclick="simpanKeFirebase()">Update</button>
            <button class="btn btn-delete" style="flex:1" onclick="tutupModal()">Batal</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // AMBIL DATA DARI FIREBASE
    db.ref('users').on('value', (snapshot) => {
        const tbody = document.getElementById('dataBody');
        tbody.innerHTML = "";
        if(!snapshot.exists()) {
            tbody.innerHTML = "<tr><td colspan='10' style='text-align:center;'>Belum ada data di database.</td></tr>";
            return;
        }
        snapshot.forEach((child) => {
            const val = child.val();
            const id = child.key;
            tbody.innerHTML += `
                <tr data-id="${id}">
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>${val.nama || ''}</td>
                    <td>${val.noHP || ''}</td>
                    <td>${val.alamat || ''}</td>
                    <td>${val.email || ''}</td>
                    <td>${val.password || ''}</td>
                    <td>${val.golDarah || ''}</td>
                    <td>${val.lokasiJC || ''}</td>
                    <td>${val.jabatan || ''}</td>
                    <td style="color:green; font-weight:bold;">Aktif</td>
                </tr>`;
        });
    });

    function toggleAll(source) {
        document.querySelectorAll('.pilih-item').forEach(cb => cb.checked = source.checked);
    }

    function bukaEditModal() {
        const selected = document.querySelector('.pilih-item:checked');
        if(!selected) return alert("Pilih satu data!");
        const row = selected.closest('tr');
        document.getElementById('edId').value = row.getAttribute('data-id');
        document.getElementById('edNama').value = row.cells[1].innerText;
        document.getElementById('edHP').value = row.cells[2].innerText;
        document.getElementById('edAlamat').value = row.cells[3].innerText;
        document.getElementById('edEmail').value = row.cells[4].innerText;
        document.getElementById('edPass').value = row.cells[5].innerText;
        document.getElementById('edDarah').value = row.cells[6].innerText;
        document.getElementById('edLokasi').value = row.cells[7].innerText;
        document.getElementById('edJabatan').value = row.cells[8].innerText;
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function tutupModal() { document.getElementById('modalEdit').style.display = 'none'; }

    async function simpanKeFirebase() {
        const id = document.getElementById('edId').value;
        const data = {
            nama: document.getElementById('edNama').value,
            noHP: document.getElementById('edHP').value,
            alamat: document.getElementById('edAlamat').value,
            email: document.getElementById('edEmail').value,
            password: document.getElementById('edPass').value,
            golDarah: document.getElementById('edDarah').value,
            lokasiJC: document.getElementById('edLokasi').value,
            jabatan: document.getElementById('edJabatan').value
        };
        await db.ref('users/' + id).update(data);
        alert("Berhasil diupdate!");
        tutupModal();
    }

    async function hapusTerpilih() {
        const selected = document.querySelectorAll('.pilih-item:checked');
        if(selected.length === 0) return alert("Pilih data!");
        if(confirm("Hapus permanen?")) {
            selected.forEach(async (cb) => {
                const id = cb.closest('tr').getAttribute('data-id');
                await db.ref('users/' + id).remove();
            });
        }
    }
</script>
</body>
</html>
