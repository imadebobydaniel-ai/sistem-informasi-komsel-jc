<div id="modalEdit" class="modal">
    <div class="modal-content" style="max-width: 450px; border-radius: 12px; padding: 25px;">
        <h3 style="margin-top: 0; border-bottom: 2px solid #0084ff; padding-bottom: 10px;">Edit Data Anggota</h3>
        
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Nama Lengkap:</label>
            <input type="text" id="editNama" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Alamat Email:</label>
            <input type="email" id="editEmail" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Password:</label>
            <input type="text" id="editPassword" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; font-size:13px;">No HP / WhatsApp:</label>
            <input type="text" id="editHP" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Golongan Darah:</label>
            <select id="editGolDarah" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Jabatan (Pilih):</label>
            <select id="editJabatan" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Wakil Ketua">Wakil Ketua</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Pengerja">Pengerja</option>
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; font-size:13px;">Komsel JC (Pilih):</label>
            <select id="editKomsel" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <button class="btn-save" onclick="simpanPerubahan()" style="width:100%; background:#0084ff; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:10px;">Simpan Perubahan</button>
        <button onclick="tutupModal()" style="width:100%; background:#6c757d; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">Batal</button>
    </div>
</div>

<script>
    function bukaEditTerpilih() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        if (terpilih.length !== 1) return alert("Pilih (centang) satu data saja untuk diedit!");

        const row = terpilih[0].closest('tr');
        
        // Pindahkan data dari tabel ke input modal
        document.getElementById('editNama').value = row.cells[1].innerText;
        document.getElementById('editEmail').value = row.cells[2].innerText;
        document.getElementById('editPassword').value = row.cells[3].innerText;
        document.getElementById('editHP').value = row.cells[4].innerText;
        document.getElementById('editGolDarah').value = row.cells[5].innerText;
        document.getElementById('editJabatan').value = row.cells[6].innerText;
        document.getElementById('editKomsel').value = row.cells[7].innerText;

        window.rowTarget = row;
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function simpanPerubahan() {
        if (!window.rowTarget) return;
        
        const row = window.rowTarget;
        row.cells[1].innerText = document.getElementById('editNama').value;
        row.cells[2].innerText = document.getElementById('editEmail').value;
        row.cells[3].innerText = document.getElementById('editPassword').value;
        row.cells[4].innerText = document.getElementById('editHP').value;
        row.cells[5].innerText = document.getElementById('editGolDarah').value;
        row.cells[6].innerText = document.getElementById('editJabatan').value;
        row.cells[7].innerText = document.getElementById('editKomsel').value;

        alert("Data berhasil diperbarui!");
        tutupModal();
    }

    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
        // Reset centang biar bersih
        document.querySelectorAll('.pilih-item').forEach(c => c.checked = false);
    }
</script>
