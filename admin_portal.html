<div id="modalEdit" class="modal">
    <style>
        /* ... kode CSS Abang sudah benar di sini ... */
        .modal {
            display: none; 
            position: fixed;
            z-index: 9999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .modal-content label {
            display: block;
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn-simpan {
            flex: 1;
            padding: 12px;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-batal {
            flex: 1;
            padding: 12px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>

    <div class="modal-content">
        <h3 style="color: #0084ff; text-align: center; border-bottom: 2px solid #0084ff; padding-bottom: 10px; margin-top: 0;">Edit Data Anggota</h3>
        
        <form id="formEdit">
            <label>Nama Lengkap:</label>
            <input type="text" id="editNama" required>

            <label>Alamat Email:</label>
            <input type="email" id="editEmail">

            <label>Password:</label>
            <input type="text" id="editPassword">

            <label>Nomor HP / WhatsApp:</label>
            <input type="text" id="editNoHP">

            <label>Golongan Darah:</label>
            <select id="editGolDarah">
                <option value="">-- Pilih --</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>

            <label>Jabatan:</label>
            <select id="editJabatan">
                <option value="">-- Pilih --</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Pengurus">Pengurus</option>
            </select>

            <label>Komsel JC:</label>
            <input type="text" id="editKomsel">

            <div class="btn-group">
                <button type="submit" class="btn-simpan">Simpan Perubahan</button>
                <button type="button" onclick="tutupModal()" class="btn-batal">Batal</button>
            </div>
        </form>
    </div>
</div>

<script>
    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
    }

    // Pastikan fungsi bukaModalEdit Abang juga ada di sini agar data bisa muncul
    function bukaModalEdit(id, data) {
        document.getElementById('editNama').value = data.nama_lengkap || '';
        document.getElementById('editEmail').value = data.email || '';
        document.getElementById('editPassword').value = data.password || '';
        document.getElementById('editNoHP').value = data.no_hp || '';
        document.getElementById('editGolDarah').value = data.gol_darah || '';
        document.getElementById('editJabatan').value = data.jabatan || '';
        document.getElementById('editKomsel').value = data.komsel_jc || '';
        
        document.getElementById('formEdit').setAttribute('data-id', id);
        document.getElementById('modalEdit').style.display = 'flex';
    }
</script>
