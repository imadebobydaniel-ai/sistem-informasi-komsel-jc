<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrator - Pondok Pemulihan Papua</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf-plugin-autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        h2 { border-bottom: 3px solid #0084ff; padding-bottom: 10px; color: #1c1e21; margin-top: 0; }
        
        .header-tools { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .btn-back { background: #6c757d; text-decoration: none; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #dc3545; }
        .btn-danger { background: #ff4757; } /* Tombol Hapus Masal */

        /* Tabel & Checkbox */
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #0084ff; color: white; padding: 15px 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        /* Modal & Input */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        label { display: block; font-weight: bold; margin-top: 15px; }
        input[type="text"], input[type="email"], select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: #0084ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Administrator</h2>
    
    <div class="header-tools">
        <a href="index.html" class="btn btn-back">← Kembali</a>
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <button class="btn btn-pdf" onclick="exportTerpilih()">Export Terpilih (PDF)</button>
        <button class="btn btn-danger" onclick="hapusTerpilih()">Hapus Terpilih</button>
    </div>

    <div class="table-responsive">
        <table id="tabelAnggota">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="row-1">
                    <td><input type="checkbox" class="user-checkbox"></td>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>Bukadong821</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                    <td>
                        <button onclick="bukaModalEdit()" style="background:#ffc107; border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">Edit</button>
                    </td>
                </tr>
                <tr id="row-2">
                    <td><input type="checkbox" class="user-checkbox"></td>
                    <td>Budi Santoso</td>
                    <td>budi@gmail.com</td>
                    <td>User123</td>
                    <td>08123456789</td>
                    <td>O</td>
                    <td>Ketua Komsel</td>
                    <td>JC 1</td>
                    <td>
                        <button onclick="bukaModalEdit()" style="background:#ffc107; border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">Edit</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. LOGIKA CHECKBOX
    function toggleAll(source) {
        const checkboxes = document.querySelectorAll('.user-checkbox');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }

    // 2. FUNGSI HAPUS TERPILIH
    function hapusTerpilih() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length === 0) return alert("Pilih data dulu, Bang!");
        
        if (confirm(`Yakin mau hapus ${selected.length} data ini?`)) {
            selected.forEach(cb => {
                cb.closest('tr').remove();
            });
            alert("Data terpilih berhasil dihapus!");
        }
    }

    // 3. FUNGSI EXPORT TERPILIH (PDF)
    function exportTerpilih() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length === 0) return alert("Pilih data yang mau di-export ke PDF!");

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            // Ambil data hanya dari baris yang dicentang
            const rows = [];
            selected.forEach(cb => {
                const tr = cb.closest('tr');
                const cells = tr.querySelectorAll('td');
                // Ambil kolom Nama (1) sampai Komsel JC (7)
                rows.push([
                    cells[1].innerText, 
                    cells[2].innerText, 
                    cells[3].innerText, 
                    cells[4].innerText, 
                    cells[5].innerText, 
                    cells[6].innerText, 
                    cells[7].innerText
                ]);
            });

            doc.text("LAPORAN DATA ANGGOTA TERPILIH", 14, 15);
            doc.autoTable({
                head: [['Nama', 'Email', 'Password', 'No HP', 'Gol', 'Jabatan', 'Komsel']],
                body: rows,
                startY: 25,
                theme: 'grid',
                headStyles: { fillColor: [0, 132, 255] }
            });

            doc.save("Laporan_Terpilih.pdf");
        } catch (e) {
            console.error(e);
            alert("Error PDF: " + e.message);
        }
    }

    function bukaModalEdit() { alert("Fungsi Edit siap digunakan."); }
</script>

</body>
</html>
