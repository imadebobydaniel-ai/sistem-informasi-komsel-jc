<table id="userTable">
    <thead>
        <tr>
            <th>Nama Lengkap</th>
            <th>Email</th>
            <th>No. KTP</th>
            <th>Gol. Darah</th>
            <th>Alamat</th>
            <th>Status Nikah</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="userList">
        </tbody>
</table>

<script>
    // Fungsi loadUsers yang sudah diperbaiki agar tidak 'undefined'
    async function loadUsers() {
        const userList = document.getElementById("userList");
        userList.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Memuat data...</td></tr>";

        try {
            const snapshot = await db.collection("users").get();
            userList.innerHTML = "";
            
            snapshot.forEach(doc => {
                const data = doc.data();
                userList.innerHTML += `
                    <tr>
                        <td>${data.nama || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td>${data.no_ktp || '-'}</td>
                        <td>${data.gol_darah || '-'}</td>
                        <td>${data.alamat || '-'}</td>
                        <td>${data.status_nikah || '-'}</td>
                        <td>
                            <button class="btn-hapus" onclick="hapusUser('${doc.id}')">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            alert("Gagal memuat data: " + error.message);
        }
    }

    // Fungsi Export PDF juga disesuaikan agar kolomnya lengkap
    function exportKePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape'); // Gunakan landscape agar muat banyak kolom

        doc.text("Laporan Lengkap Anggota Pondok Pemulihan Papua", 14, 15);
        
        doc.autoTable({
            html: '#userTable',
            startY: 25,
            // Kita sembunyikan kolom aksi (indeks ke-6) dari PDF
            columns: [0, 1, 2, 3, 4, 5]
        });

        doc.save("Data_Lengkap_Anggota.pdf");
    }
</script>
