<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrator - Pondok Pemulihan Papua</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        h2 { border-bottom: 3px solid #0084ff; padding-bottom: 10px; color: #1c1e21; margin-top: 0; }
        
        .header-tools { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; text-decoration: none; }
        .btn-back { background: #6c757d; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #dc3545; }
        .btn-danger { background: #ff4757; }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #0084ff; color: white; padding: 15px 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Administrator</h2>
    
    <div class="header-tools">
        <a href="index.html" class="btn btn-back">← Kembali</a>
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <button class="btn btn-pdf" onclick="eksekusiPDF()">Export Terpilih (PDF)</button>
        <button class="btn btn-danger" onclick="hapusTerpilih()">Hapus Terpilih</button>
    </div>

    <div class="table-responsive">
        <table id="tabelData">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>Bukadong821</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                </tr>
                <tr>
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>Budi Santoso</td>
                    <td>budi@gmail.com</td>
                    <td>User123</td>
                    <td>08123456789</td>
                    <td>O</td>
                    <td>Ketua Komsel</td>
                    <td>JC 1</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // FUNGSI CHECKBOX
    function toggleAll(source) {
        const checkboxes = document.querySelectorAll('.pilih-item');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }

    function hapusTerpilih() {
        const selected = document.querySelectorAll('.pilih-item:checked');
        if (selected.length === 0) return alert("Pilih data dulu!");
        if (confirm("Hapus data terpilih?")) {
            selected.forEach(cb => cb.closest('tr').remove());
        }
    }

    // FUNGSI PDF (VERSI TERKUAT)
    function eksekusiPDF() {
        const selected = document.querySelectorAll('.pilih-item:checked');
        if (selected.length === 0) return alert("Centang data yang mau di-export ke PDF!");

        // 1. Cek library inti
        if (!window.jspdf) return alert("Library jspdf gagal dimuat. Cek internet.");
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');

        // 2. Cek plugin tabel (Ini kuncinya!)
        if (typeof doc.autoTable !== 'function') {
            alert("Plugin Tabel belum siap. Klik OK untuk mencoba memperbaiki otomatis.");
            // Force Reload plugin if failed
            const script = document.createElement('script');
            script.src = "https://unpkg.com/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.js";
            document.head.appendChild(script);
            return;
        }

        // 3. Ambil data dari baris yang dicentang
        const barisData = [];
        selected.forEach(cb => {
            const row = cb.closest('tr');
            const cols = row.querySelectorAll('td');
            barisData.push([
                cols[1].innerText, 
                cols[2].innerText, 
                cols[3].innerText, 
                cols[4].innerText, 
                cols[5].innerText, 
                cols[6].innerText, 
                cols[7].innerText
            ]);
        });

        // 4. Render PDF
        doc.text("LAPORAN DATA ANGGOTA - PONDOK PEMULIHAN PAPUA", 14, 15);
        doc.autoTable({
            head: [['Nama', 'Email', 'Password', 'No HP', 'Gol', 'Jabatan', 'Komsel']],
            body: barisData,
            startY: 25,
            theme: 'grid',
            headStyles: { fillColor: [0, 132, 255] }
        });

        doc.save("Laporan_Admin.pdf");
    }
</script>

</body>
</html>
