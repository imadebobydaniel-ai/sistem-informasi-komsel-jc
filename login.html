<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Pondok Pemulihan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #0073e6; }
        .back-link { display: block; margin-top: 15px; color: #0084ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Portal Admin</h2>
    <p style="font-size: 14px; color: #666;">Silakan masukkan password akses</p>
    
    <input type="password" id="passInput" placeholder="Password Admin" autocomplete="off">
    
    <button onclick="verifikasiAdmin()">Masuk Sekarang</button>
    
    <a href="index.html" class="back-link">Kembali ke Beranda</a>
</div>

<script>
    function verifikasiAdmin() {
        // Mengambil nilai dari input
        const passwordDiketik = document.getElementById('passInput').value;
        
        // PASSWORD DIKUNCI: admin123
        if (passwordDiketik === "admin123") {
            alert("Akses Diterima! Membuka Database...");
            // Langsung pindah ke file admin_portal.html
            window.location.href = "admin_portal.html";
        } else {
            alert("Password Salah! Silakan gunakan: admin123");
            // Mengosongkan input jika salah
            document.getElementById('passInput').value = "";
        }
    }

    // Fungsi tambahan agar bisa tekan 'Enter' untuk masuk
    document.getElementById("passInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            verifikasiAdmin();
        }
    });
</script>

</body>
</html>
