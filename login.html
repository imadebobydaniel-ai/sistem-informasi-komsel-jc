<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Pondok Pemulihan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 15px; background-color: #0084ff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0073e6; }
        .link { display: block; margin-top: 20px; color: #0084ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: #0084ff; font-size: 24px;">Pondok Pemulihan</h1>
    <h2>Portal Admin</h2>
    <p>Masukkan password untuk masuk</p>
    
    <input type="password" id="inputPassAdmin" placeholder="••••••••">
    
    <button onclick="loginAdmin()">Masuk Sekarang</button>
    
    <a href="index.html" class="link">← Kembali ke Beranda</a>
</div>

<script>
    function loginAdmin() {
        // Mengambil apa yang diketik di kotak inputPassAdmin
        var pass = document.getElementById("inputPassAdmin").value;
        
        // Verifikasi password (admin123)
        if (pass === "admin123") {
            alert("Akses Diterima! Membuka Database...");
            // Menuju ke file admin_portal.html sesuai di GitHub Abang
            window.location.href = "admin_portal.html";
        } else {
            alert("Password Salah! Gunakan password: admin123");
        }
    }

    // Biar bisa tekan Enter
    document.getElementById("inputPassAdmin").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            loginAdmin();
        }
    });
</script>

</body>
</html>
