<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 18px; }
        button { width: 100%; padding: 12px; background: #ff003c; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>Portal Admin</h2>
    <input type="password" id="p" placeholder="Password Admin">
    <button onclick="gas()">Buka Database</button>
</div>
<script>
    function gas() {
        if (document.getElementById('p').value === "admin2026") {
            // SAYA KUNCI: Menuju langsung ke admin_portal.html
            window.location.href = 'admin_portal.html';
        } else {
            alert("Password Salah!");
        }
    }
</script>
</body>
</html>
