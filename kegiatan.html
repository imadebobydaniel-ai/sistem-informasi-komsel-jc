<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kegiatan - Under Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        :root {
            --primary: #0056b3;
            --bg-body: #f0f4f8;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .construction-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        /* Animasi Membangun Gereja (CSS) */
        .church-builder {
            position: relative;
            width: 120px;
            height: 100px;
            margin-bottom: 20px;
        }

        .brick {
            width: 30px;
            height: 15px;
            background: #cc6633;
            position: absolute;
            border-radius: 2px;
            animation: build 2s infinite;
            opacity: 0;
        }

        @keyframes build {
            0% { transform: translateY(-50px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(0); opacity: 1; }
        }

        h2 { color: var(--primary); margin-bottom: 10px; font-weight: 800; }
        p { color: #666; font-size: 14px; line-height: 1.5; max-width: 250px; }

        .btn-back-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Tagline Progress */
        .progress-bar {
            width: 200px;
            height: 6px;
            background: #ddd;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 40%;
            height: 100%;
            background: var(--primary);
            animation: loading 3s infinite ease-in-out;
        }
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

<div class="construction-container">
    <lottie-player src="https://assets2.lottiefiles.com/packages/lf20_at6p77j3.json" 
        background="transparent" speed="1" style="width: 250px; height: 250px;" loop autoplay>
    </lottie-player>

    <h2>UNDER CONSTRUCTION</h2>
    <p>Kami sedang mempersiapkan sistem jadwal kegiatan & pendaftaran event untuk Anda.</p>
    
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    
    <div style="font-size: 11px; color: var(--primary); font-weight: bold; letter-spacing: 1px;">
        <i class="fas fa-hammer"></i> MEMBANGUN GEDUNG GEREJA...
    </div>
</div>

<div class="btn-back-container">
    <a href="menu.html" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i> KEMBALI KE MENU UTAMA
    </a>
</div>

</body>
</html>
