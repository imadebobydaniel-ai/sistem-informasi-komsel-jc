<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran JC - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }
        .icon-header { 
            font-size: 60px; 
            color: #00a884; 
            margin-bottom: 20px; 
        }
        h2 { 
            color: #003366; 
            margin: 0 0 10px 0; 
            font-size: 24px;
            font-weight: bold;
        }
        p { 
            color: #777; 
            font-size: 14px; 
            margin-bottom: 30px; 
            line-height: 1.5;
        }
        .btn { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: 0.3s; 
            color: white;
        }
        .btn-hadir { background: #00c853; }
        .btn-hadir:hover { background: #00a846; }
        .btn-absen { background: #d81b60; }
        .btn-absen:hover { background: #b0154d; }
        
        #reason-container { display: none; margin-top: 15px; animation: fadeIn 0.3s; }
        textarea { 
            width: 100%; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            padding: 12px; 
            box-sizing: border-box; 
            font-family: inherit; 
            margin-bottom: 10px; 
            resize: none;
        }
        
        #status-display { 
            display: none; 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            background: #f8f9fa; 
            border: 1px solid #eee; 
            animation: fadeIn 0.5s;
        }
        .btn-back { 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            margin-top: 25px; 
            color: #003366; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 13px; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-header">
        <i class="fa-solid fa-location-dot"></i>
    </div>
    <h2 id="judul-utama">KEHADIRAN JC</h2>
    <p>Shalom! Silakan pilih status kehadiran Anda hari ini untuk laporan Komsel.</p>

    <button class="btn btn-hadir" id="btnHadir" onclick="prosesLapor('HADIR')">
        SAYA HADIR <i class="fa-solid fa-circle-check"></i>
    </button>

    <button class="btn btn-absen" id="btnAbsen" onclick="tampilkanInputAlasan()">
        TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
    </button>

    <div id="reason-container">
        <textarea id="alasan" rows="3" placeholder="Tulis alasan tidak hadir..."></textarea>
        <button class="btn btn-absen" onclick="prosesLapor('TIDAK HADIR')">KIRIM LAPORAN</button>
    </div>

    <div id="status-display">
        <strong id="status-title" style="color: #00a884; display: block; margin-bottom: 5px;"></strong>
        <span id="status-desc" style="font-size: 12px; color: #888; font-family: monospace;"></span>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</a>
</div>

<div id="modal-global" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;">
    <div style="background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%;">
        <i id="icon-modal" class="fa-solid fa-circle-check" style="font-size: 50px; color: #28a745; margin-bottom: 15px;"></i>
        <h3 id="judul-modal" style="color: #333; margin-top: 0;">Terimakasih</h3>
        <p id="status-laporan" style="font-weight: bold; color: #28a745; margin-bottom: 5px;"></p>
        <p id="display-alamat-global" style="font-size: 12px; color: #444; margin-bottom: 10px; line-height: 1.4;"></p>
        <p id="display-gps-global" style="font-size: 10px; color: #999; margin-bottom: 20px;"></p>
        <button onclick="tutupPopupGlobal()" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">OK</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userEmail = localStorage.getItem("userEmail") || "guest@gmail.com";
    const userName = localStorage.getItem("userName") || "User";

    // --- FUNGSI REVERSE GEOCODING ---
    async function dapatkanAlamatLengkap(lat, lon) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            return data.display_name || "Alamat tidak ditemukan";
        } catch (error) {
            console.error("Gagal mengambil alamat:", error);
            return "Gagal mendapatkan detail alamat";
        }
    }

    // --- FUNGSI UI ---
    function tampilkanPopupKonfirmasi(jenisHadir, lat, lon, alamat) {
        const modal = document.getElementById('modal-global');
        const judul = document.getElementById('judul-modal');
        const status = document.getElementById('status-laporan');
        const gps = document.getElementById('display-gps-global');
        const alamatDisplay = document.getElementById('display-alamat-global');
        const icon = document.getElementById('icon-modal');

        if (jenisHadir === "HADIR") {
            judul.innerText = "Terimakasih Atas Laporan Anda";
            status.innerText = "Status: SAYA HADIR";
            status.style.color = "#28a745"; 
            icon.style.color = "#28a745";
            icon.className = "fa-solid fa-circle-check";
        } else {
            judul.innerText = "Laporan Ketidakhadiran Terkirim";
            status.innerText = "Status: TIDAK HADIR";
            status.style.color = "#dc3545"; 
            icon.style.color = "#dc3545";
            icon.className = "fa-solid fa-circle-xmark";
        }

        alamatDisplay.innerHTML = "<strong>Lokasi:</strong><br>" + alamat;
        gps.innerText = "Koordinat: " + lat.toFixed(6) + ", " + lon.toFixed(6);
        modal.style.display = 'flex';
    }

    function tutupPopupGlobal() {
        document.getElementById('modal-global').style.display = 'none';
        location.reload(); 
    }

    function updateUIStatus(judul, deskripsi) {
        const display = document.getElementById("status-display");
        const title = document.getElementById("status-title");
        const desc = document.getElementById("status-desc");

        display.style.display = "block";
        title.innerText = judul;
        desc.innerText = deskripsi;
    }

    function tampilkanInputAlasan() {
        document.getElementById("btnHadir").style.display = "none";
        document.getElementById("btnAbsen").style.display = "none";
        document.getElementById("reason-container").style.display = "block";
    }

    // --- FUNGSI PROSES LAPOR ---
    async function prosesLapor(tipe) {
        const todayStr = new Date().toISOString().split('T')[0];
        const alasanVal = document.getElementById("alasan").value;

        if (tipe === 'TIDAK HADIR' && !alasanVal) {
            alert("Harap isi alasan ketidakhadiran.");
            return;
        }

        updateUIStatus("Sedang Memproses...", "Mengambil lokasi & alamat...");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // 1. Ambil Nama Alamat via Reverse Geocoding
                const alamatLengkap = await dapatkanAlamatLengkap(lat, lon);

                try {
                    // 2. Simpan ke Firestore
                    await db.collection("kehadiran").add({
                        nama: userName,
                        email: userEmail,
                        status: tipe,
                        alasan: tipe === 'TIDAK HADIR' ? alasanVal : "",
                        koordinat: `${lat}, ${lon}`,
                        alamat: alamatLengkap, // Menyimpan alamat teks
                        tanggal: firebase.firestore.FieldValue.serverTimestamp(),
                        tanggal_str: todayStr
                    });

                    localStorage.setItem("lapor_" + todayStr, "true");
                    
                    document.getElementById("status-display").style.display = "none";
                    tampilkanPopupKonfirmasi(tipe, lat, lon, alamatLengkap);

                } catch (e) {
                    updateUIStatus("Gagal Mengirim", e.message);
                }
            }, () => {
                updateUIStatus("GPS Tidak Aktif", "Mohon aktifkan lokasi pada HP Anda.");
            }, { enableHighAccuracy: true });
        } else {
            updateUIStatus("Error", "Browser tidak mendukung Geolocation.");
        }
    }

    // --- CEK STATUS SAAT LOAD ---
    window.onload = () => {
        const todayStr = new Date().toISOString().split('T')[0];
        if (localStorage.getItem("lapor_" + todayStr)) {
            updateUIStatus("Laporan Sudah Masuk", "Terimakasih, Anda sudah melapor hari ini.");
            document.getElementById("btnHadir").disabled = true;
            document.getElementById("btnAbsen").disabled = true;
            document.getElementById("btnHadir").style.opacity = "0.5";
            document.getElementById("btnAbsen").style.opacity = "0.5";
        }
    };
</script>
</body>
</html>
