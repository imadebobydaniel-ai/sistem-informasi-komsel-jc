<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Kehadiran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 10px; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-hadir { background-color: #00a14b; color: white; }
        .btn-tidak { background-color: #e91e63; color: white; }
        
        .form-alasan { background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #ffcccc; display: none; margin-top: 10px; }
        .form-alasan label { display: block; text-align: left; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; resize: none; }
        
        .btn-group-action { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-kirim { background-color: #333; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-batal { background-color: #bbb; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .btn-home { display: inline-block; margin-top: 25px; color: #007bff; text-decoration: none; font-size: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Lapor Kehadiran</h2>
    <p>Silakan pilih status kehadiran Anda hari ini.</p>

    <button class="btn btn-hadir" id="btnHadir" onclick="pilihHadir()">
        SAYA HADIR <i class="fa-solid fa-circle-check"></i>
    </button>

    <button class="btn btn-tidak" id="btnTidakHadir" onclick="tampilAlasan()">
        TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
    </button>

    <div id="boxAlasan" class="form-alasan">
        <label>Alasan Tidak Hadir:</label>
        <textarea id="keterangan" placeholder="Isi alasan..."></textarea>
        
        <div class="btn-group-action">
            <button class="btn-kirim" onclick="kirimAlasan()">Kirim</button>
            <button class="btn-batal" onclick="batalProses()">Batal</button>
        </div>
        
    </div>

    <a href="menu.html" class="btn-home">
        <i class="fa-solid fa-house"></i> Back Home
    </a>
</div>

<script>
    function pilihHadir() {
        alert("Kehadiran dicatat.");
        // Anda bisa menambahkan navigasi otomatis setelah sukses
        // window.location.href = "menu.html";
    }

    function tampilAlasan() {
        document.getElementById('btnHadir').style.display = 'none';
        document.getElementById('btnTidakHadir').style.display = 'none';
        document.getElementById('boxAlasan').style.display = 'block';
    }

    function batalProses() {
        document.getElementById('keterangan').value = "";
        document.getElementById('boxAlasan').style.display = 'none';
        document.getElementById('btnHadir').style.display = 'flex';
        document.getElementById('btnTidakHadir').style.display = 'flex';
    }

    function kirimAlasan() {
        const teks = document.getElementById('keterangan').value;
        if(teks !== "") {
            alert("Keterangan dikirim.");
            batalProses();
        } else {
            alert("Silakan isi alasan terlebih dahulu.");
        }
        // Fungsi untuk mendapatkan alamat dari koordinat (Reverse Geocoding)
async function getAlamat(lat, lon) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await response.json();
        return data.display_name; // Mengembalikan alamat lengkap
    } catch (error) {
        return "Alamat tidak ditemukan";
    }
}

// Fungsi utama saat tombol "SAYA HADIR" ditekan
async function laporKehadiran() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            // 1. Ambil Alamat
            const alamatLengkap = await getAlamat(lat, lon);

            // 2. Tampilkan Modal/Pesan
            alert(`Kehadiran anda tercatat dengan lokasi alamat: ${alamatLengkap}`);

            // 3. Simpan ke Firebase
            const dataKehadiran = {
                nama: "Boby Daniel", // Ambil dari profil
                komsel: "JC 5",      // Ambil dari profil
                status: "Hadir",
                alamat_hadir: alamatLengkap,
                waktu: new Date().toISOString()
            };

            // Simpan ke Firestore (Contoh)
            // db.collection("kehadiran").add(dataKehadiran);

            console.log("Data terkirim ke database:", dataKehadiran);

        }, (error) => {
            alert("Gagal mengambil lokasi. Pastikan izin lokasi diaktifkan.");
        });
    } else {
        alert("Browser Anda tidak mendukung fitur lokasi.");
    }
    // Fungsi untuk menutup modal
function tutupModal() {
    document.getElementById('modal-kehadiran').style.display = 'none';
}

// Fungsi Utama Lapor Hadir
async function laporHadir() {
    const userEmail = localStorage.getItem("userEmail");
    if (!userEmail) return alert("Sesi berakhir, silakan login ulang.");

    // Tampilkan loading jika perlu
    console.log("Mencari lokasi...");

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            try {
                // 1. Ambil Nama Jalan (Reverse Geocoding menggunakan Nominatim - Gratis)
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                const geoData = await response.json();
                const alamatJalan = geoData.address.road || geoData.display_name.split(',')[0] || "Lokasi tidak dikenal";

                // 2. Ambil Data Profil User dari Firestore
                const userSnap = await db.collection("users").where("email", "==", userEmail).get();
                if (userSnap.empty) return;
                
                const userData = userSnap.docs[0].data();
                const nama = userData.nama || "Anonim";
                const jc = userData.komsel || "-";

                // 3. Simpan ke Database Firebase (Collection: kehadiran)
                const dataSimpan = {
                    nama: nama,
                    komsel: jc,
                    tanggal: firebase.firestore.FieldValue.serverTimestamp(),
                    alamat_hadir: alamatJalan,
                    koordinat: `${lat}, ${lon}`,
                    status: "Hadir"
                };

                await db.collection("kehadiran").add(dataSimpan);

                // 4. Tampilkan Notifikasi Blok Display
                const modal = document.getElementById('modal-kehadiran');
                const pesan = document.getElementById('pesan-lokasi');
                
                pesan.innerHTML = `Anda hadir di Komsel dengan<br><b>Alamat Jl: ${alamatJalan}</b>`;
                modal.style.display = 'flex';

            } catch (error) {
                console.error(error);
                alert("Gagal memproses lokasi atau database.");
            }
        }, (error) => {
            alert("Harap aktifkan GPS/Izin Lokasi di HP Anda.");
        });
    } else {
        alert("Browser Anda tidak mendukung deteksi lokasi.");
    }
}
}
    }
</script>

</body>
    <div id="modal-kehadiran" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center;">
    <div style="background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">
        <i class="fa-solid fa-circle-check" style="color: #2ecc71; font-size: 50px; margin-bottom: 15px;"></i>
        <h3 style="margin: 0 0 10px; color: #333;">Berhasil!</h3>
        <p id="pesan-lokasi" style="font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px;"></p>
        <button onclick="tutupModal()" style="background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">OKE</button>
    </div>
</div>
</html>
