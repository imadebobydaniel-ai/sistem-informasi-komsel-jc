<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Kehadiran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 10px; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-hadir { background-color: #00a14b; color: white; }
        .btn-tidak { background-color: #e91e63; color: white; }
        
        .form-alasan { background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #ffcccc; display: none; margin-top: 10px; }
        .form-alasan label { display: block; text-align: left; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; resize: none; }
        
        .btn-group-action { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-kirim { background-color: #333; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-batal { background-color: #bbb; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .btn-home { display: inline-block; margin-top: 25px; color: #007bff; text-decoration: none; font-size: 14px; font-weight: bold; cursor: pointer; }

        /* Modal Style */
        #modal-kehadiran { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="card">
    <h2>Lapor Kehadiran</h2>
    <p>Silakan pilih status kehadiran Anda hari ini.</p>

    <button class="btn btn-hadir" id="btnHadir" onclick="laporHadir()">
        SAYA HADIR <i class="fa-solid fa-circle-check"></i>
    </button>

    <button class="btn btn-tidak" id="btnTidakHadir" onclick="tampilAlasan()">
        TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
    </button>

    <div id="boxAlasan" class="form-alasan">
        <label>Alasan Tidak Hadir:</label>
        <textarea id="keterangan" placeholder="Isi alasan..."></textarea>
        <div class="btn-group-action">
            <button class="btn-kirim" onclick="kirimAlasan()">Kirim</button>
            <button class="btn-batal" onclick="batalProses()">Batal</button>
        </div>
    </div>

    <a href="menu.html" class="btn-home">
        <i class="fa-solid fa-house"></i> Back Home
    </a>
</div>

<div id="modal-kehadiran">
    <div class="modal-content">
        <i class="fa-solid fa-circle-check" style="color: #2ecc71; font-size: 50px; margin-bottom: 15px;"></i>
        <h3 style="margin: 0 0 10px; color: #333;">Berhasil!</h3>
        <p id="pesan-lokasi" style="font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px;"></p>
        <button onclick="tutupModal()" style="background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">OKE</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    // FUNGSI DASAR TAMPILAN
    function tampilAlasan() {
        document.getElementById('btnHadir').style.display = 'none';
        document.getElementById('btnTidakHadir').style.display = 'none';
        document.getElementById('boxAlasan').style.display = 'block';
    }

    function batalProses() {
        document.getElementById('keterangan').value = "";
        document.getElementById('boxAlasan').style.display = 'none';
        document.getElementById('btnHadir').style.display = 'flex';
        document.getElementById('btnTidakHadir').style.display = 'flex';
    }

    function tutupModal() {
        document.getElementById('modal-kehadiran').style.display = 'none';
        window.location.href = "menu.html";
    }

    // FUNGSI GEOLOCATION
    async function getAlamat(lat, lon) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            return data.display_name;
        } catch (error) {
            return "Lokasi di Papua";
        }
    }

    // FUNGSI UTAMA LAPOR HADIR
    async function laporHadir() {
        if (!userEmail) return alert("Silakan login kembali.");
        
        const btn = document.getElementById('btnHadir');
        btn.innerText = "Mendeteksi Lokasi...";
        btn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const alamatLengkap = await getAlamat(lat, lon);

                // Ambil data profil untuk JC & Nama
                const snap = await db.collection("users").where("email", "==", userEmail).get();
                if (snap.empty) return;
                const userData = snap.docs[0].data();

                // Simpan ke Firebase
                await db.collection("kehadiran").add({
                    nama: userData.nama || "User",
                    komsel: userData.komsel || "-",
                    status: "Hadir",
                    alamat_hadir: alamatLengkap,
                    tanggal: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Tampilkan Modal Notifikasi
                document.getElementById('pesan-lokasi').innerHTML = `Anda hadir di Komsel dengan<br><b>Alamat: ${alamatLengkap}</b>`;
                document.getElementById('modal-kehadiran').style.display = 'flex';
                btn.innerHTML = `SAYA HADIR <i class="fa-solid fa-circle-check"></i>`;
                btn.disabled = false;

            }, () => {
                alert("Gagal akses GPS. Pastikan izin lokasi aktif.");
                btn.disabled = false;
            });
        }
    }

    // FUNGSI KIRIM ALASAN (TIDAK HADIR)
    async function kirimAlasan() {
        const alasan = document.getElementById('keterangan').value;
        if (!alasan) return alert("Isi alasan!");

        const snap = await db.collection("users").where("email", "==", userEmail).get();
        const userData = snap.docs[0].data();

        await db.collection("kehadiran").add({
            nama: userData.nama || "User",
            komsel: userData.komsel || "-",
            status: "Tidak Hadir",
            alasan: alasan,
            tanggal: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("Keterangan tidak hadir terkirim.");
        window.location.href = "menu.html";
    }
</script>
</body>
</html>
