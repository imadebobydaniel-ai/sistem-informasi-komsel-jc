<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14; --cyan: #17a2b8;
            --teal: #008080;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 15px; color: var(--dark); }
        .admin-container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--emas); padding-bottom: 15px; margin-bottom: 25px; }
        .btn-logout { background: var(--danger); color: white; padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .btn-logout:hover { opacity: 0.8; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stats-grid a { text-decoration: none; }
        .stat-card { padding: 20px; border-radius: 12px; color: white; position: relative; overflow: hidden; transition: 0.3s; display: flex; align-items: center; min-height: 80px; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .stat-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; z-index: 2; position: relative; }
        .stat-card i { position: absolute; right: 15px; font-size: 2rem; opacity: 0.2; z-index: 1; }

        /* Controls */
        #actionMenu { display: none; gap: 10px; margin-bottom: 15px; padding: 15px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 10px; align-items: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .table-controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .search-box { position: relative; flex: 1; min-width: 300px; }
        .search-box input { width: 100%; padding: 14px 20px; border: 2px solid #eee; border-radius: 12px; font-size: 14px; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--accent); }
        .search-box i { position: absolute; right: 20px; top: 16px; color: #ccc; }
        
        .btn-cetak-kartu-main { background: var(--teal); color: white; border: none; padding: 14px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* Table Design */
        .table-responsive { overflow-x: auto; border-radius: 12px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1500px; }
        table th { background: var(--primary); color: white; padding: 15px; font-size: 12px; text-align: left; position: sticky; top: 0; }
        table td { padding: 12px 15px; border-bottom: 1px solid #f8f9fa; font-size: 13px; color: #555; }
        table tr:hover { background: #fcfcfc; }
        
        .nij-col { color: var(--accent); font-weight: bold; font-family: 'Courier New', monospace; }
        .badge-pending { background: #ffefc1; color: #856404; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-aktif { background: #d4edda; color: #155724; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        
        .file-link { color: var(--accent); font-size: 18px; text-decoration: none; }
        .btn-action { padding: 8px; border: none; border-radius: 6px; color: white; cursor: pointer; margin-right: 5px; transition: 0.2s; }
        .btn-action:hover { opacity: 0.8; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h2 style="color:var(--primary); margin:0;">Dashboard Administrator</h2>
            <small style="color: #666;">Manajemen Data Jemaat Real-time</small>
        </div>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> KELUAR SISTEM</a>
    </div>

    <div class="stats-grid">
        <a href="admin-tiket.html"><div class="stat-card" style="background: var(--accent);"><h4>Portal Tiket</h4><i class="fas fa-ticket-alt"></i></div></a>
        <a href="#memberData"><div class="stat-card" style="background: var(--success);"><h4>Raport Jemaat</h4><i class="fas fa-check-circle"></i></div></a>
        <a href="portal-media.html"><div class="stat-card" style="background: var(--purple);"><h4>Portal Media</h4><i class="fas fa-icons"></i></div></a>
        <a href="informasi-kegiatan.html"><div class="stat-card" style="background: var(--orange);"><h4>Info Kegiatan</h4><i class="fas fa-calendar-alt"></i></div></a>
        <a href="admin-bigdata.html"><div class="stat-card" style="background: var(--cyan);"><h4>Big Data</h4><i class="fas fa-chart-line"></i></div></a>
        <a href="manajemen-user.html"><div class="stat-card" style="background: var(--emas); color: #333;"><h4 style="color: #333;">Manajemen User</h4><i class="fas fa-users-cog" style="color: #333;"></i></div></a>
    </div>

    <div id="actionMenu">
        <span style="font-size: 13px; font-weight: bold; margin-right: 20px;" id="selectedCount"><i class="fas fa-info-circle"></i> 0 Terpilih</span>
        <button class="btn-action" style="background: var(--danger); padding: 8px 15px;" onclick="bulkDelete()"><i class="fas fa-trash"></i> Hapus Massal</button>
        <button class="btn-action" style="background: var(--teal); padding: 8px 15px;" onclick="generateMemberCards()"><i class="fas fa-id-card"></i> Cetak Kartu Terpilih</button>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari berdasarkan Nama, NIJ, atau Lokasi...">
            <i class="fas fa-search"></i>
        </div>
        <button class="btn-cetak-kartu-main" onclick="generateMemberCards()">
            <i class="fas fa-print"></i> CETAK KARTU JEMAAT
        </button>
    </div>

    <div class="table-responsive">
        <table id="memberTable">
            <thead>
                <tr>
                    <th style="width: 30px;"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                    <th>NIJ</th>
                    <th>Identitas Jemaat</th>
                    <th>TTL / Alamat</th> 
                    <th>Kontak</th>
                    <th>Info Keluarga</th>
                    <th>Gereja / Komsel</th>
                    <th>Jabatan</th>
                    <th style="text-align:center;">KTP</th>
                    <th>Status Akun</th>
                    <th>Navigasi</th>
                </tr>
            </thead>
            <tbody id="memberData">
                <tr><td colspan="11" style="text-align:center; padding:50px;">Memuat data jemaat...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // 1. Firebase Config (Pastikan ini sesuai dengan Project Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // 2. Load Data Real-time
    function loadMembersRealtime() {
        db.collection("users").onSnapshot(snapshot => {
            const tableBody = document.getElementById("memberData");
            if(!tableBody) return;
            tableBody.innerHTML = "";
            
            if(snapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='11' style='text-align:center;'>Belum ada data jemaat terdaftar.</td></tr>";
                return;
            }

            snapshot.forEach(doc => {
                const d = doc.data();
                
                // Handling Nama & Data Dasar
                const nama = d.nama_lengkap || d.nama || "Tanpa Nama";
                const nij = d.nij || '<span style="color:#ccc">Belum Ada</span>';
                
                // Formatting Tanggal Lahir
                let tglLahir = "-";
                const rawDate = d.tanggal_lahir_murni || d.tanggal_lahir;
                if (rawDate) {
                    tglLahir = (typeof rawDate === 'object' && rawDate.toDate) ? 
                                rawDate.toDate().toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'}) : 
                                rawDate;
                }

                const status = d.status_akun || 'Pending';
                const statusClass = status === 'Aktif' ? 'badge-aktif' : 'badge-pending';

                tableBody.innerHTML += `
                <tr>
                    <td><input type="checkbox" class="user-checkbox" value="${doc.id}" onclick="updateActionMenu()"></td>
                    <td class="nij-col">${nij}</td>
                    <td>
                        <strong>${nama.toUpperCase()}</strong><br>
                        <small>Gol. Darah: <strong>${d.darah || '-'}</strong></small>
                    </td>
                    <td>
                        <i class="fas fa-map-marker-alt"></i> ${d.kota || '-'}<br>
                        <small>${tglLahir}</small><br>
                        <small style="color:#888">${d.alamat || '-'}</small>
                    </td>
                    <td>
                        <i class="fab fa-whatsapp" style="color:green"></i> ${d.whatsapp || '-'}<br>
                        <small>${d.email || '-'}</small>
                    </td>
                    <td>
                        <small>Pasangan: ${d.nama_pasangan || '-'}<br>Anak: ${d.jumlah_anak || '0'}</small>
                    </td>
                    <td>
                        <strong>${d.lokasi_berjemaat || '-'}</strong><br>
                        <small>Komsel: ${d.komsel || '-'}</small>
                    </td>
                    <td><span style="background:#eee; padding:2px 6px; border-radius:4px">${d.jabatan || 'Jemaat'}</span></td>
                    <td style="text-align:center;">
                        ${(d.url_ktp || d.url_berkas) ? 
                        `<a href="${d.url_ktp || d.url_berkas}" target="_blank" class="file-link"><i class="fas fa-id-card"></i></a>` : 
                        '<i class="fas fa-times-circle" style="color:#ddd"></i>'}
                    </td>
                    <td>
                        <span class="${statusClass}">${status}</span>
                        <button class="btn-action" style="background:#6c757d; padding:2px 5px; font-size:10px;" onclick="toggleStatus('${doc.id}', '${status}')">
                            <i class="fas fa-sync"></i>
                        </button>
                    </td>
                    <td>
                        <button onclick="openEditModal('${doc.id}')" class="btn-action" style="background:var(--accent)"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser('${doc.id}')" class="btn-action" style="background:var(--danger)"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            updateActionMenu();
        });
    }

    // 3. Logic Control
    function updateActionMenu() {
        const count = document.querySelectorAll('.user-checkbox:checked').length;
        const menu = document.getElementById('actionMenu');
        if(menu) {
            menu.style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('selectedCount').innerHTML = `<i class="fas fa-info-circle"></i> ${count} Terpilih`;
        }
    }

    function toggleAll(source) {
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = source.checked);
        updateActionMenu();
    }

    function toggleStatus(id, current) {
        const next = current === 'Aktif' ? 'Pending' : 'Aktif';
        db.collection("users").doc(id).update({ status_akun: next });
    }

    function deleteUser(id) {
        if(confirm("Hapus data jemaat ini? Tindakan ini tidak bisa dibatalkan.")) { 
            db.collection("users").doc(id).delete(); 
        }
    }

    function bulkDelete() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if(confirm(`Anda yakin ingin menghapus ${selected.length} data jemaat sekaligus?`)) {
            selected.forEach(cb => db.collection("users").doc(cb.value).delete());
        }
    }

    function filterTable() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#memberData tr");
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query) ? "" : "none";
        });
    }

    function generateMemberCards() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length === 0) {
            alert("Silahkan centang jemaat yang ingin dicetak kartunya.");
            return;
        }
        const ids = Array.from(selected).map(cb => cb.value);
        window.location.href = `cetak-kartu.html?ids=${ids.join(',')}`;
    }

    function openEditModal(uid) { 
        window.location.href = `edit-jemaat-administrator.html?edit=${uid}`; 
    }

    window.onload = loadMembersRealtime;
</script>
</body>
</html>
