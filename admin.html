<div class="form-group">
    <label>Provinsi Tempat Lahir</label>
    <select id="provinsi" class="form-control" onchange="loadKota()">
        <option value="">Pilih Provinsi</option>
    </select>
</div>

<div class="form-group">
    <label>Kota/Kabupaten</label>
    <select id="kota" class="form-control" onchange="loadKecamatan()">
        <option value="">Pilih Kota/Kabupaten</option>
    </select>
</div>

<div class="form-group">
    <label>Kecamatan</label>
    <select id="kecamatan" class="form-control" onchange="loadDesa()">
        <option value="">Pilih Kecamatan</option>
    </select>
</div>

<div class="form-group">
    <label>Desa/Kelurahan</label>
    <select id="desa" class="form-control">
        <option value="">Pilih Desa</option>
    </select>
</div>

<div class="form-group">
    <label>Tanggal Lahir</label>
    <input type="date" id="tanggal_lahir" class="form-control">
</div>
