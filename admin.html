<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 95%; margin: auto; }
        
        .navigation-top { margin-bottom: 20px; }
        .btn-back { 
            background: #222 !important; color: #fff !important; border: 2px solid #007bff; 
            padding: 12px 25px; border-radius: 50px; cursor: pointer; text-decoration: none; 
            font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .btn-back:hover { background: #007bff !important; transform: translateX(-5px); }

        .header-section { display: flex; align-items: center; gap: 10px; border-bottom: 3px solid #ff0000; padding-bottom: 15px; margin-bottom: 25px; font-size: 24px; font-weight: bold; }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }

        .search-group { display: flex; gap: 5px; flex-grow: 1; max-width: 500px; position: relative; }
        .search-input { padding: 10px 15px; width: 100%; border: 1px solid #ccc; border-radius: 6px; }
        .btn-cari-red { background: #ff0000; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .table-container { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        thead { background: #ff0000; color: white; position: sticky; top: 0; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        
        .sedang-diedit { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; color: black !important; }
        .loading-text { text-align: center; padding: 20px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="navigation-top">
        <a href="index.html" class="btn-back">
            <i class="fa-solid fa-circle-arrow-left"></i> KEMBALI KE LOGIN
        </a>
    </div>

    <div class="header-section">
        <i class="fa-solid fa-database"></i> Database Administrator
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="muatDataUser()"><i class="fa-solid fa-rotate"></i> Refresh Data</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-pen-to-square"></i> Mode Edit</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus Terpilih</button>
        
        <div class="search-group">
            <input type="text" id="kotakCari" class="search-input" placeholder="Cari Nama atau No HP..." onkeyup="jalankanCari()">
            <button class="btn-cari-red"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 20px;"><input type="checkbox" id="pilihSemua"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Nomor HP</th>
                    <th>Alamat</th>
                    <th>Jabatan</th>
                    <th>Lokasi JC</th>
                    <th>Gol. Darah</th>
                </tr>
            </thead>
            <tbody id="badanTabel">
                <tr><td colspan="9" class="loading-text">Sedang mengambil data dari server...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. FUNGSI AMBIL DATA DARI FIRESTORE
    function muatDataUser() {
        const badanTabel = document.getElementById('badanTabel');
        // Snapshot real-time dari koleksi 'users'
        db.collection("users").onSnapshot((querySnapshot) => {
            badanTabel.innerHTML = "";
            if (querySnapshot.empty) {
                badanTabel.innerHTML = "<tr><td colspan='9' class='loading-text'>Tidak ada data ditemukan.</td></tr>";
                return;
            }
            querySnapshot.forEach((doc) => {
                let user = doc.data();
                let id = doc.id;
                let baris = `
                    <tr data-id="${id}">
                        <td><input type="checkbox" class="cek-baris"></td>
                        <td class="bisa-edit" data-field="nama">${user.nama || '-'}</td>
                        <td>${user.email || '-'}</td>
                        <td class="bisa-edit" data-field="password" style="color:red; font-weight:bold;">${user.password || '***'}</td>
                        <td class="bisa-edit" data-field="no_hp">${user.no_hp || '-'}</td>
                        <td class="bisa-edit" data-field="alamat">${user.alamat || '-'}</td>
                        <td class="bisa-edit" data-field="jabatan">${user.jabatan || '-'}</td>
                        <td class="bisa-edit" data-field="komsel">${user.komsel || '-'}</td>
                        <td class="bisa-edit" data-field="gol_darah">${user.gol_darah || '-'}</td>
                    </tr>
                `;
                badanTabel.innerHTML += baris;
            });
        }, (error) => {
            console.error("Error: ", error);
            badanTabel.innerHTML = "<tr><td colspan='9' class='loading-text'>Gagal mengambil data. Periksa Rules Firestore.</td></tr>";
        });
    }

    // 2. FUNGSI EDIT DATA
    document.getElementById('btnEdit').onclick = function() {
        let terpilih = document.querySelectorAll('.cek-baris:checked');
        if (terpilih.length === 0) return alert("Pilih data dulu, Bang!");

        terpilih.forEach(checkbox => {
            let baris = checkbox.closest('tr');
            let selData = baris.querySelectorAll('.bisa-edit');
            
            selData.forEach(td => {
                td.contentEditable = "true"; 
                td.classList.add('sedang-diedit');
                
                td.onblur = function() {
                    const idUser = baris.getAttribute('data-id');
                    const field = td.getAttribute('data-field');
                    const valueBaru = td.innerText;
                    
                    db.collection("users").doc(idUser).update({ [field]: valueBaru })
                    .then(() => console.log("Berhasil Update"))
                    .catch(err => alert("Gagal Simpan: " + err));
                };
            });
        });
        alert("Mode Edit Aktif! Klik pada kotak kuning untuk merubah.");
    };

    // 3. FUNGSI CARI
    function jalankanCari() {
        let input = document.getElementById('kotakCari').value.toLowerCase();
        let barisTabel = document.querySelectorAll('#badanTabel tr');
        barisTabel.forEach(tr => {
            let teks = tr.innerText.toLowerCase();
            tr.style.display = teks.includes(input) ? "" : "none";
        });
    }

    // 4. FUNGSI HAPUS
    document.getElementById('btnHapus').onclick = function() {
        let terpilih = document.querySelectorAll('.cek-baris:checked');
        if (terpilih.length === 0) return alert("Pilih data yang mau dihapus!");
        
        if (confirm("Hapus data dari server?")) {
            terpilih.forEach(cb => {
                const idUser = cb.closest('tr').getAttribute('data-id');
                db.collection("users").doc(idUser).delete();
            });
        }
    };

    // 5. SELECT ALL
    document.getElementById('pilihSemua').onclick = function() {
        document.querySelectorAll('.cek-baris').forEach(cb => cb.checked = this.checked);
    }

    window.onload = muatDataUser;
</script>
</body>
</html>
