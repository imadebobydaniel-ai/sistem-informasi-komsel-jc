<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kelola Baribut</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --biru-tua: #003366; 
            --biru-safir: #0056b3; 
            --hijau-zamrud: #2ecc71; 
            --emas-lux: #D4AF37; 
            --putih-bg: #f4f7fa; 
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 20px; }
        h2 { color: var(--biru-tua); text-align: center; border-bottom: 3px solid var(--emas-lux); padding-bottom: 10px; }

        /* TABEL DESKTOP */
        .table-container { overflow-x: auto; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--biru-tua); color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }

        /* RESPONSIVE MOBILE (Stack Mode) */
        @media screen and (max-width: 600px) {
            body { padding: 10px; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; } /* Sembunyikan Header Tabel di HP */
            tr { background: white; border: 2px solid #ddd; border-radius: 15px; margin-bottom: 15px; padding: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
            td { border: none; position: relative; padding-left: 45%; text-align: left; border-bottom: 1px solid #f9f9f9; }
            td:before { 
                position: absolute; left: 15px; width: 40%; font-weight: bold; color: var(--biru-safir);
                content: attr(data-label); /* Mengambil label dari atribut HTML */
            }
            td:last-child { border-bottom: 0; text-align: center; padding-left: 15px; display: flex; justify-content: space-around; margin-top: 10px; }
        }

        /* Tombol Aksi */
        .btn-edit { background: var(--biru-safir); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* MODAL FORM EDIT */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
        .modal-content h3 { margin-top: 0; color: var(--biru-tua); }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: var(--hijau-zamrud); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2><i class="fas fa-user-shield"></i> Management Baribut</h2>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Pesan</th>
                    <th>Waktu</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Pesan Baribut</h3>
            <form id="editForm">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Nama Pengirim</label>
                    <input type="text" id="edit-nama" required>
                </div>
                <div class="form-group">
                    <label>Pesan</label>
                    <textarea id="edit-pesan" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-save">Simpan Perubahan</button>
                <button type="button" onclick="closeModal()" style="background:none; border:none; color:grey; width:100%; margin-top:10px; cursor:pointer;">Batal</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Config Firebase Anda
        const firebaseConfig = { 
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
            authDomain: "boby-apps-project.firebaseapp.com", 
            projectId: "boby-apps-project", 
            storageBucket: "boby-apps-project.appspot.com", 
            messagingSenderId: "125984859692", 
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Ambil Data
        db.collection("baribut_chat").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const time = d.timestamp ? new Date(d.timestamp.toDate()).toLocaleString('id-ID') : '-';
                
                // Perhatikan atribut 'data-label', ini kunci agar tampilan HP rapi
                tbody.innerHTML += `
                    <tr>
                        <td data-label="Nama">${d.nama}</td>
                        <td data-label="Pesan">${d.pesan}</td>
                        <td data-label="Waktu">${time}</td>
                        <td data-label="Aksi">
                            <button class="btn-edit" onclick="openEdit('${doc.id}', '${d.nama}', '${d.pesan.replace(/'/g, "\\'")}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-delete" onclick="deleteMsg('${doc.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        });

        // 2. Fungsi Buka Modal & Isi Data
        function openEdit(id, nama, pesan) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-nama').value = nama;
            document.getElementById('edit-pesan').value = pesan;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // 3. Simpan Perubahan ke Firestore
        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const newNama = document.getElementById('edit-nama').value;
            const newPesan = document.getElementById('edit-pesan').value;

            db.collection("baribut_chat").doc(id).update({
                nama: newNama,
                pesan: newPesan
            }).then(() => {
                alert("Berhasil diupdate!");
                closeModal();
            });
        });

        // 4. Hapus Pesan
        function deleteMsg(id) {
            if(confirm("Yakin mau hapus pesan ini?")) {
                db.collection("baribut_chat").doc(id).delete();
            }
        }
    </script>
</body>
</html>
