<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Portal & Playlist - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a; --card-dark: #1e293b; --accent: #38bdf8;
            --danger: #ef4444; --success: #22c55e; --text-main: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .media-container { max-width: 1400px; margin: auto; display: grid; grid-template-columns: 400px 1fr; gap: 20px; }

        /* --- SISI KIRI: INPUT MEDIA --- */
        .input-panel { background: var(--card-dark); padding: 20px; border-radius: 16px; border: 1px solid #334155; height: fit-content; }
        .input-panel h3 { margin-top: 0; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #94a3b8; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #0f172a; border: 1px solid #334155; color: white;
            padding: 10px; border-radius: 8px; box-sizing: border-box; outline: none;
        }

        .btn-add {
            width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px;
            color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-add:hover { opacity: 0.9; transform: translateY(-2px); }

        /* --- SISI KANAN: PLAYLIST & CONTROLS --- */
        .playlist-panel { background: var(--card-dark); border-radius: 16px; border: 1px solid #334155; display: flex; flex-direction: column; height: 85vh; }
        
        /* Playlist Header (Toolbar) */
        .playlist-header { padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .play-controls { display: flex; gap: 10px; background: #0f172a; padding: 10px; border-radius: 12px; }
        .control-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .control-btn.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        
        /* Action Buttons */
        .action-bar { padding: 10px 20px; background: #1e293b; display: flex; align-items: center; gap: 15px; }
        .btn-delete-all { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; display: none; }

        /* Playlist Scroll Area */
        .playlist-items { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .item-card {
            background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 12px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .item-card:hover { border-color: var(--accent); }
        .item-card.playing { border-color: var(--success); background: #064e3b; }

        .thumb-preview { width: 80px; height: 50px; border-radius: 6px; background: #334155; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb-preview img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { flex: 1; }
        .item-info h4 { margin: 0; font-size: 14px; }
        .item-info span { font-size: 11px; color: #64748b; text-transform: uppercase; }

        /* Responsive */
        @media (max-width: 900px) { .media-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="media-container">
    <div class="input-panel">
        <h3><i class="fas fa-clapperboard"></i> Input Media</h3>
        <form id="mediaForm">
            <div class="form-group">
                <label>Judul Media</label>
                <input type="text" id="m_judul" placeholder="Contoh: Pujian Pembukaan" required>
            </div>
            <div class="form-group">
                <label>Tipe Media</label>
                <select id="m_tipe">
                    <option value="youtube">YouTube Link</option>
                    <option value="video">Direct Video (MP4)</option>
                    <option value="gambar">Gambar (URL)</option>
                    <option value="teks">Teks Murni (Running Text)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Link / Konten</label>
                <textarea id="m_isi" rows="3" placeholder="Masukkan Link atau Teks..." required></textarea>
            </div>
            <div class="form-group" id="timingGroup">
                <label>Durasi Tampil (Khusus Gambar/Teks - Detik)</label>
                <input type="number" id="m_durasi" value="15">
            </div>
            <button type="submit" class="btn-add">SIMPAN KE PLAYLIST</button>
        </form>
    </div>

    <div class="playlist-panel">
        <div class="playlist-header">
            <div class="play-controls">
                <button class="control-btn active" id="mode_play_all" title="Play All"><i class="fas fa-play-circle"></i></button>
                <button class="control-btn" onclick="toggleMode('repeat')" id="mode_repeat" title="Repeat"><i class="fas fa-redo-alt"></i></button>
                <button class="control-btn" onclick="toggleMode('shuffle')" id="mode_shuffle" title="Shuffle"><i class="fas fa-random"></i></button>
                <button class="control-btn" onclick="toggleMode('loop')" id="mode_loop" title="Looping Playlist"><i class="fas fa-sync"></i></button>
            </div>
            <div style="text-align: right">
                <h4 style="margin:0; font-size: 14px; color: var(--accent);">Monitor Status: Online</h4>
                <small style="color: #64748b;">Pondok Pemulihan Papua</small>
            </div>
        </div>

        <div class="action-bar">
            <input type="checkbox" id="checkAll" onclick="selectAll(this)">
            <label for="checkAll" style="font-size: 12px; cursor: pointer;">Pilih Semua</label>
            <button id="btnDeleteBatch" class="btn-delete-all" onclick="deleteBatch()"><i class="fas fa-trash"></i> Hapus Terpilih</button>
        </div>

        <div class="playlist-items" id="playlistData">
            </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // --- SAVE MEDIA KE FIREBASE ---
    document.getElementById("mediaForm").onsubmit = async (e) => {
        e.preventDefault();
        const tipe = document.getElementById("m_tipe").value;
        const judul = document.getElementById("m_judul").value;
        const isi = document.getElementById("m_isi").value;
        const durasi = document.getElementById("m_durasi").value;

        try {
            // Mengambil urutan terakhir
            const snap = await db.collection("portal_media").get();
            const urutan = snap.size + 1;

            await db.collection("portal_media").add({
                judul, tipe, isi, durasi, urutan,
                status: "checked", // Default masuk playlist aktif
                playing: false,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("mediaForm").reset();
            alert("Media berhasil ditambahkan!");
        } catch (err) { alert("Error: " + err); }
    };

    // --- LOAD PLAYLIST REALTIME ---
    function loadPlaylist() {
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot(snap => {
            const container = document.getElementById("playlistData");
            container.innerHTML = "";
            
            snap.forEach(doc => {
                const m = doc.data();
                const activeClass = m.playing ? 'playing' : '';
                const checkedAttr = m.status === 'checked' ? 'checked' : '';
                
                // Logika Thumbnail Sederhana
                let thumb = '<i class="fas fa-file-alt"></i>';
                if(m.tipe === 'youtube') thumb = `<img src="https://img.youtube.com/vi/${getYTID(m.isi)}/default.jpg">`;
                if(m.tipe === 'gambar') thumb = `<img src="${m.isi}">`;
                if(m.tipe === 'video') thumb = `<i class="fas fa-video"></i>`;

                container.innerHTML += `
                    <div class="item-card ${activeClass}">
                        <input type="checkbox" class="item-check" value="${doc.id}" ${checkedAttr} onclick="updateItemStatus('${doc.id}', this)">
                        <div class="thumb-preview">${thumb}</div>
                        <div class="item-info">
                            <span>${m.tipe} • ${m.durasi}s</span>
                            <h4>${m.judul}</h4>
                        </div>
                        <div class="playlist-controls">
                            <button class="control-btn" onclick="moveItem('${doc.id}', -1)"><i class="fas fa-chevron-up"></i></button>
                            <button class="control-btn" onclick="moveItem('${doc.id}', 1)"><i class="fas fa-chevron-down"></i></button>
                        </div>
                    </div>`;
            });
            updateDeleteBtnVisibility();
        });
    }

    // Helper Youtube ID
    function getYTID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // --- LOGIKA CHECKBOX & HAPUS MASAL ---
    function selectAll(source) {
        const checkboxes = document.querySelectorAll('.item-check');
        checkboxes.forEach(cb => {
            cb.checked = source.checked;
            updateItemStatus(cb.value, cb);
        });
    }

    async function updateItemStatus(id, el) {
        await db.collection("portal_media").doc(id).update({ status: el.checked ? 'checked' : 'unchecked' });
        updateDeleteBtnVisibility();
    }

    function updateDeleteBtnVisibility() {
        const checkedCount = document.querySelectorAll('.item-check:checked').length;
        document.getElementById("btnDeleteBatch").style.display = checkedCount > 0 ? "block" : "none";
    }

    async function deleteBatch() {
        if(!confirm("Hapus semua media yang dipilih dari playlist?")) return;
        const checked = document.querySelectorAll('.item-check:checked');
        for (let cb of checked) { await db.collection("users").doc(cb.value).delete(); } // Perhatikan: sesuaikan nama collection
        alert("Terpilih berhasil dihapus.");
    }

    // --- LOGIKA MODES (VISUAL ONLY FOR NOW) ---
    function toggleMode(mode) {
        const btn = document.getElementById('mode_' + mode);
        btn.classList.toggle('active');
        // Kirim status mode ke Firebase untuk dibaca oleh Media Player
        db.collection("settings").doc("playback_mode").set({ mode: mode, active: btn.classList.contains('active') });
    }

    window.onload = loadPlaylist;
</script>
</body>
</html>
