<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Management Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #003366; --accent: #007bff; --dark: #333;
            --light: #f4f7f6; --success: #28a745; --danger: #dc3545;
            --purple: #6f42c1; --orange: #fd7e14;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); margin: 0; padding: 20px; }
        
        /* Header Dashboard */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dashboard-header h1 { font-size: 24px; color: var(--dark); margin: 0; }
        .btn-keluar { background-color: var(--danger); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; }

        /* Statistik Cards */
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { padding: 20px; border-radius: 12px; color: white; position: relative; }
        .stat-box h3 { margin: 0; font-size: 12px; text-transform: uppercase; }
        .stat-box p { margin: 10px 0 0; font-size: 32px; font-weight: bold; }
        .stat-box i { position: absolute; right: 15px; bottom: 15px; font-size: 40px; opacity: 0.2; }
        .bg-blue { background-color: #007bff; }
        .bg-green { background-color: #28a745; }
        .bg-purple { background-color: #6f42c1; }
        .bg-orange { background-color: #fd7e14; }

        /* Main Grid Layout */
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; border: 1px solid #eef0f2; }
        .card h2 { font-size: 18px; color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }

        /* Table Database Anggota */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; color: var(--primary); border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-delete { color: var(--danger); cursor: pointer; border: none; background: none; }

        /* Doa & Konten Monitor */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        .btn-submit { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }

        /* Absensi Global */
        .absensi-feed { min-height: 80px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; }

        @media (max-width: 1024px) { .stats-container { grid-template-columns: repeat(2, 1fr); } .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>Dashboard Management Admin</h1>
        <a href="login.html" class="btn-keluar">Keluar</a>
    </div>

    <div class="stats-container">
        <div class="stat-box bg-blue">
            <h3>Total Anggota</h3>
            <p id="total_anggota">10</p>
            <i class="fas fa-users"></i>
        </div>
        <div class="stat-box bg-green">
            <h3>Kehadiran Hari Ini</h3>
            <p id="total_hadir">0</p>
            <i class="fas fa-calendar-check"></i>
        </div>
        <div class="stat-box bg-purple">
            <h3>Pokok Doa Aktif</h3>
            <p id="total_doa">0</p>
            <i class="fas fa-praying-hands"></i>
        </div>
        <div class="stat-box bg-orange">
            <h3>Total JC (Komsel)</h3>
            <p id="total_jc">3</p>
            <i class="fas fa-church"></i>
        </div>
    </div>

    <div class="main-grid">
        <div class="left-section">
            <div class="card">
                <h2><i class="fas fa-fingerprint" style="color:var(--success)"></i> Absensi Global (Real-Time)</h2>
                <div class="absensi-feed" id="absensiData">
                    Belum ada absensi hari ini
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-database"></i> Database Anggota</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>JC</th>
                            <th>Jabatan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="memberData">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="right-section">
            <div class="card">
                <h2><i class="fas fa-heart" style="color:var(--danger)"></i> Doa Global</h2>
                <div class="input-group">
                    <label>Tambah Pokok Doa Baru</label>
                    <textarea id="doa_input" rows="3" placeholder="Tulis permohonan doa..."></textarea>
                </div>
                <button class="btn-submit" style="background-color: var(--danger);">KIRIM DOA</button>
            </div>

            <div class="card">
                <h2><i class="fas fa-play-circle" style="color:var(--orange)"></i> Konten Monitor</h2>
                <div class="input-group">
                    <label>Judul Media</label>
                    <input type="text" id="m_judul">
                </div>
                <div class="input-group">
                    <label>URL / Link</label>
                    <input type="text" id="m_link">
                </div>
                <button class="btn-submit" style="background-color: var(--orange);">TAMBAH KE MONITOR</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        // Gunakan config Firebase Anda yang sudah ada di proyek Pondok Pemulihan Papua
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // Fungsi Load Data Anggota (Sesuai database yang Anda kelola)
        function loadMembers() {
            db.collection("users").onSnapshot((snapshot) => {
                const tbody = document.getElementById("memberData");
                tbody.innerHTML = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${d.nama || '-'}</b></td>
                            <td>JC ${d.komsel || '-'}</td>
                            <td>${d.jabatan || '-'}</td>
                            <td><i class="fas fa-trash btn-delete" onclick="deleteMember('${doc.id}')"></i></td>
                        </tr>`;
                });
            });
        }
        window.onload = loadMembers;
    </script>
</body>
</html>
