<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>

    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14; --cyan: #17a2b8;
            --teal: #008080;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1450px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .stats-grid a { text-decoration: none; color: inherit; }
        .stat-card { 
            padding: 20px 15px; 
            border-radius: 10px; 
            color: white; 
            position: relative; 
            min-height: 60px; 
            cursor: pointer; 
            transition: transform 0.2s; 
            display: flex;
            align-items: center;
        }
        .stat-card:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .stat-card h4 { margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; padding-right: 30px; }
        .stat-card i { position: absolute; right: 12px; font-size: 1.3rem; opacity: 0.4; }

        #actionMenu { display: none; gap: 10px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; align-items: center; }
        .btn-action { border: none; padding: 8px 15px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; text-decoration: none; display: inline-block; transition: 0.3s; }
        
        .table-controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }
        
        /* Tombol Extract Khusus */
        .btn-extract-main { background: #ff0000; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-extract-main:hover { background: #cc0000; transform: scale(1.02); }

        /* PENAMBAHAN GAYA TOMBOL CETAK KARTU */
        .btn-cetak-kartu { background: var(--teal); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-cetak-kartu:hover { background: #006666; transform: scale(1.02); }

        .table-responsive { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        table th { background: var(--primary); color: white; padding: 12px; font-size: 11px; text-align: left; text-transform: uppercase; }
        table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: top; }
        
        .nij-col { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 12px; }
        .check-col { width: 40px; text-align: center; }
        
        .badge-pending { background: #ffc107; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .badge-aktif { background: var(--success); color: #fff; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .btn-status-toggle { border: none; padding: 4px 8px; border-radius: 4px; color: white; font-size: 12px; cursor: pointer; margin-left: 5px; }

        .file-link {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            border: 1px solid #ddd;
            transition: 0.3s;
            color: var(--accent) !important;
            text-decoration: none !important;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
            margin-right: 5px;
        }
        .file-link:hover { background: var(--accent); color: white !important; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2 style="color:var(--primary); margin:0;">Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <a href="admin-tiket.html"><div class="stat-card" style="background: #007bff;"><h4>Portal Tiket</h4><i class="fas fa-ticket-alt"></i></div></a>
        <a href="#memberData"><div class="stat-card" style="background: #28a745;"><h4>Raport Jemaat</h4><i class="fas fa-check-circle"></i></div></a>
        <a href="portal-media.html"><div class="stat-card" style="background: #6f42c1;"><h4>Portal Media</h4><i class="fas fa-icons"></i></div></a>
        <a href="informasi-kegiatan.html"><div class="stat-card" style="background: #fd7e14;"><h4>Informasi Kegiatan</h4><i class="fas fa-calendar-alt"></i></div></a>
        <a href="admin-bigdata.html"><div class="stat-card" style="background: #17a2b8;"><h4>Big Data</h4><i class="fas fa-chart-line"></i></div></a>
        <a href="admin_agenda.html"><div class="stat-card" style="background: var(--teal);"><h4>Agenda Tahunan</h4><i class="fas fa-book-open"></i></div></a>
        <a href="manajemen-user.html"><div class="stat-card" style="background: var(--emas); color: #333;"><h4 style="color: #333;">Manajemen User</h4><i class="fas fa-users-cog" style="color: #333; opacity: 0.6;"></i></div></a>
    </div>

    <div id="actionMenu">
        <span style="font-size: 12px; font-weight: bold; margin-right: 10px;" id="selectedCount">0 Terpilih</span>
        <button class="btn-action" style="background: var(--danger);" onclick="bulkDelete()"><i class="fas fa-trash"></i> Hapus Massal</button>
        <button class="btn-action" style="background: #ff0000;" onclick="extractSelectedToPDF()"><i class="fas fa-file-pdf"></i> Extract PDF Terpilih</button>
        <button class="btn-action" style="background: var(--teal);" onclick="generateMemberCards()"><i class="fas fa-id-card"></i> Cetak Kartu Terpilih</button>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari NIJ, nama, komsel, atau jabatan...">
            <i class="fas fa-search"></i>
        </div>
        <button class="btn-cetak-kartu" onclick="generateMemberCards()">
            <i class="fas fa-id-card"></i> CETAK KARTU
        </button>
        <button class="btn-extract-main" onclick="extractSelectedToPDF()">
            <i class="fas fa-file-pdf"></i> EXTRACT PDF
        </button>
    </div>

    <div class="table-responsive">
        <table id="memberTable">
            <thead>
                <tr>
                    <th class="check-col"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                    <th>NIJ</th>
                    <th>Nama Lengkap</th>
                    <th>G.D</th> 
                    <th>WhatsApp / Email</th>
                    <th>Detail Keluarga</th>
                    <th>Alamat</th>
                    <th>Lokasi & Komsel</th>
                    <th>Jabatan & Pelayanan</th>
                    <th>Lampiran</th>
                    <th>Status Akun</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData">
                </tbody>
        </table>
    </div>
</div>

<canvas id="barcodeCanvas" style="display:none;"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() { loadMembersRealtime(); };

    // --- LOAD DATA REALTIME (TIDAK ADA PERUBAHAN) ---
    function loadMembersRealtime() {
        db.collection("users").onSnapshot(snapshot => {
            const tableBody = document.getElementById("memberData");
            if(!tableBody) return;
            
            tableBody.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                
                const namaTampil = d.nama || d.nama_lengkap || d.Nama || '-';
                const nij = d.nij || '-';
                const goldar = d.darah || d.golongan_darah || '-'; 
                
                const whatsapp = d.whatsapp || d.WhatsApp || '-';
                const email = d.email || '-';

                const pasangan = d.nama_suami_istri || d.nama_pasangan || d.suami || d.istri || d.pasangan || '-';
                const anak = d.jumlah_anak || d.anak || '0';

                const alamatDetail = d.alamat || d.Alamat || '-';
                const wilayah = d.wilayah || '-';
                const komsel = d.komsel || d.Komsel || '-';

                const jabatan = d.jabatan || '-';
                const fungsi = d.sub_bidang || d.fungsi_pelayanan || d.fungsi_spesifik || '-';

                const linkKtp = d.url_ktp || d.urlKtp || d.ktp || d.foto_ktp || d.lampiran_ktp || d.urlKTP;
                const linkBerkas = d.url_berkas || d.berkas || d.lampiran || d.file || d.urlBerkas;

                // FOTO PROFIL (untuk kartu)
                const fotoUrl = d.foto_profil || d.url_foto || "";

                let fileHtml = "";
                if (linkKtp && linkKtp !== "" && linkKtp !== "-") {
                    fileHtml += `<a href="${linkKtp}" target="_blank" class="file-link" title="Lihat KTP"><i class="fas fa-id-card"></i></a> `;
                }
                if (linkBerkas && linkBerkas !== "" && linkBerkas !== "-") {
                    fileHtml += `<a href="${linkBerkas}" target="_blank" class="file-link" title="Lihat Berkas"><i class="fas fa-file-alt"></i></a>`;
                }
                if (!fileHtml) fileHtml = '<span style="color:#ccc;">-</span>';

                const status = d.status_akun || 'Pending';
                
                const statusBadge = status === 'Aktif' ? 'badge-aktif' : 'badge-pending';
                const statusIcon = status === 'Aktif' ? 'fa-check-square' : 'fa-stop-circle';
                const statusBtnColor = status === 'Aktif' ? '#28a745' : '#dc3545';

                // Data attributes ditambahkan untuk mempermudah fungsi kartu tanpa merubah struktur visual tabel
                tableBody.innerHTML += `
                <tr data-foto="${fotoUrl}" data-ttl="${d.tempat_tanggal_lahir || '-'}">
                    <td class="check-col"><input type="checkbox" class="user-checkbox" value="${doc.id}" onclick="updateActionMenu()"></td>
                    <td class="nij-col">${nij}</td>
                    <td><strong>${namaTampil}</strong></td>
                    <td style="text-align:center;"><strong>${goldar}</strong></td> 
                    <td>${whatsapp}<br><small>${email}</small></td>
                    <td><small>P: ${pasangan}<br>A: ${anak}</small></td>
                    <td><small>${alamatDetail}</small></td>
                    <td><small>${wilayah}<br>K: ${komsel}</small></td>
                    <td><small>${jabatan}<br>F: ${fungsi}</small></td>
                    <td style="text-align:center; font-size:18px;">${fileHtml}</td>
                    <td>
                        <span class="${statusBadge}">${status}</span>
                        <button class="btn-status-toggle" style="background:${statusBtnColor}" onclick="toggleUserStatus('${doc.id}', '${status}')">
                            <i class="fas ${statusIcon}"></i>
                        </button>
                    </td>
                    <td>
                        <button onclick="openEditModal('${doc.id}')" class="btn-action" style="background:var(--accent); padding:4px 8px;"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser('${doc.id}')" class="btn-action" style="background:var(--danger); padding:4px 8px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            updateActionMenu();
        });
    }

    // --- FITUR BARU: GENERATE MEMBER CARD (PENAMBAHAN) ---
    async function generateMemberCards() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', [85.6, 54]); 

        const selectedCheckboxes = document.querySelectorAll('.user-checkbox:checked');
        if (selectedCheckboxes.length === 0) {
            alert("Pilih jemaat terlebih dahulu!");
            return;
        }

        const canvas = document.getElementById('barcodeCanvas');

        for (let i = 0; i < selectedCheckboxes.length; i++) {
            const row = selectedCheckboxes[i].closest('tr');
            const nij = row.cells[1].innerText;
            const nama = row.cells[2].innerText;
            const alamat = row.cells[6].innerText;
            const wilayah = row.cells[7].innerText.split('\n')[0];
            const jabatan = row.cells[8].innerText.split('\n')[0];
            const ttl = row.getAttribute('data-ttl');
            const foto = row.getAttribute('data-foto');

            if (i > 0) doc.addPage();

            // Background & Border
            doc.setDrawColor(212, 175, 55);
            doc.setLineWidth(0.8);
            doc.rect(2, 2, 81.6, 50);

            // LOGO (Kiri: Pondok, Kanan: GBI sesuai koreksi)
            try {
                doc.addImage('logo_pondok.png', 'PNG', 4, 4, 10, 10);
                doc.addImage('gbi.png', 'PNG', 71, 4, 10, 10);
            } catch(e) { console.warn("Logo tidak ditemukan, pastikan file ada di github."); }

            // KOP KARTU
            doc.setFont("helvetica", "bold");
            doc.setTextColor(0, 51, 102);
            doc.setFontSize(10);
            doc.text("PONDOK PEMULIHAN PAPUA", 42.8, 8, { align: "center" });
            doc.setFontSize(8);
            doc.text("KARTU JEMAAT", 42.8, 12, { align: "center" });
            doc.setDrawColor(212, 175, 55);
            doc.line(16, 14, 69, 14);

            // FOTO PROFIL
            if (foto && foto !== "") {
                try { doc.addImage(foto, 'JPEG', 5, 18, 18, 22); }
                catch(e) { doc.rect(5, 18, 18, 22); doc.text("Foto", 14, 29, {align:"center"}); }
            } else {
                doc.setDrawColor(200);
                doc.rect(5, 18, 18, 22);
                doc.setFontSize(6);
                doc.text("Tanpa Foto", 14, 29, {align:"center"});
            }

            // BIODATA
            doc.setFontSize(7);
            doc.setTextColor(0);
            let x = 26; let y = 21; let s = 4.2;

            doc.text(`NIJ`, x, y);              doc.text(`: ${nij}`, x+18, y);
            doc.text(`Nama`, x, y+s);           doc.text(`: ${nama}`, x+18, y+s);
            doc.text(`Alamat`, x, y+s*2);       doc.text(`: ${alamat.substring(0,30)}`, x+18, y+s*2);
            doc.text(`TTL`, x, y+s*3);          doc.text(`: ${ttl}`, x+18, y+s*3);
            doc.text(`Jabatan`, x, y+s*4);      doc.text(`: ${jabatan}`, x+18, y+s*4);
            doc.text(`Wilayah`, x, y+s*5);      doc.text(`: ${wilayah}`, x+18, y+s*5);

            // BARCODE
            JsBarcode(canvas, nij, { format: "CODE128", displayValue: false, margin: 0 });
            const b64 = canvas.toDataURL("image/png");
            doc.addImage(b64, 'PNG', 5, 42, 25, 7);
            doc.setFontSize(5);
            doc.text("Scan to Search System", 17.5, 50, { align: "center" });
        }
        doc.save(`Kartu_Jemaat_PPP_${Date.now()}.pdf`);
    }

    // --- FUNGSI EXTRACT PDF (TIDAK BERUBAH) ---
    function extractSelectedToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); 
        
        const selectedCheckboxes = document.querySelectorAll('.user-checkbox:checked');
        if (selectedCheckboxes.length === 0) {
            alert("Pilih jemaat terlebih dahulu!");
            return;
        }

        const rows = [];
        document.querySelectorAll("#memberData tr").forEach(tr => {
            const cb = tr.querySelector(".user-checkbox");
            if (cb && cb.checked) {
                const tds = tr.querySelectorAll("td");
                rows.push([
                    tds[1].innerText, tds[2].innerText, tds[3].innerText,
                    tds[4].innerText.replace(/\n/g, ' / '), tds[6].innerText,
                    tds[7].innerText.replace(/\n/g, ' '), tds[8].innerText.replace(/\n/g, ' '),
                    tds[10].innerText.split('\n')[0]
                ]);
            }
        });

        doc.setFontSize(16);
        doc.text("LAPORAN DATA JEMAAT - PONDOK PEMULIHAN PAPUA", 14, 15);
        doc.autoTable({
            startY: 30,
            head: [['NIJ', 'Nama Lengkap', 'G.D', 'WhatsApp/Email', 'Alamat', 'Wilayah/Komsel', 'Jabatan/Pelayanan', 'Status']],
            body: rows,
            theme: 'striped',
            headStyles: { fillColor: [0, 51, 102] },
            styles: { fontSize: 7 }
        });
        doc.save(`Data_Jemaat_PPP_${Date.now()}.pdf`);
    }

    // --- FUNGSI OPERASIONAL LAINNYA (TIDAK BERUBAH) ---
    function toggleUserStatus(id, current) {
        const next = current === 'Aktif' ? 'Pending' : 'Aktif';
        db.collection("users").doc(id).update({ status_akun: next });
    }

    function deleteUser(id) { 
        if(confirm("Hapus data ini secara permanen?")) { db.collection("users").doc(id).delete(); }
    }

    function bulkDelete() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if(confirm(`Hapus ${selected.length} data terpilih?`)) {
            selected.forEach(cb => db.collection("users").doc(cb.value).delete());
        }
    }

    function openEditModal(uid) { window.location.href = `edit-jemaat-administrator.html?edit=${uid}`; }

    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    function toggleAll(source) {
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = source.checked);
        updateActionMenu();
    }

    function updateActionMenu() {
        const count = document.querySelectorAll('.user-checkbox:checked').length;
        const menu = document.getElementById('actionMenu');
        if(menu) {
            menu.style.display = count > 0 ? 'flex' : 'none';
            const selectedCountElem = document.getElementById('selectedCount');
            if(selectedCountElem) selectedCountElem.innerText = `${count} Terpilih`;
        }
    }
</script>
</body>
</html>
