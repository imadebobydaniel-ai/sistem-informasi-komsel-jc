<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14; --cyan: #17a2b8;
            --teal: #008080;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1450px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .stats-grid a { text-decoration: none; color: inherit; }
        .stat-card { 
            padding: 20px 15px; 
            border-radius: 10px; 
            color: white; 
            position: relative; 
            min-height: 60px; 
            cursor: pointer; 
            transition: transform 0.2s; 
            display: flex;
            align-items: center;
        }
        .stat-card:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .stat-card h4 { margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; padding-right: 30px; }
        .stat-card i { position: absolute; right: 12px; font-size: 1.3rem; opacity: 0.4; }

        #actionMenu { display: none; gap: 10px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; align-items: center; }
        .btn-action { border: none; padding: 8px 15px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; text-decoration: none; display: inline-block; }
        .table-controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }
        
        .table-responsive { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        table th { background: var(--primary); color: white; padding: 12px; font-size: 11px; text-align: left; text-transform: uppercase; }
        table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: top; }
        
        .nij-col { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 12px; }
        .check-col { width: 40px; text-align: center; }
        
        /* Badge Status Styles */
        .badge-pending { background: #ffc107; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .badge-aktif { background: var(--success); color: #fff; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .blood-badge { font-size: 10px; background: #eee; color: #333; padding: 2px 5px; border-radius: 3px; font-weight: bold; margin-top: 4px; display: inline-block; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        .modal-content {
            background-color: #fff;
            margin: 2% auto;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--emas);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
        }
        .full-width { grid-column: span 2; }
        .modal-footer {
            margin-top: 20px;
            text-align: right;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2 style="color:var(--primary); margin:0;">Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <a href="admin-tiket.html"><div class="stat-card" style="background: #007bff;"><h4>Portal Tiket</h4><i class="fas fa-ticket-alt"></i></div></a>
        <a href="#memberData"><div class="stat-card" style="background: #28a745;"><h4>Raport Jemaat</h4><i class="fas fa-check-circle"></i></div></a>
        <a href="portal-media.html"><div class="stat-card" style="background: #6f42c1;"><h4>Portal Media</h4><i class="fas fa-icons"></i></div></a>
        <a href="informasi-kegiatan.html"><div class="stat-card" style="background: #fd7e14;"><h4>Informasi Kegiatan</h4><i class="fas fa-calendar-alt"></i></div></a>
        <a href="admin-bigdata.html"><div class="stat-card" style="background: #17a2b8;"><h4>Big Data</h4><i class="fas fa-chart-line"></i></div></a>
        <a href="agenda-tahunan.html"><div class="stat-card" style="background: var(--teal);"><h4>Agenda Tahunan</h4><i class="fas fa-book-open"></i></div></a>
        <a href="manajemen-user.html"><div class="stat-card" style="background: var(--emas); color: #333;"><h4 style="color: #333;">Manajemen User</h4><i class="fas fa-users-cog" style="color: #333; opacity: 0.6;"></i></div></a>
    </div>

    <div id="actionMenu">
        <span style="font-size: 12px; font-weight: bold; margin-right: 10px;" id="selectedCount">0 Terpilih</span>
        <button class="btn-action" style="background: var(--accent);" onclick="bulkEdit()"><i class="fas fa-edit"></i> Edit</button>
        <button class="btn-action" style="background: var(--danger);" onclick="bulkDelete()"><i class="fas fa-trash"></i> Hapus</button>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari NIJ, nama, komsel, atau jabatan...">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div class="table-responsive">
        <table id="memberTable">
            <thead>
                <tr>
                    <th class="check-col"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                    <th>NIJ</th>
                    <th>Nama Lengkap</th>
                    <th>Kontak (WA/Email)</th>
                    <th>TTL / Darah</th>
                    <th>KTP / KK</th>
                    <th>Status / Pekerjaan</th>
                    <th>Lokasi / Komsel</th>
                    <th>Jabatan / Pelayanan</th>
                    <th>Status</th>
                    <th>Berkas</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0; color:var(--primary);">Edit Data Anggota</h3>
            <span style="cursor:pointer; font-size:24px;" onclick="closeEditModal()">&times;</span>
        </div>
        <form id="editForm">
            <input type="hidden" id="editDocId">
            <div class="form-grid">
                <div class="form-group"><label>Nama Lengkap</label><input type="text" id="editNama" required></div>
                <div class="form-group"><label>NIJ (Nomor Induk Jemaat)</label><input type="text" id="editNij"></div>
                <div class="form-group"><label>WhatsApp</label><input type="text" id="editWhatsapp"></div>
                <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
                <div class="form-group"><label>Tempat Lahir</label><input type="text" id="editKotaLahir"></div>
                <div class="form-group"><label>Tanggal Lahir</label><input type="date" id="editTglLahir"></div>
                <div class="form-group">
                    <label>Golongan Darah</label>
                    <select id="editDarah">
                        <option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                    </select>
                </div>
                <div class="form-group"><label>No. KTP</label><input type="text" id="editKtp"></div>
                <div class="form-group"><label>No. KK</label><input type="text" id="editKk"></div>
                <div class="form-group">
                    <label>Status Pernikahan</label>
                    <select id="editStatusNikah">
                        <option value="Belum Menikah">Belum Menikah</option><option value="Menikah">Menikah</option><option value="Janda/Duda">Janda/Duda</option>
                    </select>
                </div>
                <div class="form-group"><label>Pekerjaan</label><input type="text" id="editPekerjaan"></div>
                <div class="form-group"><label>Lokasi Berjemaat</label><input type="text" id="editLokasi"></div>
                <div class="form-group"><label>Wilayah Komsel</label><input type="text" id="editKomsel"></div>
                <div class="form-group"><label>Jabatan</label><input type="text" id="editJabatan"></div>
                <div class="form-group">
                    <label>Status Keanggotaan</label>
                    <select id="editStatus">
                        <option value="Pending">Pending</option><option value="Aktif">Aktif</option>
                    </select>
                </div>
                <div class="form-group full-width"><label>Alamat Lengkap</label><textarea id="editAlamat" rows="2"></textarea></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-action" style="background:#6c757d;" onclick="closeEditModal()">Batal</button>
                <button type="submit" class="btn-action" style="background:var(--success);">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() { loadMembersRealtime(); };

    function loadMembersRealtime() {
        db.collection("users").orderBy("tanggalDaftar", "desc").onSnapshot(snapshot => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            
            snapshot.forEach(doc => {
                const d = doc.data();
                const statusValue = d.status || 'Pending';
                const statusClass = statusValue.toLowerCase() === 'aktif' ? 'badge-aktif' : 'badge-pending';
                const golDarah = d.darah || d.golongan_darah || '-';

                tableBody.innerHTML += `
                <tr>
                    <td class="check-col"><input type="checkbox" class="user-checkbox" value="${doc.id}" onclick="updateActionMenu()"></td>
                    <td class="nij-col">${d.nij || '-'}</td>
                    <td><strong>${d.nama || '-'}</strong></td>
                    <td><i class="fab fa-whatsapp text-success"></i> ${d.whatsapp || '-'}<br><small>${d.email || '-'}</small></td>
                    <td><small>${d.kota_lahir || '-'}, ${d.tgl_lahir || '-'}</small><br><span class="blood-badge">Gol: ${golDarah}</span></td>
                    <td><small>KTP: ${d.ktp || '-'}</small><br><small>KK: ${d.kk || '-'}</small></td>
                    <td>${d.status_pernikahan || '-'}<br><small>${d.pekerjaan || '-'}</small></td>
                    <td><span style="color:var(--primary); font-weight:bold;">${d.lokasi_berjemaat || '-'}</span><br><small>${d.wilayah_komsel || '-'}</small></td>
                    <td><strong>${d.jabatan_jemaat || '-'}</strong><br><small>${d.sub_jabatan || '-'}</small></td>
                    <td><span class="${statusClass}">${statusValue}</span></td>
                    <td>${d.url_berkas ? `<a href="${d.url_berkas}" target="_blank" class="btn-action" style="background:var(--cyan); padding:4px 8px;"><i class="fas fa-eye"></i></a>` : '-'}</td>
                    <td>
                        <button onclick="openEditModal('${doc.id}')" class="btn-action" style="background:var(--accent); padding:4px 8px;"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser('${doc.id}')" class="btn-action" style="background:var(--danger); padding:4px 8px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            updateActionMenu();
        });
    }

    const editModal = document.getElementById('editModal');
    const editForm = document.getElementById('editForm');

    function openEditModal(id) {
        db.collection("users").doc(id).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('editDocId').value = id;
                document.getElementById('editNama').value = data.nama || '';
                document.getElementById('editNij').value = data.nij || '';
                document.getElementById('editWhatsapp').value = data.whatsapp || '';
                document.getElementById('editEmail').value = data.email || '';
                document.getElementById('editKotaLahir').value = data.kota_lahir || '';
                document.getElementById('editTglLahir').value = data.tgl_lahir || '';
                document.getElementById('editDarah').value = data.darah || data.golongan_darah || '-';
                document.getElementById('editKtp').value = data.ktp || '';
                document.getElementById('editKk').value = data.kk || '';
                document.getElementById('editStatusNikah').value = data.status_pernikahan || 'Belum Menikah';
                document.getElementById('editPekerjaan').value = data.pekerjaan || '';
                document.getElementById('editLokasi').value = data.lokasi_berjemaat || '';
                document.getElementById('editKomsel').value = data.wilayah_komsel || '';
                document.getElementById('editJabatan').value = data.jabatan_jemaat || '';
                document.getElementById('editStatus').value = data.status || 'Pending';
                document.getElementById('editAlamat').value = data.alamat || '';
                editModal.style.display = 'block';
            }
        });
    }

    function closeEditModal() { editModal.style.display = 'none'; }

    editForm.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editDocId').value;
        const updatedData = {
            nama: document.getElementById('editNama').value,
            nij: document.getElementById('editNij').value,
            whatsapp: document.getElementById('editWhatsapp').value,
            email: document.getElementById('editEmail').value,
            kota_lahir: document.getElementById('editKotaLahir').value,
            tgl_lahir: document.getElementById('editTglLahir').value,
            darah: document.getElementById('editDarah').value,
            ktp: document.getElementById('editKtp').value,
            kk: document.getElementById('editKk').value,
            status_pernikahan: document.getElementById('editStatusNikah').value,
            pekerjaan: document.getElementById('editPekerjaan').value,
            lokasi_berjemaat: document.getElementById('editLokasi').value,
            wilayah_komsel: document.getElementById('editKomsel').value,
            jabatan_jemaat: document.getElementById('editJabatan').value,
            status: document.getElementById('editStatus').value,
            alamat: document.getElementById('editAlamat').value
        };

        try {
            await db.collection("users").doc(id).update(updatedData);
            alert("Data berhasil diperbarui!");
            closeEditModal();
        } catch (error) { alert("Gagal: " + error.message); }
    };

    function toggleAll(source) {
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = source.checked);
        updateActionMenu();
    }

    function updateActionMenu() {
        const checkedOnes = document.querySelectorAll('.user-checkbox:checked');
        const actionMenu = document.getElementById('actionMenu');
        actionMenu.style.display = checkedOnes.length > 0 ? 'flex' : 'none';
        document.getElementById('selectedCount').innerText = `${checkedOnes.length} Terpilih`;
    }

    function deleteUser(id) {
        if (confirm("Hapus permanen?")) { db.collection("users").doc(id).delete(); }
    }

    function bulkDelete() {
        const ids = Array.from(document.querySelectorAll('.user-checkbox:checked')).map(cb => cb.value);
        if (confirm(`Hapus ${ids.length} data?`)) {
            const batch = db.batch();
            ids.forEach(id => batch.delete(db.collection("users").doc(id)));
            batch.commit().then(() => alert("Terhapus"));
        }
    }

    function bulkEdit() {
        const selected = document.querySelector('.user-checkbox:checked');
        if (selected) openEditModal(selected.value);
    }

    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    window.onclick = (e) => { if (e.target == editModal) closeEditModal(); }
</script>
</body>
</html>
