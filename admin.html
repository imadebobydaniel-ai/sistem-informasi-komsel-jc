<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Database Anggota Komsel JC - Administrator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Dasar & Reset */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .admin-container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Header & Navigasi */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .admin-header h2 { font-size: 18px; margin: 0; color: #333; }
        .btn-menu { text-decoration: none; font-size: 12px; background: #333; color: white; padding: 8px 12px; border-radius: 8px; font-weight: bold; }

        /* Toolbar Tombol */
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action { border: none; padding: 10px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; }
        .btn-delete { background: #ff4757; }
        .btn-refresh { background: #007bff; }

        /* Pengaturan Tabel Responsif (Mobile Friendly) */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .user-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
        .nk-badge { background: #e3f2fd; color: #007bff; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 11px; }
        .text-sub { font-size: 11px; color: #888; display: block; }
        .blood-tag { color: #ff4757; font-weight: bold; }

        /* Modal Notif Style */
        #notif-block { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-notif { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; }
        .modal-notif i { font-size: 50px; color: #dc3545; margin-bottom: 15px; }
        .modal-notif p { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 20px; line-height: 1.5; }
        .btn-close-notif { background: #333; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        @media screen and (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 15px; text-align: center; }
            .toolbar { width: 100%; justify-content: center; }
            .btn-action { flex: 1; justify-content: center; }
            thead { display: none; }
            tr { display: block; background: #fff; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 5px; text-align: right; }
            td::before { content: attr(data-label); font-weight: bold; color: #666; float: left; text-align: left; font-size: 12px; }
            td:nth-child(2) { justify-content: center; border-bottom: 1px solid #f5f5f5; padding-bottom: 10px; margin-bottom: 5px; }
            td:nth-child(2)::before { content: ""; }
            .user-img { width: 60px; height: 60px; }
            .btn-action-cell { gap: 15px; justify-content: flex-end; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h2>Database Anggota Komsel JC</h2>
        <a href="menu.html" class="btn-menu"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE MENU</a>
    </div>

    <div class="toolbar">
        <button class="btn-action btn-delete" onclick="deleteSelected()"><i class="fa-solid fa-trash"></i> Hapus Terpilih</button>
        <button class="btn-action btn-refresh" onclick="refreshData()"><i class="fa-solid fa-sync"></i> Refresh Data</button>
    </div>

    <div class="table-responsive">
        <table id="userTable">
            <thead>
                <tr>
                    <th style="width: 30px;"><input type="checkbox" id="selectAll"></th>
                    <th>Foto</th>
                    <th>NK</th>
                    <th>Nama Lengkap</th>
                    <th>Jabatan</th>
                    <th>Gol. Darah</th>
                    <th>WhatsApp</th>
                    <th>Alamat</th>
                    <th>Tgl Daftar</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="userList">
                </tbody>
        </table>
    </div>
</div>

<div id="notif-block">
    <div class="modal-notif">
        <i class="fa-solid fa-circle-exclamation"></i>
        <p id="notif-text">Pesan Notifikasi</p>
        <button class="btn-close-notif" onclick="closeNotif()">TUTUP</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    function showNotif(msg) {
        document.getElementById("notif-text").innerText = msg;
        document.getElementById("notif-block").style.display = "flex";
    }

    function closeNotif() {
        document.getElementById("notif-block").style.display = "none";
    }

    // Load Data
    async function loadUsers() {
        const userList = document.getElementById("userList");
        userList.innerHTML = "";
        try {
            const snapshot = await db.collection("users").get();
            snapshot.forEach(doc => {
                const user = doc.data();
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><input type="checkbox" class="user-checkbox" value="${doc.id}"></td>
                    <td data-label="Foto"><img src="${user.fotoUrl || 'https://via.placeholder.com/40'}" class="user-img"></td>
                    <td data-label="NK"><span class="nk-badge">${user.nk || '-'}</span></td>
                    <td data-label="Nama Lengkap"><strong>${user.namaLengkap}</strong><span class="text-sub">${user.email}</span></td>
                    <td data-label="Jabatan">${user.jabatan}</td>
                    <td data-label="Gol. Darah" class="blood-tag">${user.golDarah || '-'}</td>
                    <td data-label="WhatsApp">${user.whatsapp || '-'}</td>
                    <td data-label="Alamat">${user.alamat || '-'}</td>
                    <td data-label="Tgl Daftar">${user.tanggalDaftar || '-'}</td>
                    <td data-label="Aksi" class="btn-action-cell">
                        <i class="fa-solid fa-edit" style="color:#007bff; cursor:pointer; margin-right:15px;" onclick="editMember('${doc.id}')"></i>
                        <i class="fa-solid fa-trash" style="color:#ff4757; cursor:pointer;" onclick="deleteMember('${doc.id}')"></i>
                    </td>
                `;
                userList.appendChild(tr);
            });
        } catch (e) { showNotif("Gagal memuat data: " + e.message); }
    }

    // Fungsi Edit
    function editMember(id) {
        localStorage.setItem("editMemberID", id);
        window.location.href = "registrasi.html";
    }

    // Fungsi Hapus Tunggal
    async function deleteMember(id) {
        if(confirm("Hapus anggota ini?")) {
            try {
                await db.collection("users").doc(id).delete();
                loadUsers();
            } catch (e) { showNotif("Gagal menghapus: " + e.message); }
        }
    }

    // Hapus Terpilih
    async function deleteSelected() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if(selected.length === 0) return showNotif("Pilih data yang ingin dihapus.");
        
        if(confirm(`Hapus ${selected.length} anggota terpilih?`)) {
            try {
                for(let cb of selected) {
                    await db.collection("users").doc(cb.value).delete();
                }
                loadUsers();
            } catch (e) { showNotif("Gagal menghapus beberapa data."); }
        }
    }

    document.getElementById('selectAll').addEventListener('change', function() {
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = this.checked);
    });

    function refreshData() { loadUsers(); }
    window.onload = loadUsers;
</script>
</body>
</html>
