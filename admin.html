<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); display: flex; justify-content: center; padding: 20px; }
        .edit-container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        /* Style untuk kolom yang tidak boleh dirubah */
        .readonly-field { background-color: #e9ecef; cursor: not-allowed; color: #6c757d; font-weight: bold; }
        
        .btn-save { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-cancel { display: block; text-align: center; text-decoration: none; color: #777; font-size: 14px; margin-top: 15px; }
        
        #loader { text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="edit-container">
    <div class="header">
        <h2 style="margin:0; color: var(--primary);">EDIT PROFIL ANGGOTA</h2>
        <p style="font-size: 12px; color: #888;">Pastikan data diperbarui dengan benar</p>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br>Memuat Data...</div>

    <form id="editForm" style="display: none;">
        <div class="form-group">
            <label>Nomor Komsel (NK) - <small>Read Only</small></label>
            <input type="text" id="nomor_komsel" class="readonly-field" readonly>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Nomor HP / WhatsApp</label>
            <input type="tel" id="no_hp" required>
        </div>

        <div class="form-group">
            <label>Password - <small>Read Only</small></label>
            <input type="text" id="password" class="readonly-field" readonly>
        </div>

        <div class="form-group">
            <label>Alamat Lengkap</label>
            <textarea id="alamat" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Golongan Darah</label>
            <select id="golongan_darah">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>

        <div class="form-group">
            <label>Jabatan</label>
            <select id="jabatan">
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
            </select>
        </div>

        <div class="form-group">
            <label>Komsel JC</label>
            <input type="number" id="komsel" placeholder="Contoh: 5">
        </div>

        <button type="submit" class="btn-save">SIMPAN PERUBAHAN</button>
        <a href="admin.html" class="btn-cancel">Batal & Kembali ke Dashboard</a>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // Mengambil ID dari localStorage yang dikirim oleh admin.html
    const memberID = localStorage.getItem("editMemberID");

    window.onload = async function() {
        if (!memberID) {
            alert("Tidak ada data yang dipilih untuk diedit!");
            window.location.href = 'admin.html';
            return;
        }

        try {
            const doc = await db.collection("users").doc(memberID).get();
            if (doc.exists) {
                const data = doc.data();
                
                // Mengisi data ke field (sesuai field name di Firebase Anda)
                document.getElementById("nomor_komsel").value = data.nomor_komsel || "";
                document.getElementById("nama").value = data.nama || "";
                document.getElementById("email").value = data.email || "";
                document.getElementById("no_hp").value = data.no_hp || "";
                document.getElementById("password").value = data.password || "";
                document.getElementById("alamat").value = data.alamat || "";
                document.getElementById("golongan_darah").value = data.golongan_darah || "A";
                document.getElementById("jabatan").value = data.jabatan || "";
                document.getElementById("komsel").value = data.komsel || "";

                document.getElementById("loader").style.display = "none";
                document.getElementById("editForm").style.display = "block";
            }
        } catch (error) {
            alert("Gagal mengambil data: " + error.message);
        }
    };

    // Fungsi Simpan Perubahan
    document.getElementById("editForm").onsubmit = async function(e) {
        e.preventDefault();
        
        try {
            await db.collection("users").doc(memberID).update({
                nama: document.getElementById("nama").value,
                email: document.getElementById("email").value,
                no_hp: document.getElementById("no_hp").value,
                alamat: document.getElementById("alamat").value,
                golongan_darah: document.getElementById("golongan_darah").value,
                jabatan: document.getElementById("jabatan").value,
                komsel: document.getElementById("komsel").value
                // Password dan NK tidak masuk ke update karena Read-Only
            });
            
            alert("Data berhasil diperbarui!");
            window.location.href = 'admin.html';
        } catch (error) {
            alert("Gagal memperbarui data: " + error.message);
        }
    };
</script>
</body>
</html>
