<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrator - PPP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #222; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        table th, table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        table th { background-color: #f8f9fa; color: #333; }
        .img-table { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .btn-edit { color: #007bff; cursor: pointer; margin-right: 10px; border: none; background: none; }
        .btn-delete { color: #dc3545; cursor: pointer; border: none; background: none; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; background: #e1f5fe; color: #01579b; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h2><i class="fa-solid fa-users-gear"></i> Data Anggota Pondok</h2>
        <a href="index.html" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> KEMBALI KE LOGIN</a>
    </div>

    <div style="margin-bottom: 15px;">
        <button onclick="deleteSelected()" style="background:#dc3545; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">
            <i class="fa-solid fa-trash"></i> Hapus Terpilih
        </button>
    </div>

    <table id="userTable">
        <thead>
            <tr>
                <th><input type="checkbox" id="checkAll" onclick="toggleSelectAll()"></th>
                <th>Foto</th>
                <th>NK (Nomor Komsel)</th>
                <th>Nama Lengkap</th>
                <th>Jabatan</th>
                <th>Gol. Darah</th>
                <th>WhatsApp</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tbody-users">
            </tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. AMBIL DATA DARI FIREBASE
    async function loadUsers() {
        const tbody = document.getElementById('tbody-users');
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Memuat data...</td></tr>';
        
        try {
            const snap = await db.collection("users").orderBy("tanggal_daftar", "desc").get();
            tbody.innerHTML = '';
            
            snap.forEach(doc => {
                const u = doc.data();
                const id = doc.id;
                
                tbody.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="user-check" value="${id}"></td>
                        <td><img src="${u.fotoUrl || 'default-user.png'}" class="img-table"></td>
                        <td><span class="status-badge">${u.nomor_komsel}</span></td>
                        <td><b>${u.nama}</b><br><small>${u.email}</small></td>
                        <td>${u.jabatan || '-'}</td>
                        <td>${u.goldar || '-'}</td>
                        <td>${u.no_hp}</td>
                        <td>
                            <button class="btn-edit" onclick="editUser('${id}')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-delete" onclick="hapusUser('${id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="8">Gagal memuat data: ' + err.message + '</td></tr>';
        }
    }

    // 2. FUNGSI HAPUS SATUAN
    async function hapusUser(id) {
        if(confirm("Apakah Anda yakin ingin menghapus anggota ini?")) {
            await db.collection("users").doc(id).delete();
            alert("Data berhasil dihapus");
            loadUsers();
        }
    }

    // 3. SELEKSI SEMUA CHECKBOX
    function toggleSelectAll() {
        const isChecked = document.getElementById('checkAll').checked;
        const checks = document.querySelectorAll('.user-check');
        checks.forEach(c => c.checked = isChecked);
    }

    // 4. HAPUS YANG TERPILIH (MASSAL)
    async function deleteSelected() {
        const selected = document.querySelectorAll('.user-check:checked');
        if(selected.length === 0) return alert("Pilih data yang ingin dihapus!");
        
        if(confirm(`Hapus ${selected.length} anggota terpilih?`)) {
            for(let s of selected) {
                await db.collection("users").doc(s.value).delete();
            }
            alert("Data terpilih berhasil dihapus");
            loadUsers();
        }
    }

    // 5. FUNGSI EDIT (SIMULASI)
    function editUser(id) {
        alert("Fitur edit untuk ID: " + id + " sedang dikembangkan.");
    }

    // JALANKAN SAAT HALAMAN DIBUKA
    loadUsers();
</script>

</body>
</html>
