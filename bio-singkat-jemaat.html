<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi SIPAPUA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Modal Popup Design */
        .bio-popup {
            width: 90%; max-width: 400px; background: white; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; display: none;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .header-bio { background: #003366; color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        .content-bio { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .foto-jemaat { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; border: 3px solid #d4af37; }
        
        .detail-info { flex: 1; font-size: 13px; }
        .detail-info div { margin-bottom: 5px; color: #333; }
        .label { font-weight: bold; color: #003366; display: block; font-size: 10px; text-transform: uppercase; }

        .footer-btn { display: flex; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-add { background: #003366; color: white; }
        .btn-add:hover { background: #0055aa; }
        .btn-cancel { background: #f8f9fa; color: #666; }

        /* Style Pesan Error */
        .error-box { text-align: center; padding: 30px; display: none; }
        .error-box i { font-size: 50px; color: #e74c3c; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="popupBio" class="bio-popup">
        <div class="header-bio">BIO JEMAAT</div>
        <div class="content-bio">
            <img id="view-foto" src="https://via.placeholder.com/100" class="foto-jemaat">
            <div class="detail-info">
                <span class="label">NIJ</span>
                <div id="view-nij">...</div>
                <span class="label">Nama Lengkap</span>
                <div id="view-nama" style="font-size: 15px; font-weight: bold;">...</div>
                <span class="label">Komsel</span>
                <div id="view-komsel">...</div>
                <span class="label">Jemaat</span>
                <div id="view-jemaat">...</div>
            </div>
        </div>
        <div class="footer-btn">
            <button class="btn btn-cancel" onclick="closeApp()">CANCEL</button>
            <button class="btn btn-add" onclick="processAdd()">ADD</button>
        </div>
    </div>

    <div id="errorBox" class="error-box">
        <i class="fas fa-exclamation-triangle"></i>
        <h3 id="errMsg">Akses Dibatalkan</h3>
        <p style="color: #666; font-size: 14px;">Silahkan Hubungi Administrator atau pastikan Anda sudah Login di SIPAPUA.</p>
        <button class="btn btn-add" style="border-radius: 10px; margin-top: 10px;" onclick="closeApp()">OK</button>
    </div>

<script>
    // 1. Inisialisasi Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function initScan() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetEmail = urlParams.get('scan'); // Email orang yang di-scan
        const scannerEmail = localStorage.getItem("userEmail"); // Email orang yang sedang scan (login di HP)

        // CEK 1: Apakah Scanner sudah login?
        if (!scannerEmail) {
            showError("Anda Sedang Logout dari SIPAPUA / Anda tidak memiliki aplikasi SIPAPUA.");
            return;
        }

        if (!targetEmail) {
            showError("Data QR tidak valid.");
            return;
        }

        try {
            // Ambil data orang yang di-scan
            const snap = await db.collection("users").where("email", "==", targetEmail).get();
            if (!snap.empty) {
                const data = snap.docs[0].data();
                
                // Tampilkan ke Popup
                document.getElementById('view-nama').innerText = data.nama || "-";
                document.getElementById('view-nij').innerText = data.nij || "-";
                document.getElementById('view-komsel').innerText = data.komsel || "-";
                document.getElementById('view-jemaat').innerText = data.lokasi_berjemaat || "-";
                if(data.fotoUrl) document.getElementById('view-foto').src = data.fotoUrl;

                document.getElementById('popupBio').style.display = 'block';
            } else {
                showError("Jemaat tidak terdaftar di sistem.");
            }
        } catch (e) {
            showError("Gagal menghubungkan ke server.");
        }
    }

    function showError(msg) {
        document.getElementById('errMsg').innerText = msg;
        document.getElementById('errorBox').style.display = 'block';
    }

    function processAdd() {
        alert("Fitur ADD sedang dikembangkan. Data jemaat akan segera tersimpan ke database komsel Anda.");
        // Di sini nantinya Anda bisa tambahkan db.collection("komsel_data").add({...})
    }

    function closeApp() {
        // Karena ini di dalam APK/Webview, kita arahkan balik ke menu atau tutup window
        window.location.href = "menu.html";
    }

    window.onload = initScan;
</script>
</body>
</html>
