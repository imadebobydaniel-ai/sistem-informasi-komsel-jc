<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Data Dashboard - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --purple: #6f42c1; --dark: #1a1a1a;
            --light: #f8f9fa; --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7; margin: 0; padding: 20px; color: var(--dark);
        }

        .container { max-width: 1400px; margin: auto; }

        #loading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center;
            align-items: center; font-weight: bold; color: var(--primary);
        }

        .tab-menu {
            display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;
            align-items: center; border-bottom: 2px solid #ddd;
        }
        
        .tab-btn {
            padding: 12px 18px; border: none; border-radius: 12px; background: white;
            cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .tab-btn.active { background: var(--primary); color: white; transform: translateY(-3px); }

        .action-btn {
            padding: 10px 15px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; color: white; font-size: 12px;
        }
        .btn-pdf { background: var(--danger); }
        .btn-print { background: var(--dark); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 25px;
        }
        .chart-card {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center;
        }
        .chart-title { font-weight: bold; margin-bottom: 15px; color: var(--dark); width: 100%; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .data-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table-wrapper { overflow-x: auto; margin-top: 15px; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #e2e3e5; color: #383d41; }

        @media print {
            .tab-menu, #loading, .action-btn, .fas.fa-arrow-left { display: none !important; }
        }
    </style>
</head>
<body>

<div id="loading">Memproses Data...</div>

<div id="exportModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:20px; width:90%; max-width:500px; box-shadow:0 10px 30px rgba(0,0,0,0.3);">
        <h3 id="modalTitle" style="margin-top:0;"><i class="fas fa-file-export"></i> Opsi Ekspor Laporan</h3>
        <p>Silakan pilih metode pengambilan data:</p>
        
        <div style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
            <button class="tab-btn" onclick="processExport('current')" style="justify-content:flex-start; width:100%;">
                <i class="fas fa-table"></i> Ekspor Data Saat Ini (Tab Aktif)
            </button>
            <button class="tab-btn" onclick="processExport('all')" style="justify-content:flex-start; width:100%;">
                <i class="fas fa-layer-group"></i> Ekspor Semua Kategori (Satu File PDF)
            </button>
            <button class="tab-btn" onclick="toggleCustomSection()" style="justify-content:flex-start; width:100%;">
                <i class="fas fa-check-square"></i> Pilih Custom (Pilih Kategori)
            </button>
        </div>

        <div id="customSection" style="display:none; margin-top:15px; padding:15px; background:#f8f9fa; border-radius:10px; border:1px solid #ddd;">
            <p style="font-weight:bold; font-size:12px; margin-bottom:10px;">Pilih Kategori:</p>
            <div id="customCheckboxes" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px;"></div>
            <button class="action-btn btn-pdf" onclick="processExport('custom')" style="width:100%; margin-top:15px; justify-content:center;">Proses Pilihan</button>
        </div>

        <button onclick="closeExportModal()" style="margin-top:20px; width:100%; border:none; background:none; color:var(--danger); cursor:pointer; font-weight:bold;">Batal</button>
    </div>
</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2><i class="fas fa-database"></i> Dashboard Statistik Central</h2>
        <a href="admin.html" style="text-decoration:none; color: var(--primary); font-weight:bold;"><i class="fas fa-arrow-left"></i> Kembali</a>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('ibadah', this)"><i class="fas fa-church"></i> Ibadah Raya</button>
        <button class="tab-btn" onclick="switchTab('arso1', this)"><i class="fas fa-map-marker-alt"></i> Ibadah Arso 1</button>
        <button class="tab-btn" onclick="switchTab('komsel', this)"><i class="fas fa-users"></i> Komsel Reguler</button>
        <button class="tab-btn" onclick="switchTab('komsel_gabungan', this)"><i class="fas fa-layer-group"></i> Komsel Gabungan</button>
        <button class="tab-btn" onclick="switchTab('absen_kd', this)"><i class="fas fa-graduation-cap"></i> Absen KD</button>
        <button class="tab-btn" onclick="switchTab('bacaan', this)"><i class="fas fa-bible"></i> Baca Alkitab</button>
        <button class="tab-btn" onclick="switchTab('doa_komsel', this)"><i class="fas fa-hands-praying"></i> Doa Komsel</button>
        <button class="tab-btn" onclick="switchTab('peringkat_jc', this)"><i class="fas fa-trophy"></i> Peringkat JC</button>
        <button class="tab-btn" onclick="switchTab('saran', this)"><i class="fas fa-comment-dots"></i> Saran & Tiket</button>
        
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="action-btn btn-pdf" onclick="openExportModal('export')"><i class="fas fa-file-pdf"></i> Export</button>
            <button class="action-btn btn-print" onclick="openExportModal('print')"><i class="fas fa-print"></i> Print</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="chart-card">
            <div class="chart-title" id="pie-title">Proporsi Status Laporan</div>
            <div style="width: 100%; height: 250px;"><canvas id="pieChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Kurva Tren Aktivitas (7 Hari)</div>
            <div style="width: 100%; height: 250px;"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title" id="bar-title">Distribusi Per JC/Komsel</div>
            <div style="width: 100%; height: 250px;"><canvas id="barChart"></canvas></div>
        </div>
    </div>

    <div class="data-section">
        <div class="chart-title" id="table-title" style="text-align: left;">Detail: Ibadah Raya</div>
        <div class="table-wrapper">
            <table id="mainTable">
                <thead id="table-head"></thead>
                <tbody id="data-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myCharts = { pie: null, line: null, bar: null };
    let activeType = 'ibadah';
    let currentAction = 'export';

    const menuConfig = {
        ibadah: { title: 'Ibadah Raya', col: 'kehadiran', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Keterangan'] },
        arso1: { title: 'Kehadiran Arso 1', col: 'kehadiran_arso1', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Keterangan'] },
        komsel: { title: 'Komsel Reguler', col: 'laporan_komsel', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Materi'] },
        komsel_gabungan: { title: 'Komsel Gabungan', col: 'laporan_gabungan', fields: ['Nama', 'Komsel', 'Tanggal', 'Status', 'Lokasi'] },
        absen_kd: { title: 'Kingdom Discipleship', col: 'kehadiran_kd', fields: ['Nama', 'Kelas', 'Tanggal', 'Status', 'Materi'] },
        bacaan: { title: 'Laporan Baca Alkitab', col: 'laporan_bacaan', fields: ['Nama', 'Kitab', 'Pasal', 'Tanggal', 'Pesan'] },
        doa_komsel: { title: 'Hasil Doa Komsel', col: 'laporan_doa', fields: ['Nama', 'JC', 'Tgl Doa', 'Status Doa', 'Pokok Doa'] },
        peringkat_jc: { title: 'Peringkat JC', col: 'peringkat_jc', fields: ['Peringkat', 'Nama JC', 'Total Poin', 'Periode', 'Status'] },
        saran: { title: 'Saran & Tiket Masuk', col: 'saran_masuk', fields: ['Pengirim', 'Komsel', 'Kategori', 'Isi Pesan', 'Tanggal'] }
    };

    function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

    // ==========================================
    // FUNGSI SINKRONISASI LEADERBOARD (LOGIC)
    // ==========================================
    async function syncLeaderboard() {
        showLoading(true);
        try {
            // 1. Ambil data kehadiran (sebagai penunjang skor)
            const snapshot = await db.collection("kehadiran").get();
            let skorJC = {};
            let periodeSekarang = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });

            snapshot.forEach((doc) => {
                let d = doc.data();
                let namaJC = d.jc || "Umum";
                if (!skorJC[namaJC]) skorJC[namaJC] = 0;
                
                // Logika Poin: Hadir = 10 poin
                if (d.status && d.status.toUpperCase() === "HADIR") {
                    skorJC[namaJC] += 10;
                }
            });

            // 2. Ubah ke Array & Urutkan
            let urutan = Object.keys(skorJC).map(name => ({
                nama: name,
                poin: skorJC[name]
            })).sort((a, b) => b.poin - a.poin);

            // 3. Simpan/Update ke koleksi peringkat_jc di Firebase
            const batch = db.batch();
            urutan.forEach((item, index) => {
                let docRef = db.collection("peringkat_jc").doc(item.nama);
                batch.set(docRef, {
                    ranking: index + 1,
                    nama_jc: item.nama,
                    poin: item.poin,
                    periode: periodeSekarang,
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
            await batch.commit();
            console.log("Leaderboard Sync Success");
        } catch (error) {
            console.error("Gagal sinkronisasi:", error);
        }
    }

    // --- FUNGSI LOAD DATA ---
    async function loadData(type) {
        showLoading(true);
        activeType = type;

        // Jika user klik Peringkat JC, jalankan sinkronisasi dulu
        if (type === 'peringkat_jc') {
            await syncLeaderboard();
        }

        const cfg = menuConfig[type];
        document.getElementById('table-title').innerText = "Detail: " + cfg.title;
        document.getElementById('table-head').innerHTML = `<tr>${cfg.fields.map(f => `<th>${f}</th>`).join('')}</tr>`;

        // Query ke Firestore
        let query = db.collection(cfg.col);
        if (type === 'peringkat_jc') {
            query = query.orderBy("ranking", "asc");
        } else {
            query = query.orderBy("tanggal", "desc").limit(50);
        }

        query.onSnapshot((snapshot) => {
            let html = "";
            let stats = { pie: {}, line: {}, bar: {} };

            snapshot.forEach((doc) => {
                const d = doc.data();
                const tgl = d.tanggal || d.periode || "-";
                
                if(type === 'peringkat_jc') {
                    const jc = d.nama_jc;
                    const poin = d.poin;
                    const rank = d.ranking;

                    stats.bar[jc] = poin; // Untuk grafik bar
                    stats.pie[jc] = poin; // Untuk grafik proporsi
                    
                    html += `
                        <tr>
                            <td><b>#${rank}</b></td>
                            <td>${jc}</td>
                            <td><span class="badge badge-success">${poin} Poin</span></td>
                            <td>${tgl}</td>
                            <td><span class="badge badge-info">AKTIF</span></td>
                        </tr>`;
                } else {
                    // Logika tampilan untuk kategori lain (Ibadah, Komsel, dll)
                    const jc = d.jc || d.komsel || "Umum";
                    const status = (d.status || "HADIR").toUpperCase();
                    
                    stats.pie[status] = (stats.pie[status] || 0) + 1;
                    stats.bar[jc] = (stats.bar[jc] || 0) + 1;
                    stats.line[tgl] = (stats.line[tgl] || 0) + 1;

                    html += `<tr>
                        <td>${d.nama || '-'}</td>
                        <td>${jc}</td>
                        <td>${tgl}</td>
                        <td><span class="badge ${status === 'HADIR' ? 'badge-success' : 'badge-danger'}">${status}</span></td>
                        <td>${d.keterangan || d.materi || '-'}</td>
                    </tr>`;
                }
            });
            document.getElementById('data-list').innerHTML = html;
            refreshCharts(stats);
            showLoading(false);
        });
    }

    function refreshCharts(stats) {
        const createChart = (id, chartType, labels, data, colors, label) => {
            if (myCharts[id]) myCharts[id].destroy();
            const canvas = document.getElementById(id + 'Chart');
            if(!canvas) return;
            myCharts[id] = new Chart(canvas.getContext('2d'), {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{ label: label, data: data, backgroundColor: colors, fill: chartType === 'line' }]
                },
</body>
</html>
