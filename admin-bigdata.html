<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Data Dashboard - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --purple: #6f42c1; --dark: #1a1a1a;
            --light: #f8f9fa; --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7; margin: 0; padding: 20px; color: var(--dark);
        }

        .container { max-width: 1300px; margin: auto; }

        #loading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center;
            align-items: center; font-weight: bold; color: var(--primary);
        }

        .tab-menu {
            display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;
            align-items: center;
        }
        
        /* Tombol Menu Utama */
        .tab-btn {
            padding: 12px 20px; border: none; border-radius: 12px; background: white;
            cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }
        .tab-btn.active { background: var(--primary); color: white; transform: translateY(-3px); }

        /* Tombol Aksi (Kotak Merah) */
        .action-btn {
            padding: 12px 20px; border: none; border-radius: 12px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; color: white;
        }
        .btn-pdf { background: var(--danger); }
        .btn-print { background: var(--dark); }
        .action-btn:hover { opacity: 0.8; transform: scale(1.05); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px;
        }
        .chart-card {
            background: var(--glass); padding: 20px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3);
            display: flex; flex-direction: column; align-items: center; min-height: 300px;
        }
        .chart-title { font-weight: bold; margin-bottom: 15px; color: var(--dark); width: 100%; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .data-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table-wrapper { overflow-x: auto; margin-top: 15px; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-hadir { background: #d4edda; color: #155724; }
        .badge-absen { background: #f8d7da; color: #721c24; }
        .jc-tag { color: var(--primary); font-weight: bold; }

        canvas { filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.1)); width: 100% !important; height: 100% !important; }

        /* Media Print */
        @media print {
            .tab-menu, #loading, .stats-grid, .fas.fa-arrow-left, .action-btn { display: none !important; }
            .data-section { box-shadow: none; border: none; }
            .table-wrapper { max-height: none; overflow: visible; }
        }
    </style>
</head>
<body>

<div id="loading">Memproses Big Data...</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2><i class="fas fa-database"></i> Big Data & Statistik Central</h2>
        <a href="admin.html" style="text-decoration:none; color: var(--primary); font-weight:bold;"><i class="fas fa-arrow-left"></i> Kembali</a>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('ibadah', this)"><i class="fas fa-church"></i> Ibadah Raya</button>
        <button class="tab-btn" onclick="switchTab('komsel', this)"><i class="fas fa-users"></i> Komsel Reguler</button>
        <button class="tab-btn" onclick="switchTab('gabungan', this)"><i class="fas fa-layer-group"></i> Komsel Gabungan</button>
        <button class="tab-btn" onclick="switchTab('kd', this)"><i class="fas fa-book-open"></i> KD (Kelas Dasar)</button>
        <button class="tab-btn" onclick="switchTab('doa', this)"><i class="fas fa-hands-praying"></i> Ibadah Doa</button>
        
        <div style="margin-left: auto; display: flex; gap: 10px;">
            <button class="action-btn btn-pdf" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
            <button class="action-btn btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="chart-card">
            <div class="chart-title">Proporsi Kehadiran</div>
            <div style="width: 100%; height: 200px;"><canvas id="pie3D"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Tren Laporan (7 Entri Terakhir)</div>
            <div style="width: 100%; height: 200px;"><canvas id="curveChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Distribusi Anggota Per JC</div>
            <div style="width: 100%; height: 200px;"><canvas id="bar3D"></canvas></div>
        </div>
    </div>

    <div class="data-section">
        <div class="chart-title" id="table-title">Detail List: Ibadah Raya</div>
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>Nama Anggota</th>
                        <th>JC</th>
                        <th>Hari / Tanggal</th>
                        <th>Tahun</th>
                        <th>Status</th>
                        <th>Alasan / Keterangan</th>
                    </tr>
                </thead>
                <tbody id="data-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // Konfigurasi Firebase (Tetap sama)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let chartPie, chartCurve, chartBar;
    let currentCategoryName = 'Ibadah Raya';

    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    // FUNGSI EXPORT PDF
    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        
        doc.text("Laporan Statistik - " + currentCategoryName, 14, 15);
        doc.setFontSize(10);
        doc.text("Dicetak pada: " + new Date().toLocaleString('id-ID'), 14, 22);

        doc.autoTable({
            html: '#mainTable',
            startY: 30,
            theme: 'grid',
            headStyles: { fillColor: [0, 123, 255] },
            styles: { fontSize: 8 }
        });

        doc.save(`Laporan_${currentCategoryName.replace(/\s+/g, '_')}.pdf`);
    }

    function syncAllData(category) {
        showLoading();
        const collectionMap = {
            'ibadah': 'kehadiran', 'komsel': 'laporan_komsel',
            'gabungan': 'komsel_gabungan', 'kd': 'laporan_kd', 'doa': 'laporan_doa'
        };
        const activeCollection = collectionMap[category] || 'kehadiran';

        db.collection(activeCollection).orderBy("tanggal", "desc").onSnapshot((snapshot) => {
            let rekapStatus = { "HADIR": 0, "IZIN": 0, "SAKIT": 0, "ALFA": 0 };
            let rekapTren = {};
            let tableHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const status = (data.status || "HADIR").toUpperCase();
                const jc = data.jc || "-";
                const tgl = data.tanggal || "-";
                
                if (rekapStatus[status] !== undefined) rekapStatus[status]++;
                if (tgl !== "-") rekapTren[tgl] = (rekapTren[tgl] || 0) + 1;

                tableHTML += `
                    <tr>
                        <td><b>${data.nama || 'Anonim'}</b></td>
                        <td class="jc-tag">${jc}</td>
                        <td>${tgl}</td>
                        <td>2026</td>
                        <td><span class="badge ${status === 'HADIR' ? 'badge-hadir' : 'badge-absen'}">${status}</span></td>
                        <td>${data.alasan || data.keterangan || '-'}</td>
                    </tr>
                `;
            });

            document.getElementById('data-list').innerHTML = tableHTML;
            updatePieChart(rekapStatus);
            updateCurveChart(rekapTren);
            hideLoading();
        });
        syncMemberDistribution();
    }

    function syncMemberDistribution() {
        db.collection("users").onSnapshot((snapshot) => {
            let rekapJC = { "JC 1": 0, "JC 2": 0, "JC 3": 0, "JC 4": 0, "JC 5": 0 };
            snapshot.forEach(doc => {
                const jc = (doc.data().jc || "").toString().toUpperCase();
                if (rekapJC[jc] !== undefined) rekapJC[jc]++;
            });
            updateBarChart(rekapJC);
        });
    }

    function updatePieChart(dataObj) {
        const ctx = document.getElementById('pie3D').getContext('2d');
        if (chartPie) chartPie.destroy();
        chartPie = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(dataObj),
                datasets: [{
                    data: Object.values(dataObj),
                    backgroundColor: ['#28a745', '#ffc107', '#dc3545', '#bdc3c7'],
                    hoverOffset: 10
                }]
            },
            options: { cutout: '70%', maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function updateCurveChart(trenObj) {
        const labels = Object.keys(trenObj).slice(-7);
        const data = Object.values(trenObj).slice(-7);
        const ctx = document.getElementById('curveChart').getContext('2d');
        if (chartCurve) chartCurve.destroy();
        chartCurve = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Entri',
                    data: data,
                    borderColor: '#6f42c1',
                    fill: true, tension: 0.4
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function updateBarChart(jcObj) {
        const ctx = document.getElementById('bar3D').getContext('2d');
        if (chartBar) chartBar.destroy();
        chartBar = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(jcObj),
                datasets: [{
                    label: 'Anggota',
                    data: Object.values(jcObj),
                    backgroundColor: '#007bff'
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function switchTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const titles = {
            'ibadah': 'Ibadah Raya', 'komsel': 'Komsel Reguler',
            'gabungan': 'Komsel Gabungan', 'kd': 'Kelas Dasar (KD)', 'doa': 'Ibadah Doa'
        };
        currentCategoryName = titles[type];
        document.getElementById('table-title').innerText = "Detail List: " + currentCategoryName;
        syncAllData(type);
    }

    window.onload = () => syncAllData('ibadah');
</script>

</body>
</html>
