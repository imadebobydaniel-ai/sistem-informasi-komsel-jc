<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Data Dashboard - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --purple: #6f42c1; --dark: #1a1a1a;
            --light: #f8f9fa; --glass: rgba(255, 255, 255, 0.9);
            --info: #17a2b8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7; margin: 0; padding: 20px; color: var(--dark);
        }

        .container { max-width: 1400px; margin: auto; }

        #loading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center;
            align-items: center; font-weight: bold; color: var(--primary);
        }

        .tab-menu {
            display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;
            align-items: center;
        }
        
        .tab-btn {
            padding: 12px 20px; border: none; border-radius: 12px; background: white;
            cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .tab-btn.active { background: var(--primary); color: white; transform: translateY(-3px); }

        .action-btn {
            padding: 10px 15px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; color: white; font-size: 13px;
        }
        .btn-pdf { background: var(--danger); }
        .btn-print { background: var(--dark); }
        .action-btn:hover { opacity: 0.8; transform: scale(1.05); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px;
        }
        .chart-card {
            background: var(--glass); padding: 20px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3);
            display: flex; flex-direction: column; align-items: center; min-height: 320px;
        }
        .chart-title { font-weight: bold; margin-bottom: 15px; color: var(--dark); width: 100%; border-bottom: 1px solid #eee; padding-bottom: 10px; text-align: center; }

        .data-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table-wrapper { overflow-x: auto; margin-top: 15px; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }

        canvas { width: 100% !important; height: 100% !important; }

        @media print {
            .tab-menu, #loading, .fas.fa-arrow-left, .action-btn { display: none !important; }
            .data-section { box-shadow: none; border: none; }
            .table-wrapper { max-height: none; overflow: visible; }
        }
    </style>
</head>
<body>

<div id="loading">Memproses Big Data...</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2><i class="fas fa-chart-line"></i> Central Intelligence & Statistics</h2>
        <a href="admin.html" style="text-decoration:none; color: var(--primary); font-weight:bold;"><i class="fas fa-arrow-left"></i> Panel Admin</a>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('ibadah', this)"><i class="fas fa-church"></i> Ibadah Raya</button>
        <button class="tab-btn" onclick="switchTab('arso1', this)"><i class="fas fa-place-of-worship"></i> Ibadah Arso 1</button>
        <button class="tab-btn" onclick="switchTab('bacaan', this)"><i class="fas fa-bible"></i> Baca Alkitab</button>
        <button class="tab-btn" onclick="switchTab('doa_komsel', this)"><i class="fas fa-praying-hands"></i> Doa Komsel</button>
        <button class="tab-btn" onclick="switchTab('komsel', this)"><i class="fas fa-users"></i> Komsel</button>
        
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="action-btn btn-pdf" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
            <button class="action-btn btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="chart-card">
            <div class="chart-title" id="pie-label">Status Kehadiran</div>
            <div style="width: 100%; height: 230px;"><canvas id="pieChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Volume Data (7 Hari Terakhir)</div>
            <div style="width: 100%; height: 230px;"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Aktivitas Per JC</div>
            <div style="width: 100%; height: 230px;"><canvas id="barChart"></canvas></div>
        </div>
    </div>

    <div class="data-section">
        <div class="chart-title" id="table-title" style="text-align: left;">Detail Data: Ibadah Raya</div>
        <div class="table-wrapper">
            <table id="mainTable">
                <thead id="table-head">
                    </thead>
                <tbody id="data-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let charts = { pie: null, line: null, bar: null };
    let currentCategory = 'ibadah';

    // KONFIGURASI TABEL & KOLEKSI
    const config = {
        ibadah: { title: 'Ibadah Raya', col: 'kehadiran', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Keterangan'] },
        arso1: { title: 'Ibadah Arso 1', col: 'kehadiran_arso1', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Keterangan'] },
        bacaan: { title: 'Laporan Baca Alkitab', col: 'laporan_bacaan', fields: ['Nama', 'Kitab', 'Pasal', 'Tanggal', 'JC'] },
        doa_komsel: { title: 'Laporan Doa Komsel', col: 'laporan_doa', fields: ['Nama', 'JC', 'Tgl Input', 'Status Doa', 'Detail'] },
        komsel: { title: 'Komsel Reguler', col: 'laporan_komsel', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Materi'] }
    };

    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    async function syncData(type) {
        showLoading();
        currentCategory = type;
        const cfg = config[type];
        document.getElementById('table-title').innerText = "Detail Data: " + cfg.title;
        
        // Render Table Header
        let headHTML = "<tr>" + cfg.fields.map(f => `<th>${f}</th>`).join('') + "</tr>";
        document.getElementById('table-head').innerHTML = headHTML;

        db.collection(cfg.col).orderBy("tanggal", "desc").limit(100).onSnapshot((snapshot) => {
            let listHTML = "";
            let stats = { pie: {}, line: {}, bar: {} };

            snapshot.forEach((doc) => {
                const d = doc.data();
                
                // Logika Statistik Umum
                const dateKey = d.tanggal || d.tglInput || "-";
                const jcKey = d.jc || d.komsel || "Tanpa JC";
                stats.line[dateKey] = (stats.line[dateKey] || 0) + 1;
                stats.bar[jcKey] = (stats.bar[jcKey] || 0) + 1;

                // Logika Baris Tabel & Pie Chart per Kategori
                if (type === 'bacaan') {
                    const status = d.kitab || "Selesai";
                    stats.pie[status] = (stats.pie[status] || 0) + 1;
                    listHTML += `<tr><td>${d.nama}</td><td>${d.kitab}</td><td>${d.pasal}</td><td>${d.tanggal}</td><td>${d.email || '-'}</td></tr>`;
                } else if (type === 'doa_komsel') {
                    const st = d.status_doa || "Terjawab";
                    stats.pie[st] = (stats.pie[st] || 0) + 1;
                    listHTML += `<tr><td>${d.nama || 'Anggota'}</td><td class="badge-info">${d.jc}</td><td>${d.tglInput}</td><td><span class="badge badge-success">${st}</span></td><td>${d.doa || '-'}</td></tr>`;
                } else {
                    const st = (d.status || "Hadir").toUpperCase();
                    stats.pie[st] = (stats.pie[st] || 0) + 1;
                    listHTML += `<tr><td><b>${d.nama}</b></td><td>${d.jc}</td><td>${d.tanggal}</td><td><span class="badge ${st === 'HADIR' ? 'badge-success' : 'badge-danger'}">${st}</span></td><td>${d.alasan || d.materi || '-'}</td></tr>`;
                }
            });

            document.getElementById('data-list').innerHTML = listHTML;
            updateCharts(stats);
            hideLoading();
        });
    }

    function updateCharts(stats) {
        // Pie Chart
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        if (charts.pie) charts.pie.destroy();
        charts.pie = new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: Object.keys(stats.pie),
                datasets: [{ data: Object.values(stats.pie), backgroundColor: ['#28a745', '#dc3545', '#ffc107', '#17a2b8', '#6f42c1'] }]
            },
            options: { maintainAspectRatio: false, cutout: '60%' }
        });

        // Line Chart
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        if (charts.line) charts.line.destroy();
        charts.line = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: Object.keys(stats.line).reverse().slice(-7),
                datasets: [{ label: 'Data Input', data: Object.values(stats.line).reverse().slice(-7), borderColor: '#007bff', fill: true, tension: 0.3 }]
            },
            options: { maintainAspectRatio: false }
        });

        // Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (charts.bar) charts.bar.destroy();
        charts.bar = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: Object.keys(stats.bar),
                datasets: [{ label: 'Jumlah Laporan', data: Object.values(stats.bar), backgroundColor: '#6f42c1' }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function switchTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        syncData(type);
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.text("Laporan Statistik Central - " + config[currentCategory].title, 14, 15);
        doc.autoTable({ html: '#mainTable', startY: 25, theme: 'grid', styles: { fontSize: 8 } });
        doc.save(`Statistik_${currentCategory}.pdf`);
    }

    window.onload = () => syncData('ibadah');
</script>

</body>
</html>
