<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS & Visual Card Editor - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> 
    <style>
        :root { --primary: #003366; --accent: #007bff; --light: #f4f7f6; --gold: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 20px; }
        
        /* CMS Form Style */
        .edit-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; } 
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* Modal / Popup Editor */
        .modal-editor {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }

        /* Preview Kartu di Dalam Modal */
        .card-preview-area {
            width: 350px; /* Ukuran Standar Kartu */
            height: 520px;
            margin: 20px auto;
            background: white;
            border: 1px solid #ccc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        /* Header Biru Kartu */
        .card-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        /* Tombol Edit di Pojok Kanan Kartu */
        .btn-edit-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Konten Kartu yang Bisa Diedit Visual */
        .editable-content {
            padding: 15px;
            font-size: 11px;
        }
        [contenteditable="true"] {
            border: 1px dashed #444;
            padding: 2px;
            outline: none;
        }
        [contenteditable="true"]:hover { background: #fffde7; }

        .info-row { display: flex; margin-bottom: 4px; align-items: flex-start; }
        .label { width: 70px; font-weight: bold; flex-shrink: 0; }
        .value { flex-grow: 1; padding-left: 5px; cursor: text; }

        .barcode-area {
            position: absolute;
            bottom: 60px;
            right: 15px;
            text-align: center;
            cursor: move; /* Indikasi bisa digeser */
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-close { background: #666; color: white; margin-top: 5px; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 3000; display:none; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><p><i class="fas fa-spinner fa-spin"></i> Memproses...</p></div>

<div class="edit-container">
    <a href="admin.html" class="btn-back" style="text-decoration:none; color:var(--primary); font-weight:bold;"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
    <h2 style="border-bottom: 2px solid var(--gold); padding-bottom:10px;">CMS Jemaat & Visual Editor</h2>
    
    <form id="editForm">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama_lengkap" required>
        </div>
        <div class="form-group">
            <label>NIJ</label>
            <input type="text" id="nij" readonly>
        </div>
        <div class="form-group">
            <label>Wilayah</label>
            <select id="wilayah">
                <option value="Abepura">Abepura</option>
                <option value="Sentani">Sentani</option>
                <option value="Doyo">Doyo</option>
                <option value="Arso 1">Arso 1</option>
                <option value="Arso 2">Arso 2</option>
            </select>
        </div>

        <button type="submit" class="btn-action btn-primary"><i class="fas fa-save"></i> Simpan ke Database</button>
        <button type="button" onclick="openVisualEditor()" class="btn-action btn-gold"><i class="fas fa-id-card"></i> Preview & Edit Layout Kartu</button>
    </form>
</div>

<div id="visualEditor" class="modal-editor">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--primary)">Visual Card Editor</h3>
        <p style="font-size:12px; color:#666;">Klik pada teks kartu untuk mengubah isinya secara manual. Gunakan untuk merapikan nama yang terlalu panjang.</p>
        
        <div class="card-preview-area" id="captureArea">
            <div class="card-header">
                <button class="btn-edit-icon"><i class="fas fa-pencil-alt"></i></button>
                <div style="font-weight:bold; font-size:14px;">KARTU ANGGOTA JEMAAT</div>
                <div style="font-size:10px;">PONDOK PEMULIHAN PAPUA</div>
            </div>

            <div class="editable-content">
                <center>
                    <div style="width:100px; height:120px; background:#eee; border:1px solid #ccc; margin-bottom:10px; display:flex; align-items:center; justify-content:center; font-size:10px;">FOTO</div>
                </center>

                <div class="info-row">
                    <span class="label">NIJ</span>
                    <span class="value" contenteditable="true" id="v_nij">-</span>
                </div>
                <div class="info-row">
                    <span class="label">NAMA</span>
                    <span class="value" contenteditable="true" id="v_nama">-</span>
                </div>
                <div class="info-row">
                    <span class="label">TTL</span>
                    <span class="value" contenteditable="true" id="v_ttl">-</span>
                </div>
                <div class="info-row">
                    <span class="label">JEMAAT</span>
                    <span class="value" contenteditable="true" id="v_jemaat">-</span>
                </div>
            </div>

            <div class="barcode-area" id="v_barcode_move">
                <div style="width:120px; height:40px; border:1px solid #000; display:flex; align-items:center; justify-content:center; font-size:9px; background:white;">BARCODE</div>
                <div id="v_nij_label" style="font-size:10px; font-weight:bold;">NIJ: -</div>
            </div>

            <div style="position:absolute; bottom:0; width:100%; height:30px; background:var(--primary);"></div>
        </div>

        <button onclick="window.print()" class="btn-action btn-primary"><i class="fas fa-print"></i> Cetak Sekarang</button>
        <button onclick="closeVisualEditor()" class="btn-action btn-close">Tutup Editor</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    // Firebase Config (Tetap sama)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = new URLSearchParams(window.location.search).get('edit');

    // 1. Ambil Data Realtime untuk Form
    async function loadData() {
        if(!userId) return;
        document.getElementById('loading').style.display='flex';
        const doc = await db.collection("users").doc(userId).get();
        if(doc.exists) {
            const d = doc.data();
            document.getElementById('nama_lengkap').value = d.nama_lengkap;
            document.getElementById('nij').value = d.nij;
            document.getElementById('wilayah').value = d.wilayah;
            
            // Masukkan ke preview Visual Editor juga
            document.getElementById('v_nama').innerText = d.nama_lengkap;
            document.getElementById('v_nij').innerText = d.nij;
            document.getElementById('v_nij_label').innerText = "NIJ: " + d.nij;
            document.getElementById('v_jemaat').innerText = d.wilayah || "PONDOK PEMULIHAN";
            document.getElementById('v_ttl').innerText = d.tempat_lahir + ", " + d.tanggal_lahir;
        }
        document.getElementById('loading').style.display='none';
    }

    // 2. Fungsi Buka Modal
    function openVisualEditor() {
        document.getElementById('visualEditor').style.display = 'block';
    }

    function closeVisualEditor() {
        document.getElementById('visualEditor').style.display = 'none';
    }

    // 3. Simpan Perubahan Form ke Database
    document.getElementById('editForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loading').style.display='flex';
        await db.collection("users").doc(userId).update({
            nama_lengkap: document.getElementById('nama_lengkap').value,
            wilayah: document.getElementById('wilayah').value,
            last_update: new Date().toISOString()
        });
        alert("Data Database Berhasil Diperbarui!");
        loadData();
    };

    window.onload = loadData;
</script>
</body>
</html>
