<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Manager - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #003366; --accent: #D4AF37; --bg: #f4f7fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 3px solid #2ecc71; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Form & Input */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-share { background: #25D366; color: white; } /* Warna WA */
        
        /* Scan Section */
        .scan-area { background: #e8f4fd; border: 2px dashed var(--primary); padding: 15px; text-align: center; border-radius: 10px; }
        #totalHadir { font-size: 40px; font-weight: bold; color: var(--primary); }
        
        #adminSection, #viewSection { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-size: 1.2rem; margin: 0;">KEGIATAN EVENT</h1>
</div>

<div class="container">
    <div id="loginSection" class="card">
        <h3>Login Admin Event</h3>
        <input type="text" id="userAdmin" placeholder="Username">
        <input type="password" id="passAdmin" placeholder="Password">
        <button class="btn-primary" onclick="loginEvent()">Masuk</button>
    </div>

    <div id="adminSection">
        <div class="card">
            <h3>Input Data Kegiatan</h3>
            <input type="text" id="namaEvent" placeholder="Nama Kegiatan">
            <input type="text" id="lokasiEvent" placeholder="Lokasi">
            <input type="date" id="tglEvent">
            <textarea id="isiEvent" placeholder="Deskripsi Kegiatan" rows="3"></textarea>
            <input type="file" id="fotoEvent" accept="image/*" multiple>
        </div>

        <div class="card scan-area">
            <h3>Absensi Tap Barcode</h3>
            <p>Klik kotak bawah ini, lalu tap kartu digital</p>
            <input type="text" id="inputScan" placeholder="Tap Barcode Di Sini..." onchange="hitungAbsen()">
            <hr>
            <p>Total Kehadiran Saat Ini:</p>
            <div id="totalHadir">0</div>
        </div>

        <button class="btn-primary" onclick="simpanEvent()">SIMPAN DATA</button>
        <button class="btn-share" onclick="shareWA()">SHARE VIA WHATSAPP</button>
        <button style="background:#888; color:white;" onclick="logoutEvent()">LOGOUT</button>
    </div>

    <div id="viewSection">
        </div>
</div>

<script>
    let jumlahPeserta = 0;

    function loginEvent() {
        const user = document.getElementById('userAdmin').value;
        const pass = document.getElementById('passAdmin').value;

        if(user === "admin" && pass === "admin123") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            Swal.fire('Berhasil', 'Selamat Bekerja Panitia!', 'success');
        } else {
            Swal.fire('Error', 'User/Pass Salah', 'error');
        }
    }

    function hitungAbsen() {
        const input = document.getElementById('inputScan');
        if(input.value !== "") {
            jumlahPeserta++;
            document.getElementById('totalHadir').innerText = jumlahPeserta;
            input.value = ""; // Reset input biar bisa tap lagi
            input.focus();
            // Suara bip sederhana (opsional)
            const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            audio.play();
        }
    }

    function simpanEvent() {
        const nama = document.getElementById('namaEvent').value;
        if(!nama) return Swal.fire('Maaf', 'Isi nama kegiatan dulu', 'warning');
        
        Swal.fire('Berhasil!', 'Data Kegiatan Telah Tersimpan di Database', 'success');
        // Logika Firebase Simpan Data bisa ditaruh di sini
    }

    function shareWA() {
        const nama = document.getElementById('namaEvent').value;
        const hadir = document.getElementById('totalHadir').innerText;
        const text = `LAPORAN KEGIATAN SIPAPUA%0A%0ANama: ${nama}%0ATotal Hadir: ${hadir} Orang`;
        window.open(`https://wa.me/?text=${text}`);
    }

    function logoutEvent() {
        location.reload();
    }
</script>

</body>
</html>
