<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubrik Kegiatan Event - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --primary: #003366; --accent: #2ecc71; --bg: #f0f2f5; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .header { background: var(--primary); color: white; padding: 35px 15px 15px 15px; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--accent); }
        .nav-admin { position: absolute; right: 15px; bottom: 15px; }

        .container { padding: 15px; max-width: 800px; margin: auto; }
        #adminSection { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); display: none; }
        
        /* Modul Baru: Absensi & QRCode */
        .absensi-box { background: #eef7ff; border: 2px dashed var(--primary); padding: 15px; border-radius: 12px; margin: 15px 0; text-align: center; }
        .absensi-list { text-align: left; background: white; padding: 10px; border-radius: 8px; max-height: 150px; overflow-y: auto; margin-top: 10px; font-size: 13px; border: 1px solid #ddd; }
        
        /* Tombol Share & PDF */
        .flex-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-small { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* Log Aktivitas / List Berita */
        .log-section { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-top: 20px; }
        .event-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; position: relative; }
        .event-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }

        .login-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 240px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 2000; border: 1px solid #eee; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-size: 1.1rem; margin: 0; letter-spacing: 1px;">EVENT JEMAAT</h1>
    <div class="nav-admin">
        <button id="btnToggle" style="background:var(--accent); color:white; border:none; width:38px; height:38px; border-radius:50%; cursor:pointer;" onclick="toggleLoginSlider()"><i class="fas fa-user-shield"></i></button>
        <div id="loginBox" class="login-dropdown">
            <input type="text" id="userAdmin" placeholder="Username">
            <input type="password" id="passAdmin" placeholder="Password">
            <button style="width:100%; background:var(--primary); color:white; border:none; padding:10px; border-radius:8px;" onclick="loginEvent()">MASUK</button>
        </div>
        <button id="btnLogout" style="display:none; background:var(--danger); border:none; color:white; padding:8px 15px; border-radius:20px;" onclick="logout()">LOGOUT</button>
    </div>
</div>

<div class="container">
    <div id="adminSection">
        <h3><i class="fas fa-edit"></i> CMS Input Kegiatan</h3>
        <input type="text" id="namaEvent" placeholder="Nama Kegiatan">
        <input type="text" id="lokasiEvent" placeholder="Lokasi">
        <input type="date" id="tglEvent">
        <textarea id="isiEvent" placeholder="Isi detail kegiatan..." rows="4"></textarea>
        
        <p style="font-size: 12px; margin: 0;">Upload Foto:</p>
        <input type="file" id="fotoEvent" accept="image/*" multiple onchange="uploadToCloudinary(event)">
        <div id="uploadStatus" style="font-size: 11px; color: var(--primary); margin: 5px 0;"></div>

        <div class="flex-buttons">
            <button class="btn-small" style="background: #25D366;" onclick="shareWA()"><i class="fab fa-whatsapp"></i> SHARE WA</button>
            <button class="btn-small" style="background: #e74c3c;" onclick="generatePDF()"><i class="fas fa-file-pdf"></i> GENERATE PDF</button>
        </div>

        <div class="absensi-box">
            <h4 style="margin:0 0 10px 0;">Absensi Tap Barcode</h4>
            <div id="qrcode" style="display:none;"></div>
            <input type="text" id="inputQR" placeholder="Tap Barcode Di Sini..." onchange="prosesAbsen(this.value)" style="text-align:center; font-weight:bold; border:2px solid var(--primary);">
            <div style="font-size: 14px; font-weight: bold; margin: 10px 0;">Total Kehadiran Saat Ini: <span id="totalAbsen" style="font-size: 24px; color: var(--primary);">0</span></div>
            <div class="absensi-list" id="riwayatAbsen">Belum ada data absensi.</div>
        </div>

        <button class="btn-action" id="btnSimpan" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;" onclick="simpanData()">SIMPAN & PUBLIKASIKAN</button>
    </div>

    <div class="log-section">
        <h3 style="margin-top:0;"><i class="fas fa-history"></i> LOG AKTIVITAS BERITA</h3>
        <div id="newsLog"></div>
    </div>
</div>

<script>
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxzllsbgi/image/upload";
    const CLOUDINARY_PRESET = "sipapua_preset";
    let cloudinaryImages = [];
    let dataAbsen = [];

    window.onload = function() { renderLog(); };

    function toggleLoginSlider() {
        const box = document.getElementById('loginBox');
        box.style.display = (box.style.display === "block") ? "none" : "block";
    }

    function loginEvent() {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;
        if(u === "admin" && p === "admin123") {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('btnToggle').style.display = 'none';
            document.getElementById('btnLogout').style.display = 'block';
            Swal.fire('Berhasil', 'Selamat Datang Admin', 'success');
        } else {
            Swal.fire('Gagal', 'Akses Ditolak', 'error');
        }
    }

    async function uploadToCloudinary(e) {
        const files = Array.from(e.target.files);
        const statusLabel = document.getElementById('uploadStatus');
        if (files.length === 0) return;
        cloudinaryImages = [];
        statusLabel.innerText = "⏳ Sedang mengunggah...";
        document.getElementById('btnSimpan').disabled = true;

        try {
            for (let file of files) {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", CLOUDINARY_PRESET);
                const res = await fetch(CLOUDINARY_URL, { method: "POST", body: formData });
                const data = await res.json();
                cloudinaryImages.push(data.secure_url);
            }
            statusLabel.innerText = "✅ Selesai Mengunggah (" + cloudinaryImages.length + " foto).";
        } catch (err) {
            statusLabel.innerText = "❌ Gagal mengunggah.";
        } finally {
            document.getElementById('btnSimpan').disabled = false;
        }
    }

    // FITUR ABSENSI
    function prosesAbsen(val) {
        if(!val) return;
        const namaJemaat = val; // Asumsi isi Barcode adalah nama jemaat
        dataAbsen.push({ nama: namaJemaat, waktu: new Date().toLocaleTimeString() });
        document.getElementById('inputQR').value = "";
        updateUI_Absensi();
    }

    function updateUI_Absensi() {
        document.getElementById('totalAbsen').innerText = dataAbsen.length;
        const listHtml = dataAbsen.map(item => `<div>• ${item.nama} <span style="color:#888; font-size:10px;">(${item.waktu})</span></div>`).join("");
        document.getElementById('riwayatAbsen').innerHTML = listHtml || "Belum ada data absensi.";
    }

    // FITUR SHARE & PDF
    function shareWA() {
        const nama = document.getElementById('namaEvent').value;
        const lokasi = document.getElementById('lokasiEvent').value;
        if(!nama) return Swal.fire('Gagal', 'Isi nama kegiatan dulu', 'warning');
        const text = `*INFO EVENT JEMAAT*%0A*Kegiatan:* ${nama}%0A*Lokasi:* ${lokasi}%0A*Total Hadir:* ${dataAbsen.length}`;
        window.open(`https://wa.me/?text=${text}`);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("LAPORAN KEGIATAN JEMAAT", 10, 10);
        doc.text(`Kegiatan: ${document.getElementById('namaEvent').value}`, 10, 20);
        doc.text(`Total Hadir: ${dataAbsen.length}`, 10, 30);
        doc.save("laporan_event.pdf");
    }

    // SIMPAN DATA KE LOG
    function simpanData() {
        const nama = document.getElementById('namaEvent').value;
        const lokasi = document.getElementById('lokasiEvent').value;
        const tgl = document.getElementById('tglEvent').value;
        
        if(!nama) return Swal.fire('Peringatan', 'Nama kegiatan wajib diisi!', 'warning');

        const newEntry = { 
            id: Date.now(), 
            nama, lokasi, tgl, 
            fotos: cloudinaryImages, 
            absen: [...dataAbsen] 
        };
        
        let list = JSON.parse(localStorage.getItem('eventList')) || [];
        list.unshift(newEntry);
        localStorage.setItem('eventList', JSON.stringify(list));

        Swal.fire('Tersimpan!', 'Kegiatan telah masuk Log Aktivitas.', 'success');
        renderLog();
        // Reset form
        dataAbsen = [];
        updateUI_Absensi();
    }

    function renderLog() {
        const list = JSON.parse(localStorage.getItem('eventList')) || [];
        const container = document.getElementById('newsLog');
        container.innerHTML = list.length === 0 ? "<p style='color:#888;'>Belum ada riwayat kegiatan.</p>" : "";

        list.forEach(item => {
            const img = item.fotos.length > 0 ? item.fotos[0] : "https://via.placeholder.com/60";
            container.innerHTML += `
                <div class="event-item">
                    <img src="${img}" class="event-thumb">
                    <div style="flex:1">
                        <div style="font-weight:bold; color:var(--primary);">${item.nama}</div>
                        <div style="font-size:11px; color:#666;">${item.tgl} | ${item.lokasi}</div>
                        <div style="font-size:11px; color:var(--accent);">Hadir: ${item.absen.length} Orang</div>
                    </div>
                    <button class="btn-delete" onclick="konfirmasiHapus(${item.id})"><i class="fas fa-trash"></i> Hapus</button>
                </div>
            `;
        });
    }

    async function konfirmasiHapus(id) {
        const { value: password } = await Swal.fire({
            title: 'Hapus Kegiatan?',
            input: 'password',
            inputLabel: 'Masukkan Password Admin untuk menghapus',
            inputPlaceholder: 'Password...',
            showCancelButton: true
        });

        if (password === 'admin123') {
            let list = JSON.parse(localStorage.getItem('eventList'));
            list = list.filter(x => x.id !== id);
            localStorage.setItem('eventList', JSON.stringify(list));
            renderLog();
            Swal.fire('Terhapus', 'Data telah dihapus dari log.', 'success');
        } else if (password) {
            Swal.fire('Gagal', 'Password Salah!', 'error');
        }
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
