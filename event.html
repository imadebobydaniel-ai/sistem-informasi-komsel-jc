<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubrik Kegiatan Event - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #003366; --accent: #2ecc71; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* HEADER FIX: Penyejajaran Simetris */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 3px solid var(--accent); 
        }

        .login-mini { 
            display: flex; 
            align-items: center; /* Sejajar secara vertikal */
            gap: 5px; 
        }

        /* Input & Button dibuat tingginya sama agar simetris */
        .login-mini input { 
            padding: 6px 8px; 
            border-radius: 4px; 
            border: 1px solid #ccc; 
            font-size: 12px; 
            width: 75px; /* Lebar kolom disamakan */
            height: 30px; /* Tinggi disamakan */
            box-sizing: border-box;
        }

        .login-mini button { 
            height: 30px; /* Tinggi sama dengan input */
            padding: 0 12px; 
            background: var(--accent); 
            border: none; 
            color: white; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container & Card Style */
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .event-item { background: white; border-radius: 12px; overflow: hidden; display: flex; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .event-thumb { width: 100px; height: 100px; object-fit: cover; background: #ddd; }
        .event-content { padding: 12px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .event-title { font-weight: bold; color: var(--primary); font-size: 16px; margin: 0; }
        .event-meta { font-size: 11px; color: #777; margin-bottom: 3px; }

        #adminSection { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); display: none; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; }
        .scan-box { background: #e8f4fd; border: 2px dashed var(--primary); padding: 15px; text-align: center; border-radius: 10px; margin: 15px 0; }
        #reader { width: 100%; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-size: 1rem; margin: 0; letter-spacing: 1px;">EVENT</h1>
    
    <div class="login-mini" id="loginBox">
        <input type="text" id="userAdmin" placeholder="User">
        <input type="password" id="passAdmin" placeholder="Pass">
        <button onclick="loginEvent()">MASUK</button>
    </div>

    <button id="btnLogout" style="display:none; background:#e74c3c; border:none; color:white; height: 30px; padding:0 12px; border-radius:4px;" onclick="logout()">LOGOUT</button>
</div>

<div class="container">
    <div id="adminSection">
        <h3><i class="fas fa-edit"></i> CMS Input Kegiatan</h3>
        <input type="text" id="namaEvent" placeholder="Nama Kegiatan">
        <input type="text" id="lokasiEvent" placeholder="Lokasi">
        <input type="date" id="tglEvent">
        <textarea id="isiEvent" placeholder="Isi detail kegiatan..." rows="4" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        <input type="file" id="fotoEvent" accept="image/*" onchange="previewImage(event)" style="margin-top:10px;">
        
        <div class="scan-box">
            <h4><i class="fas fa-qrcode"></i> Absensi Jemaat</h4>
            <div id="reader"></div>
            <button class="btn-action" style="background:var(--primary)" id="btnScan" onclick="mulaiScan()">BUKA SCANNER</button>
            <p>Terabsen: <span id="totalHadir" style="font-size:20px; font-weight:bold;">0</span></p>
        </div>

        <button class="btn-action" style="background:var(--accent)" onclick="simpanData()">SIMPAN & PUBLIKASIKAN</button>
    </div>

    <div id="newsList"></div>
</div>

<script>
    let html5QrCode;
    let jumlahPeserta = 0;
    let imageBase64 = "";

    window.onload = function() { renderList(); };

    function loginEvent() {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;
        if(u === "admin" && p === "admin123") {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('btnLogout').style.display = 'block';
            Swal.fire('Login Berhasil', 'Mode Admin Aktif', 'success');
        } else {
            Swal.fire('Gagal', 'Username/Password salah', 'error');
        }
    }

    function logout() { location.reload(); }

    function previewImage(e) {
        const reader = new FileReader();
        reader.onload = function() { imageBase64 = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function mulaiScan() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            jumlahPeserta++;
            document.getElementById('totalHadir').innerText = jumlahPeserta;
            new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
        });
    }

    function simpanData() {
        const nama = document.getElementById('namaEvent').value;
        const lokasi = document.getElementById('lokasiEvent').value;
        const tgl = document.getElementById('tglEvent').value;
        const isi = document.getElementById('isiEvent').value;

        if(!nama || !lokasi) return Swal.fire('Peringatan', 'Data belum lengkap', 'warning');

        const newEntry = {
            id: Date.now(),
            nama, lokasi, tgl, isi,
            hadir: jumlahPeserta,
            foto: imageBase64 || 'https://via.placeholder.com/100'
        };

        let list = JSON.parse(localStorage.getItem('eventList')) || [];
        list.unshift(newEntry);
        localStorage.setItem('eventList', JSON.stringify(list));

        Swal.fire('Berhasil!', 'Kegiatan dipublikasikan', 'success');
        renderList();
        document.getElementById('adminSection').style.display = 'none';
    }

    function renderList() {
        const list = JSON.parse(localStorage.getItem('eventList')) || [];
        const container = document.getElementById('newsList');
        container.innerHTML = list.length ? "" : "<p style='text-align:center; color:#888;'>Belum ada kegiatan.</p>";

        list.forEach(item => {
            container.innerHTML += `
                <div class="event-item" onclick="showPopup(${item.id})">
                    <img src="${item.foto}" class="event-thumb">
                    <div class="event-content">
                        <p class="event-meta"><b>${item.tgl}</b> | ${item.lokasi}</p>
                        <h3 class="event-title">${item.nama}</h3>
                        <p class="event-meta"><i class="fas fa-users"></i> ${item.hadir} Hadir</p>
                    </div>
                </div>
            `;
        });
    }

    function showPopup(id) {
        const list = JSON.parse(localStorage.getItem('eventList'));
        const data = list.find(x => x.id === id);

        Swal.fire({
            title: data.nama,
            html: `
                <img src="${data.foto}" style="width:100%; border-radius:10px; margin-bottom:10px;">
                <p style="text-align:left; font-size:14px;"><b>Lokasi:</b> ${data.lokasi}<br><b>Tanggal:</b> ${data.tgl}</p>
                <div style="text-align:justify; font-size:14px; border-top:1px solid #eee; padding-top:10px;">${data.isi}</div>
                <div style="background:#e8f4fd; padding:10px; margin-top:15px; border-radius:8px; font-weight:bold; color:#003366;">
                    Total Kehadiran: ${data.hadir} Jemaat
                </div>
            `,
            confirmButtonText: 'Tutup'
        });
    }
</script>

</body>
</html>
