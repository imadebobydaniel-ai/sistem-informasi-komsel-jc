<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1e3a8a;
            --secondary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at top right, #e0e7ff, transparent), radial-gradient(circle at bottom left, #f1f5f9, transparent);
            margin: 0;
            padding: 20px;
            color: #1e293b;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-back {
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

        .card-modern {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .card-header-gradient {
            background: linear-gradient(45deg, var(--primary-dark), var(--primary));
            color: white;
            padding: 18px 25px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-body { padding: 25px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #475569; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            background: #fff;
            transition: 0.3s;
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .table-responsive { border-radius: 15px; overflow: hidden; background: white; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: #64748b; padding: 15px; text-align: left; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .btn-action {
            width: 32px; height: 32px; border-radius: 8px; border: none; 
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin: 0 2px;
        }
        .btn-play-sm { background: #eff6ff; color: var(--primary); }
        .btn-up { background: #f0fdf4; color: #16a34a; }
        .btn-down { background: #fff7ed; color: #ea580c; }
        .btn-del-sm { background: #fef2f2; color: var(--danger); }

        .status-dot { height: 8px; width: 8px; background-color: #cbd5e1; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.active { background-color: var(--success); box-shadow: 0 0 8px var(--success); }

        .playlist-controls {
            display: flex; gap: 10px; align-items: center; background: #f1f5f9; padding: 15px; border-radius: 15px; margin-bottom: 20px;
        }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .divider-modern { border: 0; height: 1px; background: linear-gradient(to right, transparent, #e2e8f0, transparent); margin: 25px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #1e3a8a, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Portal Media</h1>
            <p style="margin:5px 0 0; color:#64748b; font-size: 14px;"><i class="fa-solid fa-layer-group"></i> Smart CMS</p>
        </div>
        <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="card-modern">
        <div class="card-header-gradient" style="background: linear-gradient(45deg, #f59e0b, #fbbf24);">
            <span><i class="fas fa-bullhorn"></i> Fitur Koleksi & Otomasi Running Text</span>
        </div>
        <div class="card-body">
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 2; min-width: 300px;">
                    <label>Input Teks Baru & Koleksi</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="rt_input" placeholder="Tulis pengumuman baru...">
                        <input type="number" id="rt_durasi" placeholder="Detik" style="max-width: 90px;" value="15">
                        <button onclick="saveRunningTextToCollection()" class="btn-submit" style="width: auto;">
                            <i class="fas fa-plus"></i> Simpan
                        </button>
                    </div>
                </div>
            </div>
            <hr class="divider-modern">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">Status</th>
                            <th>Isi Pesan</th>
                            <th style="width: 80px;">Durasi</th>
                            <th style="width: 100px; text-align: center;">Kontrol</th>
                        </tr>
                    </thead>
                    <tbody id="rt_history_list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card-modern">
        <div class="card-header-gradient">
            <span><i class="fa-solid fa-circle-plus"></i> Tambah Konten Monitor Utama</span>
        </div>
        <div class="card-body">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;">
                <div>
                    <label>Judul Konten</label>
                    <input type="text" id="judul" placeholder="Contoh: Ibadah Minggu">
                </div>
                <div>
                    <label>Tipe Media</label>
                    <select id="tipe_media" onchange="toggleInputFields()">
                        <option value="gambar">Gambar (Cloudinary)</option>
                        <option value="video_player">Video MP4 (Cloudinary)</option>
                        <option value="audio_player">Audio MP3 (Cloudinary)</option>
                        <option value="video_youtube">Video (YouTube ID)</option>
                        <option value="teks">Text World (Artikel)</option>
                    </select>
                </div>
            </div>

            <div id="input_url_container" style="margin-bottom: 20px;">
                <label id="label_media">File Media / URL</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="url_media" placeholder="Pilih file atau masukkan ID YouTube..." style="background: #f8fafc;">
                    <button type="button" id="btn_upload_cloudinary" onclick="bukaWidgetUpload()" class="btn-submit" style="width: auto; background: #6366f1;">
                        <i class="fas fa-upload"></i> Upload File
                    </button>
                </div>
                <small style="color: #64748b; font-size: 11px; margin-top: 5px; display: block;">
                    *Gunakan tombol Upload untuk Gambar/Video/Audio. Masukkan ID Manual khusus YouTube.
                </small>
            </div>

            <div id="input_teks_container" style="display:none; margin-bottom: 20px;">
                <label>Isi Artikel Lengkap</label>
                <textarea id="isi_artikel" rows="4"></textarea>
            </div>

            <button onclick="uploadKePortal()" id="btnPublish" class="btn-submit" style="width: 100%;">
                <i class="fa-solid fa-paper-plane"></i> Publikasikan Konten
            </button>
        </div>
    </div>

    <div class="card-modern">
        <div class="card-header-gradient" style="background: #1e293b;">
            <span><i class="fas fa-list-ul"></i> Playlist Konten Aktif</span>
            <div style="font-size: 12px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px;">
                Mode: <span id="currentModeDisplay">LOOPING</span>
            </div>
        </div>
        <div class="card-body">
            <div class="playlist-controls">
                <div style="flex: 1;">
                    <label style="font-size: 11px; color: #64748b;">MODE PEMUTARAN</label>
                    <select id="play_mode" onchange="updatePlayMode()" style="padding: 8px;">
                        <option value="looping">Play Looping (Berurutan)</option>
                        <option value="shuffle">Play Shuffle (Acak)</option>
                        <option value="custom">Play Custom (Pilihan)</option>
                    </select>
                </div>
                <button onclick="deleteSelected()" class="btn-submit" style="background: var(--danger); padding: 10px 15px; font-size: 13px;">
                    <i class="fas fa-trash"></i> Hapus Terpilih
                </button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="checkAll" onclick="toggleSelectAll()"></th>
                            <th style="width: 60px; text-align: center;">No</th>
                            <th>Judul Konten</th>
                            <th>Tipe</th>
                            <th style="text-align: center; width: 180px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="mediaList"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // --- 1. KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { 
        firebase.initializeApp(firebaseConfig); 
    }
    const db = firebase.firestore();
    let playlistData = [];

    // --- 2. FITUR RUNNING TEXT ---
    async function saveRunningTextToCollection() {
        const pesan = document.getElementById('rt_input').value;
        const durasi = document.getElementById('rt_durasi').value;

        if(!pesan) return alert("Pesan tidak boleh kosong!");

        try {
            await db.collection("config").doc("running_text").set({
                pesan: pesan,
                durasi: parseInt(durasi),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            await db.collection("running_text_history").add({
                pesan: pesan,
                durasi: parseInt(durasi),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Running Text Berhasil Dikirim ke Monitor!");
            document.getElementById('rt_input').value = "";
        } catch (e) {
            console.error("Error RT:", e);
            alert("Gagal menyimpan Running Text");
        }
    }

    function loadRTCollection() {
        db.collection("running_text_history").orderBy("timestamp", "desc").limit(5).onSnapshot(snap => {
            const list = document.getElementById('rt_history_list');
            if(!list) return;
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <tr>
                        <td><span class="status-dot active"></span> Arsip</td>
                        <td>${data.pesan}</td>
                        <td>${data.durasi}s</td>
                        <td style="text-align:center;">
                            <button onclick="setRTActive('${data.pesan}', ${data.durasi})" class="btn-action btn-play-sm"><i class="fas fa-paper-plane"></i></button>
                        </td>
                    </tr>`;
            });
        });
    }

    async function setRTActive(pesan, durasi) {
        await db.collection("config").doc("running_text").set({ pesan, durasi });
        alert("Pesan diaktifkan kembali!");
    }

    // --- 3. FITUR PLAYLIST REORDERING ---
    async function moveItem(id, direction) {
        const index = playlistData.findIndex(item => item.id === id);
        if (index < 0) return;

        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= playlistData.length) return;

        const currentItem = playlistData[index];
        const targetItem = playlistData[newIndex];

        const batch = db.batch();
        const ref1 = db.collection("portal_media").doc(currentItem.id);
        const ref2 = db.collection("portal_media").doc(targetItem.id);

        batch.update(ref1, { urutan: targetItem.urutan });
        batch.update(ref2, { urutan: currentItem.urutan });

        await batch.commit();
    }

    // --- 4. PLAY MODE CONFIG ---
    async function updatePlayMode() {
        const mode = document.getElementById('play_mode').value;
        try {
            await db.collection("config").doc("playlist").set({
                mode: mode,
                triggerChange: Date.now()
            }, { merge: true });
            document.getElementById('currentModeDisplay').innerText = mode.toUpperCase();
            alert("Mode pemutaran diganti ke: " + mode.toUpperCase());
        } catch (e) { alert("Gagal update mode"); }
    }

    // --- 5. MEDIA MANAGEMENT ---
    function toggleInputFields() {
        const tipe = document.getElementById('tipe_media').value;
        const urlContainer = document.getElementById('input_url_container');
        const teksContainer = document.getElementById('input_teks_container');
        const btnCloudinary = document.getElementById('btn_upload_cloudinary');

        if (tipe === 'teks') {
            urlContainer.style.display = 'none';
            teksContainer.style.display = 'block';
        } else {
            urlContainer.style.display = 'block';
            teksContainer.style.display = 'none';
            btnCloudinary.style.display = (tipe === 'video_youtube') ? 'none' : 'block';
        }
    }

    async function uploadKePortal() {
        const judul = document.getElementById('judul').value;
        const tipe = document.getElementById('tipe_media').value;
        let url = document.getElementById('url_media').value || "";

        if(!judul) return alert("Judul wajib diisi!");

        try {
            await db.collection("portal_media").add({
                judul: judul,
                tipe: tipe,
                url: url, 
                isi_artikel: document.getElementById('isi_artikel').value || "",
                urutan: Date.now(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Konten Berhasil Terbit!");
            document.getElementById('judul').value = "";
            document.getElementById('url_media').value = "";
            document.getElementById('isi_artikel').value = "";
        } catch (e) { console.error(e); }
    }

    function loadMedia() {
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot(snapshot => {
            const list = document.getElementById('mediaList');
            if(!list) return;
            list.innerHTML = ""; 
            playlistData = [];
            let count = 1;
            snapshot.forEach(doc => {
                const data = doc.data();
                playlistData.push({ id: doc.id, ...data });
                list.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="item-checkbox" value="${doc.id}"></td>
                        <td style="text-align:center;">${count++}</td>
                        <td style="font-weight:600;">${data.judul}</td>
                        <td><span style="font-size:11px; background:#e0e7ff; color:#4338ca; padding:4px 8px; border-radius:10px;">${data.tipe}</span></td>
                        <td style="text-align:center;">
                            <button onclick="moveItem('${doc.id}', -1)" class="btn-action btn-up"><i class="fas fa-chevron-up"></i></button>
                            <button onclick="moveItem('${doc.id}', 1)" class="btn-action btn-down"><i class="fas fa-chevron-down"></i></button>
                            <button onclick="playSekarang('${doc.id}')" class="btn-action btn-play-sm"><i class="fas fa-desktop"></i></button>
                            <button onclick="deleteMedia('${doc.id}')" class="btn-action btn-del-sm"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        });
    }

    async function deleteMedia(id) {
        if(confirm("Hapus konten ini?")) {
            await db.collection("portal_media").doc(id).delete();
        }
    }

    async function deleteSelected() {
        const checked = document.querySelectorAll('.item-checkbox:checked');
        if(checked.length === 0) return alert("Pilih item dulu!");
        if(confirm(`Hapus ${checked.length} item?`)) {
            const batch = db.batch();
            checked.forEach(box => {
                batch.delete(db.collection("portal_media").doc(box.value));
            });
            await batch.commit();
        }
    }

    function toggleSelectAll() {
        const master = document.getElementById('checkAll');
        document.querySelectorAll('.item-checkbox').forEach(box => box.checked = master.checked);
    }

    async function playSekarang(id) {
        const item = playlistData.find(i => i.id === id);
        await db.collection("config").doc("playlist").set({
            mode: 'single',
            activeContentId: item.url,
            activeTipe: item.tipe,
            activeTitle: item.judul,
            triggerChange: Date.now()
        }, { merge: true });
        alert("Monitor memutar: " + item.judul);
    }

    // --- CLOUDINARY WIDGET ---
    function bukaWidgetUpload() {
        cloudinary.openUploadWidget({
            cloudName: 'dcvv88vzh', 
            uploadPreset: 'ml_default'
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById('url_media').value = result.info.secure_url;
            }
        });
    }

    window.onload = () => {
        loadRTCollection();
        loadMedia();
        db.collection("config").doc("playlist").get().then(doc => {
            if(doc.exists && doc.data().mode) {
                document.getElementById('play_mode').value = doc.data().mode;
                document.getElementById('currentModeDisplay').innerText = doc.data().mode.toUpperCase();
            }
        });
    };
</script>
</body>
</html>
