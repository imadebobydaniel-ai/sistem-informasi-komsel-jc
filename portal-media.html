<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #007bff;
            --dark: #333;
            --light: #f4f7f6;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container { max-width: 1000px; margin: auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-back {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-back:hover { color: var(--primary); }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .card h2, .card h3 {
            margin-top: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .playlist-config {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            font-size: 14px;
            border: 1px solid #ffeeba;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover { opacity: 0.9; }

        .btn-save-text { background: var(--dark); margin-top: 10px; }

        .table-responsive {
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-gambar { background: #e3f2fd; color: #1976d2; }
        .badge-video_youtube { background: #fff3e0; color: #f57c00; }
        .badge-teks { background: #eeeeee; color: #333333; }
        .badge-video_player { background: #f3e5f5; color: #7b1fa2; }
        .badge-audio_player { background: #e8f5e9; color: #2e7d32; }
        
        .btn-action { border: none; background: none; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.2); }
        .btn-play { color: var(--success); }
        .btn-delete { color: var(--danger); }
        
        .btn-nav {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">Portal Media</h1>
            <p style="margin:5px 0 0; color:#777; font-size: 13px;">Manajemen Berita & Konten Pondok Pemulihan</p>
        </div>
        <a href="admin.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </a>
    </div>

    <div class="card" style="border-left: 5px solid var(--warning);">
        <h3><i class="fas fa-bullhorn" style="color: var(--warning);"></i> Pengaturan Running Text</h3>
        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Teks ini akan muncul berjalan di bawah media player monitor secara real-time.</p>
        <div class="form-group">
            <textarea id="runningTextInput" rows="2" placeholder="Tulis pesan informasi di sini..."></textarea>
        </div>
        <button onclick="updateRunningText()" id="btnSaveRunningText" class="btn-submit btn-save-text">
            <i class="fa-solid fa-save"></i> Simpan & Update Teks Berjalan
        </button>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-circle-plus" style="color: var(--primary);"></i> Tambah Konten Baru</h3>
        
        <div class="form-group">
            <label>Judul Konten / Berita</label>
            <input type="text" id="judul" placeholder="Contoh: Kegiatan Ibadah Raya Minggu...">
        </div>

        <div class="form-group">
            <label>Tipe Media</label>
            <select id="tipe_media" onchange="toggleInputFields()" style="background: #f9f9f9;">
                <option value="gambar">Gambar (Poster/Foto)</option>
                <option value="video_youtube">Video (YouTube Link)</option>
                <option value="video_player">Video MP4 (URL Direct)</option>
                <option value="audio_player">Audio (MP3/Podcast)</option>
                <option value="teks">Teks Artikel (Full Page)</option>
            </select>
        </div>

        <div id="input_url_container" class="form-group">
            <label id="label_url">Link / URL Gambar</label>
            <input type="text" id="url_media" placeholder="https://...">
        </div>

        <div id="input_teks_container" class="form-group" style="display:none;">
            <label>Isi Artikel Lengkap</label>
            <textarea id="isi_artikel" rows="5" placeholder="Tuliskan isi berita di sini..."></textarea>
        </div>

        <div class="form-group">
            <label>Deskripsi Singkat (Opsional)</label>
            <textarea id="deskripsi" rows="2" placeholder="Keterangan singkat..."></textarea>
        </div>

        <button onclick="uploadKePortal()" id="btnPublish" class="btn-submit">
            <i class="fa-solid fa-paper-plane"></i> Publikasikan ke Portal
        </button>
    </div>

    <div class="card">
        <h2><i class="fas fa-list-ul" style="color: var(--primary);"></i> Daftar Konten Terbit</h2>
        
        <div class="playlist-config">
            <div>
                <label>Mode Putar:</label>
                <select id="modePutar" style="width: auto; padding: 5px;">
                    <option value="berurutan">Berurutan</option>
                    <option value="acak">Acak (Shuffle)</option>
                    <option value="loop">Loop (Satu Konten)</option>
                </select>
            </div>
            <div>
                <label>Default Durasi (Menit):</label>
                <input type="number" id="defaultDurasi" value="10" style="width: 60px; padding: 5px;">
            </div>
            <button onclick="saveGlobalConfig()" class="btn-submit" style="width: auto; padding: 8px 15px;">Simpan Mode</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Urutan</th>
                        <th>Judul</th>
                        <th>Tipe</th>
                        <th>Durasi (Min)</th>
                        <th style="text-align: center;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="mediaList">
                    <tr><td colspan="5" style="text-align:center; padding: 30px;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // 1. FUNGSI UPDATE RUNNING TEXT (Real-time Sync)
    async function updateRunningText() {
        const text = document.getElementById('runningTextInput').value;
        const btn = document.getElementById('btnSaveRunningText');
        if(!text) return alert("Isi teks dulu!");

        btn.disabled = true;
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Menyimpan...";

        try {
            await db.collection("config").doc("running_text").set({
                message: text,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                triggerUpdate: Date.now() // Memicu listener di player
            });
            alert("Running text diperbarui!");
        } catch (error) { alert("Gagal: " + error.message); }
        finally {
            btn.disabled = false;
            btn.innerHTML = "<i class='fa-solid fa-save'></i> Simpan & Update Teks Berjalan";
        }
    }

    // 2. TOGGLE INPUT FIELDS
    function toggleInputFields() {
        const tipe = document.getElementById('tipe_media').value;
        const urlContainer = document.getElementById('input_url_container');
        const teksContainer = document.getElementById('input_teks_container');
        const labelUrl = document.getElementById('label_url');

        urlContainer.style.display = tipe === 'teks' ? "none" : "block";
        teksContainer.style.display = tipe === 'teks' ? "block" : "none";

        if (tipe === 'gambar') labelUrl.innerText = "Link / URL Gambar";
        if (tipe === 'video_youtube') labelUrl.innerText = "Link Video YouTube";
        if (tipe === 'video_player') labelUrl.innerText = "URL File MP4";
        if (tipe === 'audio_player') labelUrl.innerText = "URL File MP3";
    }

    // 3. FUNGSI PUBLISH KONTEN
    async function uploadKePortal() {
        const btn = document.getElementById('btnPublish');
        const judul = document.getElementById('judul').value;
        const tipe = document.getElementById('tipe_media').value;
        let urlValue = document.getElementById('url_media').value;
        const isiArtikel = document.getElementById('isi_artikel').value;
        const durasi = parseInt(document.getElementById('defaultDurasi').value);

        if(!judul) return alert("Judul wajib diisi!");

        // Otomatis convert link YouTube ke embed agar bisa diputar di iframe
        if (tipe === 'video_youtube' && urlValue) {
            let videoId = "";
            if (urlValue.includes('v=')) videoId = urlValue.split('v=')[1].split('&')[0];
            else if (urlValue.includes('youtu.be/')) videoId = urlValue.split('youtu.be/')[1];
            if (videoId) urlValue = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&playlist=${videoId}&loop=1`;
        }

        btn.disabled = true;
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Memproses...";

        try {
            const snapshot = await db.collection("portal_media").get();
            await db.collection("portal_media").add({
                judul, tipe, url: urlValue, isi_artikel: isiArtikel,
                deskripsi: document.getElementById('deskripsi').value,
                urutan: snapshot.size + 1,
                durasi: durasi || 10,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            // Update trigger agar player tahu ada konten baru
            await db.collection("config").doc("playlist").update({ lastUpdate: Date.now() });
            
            alert("Berhasil!");
            location.reload();
        } catch (e) { alert("Gagal: " + e.message); btn.disabled = false; }
    }

    // 4. LOAD & TAMPILKAN MEDIA (Auto-refresh on change)
    function loadMedia() {
        // Load Running Text
        db.collection("config").doc("running_text").get().then(doc => {
            if(doc.exists) document.getElementById('runningTextInput').value = doc.data().message;
        });

        // Load Playlist Real-time
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot(snapshot => {
            const list = document.getElementById('mediaList');
            list.innerHTML = "";
            
            if(snapshot.empty) {
                list.innerHTML = '<tr><td colspan="5" style="text-align:center;">Belum ada konten.</td></tr>';
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <tr>
                        <td>
                            <button class="btn-nav" onclick="pindahUrutan('${id}', -1)"><i class="fas fa-chevron-up"></i></button>
                            <span style="margin:0 10px; font-weight:bold;">${data.urutan}</span>
                            <button class="btn-nav" onclick="pindahUrutan('${id}', 1)"><i class="fas fa-chevron-down"></i></button>
                        </td>
                        <td><strong>${data.judul}</strong></td>
                        <td><span class="badge badge-${data.tipe}">${data.tipe.replace('_', ' ')}</span></td>
                        <td><input type="number" value="${data.durasi}" onchange="updateDurasi('${id}', this.value)" style="width:50px;"></td>
                        <td style="text-align:center;">
                            <button class="btn-action btn-play" onclick="playSekarang('${id}')"><i class="fas fa-play-circle"></i></button>
                            <button class="btn-action btn-delete" onclick="deleteMedia('${id}')"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
        });
    }

    // 5. NAVIGASI URUTAN & AKSI
    async function pindahUrutan(id, arah) {
        const ref = db.collection("portal_media");
        const doc = await ref.doc(id).get();
        const urutanSekarang = doc.data().urutan;
        const urutanBaru = urutanSekarang + arah;
        if (urutanBaru < 1) return;

        const swapQuery = await ref.where("urutan", "==", urutanBaru).get();
        const batch = db.batch();
        if (!swapQuery.empty) batch.update(ref.doc(swapQuery.docs[0].id), { urutan: urutanSekarang });
        batch.update(ref.doc(id), { urutan: urutanBaru });
        await batch.commit();
        await db.collection("config").doc("playlist").update({ lastUpdate: Date.now() });
    }

    async function playSekarang(id) {
        await db.collection("config").doc("playlist").update({
            activeContentId: id,
            forcePlay: Date.now() 
        });
        alert("Perintah 'Putar Sekarang' dikirim ke monitor!");
    }

    async function updateDurasi(id, menit) {
        await db.collection("portal_media").doc(id).update({ durasi: parseInt(menit) });
    }

    async function deleteMedia(id) {
        if(confirm("Hapus konten ini?")) {
            await db.collection("portal_media").doc(id).delete();
            await db.collection("config").doc("playlist").update({ lastUpdate: Date.now() });
        }
    }

    async function saveGlobalConfig() {
        const mode = document.getElementById('modePutar').value;
        await db.collection("config").doc("playlist").set({ mode: mode }, { merge: true });
        alert("Mode Putar Disimpan!");
    }

    window.onload = loadMedia;
</script>
</body>
</html>
