<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #2ecc71;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar dengan garis tegas */
        .sidebar {
            width: 240px;
            background-color: var(--card-bg);
            border-right: 2px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 { color: var(--primary-green); font-size: 1.2rem; margin-bottom: 30px; }

        .nav-item {
            padding: 12px;
            color: var(--text-dim);
            text-decoration: none;
            border: 1px solid transparent;
            margin-bottom: 8px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: #2a2a2a;
            border: 1px solid var(--primary-green);
            color: white;
        }

        /* Main Panel Area */
        .main-panel {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .section-title {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Styling */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        
        label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #252525;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary-green); outline: none; }

        .btn-publish {
            background: var(--primary-green);
            color: black;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            float: right;
        }

        /* Tabel dengan Garis Jelas */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #252525;
            color: var(--text-dim);
            text-align: left;
            padding: 12px;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
        }

        td {
            padding: 12px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        tr:nth-child(even) { background: #1a1a1a; }
        tr:hover { background: #252525; }

        .btn-action {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-action:hover { border-color: var(--primary-green); color: white; }

        /* Badge Tipe */
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: #333;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>MEDIA PORTAL</h2>
        <a href="#" class="nav-item active"><i class="fas fa-desktop"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fas fa-history"></i> Media Library</a>
        <a href="#" class="nav-item"><i class="fas fa-font"></i> Running Text</a>
        <a href="statistik.html" class="nav-item"><i class="fas fa-chart-bar"></i> Lihat Statistik</a>
    </div>

    <div class="main-panel">
        <div class="glass-card">
            <div class="section-title"><i class="fas fa-bullhorn"></i> PENGATURAN RUNNING TEXT</div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="runningTextInput" placeholder="Ketik pesan baru di sini...">
                <button class="btn-publish" style="float:none" onclick="postRunningText()">POSTING</button>
            </div>
            
            <label>Riwayat Running Text:</label>
            <table style="font-size: 0.8rem;">
                <tbody id="historyRunningText">
                    </tbody>
            </table>
        </div>

        <div class="glass-card">
            <div class="section-title"><i class="fas fa-plus-circle"></i> TAMBAH KONTEN BARU</div>
            <div class="form-row">
                <div>
                    <label>Judul Konten</label>
                    <input type="text" id="judul" placeholder="Contoh: Ibadah Raya Minggu">
                </div>
                <div>
                    <label>Tipe Media</label>
                    <select id="tipe">
                        <option value="VIDEO_YOUTUBE">YouTube Video</option>
                        <option value="VIDEO_PLAYER">Video Player (MP4)</option>
                        <option value="GAMBAR">Gambar/Poster</option>
                        <option value="TEKS">Teks Berita</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Link / URL Media</label>
                    <input type="text" id="url" placeholder="https://...">
                </div>
                <div>
                    <label>Durasi Putar (Menit)</label>
                    <input type="number" id="durasi" value="10">
                </div>
            </div>
            <button class="btn-publish" onclick="tambahKonten()">PUBLIKASIKAN</button>
            <div style="clear:both"></div>
        </div>

        <div class="glass-card">
            <div class="section-title"><i class="fas fa-list"></i> PLAYLIST AKTIF</div>
            <table>
                <thead>
                    <tr>
                        <th width="50">ORD</th>
                        <th>JUDUL KONTEN</th>
                        <th width="120">TIPE</th>
                        <th width="80">TIME</th>
                        <th width="120">AKSI</th>
                    </tr>
                </thead>
                <tbody id="mediaTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. FUNGSI PLAY (AKTIFKAN KONTEN)
        async function playSekarang(id, judul) {
            try {
                await db.collection("settings").doc("current_media").set({
                    mediaId: id,
                    lastPlayed: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Memutar: " + judul);
            } catch (error) {
                console.error("Gagal memutar:", error);
            }
        }

        // 2. FUNGSI RUNNING TEXT DENGAN RIWAYAT
        async function postRunningText() {
            const text = document.getElementById('runningTextInput').value;
            if(!text) return;

            await db.collection("running_text_history").add({
                content: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // Update teks yang tampil saat ini
            await db.collection("settings").doc("running_text").set({ active: text });
            document.getElementById('runningTextInput').value = "";
            loadRunningHistory();
        }

        function loadRunningHistory() {
            db.collection("running_text_history").orderBy("timestamp", "desc").limit(5).onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    html += `<tr>
                        <td>${data.content}</td>
                        <td width="50"><button class="btn-action" onclick="reuseText('${data.content}')"><i class="fas fa-play"></i></button></td>
                    </tr>`;
                });
                document.getElementById('historyRunningText').innerHTML = html;
            });
        }

        function reuseText(txt) {
            db.collection("settings").doc("running_text").set({ active: txt });
            alert("Pesan riwayat diaktifkan!");
        }

        // 3. LOAD DATA PLAYLIST
        function loadPlaylist() {
            db.collection("portal_media").orderBy("urutan", "asc").onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    html += `
                        <tr>
                            <td>${data.urutan}</td>
                            <td><strong>${data.judul}</strong></td>
                            <td><span class="badge">${data.tipe}</span></td>
                            <td>${data.durasi}m</td>
                            <td>
                                <button class="btn-action" onclick="playSekarang('${doc.id}', '${data.judul}')" title="Play"><i class="fas fa-play" style="color:var(--primary-green)"></i></button>
                                <button class="btn-action" onclick="hapusKonten('${doc.id}')" title="Hapus"><i class="fas fa-trash" style="color:#e74c3c"></i></button>
                            </td>
                        </tr>`;
                });
                document.getElementById('mediaTableBody').innerHTML = html;
            });
        }

        window.onload = () => {
            loadPlaylist();
            loadRunningHistory();
        };
    </script>
</body>
</html>
