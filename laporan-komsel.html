<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        h3 { border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 16px; text-transform: uppercase; margin-top: 0; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; }
        .chart-container { position: relative; height: 250px; margin-bottom: 20px; }
        .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .target-item { font-size: 12px; background: #f8f9fa; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .pks-section { background: #fff3cd; border: 1px dashed #cebc85; padding: 15px; border-radius: 15px; margin-top: 20px; }
        .btn-export { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-back { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #007bff; color: white; text-align: center; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #notif-block { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-notif { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fa-solid fa-calendar-days"></i> PERIODE LAPORAN</h3>
        <select id="filter-periode" onchange="sinkronisasiData()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="2">2 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
            <option value="4">4 Bulan Terakhir</option>
            <option value="5">5 Bulan Terakhir</option>
            <option value="6">6 Bulan Terakhir</option>
        </select>
        <p id="label-jc-khusus" style="font-weight: bold; color: #007bff; margin-top: 10px; font-size: 14px;">Laporan Khusus: JC ...</p>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-line"></i> RINGKASAN PERFORMA</h3>
        <div class="chart-container">
            <canvas id="performaChart"></canvas>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="background: #f0fff4; padding: 10px; border-radius: 10px; border: 1px solid #c6f6d5;">
                <h4 style="color: #2f855a; margin: 0; font-size: 13px;"><i class="fa-solid fa-check"></i> Hadir</h4>
                <div id="list-hadir" style="font-size: 11px; margin-top: 5px;">Memuat...</div>
            </div>
            <div style="background: #fff5f5; padding: 10px; border-radius: 10px; border: 1px solid #fed7d7;">
                <h4 style="color: #c53030; margin: 0; font-size: 13px;"><i class="fa-solid fa-xmark"></i> Izin</h4>
                <div id="list-izin" style="font-size: 11px; margin-top: 5px;">Memuat...</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-bullseye"></i> TARGET & KOMITMEN</h3>
        <div class="target-grid" id="target-check-container">
            </div>
        <label style="font-size: 12px; font-weight: bold; display: block; margin-top: 15px;">Komitmen:</label>
        <select id="komitmen-user">
            <option>Makin Rajin Baca Alkitab & Komsel</option>
            <option>Berusaha Konsisten</option>
            <option>Belum Bisa Berkomitmen</option>
        </select>
    </div>

    <div class="pks-section">
        <h4 style="margin:0; color: #856404; font-size: 14px;"><i class="fa-solid fa-lock"></i> Area Verifikasi PKS</h4>
        <input type="password" id="pks-password" placeholder="Password PKS" style="margin-top:10px;">
        <button class="btn-export" onclick="validateAndExport()">
            <i class="fa-solid fa-file-pdf"></i> Ekspor ke PDF
        </button>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI</a>
</div>

<div id="notif-block">
    <div class="modal-notif">
        <i class="fa-solid fa-circle-exclamation" style="font-size: 40px; color: #dc3545;"></i>
        <p id="notif-text" style="font-weight: bold;"></p>
        <button onclick="document.getElementById('notif-block').style.display='none'" style="width:100%; padding:10px; border-radius:10px; border:none; background:#333; color:white;">TUTUP</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    let myChart;
    let userJC = "";

    async function init() {
        const email = localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com";
        const snap = await db.collection("users").where("email", "==", email).get();
        
        if(!snap.empty) {
            userJC = snap.docs[0].data().komsel;
            document.getElementById("label-jc-khusus").innerText = "Laporan Khusus: JC " + userJC;
            
            initChart();
            sinkronisasiData();
        }
    }

    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Alkitab', 'Kehadiran'],
                datasets: [{
                    label: '% Capaian',
                    data: [0, 0],
                    backgroundColor: ['#007bff', '#28a745'],
                    borderRadius: 8
                }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    function sinkronisasiData() {
        const periodeBulan = parseInt(document.getElementById("filter-periode").value);
        const batasTanggal = new Date();
        batasTanggal.setMonth(batasTanggal.getMonth() - periodeBulan);

        // Update Checkbox UI
        let checkHtml = "";
        for(let i=1; i<=6; i++) {
            const checked = i === periodeBulan ? "checked" : "";
            checkHtml += `<div class="target-item"><input type="checkbox" ${checked} disabled> ${i} Bln</div>`;
        }
        document.getElementById("target-check-container").innerHTML = checkHtml;

        // Query Kehadiran Berdasarkan Periode
        db.collection("kehadiran")
            .where("komsel", "==", String(userJC))
            .where("tanggal", ">=", firebase.firestore.Timestamp.fromDate(batasTanggal))
            .onSnapshot(snap => {
                let hadir = 0, izin = 0, htmlH = "", htmlI = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === "Hadir") { hadir++; htmlH += `<div>• ${d.nama}</div>`; }
                    else { izin++; htmlI += `<div>• ${d.nama} <span style="color:red">(${d.alasan || 'Izin'})</span></div>`; }
                });
                
                const total = hadir + izin;
                const persenKehadiran = total > 0 ? Math.round((hadir / total) * 100) : 0;
                
                myChart.data.datasets[0].data[1] = persenKehadiran;
                myChart.update();
                document.getElementById("list-hadir").innerHTML = htmlH || "Tidak ada data";
                document.getElementById("list-izin").innerHTML = htmlI || "Tidak ada data";
            });

        // Query Alkitab Berdasarkan Periode
        db.collection("laporan_bacaan")
            .where("komsel", "==", String(userJC))
            .where("tanggal", ">=", firebase.firestore.Timestamp.fromDate(batasTanggal))
            .onSnapshot(snap => {
                const totalLapor = snap.size;
                const targetLaporan = 10 * (periodeBulan * 4); // Asumsi 10 jemaat, 4x seminggu
                const persenAlkitab = Math.min(Math.round((totalLapor / targetLaporan) * 100), 100);
                
                myChart.data.datasets[0].data[0] = persenAlkitab;
                myChart.update();
            });
    }

    async function validateAndExport() {
        const pass = document.getElementById("pks-password").value;
        if(!pass) return;

        const admin = await db.collection("users").where("jabatan", "==", "Administrator").where("password", "==", pass).get();
        const pks = await db.collection("users").where("komsel", "==", userJC).where("jabatan", "==", "Ketua Komsel").where("password", "==", pass).get();

        if(!admin.empty || !pks.empty) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("LAPORAN KOMSEL PONDOK PEMULIHAN PAPUA", 10, 20);
            doc.text(`Laporan Khusus: JC ${userJC}`, 10, 30);
            doc.text(`Periode: ${document.getElementById("filter-periode").value} Bulan Terakhir`, 10, 40);
            doc.text(`Capaian Alkitab: ${myChart.data.datasets[0].data[0]}%`, 10, 50);
            doc.text(`Capaian Kehadiran: ${myChart.data.datasets[0].data[1]}%`, 10, 60);
            doc.save(`Laporan_JC${userJC}.pdf`);
        } else {
            document.getElementById("notif-text").innerText = "Password Salah!";
            document.getElementById("notif-block").style.display = "flex";
        }
    }

    window.onload = init;
</script>
</body>
</html>
