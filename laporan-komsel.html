<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #6c757d;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --light-bg: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #eef2f7; 
            margin: 0; 
            padding: 12px;
            padding-bottom: 100px;
            color: #333;
        }

        .container { max-width: 500px; margin: auto; }
        
        .card { 
            background: white; 
            padding: 18px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            margin-bottom: 15px; 
            border: 1px solid rgba(0,0,0,0.03);
        }

        h3 { 
            font-size: 14px; 
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase; 
            margin: 0 0 15px 0; 
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1.5px solid #eee; 
            font-size: 14px; 
            font-weight: 600;
            background-color: #fcfcfc;
            box-sizing: border-box;
        }

        .insight-box { 
            background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
            border-left: 5px solid var(--primary); 
            padding: 15px; 
            border-radius: 12px; 
            position: relative;
        }

        .ai-badge {
            position: absolute;
            top: -10px; right: 15px;
            background: var(--primary);
            color: white; font-size: 9px;
            padding: 3px 10px; border-radius: 10px; font-weight: bold;
        }

        /* MODAL STYLE */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 450px;
            border-radius: 20px; display: flex; flex-direction: column;
            max-height: 80vh; animation: slideUp 0.3s ease-out;
        }

        .mutasi-item { 
            display: flex; padding: 12px; background: #fafafa;
            border-radius: 12px; margin-bottom: 8px; align-items: center; 
        }

        .btn-export { 
            background: var(--success); color: white; border: none; 
            width: 100%; padding: 16px; border-radius: 14px; 
            font-weight: 800; font-size: 14px; margin-top: 15px;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-back-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 15px 20px; background: white; border-top: 1px solid #eee;
            z-index: 1000; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container" id="konten-laporan">
    <div class="card" style="background: var(--primary); color: white; border: none;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
                <p style="margin: 0; font-size: 11px; font-weight: bold; opacity: 0.8;">OFFICIAL REPORT</p>
                <h2 id="label-jc" style="margin: 0; font-size: 20px; font-weight: 900;">JC - ANALYTICS</h2>
            </div>
            <i class="fa-solid fa-shield-halved" style="font-size: 24px; opacity: 0.5;"></i>
        </div>
    </div>

    <div class="card no-print">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Rentang Analisis</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="2">2 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
        </select>
    </div>

    <div class="card" id="card-insight" style="display:none;">
        <div class="ai-badge"><i class="fas fa-microchip"></i> AI ENGINE ACTIVE</div>
        <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Pertumbuhan Komsel</h3>
        <div class="insight-box">
            <div id="text-insight" class="insight-text">Menganalisis data...</div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-pie"></i> Visualisasi Capaian</h3>
        <div style="height: 200px;">
            <canvas id="performaChart"></canvas>
        </div>
    </div>

    <div class="card no-print">
        <h3><i class="fa-solid fa-list-check"></i> Log Aktifitas</h3>
        <button class="btn-export" style="background:white; color:var(--primary); border:1px solid var(--primary);" onclick="toggleLogModal(true)">
            LIHAT DETAIL LOG
        </button>
    </div>

    <div class="card no-print">
        <h3 style="color: #856404;"><i class="fa-solid fa-signature"></i> Otoritas PKS</h3>
        <input type="password" id="pks-password" placeholder="Password PKS">
        <button class="btn-export" id="btn-download" onclick="validateAndExport()">
            <i class="fa-solid fa-file-pdf"></i> GENERATE PDF RESMI
        </button>
    </div>
</div>

<div id="modal-log" class="modal-overlay" onclick="toggleLogModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="mutasi-list" style="padding: 20px; overflow-y: auto;">
            </div>
    </div>
</div>

<div class="btn-back-container no-print">
    <a href="menu.html" style="text-decoration:none; background:var(--primary); color:white; display:block; text-align:center; padding:15px; border-radius:12px; font-weight:800;">KEMBALI</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart;
    let userJC = "";

    // Fungsi Inisialisasi
    async function init() {
        let email = localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com";
        const snap = await db.collection("users").where("email", "==", email).get();
        if(!snap.empty) {
            userJC = String(snap.docs[0].data().komsel);
            document.getElementById("label-jc").innerText = "ANALISA JC " + userJC;
            initChart();
            sinkronisasiRealtime();
        }
    }

    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Alkitab', 'Hadir', 'Absen'],
                datasets: [{ data: [0, 0, 0], backgroundColor: ['#0056b3', '#28a745', '#dc3545'] }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function sinkronisasiRealtime() {
        const periode = parseInt(document.getElementById("filter-periode").value);
        db.collection("laporan_bacaan").where("komsel", "==", userJC).onSnapshot(snap => {
            let count = 0;
            let listHtml = "";
            snap.forEach(doc => {
                count++;
                const d = doc.data();
                listHtml += `<div class="mutasi-item"><b>${d.nama}</b>: ${d.pasal_utama}</div>`;
            });
            document.getElementById("mutasi-list").innerHTML = listHtml;
            myChart.data.datasets[0].data = [count * 5, 80, 20]; // Simulasi data
            myChart.update();
            document.getElementById("card-insight").style.display = "block";
            document.getElementById("text-insight").innerText = "Performa JC " + userJC + " stabil.";
        });
    }

    function toggleLogModal(show) { document.getElementById("modal-log").style.display = show ? 'flex' : 'none'; }

    // FUNGSI EKSPOR PDF (Perbaikan Utama)
    function validateAndExport() {
        const pass = document.getElementById("pks-password").value;
        if(pass !== "rahasia123") { alert("Password Salah!"); return; }

        const btn = document.getElementById("btn-download");
        btn.innerHTML = "SEDANG MENGUNDUH...";
        btn.disabled = true;

        // Area yang akan di-print (Container Utama)
        const element = document.getElementById('konten-laporan');
        
        // Sembunyikan elemen yang tidak ingin ada di PDF (tombol & filter)
        const noPrint = document.querySelectorAll('.no-print');
        noPrint.forEach(el => el.style.display = 'none');

        const opt = {
            margin:       [10, 10],
            filename:     `Laporan_JC${userJC}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            alert("Selesai! Cek folder download.");
            noPrint.forEach(el => el.style.display = 'block');
            btn.innerHTML = "GENERATE PDF RESMI";
            btn.disabled = false;
        });
    }

    window.onload = init;
</script>
</body>
</html>
