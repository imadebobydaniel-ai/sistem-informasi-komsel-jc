<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>

    <style>
        :root {
            --primary: #0056b3;
            --secondary: #6c757d;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --light-bg: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #eef2f7; 
            margin: 0; 
            padding: 12px;
            padding-bottom: 100px;
            color: #333;
        }

        .container { max-width: 500px; margin: auto; }
        
        .card { 
            background: white; 
            padding: 18px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            margin-bottom: 15px; 
            border: 1px solid rgba(0,0,0,0.03);
        }

        h3 { 
            font-size: 14px; 
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase; 
            margin: 0 0 15px 0; 
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1.5px solid #eee; 
            font-size: 14px; 
            font-weight: 600;
            background-color: #fcfcfc;
            transition: 0.3s;
            box-sizing: border-box;
        }
        select:focus, input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .insight-box { 
            background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
            border-left: 5px solid var(--primary); 
            padding: 15px; 
            border-radius: 12px; 
            position: relative;
        }
        .insight-text { font-size: 13px; color: #444; line-height: 1.6; font-weight: 500; }
        .ai-badge {
            position: absolute;
            top: -10px;
            right: 15px;
            background: var(--primary);
            color: white;
            font-size: 9px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* MODAL HP OPTIMIZED - PRESISI & SIMETRIS */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: 92%; 
            max-width: 420px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header {
            padding: 18px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            color: var(--primary);
        }
        .modal-body {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
            background: #fff;
            -webkit-overflow-scrolling: touch;
        }

        .btn-open-log {
            background: #fff;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .mutasi-item { 
            display: flex; 
            padding: 12px; 
            background: #fafafa;
            border-radius: 12px;
            margin-bottom: 8px;
            align-items: center; 
        }
        .mutasi-date { 
            background: #eee;
            color: #666;
            font-size: 10px; 
            font-weight: 800;
            padding: 5px;
            border-radius: 8px;
            text-align: center;
            min-width: 35px;
            margin-right: 12px;
        }
        .mutasi-info { flex: 1; }
        .mutasi-name { font-weight: 700; font-size: 13px; color: #222; }
        .mutasi-desc { font-size: 11px; color: #777; margin-top: 2px; }
        .mutasi-status { font-size: 10px; color: var(--success); font-weight: 900; }

            width: 100%;

            border-radius: 14px;
