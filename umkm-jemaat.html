<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasar UMKM Jemaat - Modern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.95);
            --primary: #2563eb;
            --accent: #059669;
            --danger: #dc2626;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text);
            padding-bottom: 50px;
        }

        /* Navbar Dinamis */
        .navbar { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 18px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .navbar h1 { font-size: 20px; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -0.5px; }

        /* Card Lapak - Lebih Besar & Modern */
        .market-container { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .lapak-card { 
            background: white; 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .lapak-img-wrapper { position: relative; width: 100%; height: 200px; }
        .lapak-img { width: 100%; height: 100%; object-fit: cover; }
        
        .lapak-info { padding: 20px; }
        .lapak-info h3 { margin: 0 0 8px 0; font-size: 22px; font-weight: 700; }
        
        /* Tombol Chat Premium */
        .portal-chat { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; 
            padding: 16px; 
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        /* Admin Action Buttons */
        .admin-controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit, .btn-delete { 
            flex: 1; padding: 10px; border: none; border-radius: 12px; 
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-edit { background: #eff6ff; color: var(--primary); }
        .btn-delete { background: #fef2f2; color: var(--danger); }

        /* FAB (Floating Action Button) untuk Daftar */
        .fab-add {
            position: fixed; bottom: 30px; right: 25px;
            background: var(--primary); color: white;
            width: 60px; height: 60px; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            z-index: 999; border: none; font-size: 24px;
        }

        /* Modal Design */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { 
            background: white; width: 100%; max-width: 450px; padding: 30px; 
            border-radius: 32px; box-sizing: border-box; max-height: 90vh; overflow-y: auto;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #64748b; }
        input, select, textarea { 
            width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid #e2e8f0; 
            background: #f8fafc; font-size: 15px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); background: white; }

        /* Notifikasi */
        #notif-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 85%; display: none; }
        .notif-block { background: #1e293b; color: white; padding: 16px 24px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); text-align: center; font-weight: 600; }
    </style>
</head>
<body>

<div id="notif-container"><div class="notif-block" id="notif-message"></div></div>

<div class="navbar">
    <h1><i class="fa-solid fa-bag-shopping"></i> SIPAPUA MART</h1>
    <div class="dropdown">
        <button class="dropbtn" onclick="toggleMenu(event)" style="background:none; border:none; font-size: 20px; color:var(--text);"><i class="fa-solid fa-user-circle"></i></button>
        <div id="myDropdown" class="dropdown-content" style="display:none; position:absolute; right:0; background:white; box-shadow:0 10px 20px rgba(0,0,0,0.1); border-radius:12px; padding:10px;">
            <a href="#" onclick="bukaModal('modal-login')" style="display:block; padding:10px; text-decoration:none; color:black;">Login Lapak</a>
        </div>
    </div>
</div>

<div class="market-container" id="main-market">
    </div>

<button class="fab-add" onclick="bukaModal('modal-daftar')">
    <i class="fa-solid fa-plus"></i>
</button>

<div id="modal-daftar" class="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Buka Lapak</h2>
            <i class="fa-solid fa-times" onclick="tutupModal()" style="cursor:pointer; font-size:20px;"></i>
        </div>
        
        <div class="input-group">
            <label>NAMA UMKM</label>
            <input type="text" id="reg-toko" placeholder="Contoh: Kedai Kopi Papua">
        </div>

        <div class="input-group">
            <label>LOGO LAPAK</label>
            <input type="file" id="reg-foto" accept="image/*">
        </div>

        <div class="input-group">
            <label>WHATSAPP (NOMOR ADMIN)</label>
            <input type="tel" id="reg-hp" placeholder="0812xxxx">
        </div>

        <div class="input-group">
            <label>EMAIL & PASSWORD (UNTUK LOGIN)</label>
            <input type="email" id="reg-email" placeholder="Email Anda">
            <input type="password" id="reg-pass" placeholder="Password" style="margin-top:10px;">
        </div>

        <button class="btn-action" id="btn-daftar" onclick="prosesDaftar()" style="background:var(--primary); color:white; width:100%; border:none; padding:16px; border-radius:16px; font-weight:800; font-size:16px;">AKTIFKAN LAPAK</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389",
        measurementId: "G-X14300RJL4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const CLOUD_NAME = "dxzllsbgi";
    const UPLOAD_PRESET = "sipapua_preset";

    // UI Logic
    window.bukaModal = (id) => document.getElementById(id).style.display = 'flex';
    window.tutupModal = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
    
    function notif(m) {
        const n = document.getElementById("notif-container");
        document.getElementById("notif-message").innerText = m;
        n.style.display = "block"; setTimeout(() => n.style.display = "none", 3000);
    }

    // --- DAFTAR LAPAK ---
    async function prosesDaftar() {
        const btn = document.getElementById("btn-daftar");
        const foto = document.getElementById("reg-foto").files[0];
        if(!foto) return notif("Wajib upload logo!");

        try {
            btn.innerText = "Mengunggah..."; btn.disabled = true;
            
            // 1. Upload Logo
            const fd = new FormData();
            fd.append("file", foto);
            fd.append("upload_preset", UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: fd });
            const data = await res.json();
            
            // 2. Auth & Simpan
            const user = await auth.createUserWithEmailAndPassword(document.getElementById("reg-email").value, document.getElementById("reg-pass").value);
            
            await db.collection("umkm_stores").doc(user.user.uid).set({
                nama_toko: document.getElementById("reg-toko").value,
                whatsapp: document.getElementById("reg-hp").value,
                logo_url: data.secure_url,
                uid: user.user.uid,
                dibuat: firebase.firestore.FieldValue.serverTimestamp()
            });

            notif("Lapak Berhasil Dibuat!");
            location.reload();
        } catch (e) { notif(e.message); btn.disabled = false; }
    }

    // --- MUAT MARKET ---
    async function muatMarket() {
        const container = document.getElementById("main-market");
        const snap = await db.collection("umkm_stores").get();
        container.innerHTML = "";
        
        snap.forEach(doc => {
            const lapak = doc.data();
            container.innerHTML += `
                <div class="lapak-card">
                    <div class="lapak-img-wrapper">
                        <img src="${lapak.logo_url}" class="lapak-img">
                    </div>
                    <div class="lapak-info">
                        <h3>${lapak.nama_toko}</h3>
                        <a href="portal-chat.html?uid=${lapak.uid}" class="portal-chat">
                            <i class="fa-solid fa-comments"></i> TANYA PENJUAL
                        </a>
                        <div class="admin-controls">
                            <button class="btn-edit" onclick="editLapak('${doc.id}')"><i class="fa-solid fa-pen"></i> Edit</button>
                            <button class="btn-delete" onclick="hapusLapak('${doc.id}')"><i class="fa-solid fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function hapusLapak(id) {
        if(confirm("Hapus lapak permanen?")) {
            await db.collection("umkm_stores").doc(id).delete();
            notif("Terhapus!"); muatMarket();
        }
    }

    muatMarket();
</script>
</body>
</html>
