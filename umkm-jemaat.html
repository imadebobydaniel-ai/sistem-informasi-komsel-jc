<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMKM Jemaat</title>

<style>
body { font-family: Arial; background:#f4f7f6; margin:0; }
.navbar { background:#2c3e50; color:white; padding:15px; display:flex; justify-content:space-between; }
.btn { padding:12px; border:none; border-radius:8px; background:#2c3e50; color:white; width:100%; }
.modal { display:none; position:fixed; bottom:0; width:100%; background:white; padding:20px; border-radius:20px 20px 0 0; }
input, select, textarea { width:100%; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<div class="navbar">
    <b>UMKM Jemaat</b>
    <button onclick="bukaModal()">Daftar</button>
</div>

<div id="modal" class="modal">
    <h3>Buat Lapak</h3>

    <input id="toko" placeholder="Nama UMKM">
    <input id="pemilik" placeholder="Nama Pemilik">
    <input id="hp" placeholder="No HP">

    <input type="file" id="foto">

    <select id="jenis">
        <option value="">Pilih Jenis</option>
        <option>Jasa</option>
        <option>Makanan</option>
    </select>

    <textarea id="desc" placeholder="Deskripsi"></textarea>

    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">

    <button class="btn" id="btn" onclick="daftar()">DAFTAR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// 🔥 CONFIG FIREBASE
firebase.initializeApp({
    apiKey: "ISI_APIKEY_KAMU",
    authDomain: "ISI_DOMAIN",
    projectId: "ISI_PROJECT_ID"
});

const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 CONFIG CLOUDINARY (PASTIKAN BENAR)
const CLOUD_NAME = "dxzllsbgj";
const UPLOAD_PRESET = "sipapua_preset";

// UI
function bukaModal() {
    document.getElementById("modal").style.display = "block";
}

// 🔥 FUNGSI UTAMA
async function daftar() {
    const btn = document.getElementById("btn");

    const toko = document.getElementById("toko").value;
    const pemilik = document.getElementById("pemilik").value;
    const hp = document.getElementById("hp").value;
    const jenis = document.getElementById("jenis").value;
    const desc = document.getElementById("desc").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    const file = document.getElementById("foto").files[0];

    // VALIDASI
    if (!toko || !pemilik || !hp || !email || !pass || !file) {
        alert("Lengkapi semua data!");
        return;
    }

    try {
        btn.innerText = "Memproses...";
        btn.disabled = true;

        // 🔥 STEP 1: AUTH
        let user;
        try {
            user = await auth.createUserWithEmailAndPassword(email, pass);
        } catch (err) {
            if (err.code === "auth/email-already-in-use") {
                user = await auth.signInWithEmailAndPassword(email, pass);
            } else {
                throw err;
            }
        }

        const uid = user.user.uid;

        // 🔥 STEP 2: UPLOAD GAMBAR
        btn.innerText = "Upload Logo...";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!res.ok || data.error) {
            throw new Error(data.error?.message || "Upload gagal");
        }

        // 🔥 STEP 3: SIMPAN
        btn.innerText = "Menyimpan...";

        await db.collection("umkm").doc(uid).set({
            toko,
            pemilik,
            hp,
            jenis,
            desc,
            logo: data.secure_url,
            email,
            created: new Date()
        });

        alert("Berhasil daftar!");
        location.reload();

    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
        btn.innerText = "DAFTAR";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
