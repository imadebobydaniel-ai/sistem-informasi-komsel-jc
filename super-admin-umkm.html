<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin UMKM - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #ddd; padding-bottom: 15px; }
        
        .card-seller { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .seller-info { display: flex; gap: 15px; align-items: center; }
        .seller-info img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; border: 1px solid #eee; }
        
        .actions { display: flex; gap: 8px; }
        .actions button { padding: 10px 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn-edit { background: #e3f2fd; color: #1976d2; }
        .btn-edit:hover { background: #bbdefb; }
        .btn-delete { background: #ffebee; color: #d32f2f; }
        .btn-delete:hover { background: #ffcdd2; }
        .btn-view { background: #f5f5f5; color: #616161; }
        .btn-view:hover { background: #eeeeee; }

        /* Modal Preview Dagangan */
        #preview-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; max-width: 500px; margin: 20px auto; border-radius: 25px; padding: 30px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .grid-dagangan { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .item-dagangan { border: 1px solid #f0f0f0; border-radius: 12px; padding: 8px; text-align: center; background: #fafafa; }
        .item-dagangan img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; }
        
        .logout-btn { padding: 10px 20px; border-radius: 10px; border: none; background: #2c3e50; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <div>
            <h2 style="margin:0;"><i class="fa-solid fa-user-shield"></i> Control Panel UMKM</h2>
            <p style="margin:5px 0 0; color: #777; font-size: 14px;">Manajemen Lapak Jemaat Pondok Pemulihan Papua</p>
        </div>
        <button onclick="logout()" class="logout-btn">Keluar</button>
    </div>

    <div id="seller-list">
        </div>
</div>

<div id="preview-modal">
    <div class="modal-content">
        <h3 id="modal-seller-name" style="margin-top:0; color: #2c3e50;"></h3>
        <p style="font-size: 13px; color: #888; border-left: 3px solid #ff9800; padding-left: 10px;">Daftar Produk ini bersifat <b>Read-Only</b> (Hanya Lihat).</p>
        <div id="list-produk" class="grid-dagangan"></div>
        <button onclick="tutupPreview()" style="width: 100%; margin-top: 25px; padding: 15px; border: none; background: #f1f3f5; border-radius: 12px; font-weight: bold; color: #2c3e50; cursor: pointer;">TUTUP PANEL</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Proteksi Halaman
    if(sessionStorage.getItem("isAdmin") !== "true") { window.location.href = "umkm-jemaat.html"; }

    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadSellers() {
        const list = document.getElementById("seller-list");
        list.innerHTML = `<div style="text-align:center; padding:50px; color:#aaa;"><i class="fa-solid fa-spinner fa-spin"></i> Menghubungkan ke Database...</div>`;
        
        try {
            const snap = await db.collection("umkm_stores").get();
            list.innerHTML = "";
            
            if(snap.empty) {
                list.innerHTML = `<p style="text-align:center; color:#999;">Belum ada pedagang yang mendaftar.</p>`;
                return;
            }

            snap.forEach(doc => {
                const s = doc.data();
                list.innerHTML += `
                    <div class="card-seller">
                        <div class="seller-info">
                            <img src="${s.logo || 'https://via.placeholder.com/100'}">
                            <div>
                                <div style="font-weight:bold; color:#2c3e50; font-size:16px;">${s.nama_toko}</div>
                                <div style="font-size:13px; color:#777;"><i class="fa-brands fa-whatsapp"></i> ${s.whatsapp}</div>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-view" onclick="viewItems('${doc.id}', '${s.nama_toko}')"><i class="fa-solid fa-box"></i> Stok</button>
                            <button class="btn-edit" onclick="editSeller('${doc.id}', '${s.nama_toko}', '${s.whatsapp}')"><i class="fa-solid fa-user-pen"></i></button>
                            <button class="btn-delete" onclick="deleteSeller('${doc.id}')"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            list.innerHTML = "Gagal memuat data: " + e.message;
        }
    }

    async function viewItems(uid, name) {
        document.getElementById("modal-seller-name").innerText = "Lapak: " + name;
        const list = document.getElementById("list-produk");
        list.innerHTML = `<div style="grid-column: span 2; text-align:center;">Memuat barang...</div>`;
        document.getElementById("preview-modal").style.display = "block";

        const snap = await db.collection("umkm_products").where("seller_uid", "==", uid).get();
        list.innerHTML = snap.empty ? "<div style='grid-column: span 2; color:#bbb; padding:20px;'>Penjual belum mengupload produk apapun.</div>" : "";
        
        snap.forEach(doc => {
            const p = doc.data();
            list.innerHTML += `
                <div class="item-dagangan">
                    <img src="${p.img_url}">
                    <div style="font-size:11px; font-weight:bold; margin-top:8px; color:#333;">${p.nama}</div>
                    <div style="font-size:10px; color:#ff9800; font-weight:bold; margin-top:3px;">${p.status}</div>
                </div>
            `;
        });
    }

    async function editSeller(uid, currentName, currentWA) {
        const newName = prompt("Ubah Nama Toko:", currentName);
        const newWA = prompt("Ubah No WhatsApp:", currentWA);

        if(newName && newWA) {
            await db.collection("umkm_stores").doc(uid).update({
                nama_toko: newName,
                whatsapp: newWA
            });
            loadSellers();
        }
    }

    async function deleteSeller(uid) {
        if(confirm("PERINGATAN: Hapus permanen toko ini? Semua data produk jemaat ini juga akan ikut terhapus dari pasar.")) {
            await db.collection("umkm_stores").doc(uid).delete();
            
            // Hapus otomatis semua produk milik seller ini
            const prods = await db.collection("umkm_products").where("seller_uid", "==", uid).get();
            const batch = db.batch();
            prods.forEach(d => batch.delete(d.ref));
            await batch.commit();
            
            loadSellers();
        }
    }

    function tutupPreview() { document.getElementById("preview-modal").style.display = "none"; }
    function logout() { sessionStorage.clear(); window.location.href = "umkm-jemaat.html"; }

    // Jalankan saat load
    loadSellers();
</script>
</body>
</html>
