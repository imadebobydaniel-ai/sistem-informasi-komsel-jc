    <style>
        :root { 
            --biru-tua: #003366; 
            --biru-safir: #0056b3; 
            --biru-muda: #00e6e6; 
            --hijau-zamrud: #2ecc71; 
            --emas-lux: #D4AF37; 
            --putih-bg: #f4f7fa; 
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--putih-bg); margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        
        /* FREEZE SECTION LOGIC */
        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--putih-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @keyframes marqueeTop { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        .top-info-bar { background: var(--biru-tua); display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; font-weight: bold; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; }
        
        header { background: var(--biru-tua); border-bottom: 3px solid var(--hijau-zamrud); padding: 10px 0; overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
        
        .running-content { display: inline-block; padding-left: 100%; animation: marqueeTop 30s linear infinite; font-weight: 900; font-size: 12px; color: white; text-transform: uppercase; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* Profile Card & Media - Bagian yang di Freeze */
        .top-section-container { 
            position: relative; 
            width: 100%; 
            height: 200px; 
            overflow: hidden; 
            border-radius: 0 0 25px 25px; 
            background: #000;
            margin-bottom: 10px;
        }
        
        .profile-card { position: absolute; width: 100%; height: 100%; background: linear-gradient(145deg, #ffffff, #f0f0f0); z-index: 5; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid var(--emas-lux); }
        .profile-card.closed { transform: translateX(-100%); }
        
        .btn-toggle-side { position: absolute; left: 0; top: 50%; transform: translateY(-50%); z-index: 10; background: #ff0000; color: white; border: none; width: 25px; height: 50px; border-radius: 0 10px 10px 0; cursor: pointer; opacity: 0.8; }

        /* MENU GRID MODEL OVO */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px 5px; 
            margin-top: 20px; 
            padding: 10px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .menu-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: #444; 
            font-weight: 600; 
            font-size: 10px; 
            text-align: center;
            transition: 0.2s;
        }

        .menu-box:active { transform: scale(0.9); }

        /* Realistic Icon Style */
        .icon-circle {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,51,102,0.15);
            border: 1px solid #f0f0f0;
        }

        .menu-box i { 
            font-size: 22px; 
            background: linear-gradient(135deg, var(--biru-tua), var(--biru-safir));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Khusus Icon Warna Realistik */
        .icon-green i { background: linear-gradient(135deg, #27ae60, #2ecc71); -webkit-background-clip: text; }
        .icon-gold i { background: linear-gradient(135deg, #d4af37, #f1c40f); -webkit-background-clip: text; }
        .icon-red i { background: linear-gradient(135deg, #c0392b, #e74c3c); -webkit-background-clip: text; }

        .btn-logout { background: var(--biru-tua); color: #fff; padding: 12px; border-radius: 15px; text-decoration: none; font-size: 14px; font-weight: bold; display: block; text-align: center; margin-top: 20px; border: 1px solid var(--emas-lux); }

        /* Media Display Area */
        #media-display-area { width: 100%; height: 100%; background: #000; }
        #player, #videoPlayer, #imageDisplay { width: 100%; height: 100%; object-fit: cover; }
        
        /* Modal Styles Tetap Sama */
        .modal-card-overlay, .popup-inbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .digital-card-box { width: 260px; height: 400px; background: linear-gradient(135deg, #f1c40f, #d4af37); border-radius: 15px; padding: 20px; color: #fff; text-align: center; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
