<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Variabel Warna Khas Logo Anda */
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --biru-muda: #00e6e6;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; padding: 0; overflow-x: hidden; color: #333;
        }

        /* --- STICKY HEADER (Freeze) --- */
        .sticky-wrapper {
            position: -webkit-sticky; /* Support Safari */
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: var(--putih-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
        }

        .top-info-bar { 
            background: var(--biru-tua); 
            display: flex; justify-content: space-between; 
            padding: 8px 15px; font-weight: bold; font-size: 11px; 
            border-bottom: 2px solid var(--emas-lux); color: white;
        }
        #display-tanggal { color: var(--emas-lux); }
        #digital-clock { color: var(--biru-muda); }

        header { 
            background: white; border-bottom: 3px solid var(--hijau-zamrud); 
            padding: 12px 0; overflow: hidden; white-space: nowrap; 
        }

        .running-content { 
            display: inline-block; white-space: nowrap;
            animation: marquee 20s linear infinite; 
            font-weight: 900; font-size: 13px; color: var(--biru-tua);
            text-transform: uppercase; letter-spacing: 1px;
        }

        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Area Konten Utama */
        .main-content {
            padding: 15px;
            max-width: 450px;
            margin: auto;
            text-align: center;
        }

        .container-menu {
            max-width: 450px;
            margin: auto;
        }

        /* Profile Section Asli */
        .profile-section { 
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 25px; border-radius: 25px; 
            box-shadow: 10px 10px 20px #d1d1d1, -10px -10px 20px #ffffff;
            margin-bottom: 10px; position: relative;
            border-top: 4px solid var(--biru-safir);
        }

        .setting-icon-profile { position: absolute; top: 18px; right: 18px; color: var(--biru-tua); font-size: 22px; transition: 0.3s; }
        .setting-icon-profile:hover { transform: rotate(90deg); color: var(--emas-lux); }

        .profile-img-container { 
            width: 90px; height: 90px; border-radius: 50%; 
            margin: 0 auto 12px auto; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            background: white; border: 3px solid var(--emas-lux);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .profile-section i.fa-circle-user { font-size: 85px; color: var(--biru-safir); }

        .profile-section h2 { margin: 8px 0 2px 0; font-size: 24px; color: var(--biru-tua); font-weight: 800; }
        .profile-section p { margin: 0; color: var(--hijau-zamrud); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* --- DESAIN MENU GRID DENGAN IKON 3D (Lebih Hidup) --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding-bottom: 20px; }
        .menu-box { 
            background: white; padding: 22px 10px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: var(--biru-tua); font-weight: 800; font-size: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .menu-box:active { transform: scale(0.92); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Ikon Menu Lebih Hidup/Timbul (3D Efek) */
        .menu-box i { 
            font-size: 30px; margin-bottom: 12px; 
            color: var(--biru-safir);
            /* Menambahkan efek bayangan lembut agar ikon terlihat hidup/3D */
            filter: drop-shadow(2px 4px 3px rgba(0, 0, 0, 0.2));
            transition: 0.3s;
        }

        /* Hover efek pada ikon */
        .menu-box:hover i {
            filter: drop-shadow(2px 6px 5px rgba(0, 0, 0, 0.3));
            transform: translateY(-2px);
        }

        /* Ikon Khusus */
        .icon-special { filter: drop-shadow(2px 4px 3px rgba(212, 175, 55, 0.4)) !important; }
        .lacak-box i { filter: drop-shadow(2px 4px 3px rgba(225, 29, 72, 0.3)) !important; }

        .btn-logout { 
            background: var(--biru-tua); color: #fff; padding: 14px 40px; 
            border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: bold; 
            display: inline-block; margin: 20px 0 40px 0; border: 2px solid var(--emas-lux);
            box-shadow: 0 4px 15px rgba(0,51,102,0.3); cursor: pointer;
        }

        /* Modal styling... (Sama seperti sebelumnya) */
        .modal-overlay { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="sticky-wrapper">
        <div class="top-info-bar">
            <div id="display-tanggal">Memuat Tanggal...</div>
            <div id="digital-clock">00:00:00 WIT</div>
        </div>

        <header>
            <div id="running-text" class="running-content"></div>
        </header>

        <div class="main-content" style="padding-bottom: 5px;">
            <h3 class="org-title" style="margin-bottom: 10px;">Portal Komsel JC</h3>
            
            <div class="profile-section">
                <a href="setting.html" class="setting-icon-profile"><i class="fa-solid fa-gear"></i></a>
                <div class="profile-img-container" id="photo-area">
                    <i class="fa-solid fa-circle-user" id="default-icon" style="font-size: 85px; color: var(--biru-safir);"></i>
                    <img id="user-photo" src="" style="display: none;">
                </div>
                <h2 id="disp_nama">User</h2>
                <p id="disp_komsel">KOMSEL JC</p>
            </div>
        </div>
    </div>

    <div class="container-menu">
        <div class="menu-grid" style="padding: 0 15px;">
            <a href="profil.html" class="menu-box">
                <i class="fa-solid fa-user-shield"></i>Profil Saya
            </a>
            <a href="kehadiran.html" class="menu-box">
                <i class="fa-solid fa-calendar-check"></i>Kehadiran
            </a>
            <a href="baca-alkitab.html" class="menu-box">
                <i class="fa-solid fa-book-bible"></i>Laporan Baca
            </a>
            <a href="statistik.html" class="menu-box">
                <i class="fa-solid fa-chart-pie"></i>Statistik
            </a>
            <a href="leaderboard.html" class="menu-box">
                <i class="fa-solid fa-crown icon-special"></i>Peringkat JC
            </a>

            <a href="laporan-komsel.html" class="menu-box">
                <i class="fa-solid fa-file-signature"></i>Laporan Komsel
            </a>
            
            <a href="lacak-domba.html" class="menu-box lacak-box">
                <i class="fa-solid fa-map-location-dot"></i>Lacak Domba
            </a>
            <a href="capaian-doa.html" class="menu-box">
                <i class="fa-solid fa-hands-praying icon-special"></i>Capaian DOA
            </a>
            <a href="javascript:location.reload()" class="menu-box" style="color: #28a745;">
                <i class="fa-solid fa-arrows-rotate"></i>Refresh
            </a>
            <a href="saran.html" class="menu-box">
                <i class="fa-solid fa-comment-dots"></i>Saran
            </a>
        </div>

        <div style="text-align: center;">
            <div class="btn-logout" onclick="logoutDanHapusDevice()">KELUAR SISTEM</div>
        </div>
    </div>

    <div id="logoutModal" class="modal-overlay">
        <div class="modal-content">
            <i class="fa-solid fa-right-from-bracket" style="font-size: 50px; color: var(--biru-tua); margin-bottom: 15px;"></i>
            <h3>Konfirmasi Keluar</h3>
            <p>Apakah Anda yakin ingin keluar dari sistem?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="cancelLogout" style="flex:1; padding: 12px; border-radius: 8px; background: #f8f9fa; border: 1px solid #ddd; cursor: pointer;">Batal</button>
                <button id="confirmLogout" style="flex:1; padding: 12px; border-radius: 8px; background: #e11d48; color: white; border: none; cursor: pointer;">Keluar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</body>
</html>
