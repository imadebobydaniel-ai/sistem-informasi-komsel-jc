<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otentikasi SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2c2c2c; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; border-top: 5px solid #D4AF37; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #D4AF37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 25px; background: #D4AF37; color: black; text-decoration: none; border-radius: 5px; font-weight: bold; }
        #message { line-height: 1.6; }
    </style>
</head>
<body>

    <div class="card">
        <div id="loader" class="loader"></div>
        <div id="message">Sedang memproses permintaan Anda...</div>
        <div id="action-area"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // CONFIG FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const actionCode = urlParams.get('oobCode');
        const messageEl = document.getElementById('message');
        const loaderEl = document.getElementById('loader');

        // LOGIKA SWITCH-CASE UNTUK MEMBEDAKAN MODE
        switch (mode) {
            case 'resetPassword':
                handleResetPassword(actionCode);
                break;
            case 'verifyEmail':
                handleVerifyEmail(actionCode);
                break;
            default:
                showError("Mode tidak dikenali atau link sudah kadaluwarsa.");
        }

        // FUNGSI VERIFIKASI EMAIL
        function handleVerifyEmail(code) {
            auth.applyActionCode(code)
                .then(() => {
                    loaderEl.style.display = 'none';
                    messageEl.innerHTML = `
                        <i class="fa-solid fa-circle-check" style="color: #D4AF37; font-size: 3rem;"></i>
                        <h3>Email Terverifikasi!</h3>
                        <p>Akun Anda sekarang aktif. Silakan kembali untuk login.</p>
                        <a href="index.html" class="btn">KE HALAMAN LOGIN</a>
                    `;
                })
                .catch((error) => {
                    showError("Gagal verifikasi: " + error.message);
                });
        }

        // FUNGSI RESET PASSWORD
        function handleResetPassword(code) {
            // Kita arahkan ke halaman khusus buat password baru agar lebih aman dan rapi
            // Sesuai keinginan Anda sebelumnya
            window.location.href = "reset-password-baru.html?code=" + code;
        }

        function showError(text) {
            loaderEl.style.display = 'none';
            messageEl.innerHTML = `
                <i class="fa-solid fa-circle-xmark" style="color: #ff4444; font-size: 3rem;"></i>
                <p style="color: #ff4444; margin-top: 15px;">${text}</p>
                <a href="index.html" class="btn" style="background: #444; color: white;">Kembali</a>
            `;
        }
    </script>
</body>
</html>
