<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Pondok Pemulihan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px 20px; background: #f4f7f6; margin: 0; }
        .card { background: white; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 30px; display: inline-block; width: 100%; max-width: 380px; box-sizing: border-box; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: background 0.3s; }
        .btn:hover { background: #0056b3; }
        .error-msg { color: #dc3545; font-size: 13px; text-align: left; margin-top: -5px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Atur Password Baru</h2>
        <p>Gunakan minimal 6 karakter (kombinasi huruf, angka, atau simbol).</p>
        
        <input type="password" id="new-password" placeholder="Password Baru">
        <input type="password" id="confirm-password" placeholder="Ulangi Password Baru">
        <div id="error-text" class="error-msg">Password tidak cocok!</div>
        
        <button onclick="handleReset()" class="btn">Simpan Password</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project"
        };
        firebase.initializeApp(firebaseConfig);

        // Ambil kode oobCode dari link email
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');

        function handleReset() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('error-text');

            // 1. Validasi Minimal 6 Karakter
            if (newPassword.length < 6) {
                alert("Password minimal harus 6 karakter!");
                return;
            }

            // 2. Validasi Kesamaan Password
            if (newPassword !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = "Password tidak cocok! Silakan cek kembali.";
                return;
            } else {
                errorDiv.style.display = 'none';
            }

            // 3. Proses ke Firebase jika oobCode ada
            if (!actionCode) {
                alert("Kode verifikasi tidak ditemukan. Silakan minta link reset password baru dari menu login.");
                return;
            }

            firebase.auth().confirmPasswordReset(actionCode, newPassword)
                .then(() => {
                    alert("✅ Password Berhasil Diubah! Silakan login dengan password baru Anda.");
                    window.location.href = "login.html";
                })
                .catch(error => {
                    console.error(error);
                    if (error.code === 'auth/expired-action-code') {
                        alert("❌ Link sudah kadaluwarsa. Silakan kirim ulang permintaan reset password.");
                    } else {
                        alert("❌ Gagal merubah password: " + error.message);
                    }
                });
        }
    </script>
</body>
</html>
