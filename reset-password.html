<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Pondok Pemulihan - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a1a;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .reset-card {
            background: #ffffff; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%; max-width: 400px;
            border-top: 5px solid #28a745;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: #333; font-size: 22px; margin-bottom: 5px; }
        .header p { color: #666; font-size: 14px; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; outline: none;
        }
        .form-group input:focus { border-color: #28a745; }

        .btn-reset {
            width: 100%; padding: 14px; background-color: #28a745;
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-reset:hover { background-color: #218838; }

        #msg {
            display: none; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            font-size: 13px; font-weight: bold; text-align: center;
        }
        .error { display: block; background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .success { display: block; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        
        /* Gaya tambahan untuk mode verifikasi */
        .verify-mode { text-align: center; }
        .verify-mode i { font-size: 50px; color: #28a745; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="reset-card" id="mainCard">
        <div id="resetContent">
            <div class="header">
                <i class="fa-solid fa-lock-open" style="font-size: 40px; color: #28a745; margin-bottom: 15px;"></i>
                <h2>Perbarui Password</h2>
                <p>Silakan masukkan password baru Anda</p>
            </div>

            <div id="msg"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" id="new_pass" required placeholder="Minimal 6 karakter">
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password Baru</label>
                    <input type="password" id="confirm_pass" required placeholder="Ulangi password">
                </div>
                <button type="submit" id="btnSubmit" class="btn-reset">SIMPAN PASSWORD</button>
            </form>
        </div>

        <div id="verifyContent" style="display: none;" class="verify-mode">
            <i class="fas fa-check-circle"></i>
            <h2>Verifikasi Berhasil!</h2>
            <p>Email Anda telah berhasil diverifikasi. Sekarang Anda bisa kembali ke aplikasi.</p>
            <br>
            <button onclick="window.location.href='index.html'" class="btn-reset">KEMBALI KE LOGIN</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // LOGIKA PENYARING (INTERCEPTOR)
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const actionCode = urlParams.get('oobCode');

        // Jalankan pengecekan mode saat halaman dimuat
        if (mode === 'verifyEmail') {
            // Sembunyikan form reset, tampilkan pesan verifikasi
            document.getElementById('resetContent').style.display = 'none';
            document.getElementById('verifyContent').style.display = 'block';
            document.getElementById('mainCard').style.borderTop = '5px solid #28a745';

            // Eksekusi verifikasi ke Firebase secara otomatis
            auth.applyActionCode(actionCode).then(() => {
                console.log("Email verified successfully");
            }).catch((error) => {
                console.error("Verification error", error);
                document.querySelector('#verifyContent p').innerText = "Gagal memverifikasi atau link kadaluarsa.";
            });

        } else if (mode === 'resetPassword') {
            // Tetap tampilkan form reset password (default)
            console.log("Mode: Reset Password Aktif");
        }

        // LOGIKA RESET PASSWORD (DIBERIKAN SEBELUMNYA)
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('new_pass').value;
            const confirmPass = document.getElementById('confirm_pass').value;
            const msgBox = document.getElementById('msg');
            const btn = document.getElementById('btnSubmit');

            if (newPass !== confirmPass) {
                msgBox.innerText = "Password tidak sama! Periksa kembali.";
                msgBox.className = "error";
                return;
            }

            if (newPass.length < 6) {
                msgBox.innerText = "Password minimal 6 karakter!";
                msgBox.className = "error";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                const userEmail = await auth.verifyPasswordResetCode(actionCode);
                await auth.confirmPasswordReset(actionCode, newPass);
                
                const userQuery = await db.collection("users").where("email", "==", userEmail).get();
                if (!userQuery.empty) {
                    const docId = userQuery.docs[0].id;
                    await db.collection("users").doc(docId).update({
                        last_password_reset: firebase.firestore.FieldValue.serverTimestamp(),
                        status_akun: "Password Updated"
                    });
                }

                msgBox.innerText = "Selamat! Password baru Anda sudah berhasil. Silakan login kembali.";
                msgBox.className = "success";
                document.getElementById('resetForm').style.display = "none";

                setTimeout(() => {
                    window.location.href = "index.html"; 
                }, 3500);

            } catch (error) {
                console.error(error);
                let errMsg = "Terjadi kesalahan. Link mungkin kadaluarsa.";
                if (error.code === "auth/expired-action-code") errMsg = "Link sudah kadaluarsa.";
                msgBox.innerText = errMsg;
                msgBox.className = "error";
                btn.disabled = false;
                btn.innerText = "SIMPAN PASSWORD";
            }
        });
    </script>
</body>
</html>
