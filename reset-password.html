<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentikasi - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background: #2c2c2c; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; border-top: 5px solid #D4AF37; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; background: #333; color: white; outline: none; }
        input:focus { border-color: #D4AF37; }
        .btn { width: 100%; padding: 12px; background: #D4AF37; color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #fff; }
        #status-msg { margin-top: 15px; font-size: 14px; line-height: 1.5; }
        .loading-spinner { border: 4px solid #333; border-top: 4px solid #D4AF37; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h2 id="title" style="color: #D4AF37;">Memvalidasi...</h2>
        
        <div id="form-reset" style="display: none;">
            <p style="font-size: 14px; color: #ccc;">Masukkan password baru untuk akun Anda</p>
            <input type="password" id="pw1" placeholder="Password Baru (min. 6 karakter)">
            <input type="password" id="pw2" placeholder="Ulangi Password Baru">
            <button onclick="prosesReset()" class="btn">Perbarui Password</button>
        </div>

        <div id="loader" style="display: block;"><div class="loading-spinner"></div></div>
        <div id="status-msg">Menghubungkan ke server...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // CONFIG LENGKAP (WAJIB ADA appId & storageBucket)
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

        const auth = firebase.auth();
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode'); 
        const code = urlParams.get('oobCode');

        // Deteksi Otomatis Mode
        if (mode === 'resetPassword' && code) {
            auth.verifyPasswordResetCode(code).then((email) => {
                document.getElementById('loader').style.display = "none";
                document.getElementById('title').innerText = "Atur Password";
                document.getElementById('form-reset').style.display = "block";
                document.getElementById('status-msg').innerHTML = "Mereset akun:<br><b>" + email + "</b>";
            }).catch(e => {
                showError("Link reset tidak valid atau sudah kadaluwarsa.");
            });

        } else if (mode === 'verifyEmail' && code) {
            document.getElementById('title').innerText = "Verifikasi Email";
            auth.applyActionCode(code).then(() => {
                document.getElementById('loader').style.display = "none";
                document.getElementById('title').innerText = "Berhasil!";
                document.getElementById('status-msg').innerHTML = "<span style='color:#D4AF37'>Email berhasil dikonfirmasi.<br>Mengalihkan ke Login...</span>";
                setTimeout(() => { window.location.href = "index.html"; }, 3000);
            }).catch(e => {
                showError("Gagal verifikasi. Link mungkin sudah digunakan.");
            });

        } else {
            showError("Akses tidak sah. Gunakan link resmi dari email.");
        }

        function showError(msg) {
            document.getElementById('loader').style.display = "none";
            document.getElementById('title').innerText = "Gagal";
            document.getElementById('status-msg').innerHTML = `<span style='color:#ff4444'>${msg}</span>`;
        }

        function prosesReset() {
            const p1 = document.getElementById('pw1').value;
            const p2 = document.getElementById('pw2').value;

            if (p1.length < 6) {
                alert("Password minimal 6 karakter!");
                return;
            }
            if (p1 !== p2) {
                alert("Password tidak cocok!");
                return;
            }

            auth.confirmPasswordReset(code, p1).then(() => {
                alert("Password berhasil diubah! Silakan login kembali.");
                window.location.href = "index.html";
            }).catch(e => {
                alert("Gagal memperbarui password: " + e.message);
            });
        }
    </script>
</body>
</html>
