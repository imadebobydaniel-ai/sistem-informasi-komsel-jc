<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; width: 100%; max-width: 380px; box-sizing: border-box; }
        img { width: 80px; margin-bottom: 10px; }
        h2 { font-size: 20px; color: #333; margin-bottom: 5px; }
        p { font-size: 14px; color: #666; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 15px; }
        input:focus { border-color: #28a745; }
        .btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #d9534f; font-size: 13px; margin-top: 5px; display: none; background: #fbeeeef; padding: 8px; border-radius: 5px; }
        #loading-screen { display: block; }
        #form-content { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo_pondok.png" alt="Logo">
        
        <div id="loading-screen">
            <p>Memvalidasi tautan...</p>
        </div>

        <div id="form-content">
            <h2>Kata Sandi Baru</h2>
            <p>Silakan buat kata sandi baru untuk akun Anda.</p>
            
            <input type="password" id="pw1" placeholder="Buat Password Baru">
            <input type="password" id="pw2" placeholder="Ulangi Password Baru">
            <div id="pesan-error" class="error"></div>
            
            <button onclick="simpanPassword()" id="btnSimpan" class="btn">Simpan & Perbarui</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const code = new URLSearchParams(window.location.search).get('oobCode');

        // VALIDASI KODE SAAT HALAMAN DIBUKA
        window.onload = function() {
            if (!code) {
                document.getElementById('loading-screen').innerHTML = "<p style='color:red;'>Link tidak valid!</p>";
                return;
            }

            auth.verifyPasswordResetCode(code).then((email) => {
                // Link valid
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('form-content').style.display = "block";
                console.log("Mereset password untuk:", email);
            }).catch(e => {
                // Link kadaluwarsa atau sudah dipakai
                document.getElementById('loading-screen').innerHTML = 
                    `<p style='color:red;'><b>Sesi Habis / Link Kadaluwarsa</b><br>Silakan kirim ulang permintaan reset password dari aplikasi.</p>
                     <button onclick="window.location.href='index.html'" class='btn'>Kembali</button>`;
            });
        };

        function simpanPassword() {
            const p1 = document.getElementById('pw1').value;
            const p2 = document.getElementById('pw2').value;
            const err = document.getElementById('pesan-error');
            const btn = document.getElementById('btnSimpan');

            if (p1.length < 6) {
                err.innerText = "Password minimal 6 karakter!";
                err.style.display = "block";
                return;
            }
            if (p1 !== p2) {
                err.innerText = "Konfirmasi password tidak cocok!";
                err.style.display = "block";
                return;
            }

            err.style.display = "none";
            btn.disabled = true;
            btn.innerText = "Memproses...";

            auth.confirmPasswordReset(code, p1).then(() => {
                alert("Berhasil! Silakan login dengan password baru Anda.");
                window.location.href = "index.html"; // Arahkan ke halaman login utama
            }).catch(e => {
                btn.disabled = false;
                btn.innerText = "Simpan Password";
                alert("Gagal memperbarui: " + e.message);
            });
        }
    </script>
</body>
</html>
