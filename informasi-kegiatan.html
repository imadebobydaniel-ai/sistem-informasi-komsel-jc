<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Pengumuman - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --biru-tua: #003366;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--biru-tua); margin-bottom: 10px; font-size: 24px; }
        #kategori-tag { background: var(--emas-lux); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        #isi-pengumuman-full { margin-top: 25px; line-height: 1.8; color: #444; white-space: pre-wrap; font-size: 16px; }
        .btn-back { display: inline-block; margin-top: 30px; text-decoration: none; color: var(--biru-tua); font-weight: bold; border: 2px solid var(--biru-tua); padding: 10px 20px; border-radius: 8px; transition: 0.3s; }
        .btn-back:hover { background: var(--biru-tua); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <span id="kategori-tag">Memuat...</span>
        <h1 id="judul-pengumuman">Sedang Memuat Judul...</h1>
        <hr>
        <p id="isi-pengumuman-full">Memuat isi pengumuman surgawi...</p>
        
        <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>
    </div>

    <script>
        // 1. CONFIG FIREBASE (Gunakan Config dari Project Settings kamu)
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore(); // Menggunakan Firestore

        // 2. AMBIL ID DARI URL
        const urlParams = new URLSearchParams(window.location.search);
        const pesanId = urlParams.get('id');

        if (pesanId) {
            // Ambil data spesifik dari koleksi 'pengumuman_komsel'
            db.collection("pengumuman_komsel").doc(pesanId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('judul-pengumuman').innerText = data.judul || "Tanpa Judul";
                    document.getElementById('isi-pengumuman-full').innerText = data.detail || "Tidak ada detail.";
                    document.getElementById('kategori-tag').innerText = data.kategori || "Umum";
                } else {
                    document.getElementById('isi-pengumuman-full').innerText = "Maaf, pengumuman tidak ditemukan.";
                }
            }).catch((error) => {
                console.error("Error:", error);
                document.getElementById('isi-pengumuman-full').innerText = "Gagal memuat data dari server.";
            });
        } else {
            document.getElementById('isi-pengumuman-full').innerText = "Pesan tidak valid. Silakan kembali ke menu utama.";
        }
    </script>
</body>
</html>
