<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Informasi Kegiatan - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root { --primary: #007bff; --dark: #333; --light: #f4f7f6; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: var(--dark); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .progress-container { display: none; width: 100%; background: #e0e0e0; border-radius: 8px; margin: 15px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 12px; background: var(--success); transition: width 0.3s; }
        .progress-text { font-size: 12px; text-align: center; margin-top: 5px; font-weight: bold; }

        .btn-send { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Log Table Style */
        .log-section { margin-top: 40px; border-top: 2px solid #eee; pt: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .btn-edit { color: var(--primary); cursor: pointer; margin-right: 10px; border: none; background: none; }
        .btn-delete { color: var(--danger); cursor: pointer; border: none; background: none; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-bullhorn"></i> Kirim Informasi Kegiatan</h2>
    
    <input type="hidden" id="editId">
    <div class="form-group">
        <label>Judul Pengumuman</label>
        <input type="text" id="judul" placeholder="Judul...">
    </div>

    <div class="form-group">
        <label>Kategori</label>
        <select id="kategori">
            <option value="Penting">Penting</option>
            <option value="Kegiatan">Kegiatan</option>
            <option value="Umum">Umum</option>
        </select>
    </div>

    <div class="form-group">
        <label>Target</label>
        <select id="targetJC">
            <option value="Semua JC">Semua JC</option>
            <option value="JC1">JC 1</option>
            <option value="JC2">JC 2</option>
            <option value="JC3">JC 3</option>
            <option value="JC4">JC 4</option>
            <option value="JC5">JC 5</option>
        </select>
    </div>

    <div class="form-group">
        <label>Isi Detail</label>
        <textarea id="detail"></textarea>
    </div>

    <div id="progressArea" class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
        <div id="progressText" class="progress-text">0%</div>
    </div>

    <button id="btnSubmit" class="btn-send" onclick="handleSimpan()">
        <i class="fas fa-paper-plane"></i> Publikasikan Sekarang
    </button>

    <div class="log-section">
        <h3><i class="fas fa-history"></i> Log Pengiriman</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Judul</th>
                        <th>Target</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Konfigurasi Firebase (Gunakan milik Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. TAMPILKAN LOG SECARA REAL-TIME
    db.collection("pengumuman_komsel").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString('id-ID') : '-';
            
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td><b>${data.judul}</b></td>
                    <td><span class="badge" style="background:#6c757d">${data.target}</span></td>
                    <td>
                        <button class="btn-edit" onclick="isiFormEdit('${doc.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="hapusLog('${doc.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    });

    // 2. FUNGSI SIMPAN (TAMBAH / EDIT)
    async function handleSimpan() {
        const id = document.getElementById('editId').value;
        const btn = document.getElementById('btnSubmit');
        const data = {
            judul: document.getElementById('judul').value,
            kategori: document.getElementById('kategori').value,
            detail: document.getElementById('detail').value,
            target: document.getElementById('targetJC').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp() // Tanggal Otomatis
        };

        if(!data.judul || !data.detail) return alert("Isi semua field!");

        btn.disabled = true;
        try {
            if(id) {
                await db.collection("pengumuman_komsel").doc(id).update(data);
                alert("Data diperbarui!");
            } else {
                await db.collection("pengumuman_komsel").add(data);
                alert("Data berhasil dikirim!");
            }
            resetForm();
        } catch (e) { alert("Gagal: " + e.message); }
        btn.disabled = false;
    }

    // 3. FUNGSI EDIT (ISI BALIK KE FORM)
    async function isiFormEdit(id) {
        const doc = await db.collection("pengumuman_komsel").doc(id).get();
        const data = doc.data();
        document.getElementById('editId').value = id;
        document.getElementById('judul').value = data.judul;
        document.getElementById('kategori').value = data.kategori;
        document.getElementById('detail').value = data.detail;
        document.getElementById('targetJC').value = data.target;
        document.getElementById('btnSubmit').innerHTML = "<i class='fas fa-save'></i> Simpan Perubahan";
        window.scrollTo(0,0);
    }

    // 4. FUNGSI HAPUS
    async function hapusLog(id) {
        if(confirm("Hapus informasi ini?")) {
            await db.collection("pengumuman_komsel").doc(id).delete();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('judul').value = "";
        document.getElementById('detail').value = "";
        document.getElementById('btnSubmit').innerHTML = "<i class='fas fa-paper-plane'></i> Publikasikan Sekarang";
    }
</script>
</body>
</html>
