<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor Anda - Lengkap</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; padding: 20px; }
        .dashboard-container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { padding: 15px; border-radius: 12px; color: white; text-align: center; }
        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .bg-sangat-kurang { background: #ff0000 !important; color: white; }
        .bg-kurang { background: #ed7d31 !important; color: white; }
        .bg-cukup { background: #548235 !important; color: white; }
        .bg-sangat-baik { background: #00FF00 !important; color: black !important; }
        .excel-table-container { overflow-x: auto; margin-top: 20px; border-top: 3px solid #000; padding-top: 20px; }
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; color: #000; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 6px; text-align: center; }
        .excel-table th { background: #f2f2f2; text-transform: uppercase; }
        .col-nama { text-align: left; padding-left: 10px; font-weight: bold; }
        .col-komsel { background-color: #f4cccc; font-weight: bold; width: 80px; }
        .separator { background-color: #000; color: #000; height: 12px !important; }
        .separator td { border: none; }
        @media (max-width: 768px) { .chart-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h2 style="text-align:center; margin-bottom:0;">REKAPITULASI CAPAIAN PRIBADI</h2>
    <p id="label-user" style="text-align:center; color:#666; margin-top:5px;">Memuat data personal...</p>

    <div class="header-stats" id="cards-container"></div>

    <div class="chart-section">
        <div>
            <h3 style="font-size:14px; text-align:center;">Proporsi Keaktifan</h3>
            <canvas id="pieChart"></canvas>
        </div>
        <div>
            <h3 style="font-size:14px; text-align:center;">Perbandingan Capaian (%)</h3>
            <canvas id="barChart"></canvas>
        </div>
    </div>

    <div class="excel-table-container">
        <h3 style="text-align:left; font-size:16px; margin-bottom:10px;">TABEL RINCI (FORMAT REKAPITULASI)</h3>
        <table class="excel-table">
            <thead>
                <tr>
                    <th rowspan="2">NO</th>
                    <th rowspan="2">KOMSEL</th>
                    <th rowspan="2">NAMA</th>
                    <th colspan="4">JUMLAH (%)</th>
                    <th rowspan="2">KETERANGAN</th>
                </tr>
                <tr>
                    <th>PEMBACAAN FT</th>
                    <th>KEHADIRAN DOA</th>
                    <th>KEHADIRAN KOMSEL</th>
                    <th>IBADAH RAYA</th>
                </tr>
            </thead>
            <tbody id="excel-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // --- ISI DENGAN CONFIG FIREBASE ANDA ---
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        databaseURL: "https://your-db-name.firebaseio.com",
        projectId: "your-project-id",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    function getKategori(val) {
        if (val === "" || val === null || val === undefined) return { label: '', class: '' };
        if (val < 50) return { label: 'SANGAT KURANG', class: 'bg-sangat-kurang' };
        if (val < 80) return { label: 'KURANG', class: 'bg-kurang' };
        if (val < 95) return { label: 'CUKUP', class: 'bg-cukup' };
        return { label: 'SANGAT BAIK', class: 'bg-sangat-baik' };
    }

    // FOKUS: Otomatis ambil UID dari sesi login yang sudah ada
    auth.onAuthStateChanged(user => {
        if (user) {
            // Ambil data dari folder 'statistik_rapor' yang nama foldernya = UID user tersebut
            db.ref('statistik_rapor/' + user.uid).on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    renderData(data);
                } else {
                    document.getElementById('label-user').innerText = "Data rapor belum diinput oleh Admin.";
                }
            });
        } else {
            // Jika tidak ada sesi, lempar balik ke index
            window.location.href = "index.html";
        }
    });

    function renderData(data) {
        document.getElementById('label-user').innerText = "Pemilik Rapor: " + data.nama + " | Periode: Maret 2026";
        
        const dataPribadi = {
            "Pembacaan FT": data.ft || 0,
            "Kehadiran Doa": data.doa || 0,
            "Kehadiran Komsel": data.ks || 0,
            "Ibadah Raya": data.ir || 0,
            "Komsel Gabungan": data.gabungan || 0,
            "Kegiatan KD": data.kd || 0,
            "Latihan": data.latihan || 0,
            "Pelayanan": data.pelayanan || 0
        };

        // Render Kartu
        const cardsCont = document.getElementById('cards-container');
        cardsCont.innerHTML = "";
        Object.keys(dataPribadi).forEach(key => {
            const val = dataPribadi[key];
            const kat = getKategori(val);
            cardsCont.innerHTML += `
                <div class="stat-card ${kat.class}">
                    <div style="font-size:11px; opacity:0.9;">${key}</div>
                    <div style="font-size:22px; font-weight:bold;">${val}%</div>
                </div>`;
        });

        // Render Tabel (Hanya menampilkan baris user ini sendiri)
        const excelTable = document.getElementById('excel-table-body');
        excelTable.innerHTML = `
            <tr>
                <td>1</td>
                <td class="col-komsel">${data.komsel || '-'}</td>
                <td class="col-nama">${data.nama}</td>
                <td class="${getKategori(data.ft).class}">${data.ft || 0}%</td>
                <td class="${getKategori(data.doa).class}">${data.doa || 0}%</td>
                <td class="${getKategori(data.ks).class}">${data.ks || 0}%</td>
                <td class="${getKategori(data.ir).class}">${data.ir || 0}%</td>
                <td>Verified</td>
            </tr>
            <tr class="separator"><td colspan="8"></td></tr>
        `;

        // Update Charts
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: Object.keys(dataPribadi),
                datasets: [{ data: Object.values(dataPribadi), backgroundColor: ['#2ecc71','#e74c3c','#f1c40f','#3498db','#9b59b6','#e67e22','#1abc9c','#34495e'] }]
            }
        });

        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(dataPribadi),
                datasets: [{ label: 'Capaian (%)', data: Object.values(dataPribadi), backgroundColor: '#548235' }]
            },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }
</script>
</body>
</html>
