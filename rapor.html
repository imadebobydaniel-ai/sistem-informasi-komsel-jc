<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPAPUA - Login & Laporan</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --emas:#D4AF37; }

body {
    font-family: Arial;
    background:#1a1a1a;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    flex-direction:column;
}

/* SPLASH */
#splash {
    position:fixed;
    width:100%; height:100%;
    background:#2c2c2c;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    color:var(--emas);
    font-size:30px;
}

/* CARD */
.card {
    background:#fff;
    padding:25px;
    border-radius:12px;
    width:350px;
    margin:10px;
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}
th, td {
    padding:8px;
    border:1px solid #ddd;
    text-align:center;
}
th {
    background:#007bff;
    color:white;
}
</style>
</head>

<body>

<div id="splash">SIPAPUA</div>

<!-- LOGIN -->
<div class="card">
    <h3>Login Jemaat</h3>

    <div id="msg"></div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">MASUK</button>
    <button onclick="resetPass()">Lupa Password</button>
</div>

<!-- LAPORAN -->
<div class="card">
    <h3>Laporan Jemaat</h3>

    <table>
        <tr>
            <th>Kegiatan</th>
            <th>Jumlah</th>
            <th>Persen</th>
        </tr>

        <tr>
            <td>Pembacaan FT</td>
            <td id="ft">0</td>
            <td id="ftp">0%</td>
        </tr>

        <tr>
            <td>Kehadiran Doa</td>
            <td id="doa">0</td>
            <td id="doap">0%</td>
        </tr>

        <tr>
            <td>Komsel</td>
            <td id="komsel">0</td>
            <td id="komselp">0%</td>
        </tr>

        <tr>
            <td>Ibadah</td>
            <td id="ibadah">0</td>
            <td id="ibadahp">0%</td>
        </tr>
    </table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// CONFIG
const config = {
    apiKey: "API_KEY_KAMU",
    authDomain: "PROJECT.firebaseapp.com",
    databaseURL: "https://PROJECT-default-rtdb.firebaseio.com",
    projectId: "PROJECT",
};

firebase.initializeApp(config);

const auth = firebase.auth();
const db = firebase.database();

// SPLASH
setTimeout(()=> document.getElementById("splash").style.display="none",2000);

// LOGIN
async function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;

    try{
        let res = await auth.signInWithEmailAndPassword(email,pass);
        fetchData(res.user.uid);
    }catch(e){
        alert("Login gagal");
    }
}

// RESET PASSWORD
function resetPass(){
    let email = prompt("Masukkan email:");
    if(!email) return;

    auth.sendPasswordResetEmail(email)
    .then(()=> alert("Email reset dikirim"))
    .catch(()=> alert("Gagal"));
}

// AMBIL DATA REALTIME
function fetchData(uid){
    db.ref("users/"+uid+"/statistik")
    .on("value", snap=>{
        let d = snap.val() || {};

        render(d);
    });
}

// HITUNG %
function persen(n,t=5){
    return ((n/t)*100).toFixed(1);
}

// WARNA
function warna(p){
    if(p>=80) return "green";
    if(p>=50) return "orange";
    return "red";
}

// RENDER
function render(s){
    isi("ft","ftp",s["Pembacaan FT"]||0);
    isi("doa","doap",s["Kehadiran Doa"]||0);
    isi("komsel","komselp",s["Kehadiran Komsel"]||0);
    isi("ibadah","ibadahp",s["Ibadah Raya"]||0);
}

function isi(id,idp,val){
    let p = persen(val);

    document.getElementById(id).innerText = val;

    let el = document.getElementById(idp);
    el.innerText = p+"%";
    el.style.color = warna(p);
}
</script>

</body>
</html>
