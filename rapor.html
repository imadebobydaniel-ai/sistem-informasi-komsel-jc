<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor-Anda</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; padding: 20px; }
        .dashboard-container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { padding: 20px; border-radius: 15px; color: white; text-align: center; }
        
        /* Pewarnaan Berdasarkan Bobot */
        .bg-sangat-kurang { background: #ff0000; } /* < 50% */
        .bg-kurang { background: #ed7d31; }        /* 50-79% */
        .bg-cukup { background: #548235; }         /* 80-94% */
        .bg-sangat-baik { background: #00FF00; color: black !important; } /* 95-100% */

        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        @media (max-width: 768px) { .chart-section { grid-template-columns: 1fr; } }

        .table-container { overflow-x: auto; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h2 style="text-align:center;">REKAPITULASI CAPAIAN PRIBADI</h2>
    <p style="text-align:center; color:#666;">Periode: Maret 2026</p>

    <div class="header-stats" id="cards-container">
        </div>

    <div class="chart-section">
        <div>
            <h3 style="font-size:16px; text-align:center;">Proporsi Keaktifan (Pie Chart)</h3>
            <canvas id="pieChart"></canvas>
        </div>
        <div>
            <h3 style="font-size:16px; text-align:center;">Perbandingan Capaian (Bar Chart)</h3>
            <canvas id="barChart"></canvas>
        </div>
    </div>

    <div class="table-container">
        <h3 style="font-size:16px;">Tabel Rapor Rinci</h3>
        <table id="data-table">
            <thead>
                <tr>
                    <th>KEGIATAN</th>
                    <th>CAPAIAN (%)</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Data Simulasi (Nantinya ditarik dari Firebase statistik_rapor)
    const dataRapor = {
        "Pembacaan FT": 97,
        "Kehadiran Doa": 40,
        "Kehadiran Komsel": 75,
        "Ibadah Raya": 100,
        "Komsel Gabungan": 85,
        "Kegiatan KD": 60,
        "Latihan": 30,
        "Pelayanan": 95
    };

    function getKategori(val) {
        if (val < 50) return { label: 'SANGAT KURANG', class: 'bg-sangat-kurang' };
        if (val < 80) return { label: 'KURANG', class: 'bg-kurang' };
        if (val < 95) return { label: 'CUKUP', class: 'bg-cukup' };
        return { label: 'SANGAT BAIK', class: 'bg-sangat-baik' };
    }

    function renderUI() {
        const cardsCont = document.getElementById('cards-container');
        const tableBody = document.getElementById('table-body');
        const labels = Object.keys(dataRapor);
        const values = Object.values(dataRapor);

        labels.forEach(key => {
            const val = dataRapor[key];
            const kat = getKategori(val);

            // Render Kartu
            cardsCont.innerHTML += `
                <div class="stat-card ${kat.class}">
                    <div style="font-size:12px; opacity:0.8;">${key}</div>
                    <div style="font-size:24px; font-weight:bold;">${val}%</div>
                    <div style="font-size:10px; margin-top:5px; font-weight:bold;">${kat.label}</div>
                </div>
            `;

            // Render Tabel
            tableBody.innerHTML += `
                <tr>
                    <td>${key}</td>
                    <td style="font-weight:bold;">${val}%</td>
                    <td class="${kat.class}" style="color:${val >= 95 ? 'black' : 'white'}">${kat.label}</td>
                </tr>
            `;
        });

        // Diagram Lingkaran (Pie Chart)
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#2ecc71', '#e74c3c', '#f1c40f', '#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#34495e']
                }]
            }
        });

        // Diagram Batang (Bar Chart)
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Persentase Capaian (%)',
                    data: values,
                    backgroundColor: values.map(v => v < 50 ? '#ff0000' : '#548235')
                }]
            },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    window.onload = renderUI;
</script>
</body>
</html>
