<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Informasi Rapor Jemaat</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .main-card { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Filter Periode */
        .filter-box { text-align: center; margin-bottom: 25px; padding: 15px; background: #e9ecef; border-radius: 10px; }
        select { padding: 10px; font-weight: bold; border-radius: 5px; width: 250px; }

        /* Grid Kartu Indikator */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { padding: 15px; border-radius: 12px; color: white; text-align: center; font-weight: bold; }
        
        /* Warna Standar Anda */
        .merah { background: #ff0000; }        /* < 50% */
        .oranye { background: #ed7d31; }       /* 50-79% */
        .hijau-tua { background: #548235; }    /* 80-94% */
        .hijau-terang { background: #00FF00; color: black; } /* 95-100% */

        /* Tabel Rincian Poin */
        .table-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        th { background: #f8f9fa; text-transform: uppercase; }
        .col-nama { text-align: left; background: #fcfcfc; }
    </style>
</head>
<body>

<div class="main-card">
    <h2 style="text-align:center;">REKAPITULASI CAPAIAN PRIBADI</h2>
    
    <div class="filter-box">
        <label>LIHAT LAPORAN BULAN: </label>
        <select id="bulanFilter" onchange="loadData()">
            <option value="0">Maret 2026 (Bulan Ini)</option>
            <option value="1">Februari 2026</option>
            <option value="2">Januari 2026</option>
            <option value="3">Desember 2025</option>
            <option value="4">November 2025</option>
            <option value="5">Oktober 2025</option>
        </select>
    </div>

    <div class="stats-grid" id="statsGrid">
        </div>

    <div style="display: flex; gap: 20px; margin-bottom: 40px;">
        <div style="flex: 1;"><canvas id="pieChart"></canvas></div>
        <div style="flex: 1;"><canvas id="barChart"></canvas></div>
    </div>

    <div class="table-section">
        <h3 style="border-left: 5px solid #003366; padding-left: 10px;">TABEL RINCIAN POIN NILAI</h3>
        <table>
            <thead>
                <tr>
                    <th>KOMSEL</th>
                    <th>NAMA USER</th>
                    <th>PEMBACAAN FT</th>
                    <th>DOA</th>
                    <th>KOMSEL</th>
                    <th>IBADAH RAYA</th>
                    <th>TOTAL</th>
                    <th>KETERANGAN</th>
                </tr>
            </thead>
            <tbody id="tabelPoin">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Logika penentuan warna berdasarkan instruksi Anda
    function getColorClass(val) {
        if (val < 50) return 'merah';
        if (val < 80) return 'oranye';
        if (val < 95) return 'hijau-tua';
        return 'hijau-terang';
    }

    function loadData() {
        // Simulasi data dari database berdasarkan bulan yang dipilih
        const data = {
            ft: 97, doa: 40, komsel: 75, raya: 100,
            nama: "Nama User", komsel_nama: "AGAPE 2"
        };

        // Render Kartu Atas
        const grid = document.getElementById('statsGrid');
        grid.innerHTML = `
            <div class="card ${getColorClass(data.ft)}">FT: ${data.ft}%</div>
            <div class="card ${getColorClass(data.doa)}">DOA: ${data.doa}%</div>
            <div class="card ${getColorClass(data.komsel)}">KOMSEL: ${data.komsel}%</div>
            <div class="card ${getColorClass(data.raya)}">RAYA: ${data.raya}%</div>
        `;

        // Render Tabel Poin Bawah (Sesuai Permintaan Anda)
        const tabel = document.getElementById('tabelPoin');
        const avg = (data.ft + data.doa + data.komsel + data.raya) / 4;
        tabel.innerHTML = `
            <tr>
                <td>${data.komsel_nama}</td>
                <td class="col-nama">${data.nama}</td>
                <td class="${getColorClass(data.ft)}">${data.ft}%</td>
                <td class="${getColorClass(data.doa)}">${data.doa}%</td>
                <td class="${getColorClass(data.komsel)}">${data.komsel}%</td>
                <td class="${getColorClass(data.raya)}">${data.raya}%</td>
                <td>${avg}%</td>
                <td class="${getColorClass(avg)}">REVIEW</td>
            </tr>
        `;
        
        // Update Chart... (Logika Chart.js sama seperti sebelumnya)
    }

    window.onload = loadData;
</script>
</body>
</html>
