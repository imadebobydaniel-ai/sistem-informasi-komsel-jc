<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor Anda - Lengkap</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; padding: 20px; display: none; } /* Sembunyikan body sampai auth dicek */
        .dashboard-container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .excel-table-container { overflow-x: auto; margin-bottom: 40px; border-top: 3px solid #000; padding-top: 20px; }
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; color: #000; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 6px; text-align: center; }
        .excel-table th { background: #f2f2f2; text-transform: uppercase; }
        .col-nama { text-align: left; padding-left: 10px; font-weight: bold; }
        .col-komsel { background-color: #f4cccc; font-weight: bold; width: 80px; }
        .separator { background-color: #000; color: #000; height: 12px !important; }
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { padding: 15px; border-radius: 12px; color: white; text-align: center; }
        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .bg-sangat-kurang { background: #ff0000 !important; color: white; }
        .bg-kurang { background: #ed7d31 !important; color: white; }
        .bg-cukup { background: #548235 !important; color: white; }
        .bg-sangat-baik { background: #00FF00 !important; color: black !important; }
        @media (max-width: 768px) { .chart-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h2 style="text-align:center; margin-bottom:0;">RAPOR ANDA</h2>
    <p id="user-info" style="text-align:center; color:#666; margin-top:5px; margin-bottom: 30px;">Memuat Data...</p>

    <div class="excel-table-container">
        <h3 style="text-align:left; font-size:16px; margin-bottom:10px;">TABEL RINCIAN</h3>
        <table class="excel-table">
            <thead>
                <tr>
                    <th rowspan="2">NO</th>
                    <th rowspan="2">KOMSEL</th>
                    <th rowspan="2">NAMA</th>
                    <th colspan="4">CAPAIAN (%)</th>
                    <th rowspan="2">KETERANGAN</th>
                </tr>
                <tr>
                     <th>LAPORAN ALKITAB</th>

                    <th>LAPORAN IBADAH RAYA</th>

                    <th>LAPORAN KOMSEL</th>

                    <th>LAPORAN KOMSEL GABUNGAN</th>

                    <th>LAPORAN PERTEMUAN PEMIMPIN</th>

                    <th>LAPORAN KEGIATAN KD</th>

                    <th>LAPORAN LATIHAN</th>

                    <th>LAPORAN PELAYANAN</th>

                    <th>LAPORAN DOA</th>
                </tr>
            </thead>
            <tbody id="excel-table-body"></tbody>
        </table>
    </div>

    <div class="header-stats" id="cards-container"></div>

    <div class="chart-section">
        <canvas id="pieChart"></canvas>
        <canvas id="barChart"></canvas>
    </div>
</div>

<script>
    // 1. KONFIGURASI FIREBASE (Ganti dengan config Anda)
    const firebaseConfig = {
        apiKey: "AIza...",
        authDomain: "project-id.firebaseapp.com",
        databaseURL: "https://project-id.firebaseio.com",
        projectId: "project-id",
        storageBucket: "project-id.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // 2. PROTEKSI HALAMAN & PENGAMBILAN DATA
    auth.onAuthStateChanged(user => {
        if (user) {
            // User login, tampilkan halaman dan ambil data miliknya
            document.body.style.display = "block";
            document.getElementById('user-info').innerText = `Pemilik Rapor: ${user.email} | Periode: Maret 2026`;
            
            // PENTING: Ambil data spesifik berdasarkan UID user agar tidak crossing
            loadUserReportData(user.uid);
        } else {
            // Jika tidak login, tendang ke halaman login
            window.location.href = "login.html";
        }
    });

    function getKategori(val) {
        if (val === "" || val === null || isNaN(val)) return { label: '-', class: '' };
        if (val < 50) return { label: 'SANGAT KURANG', class: 'bg-sangat-kurang' };
        if (val < 80) return { label: 'KURANG', class: 'bg-kurang' };
        if (val < 95) return { label: 'CUKUP', class: 'bg-cukup' };
        return { label: 'SANGAT BAIK', class: 'bg-sangat-baik' };
    }

    function loadUserReportData(uid) {
        // Path database disesuaikan agar hanya membaca node milik UID login
        db.ref('statistik_rapor/' + uid).on('value', snapshot => {
            const data = snapshot.val();
            if(data) {
                renderUI(data);
            } else {
                alert("Data rapor Anda belum tersedia.");
            }
        });
    }

    function renderUI(data) {
        const cardsCont = document.getElementById('cards-container');
        const excelTable = document.getElementById('excel-table-body');
        
        // Bersihkan kontainer sebelum render
        cardsCont.innerHTML = "";
        excelTable.innerHTML = "";

        // Contoh mapping data dari Firebase ke Tabel (Sesuaikan key database Anda)
        // Misal data dari Firebase: { nama: "User", komsel: "Agape", ft: 90, doa: 80 ... }
        const cFT = getKategori(data.ft);
        const cDoa = getKategori(data.doa);
        const cKS = getKategori(data.ks);
        const cIR = getKategori(data.ir);

        excelTable.innerHTML = `
            <tr>
                <td>1</td>
                <td class="col-komsel">${data.komsel || '-'}</td>
                <td class="col-nama">${data.nama || 'User'}</td>
                <td class="${cFT.class}">${data.ft || 0}%</td>
                <td class="${cDoa.class}">${data.doa || 0}%</td>
                <td class="${cKS.class}">${data.ks || 0}%</td>
                <td class="${cIR.class}">${data.ir || 0}%</td>
                <td>Pribadi</td>
            </tr>
            <tr class="separator"><td colspan="8"></td></tr>
        `;

        // Render Kartu Statistik
        const stats = { "Alkitab": data.ft, "Doa": data.doa, "Komsel": data.ks, "Ibadah": data.ir };
        Object.keys(stats).forEach(key => {
            const val = stats[key] || 0;
            const kat = getKategori(val);
            cardsCont.innerHTML += `
                <div class="stat-card ${kat.class}">
                    <div style="font-size:11px; opacity:0.9;">${key}</div>
                    <div style="font-size:22px; font-weight:bold;">${val}%</div>
                </div>`;
        });

        // --- RENDER CHARTS --- (Script Chart.js Anda tetap sama)
        // ... (Logika Chart.js menggunakan data dari Firebase)
    }
</script>
</body>
</html>
