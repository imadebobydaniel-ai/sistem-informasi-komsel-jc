<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --danger-color: #dc2626;
            --bg-color: #f1f5f9;
            --text-dark: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            padding: 10px; 
            display: flex;
            justify-content: center;
        }

        .contact-container { 
            width: 100%;
            max-width: 480px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            overflow: hidden;
            min-height: 90vh;
        }

        /* Header & Search Bar */
        .contact-header { 
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .contact-header h3 { 
            margin: 0 0 15px 0; 
            color: var(--text-dark);
            font-size: 1.25rem;
        }

        .search-bar { 
            position: relative; 
        }

        .search-icon { 
            position: absolute; 
            left: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #94a3b8; 
        }

        .search-bar input { 
            width: 100%; 
            padding: 12px 12px 12px 40px; 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--primary-color);
        }

        /* Action Bar */
        .action-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 20px; 
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .check-all-label {
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-delete { 
            background: var(--danger-color); 
            color: white; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: none; 
            font-size: 13px;
            font-weight: 500;
        }

        /* Contact List */
        .contact-list {
            padding: 0;
        }

        .contact-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 20px; 
            border-bottom: 1px solid #f1f5f9; 
            transition: 0.2s; 
        }

        .contact-item:hover { background: #f8fafc; }

        .contact-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .profile-img { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin: 0 15px; 
            background: #e2e8f0; 
        }

        .contact-info { flex-grow: 1; }

        .contact-name { 
            font-weight: 600; 
            color: var(--text-dark); 
            font-size: 15px;
        }

        .edit-icon { 
            color: var(--primary-color); 
            cursor: pointer; 
            padding: 8px;
            font-size: 18px;
        }

        /* Modal Edit */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }

        .modal-content { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            width: 85%; 
            max-width: 350px; 
        }

        .modal-content h4 { margin-top: 0; }

        .modal-content input { 
            width: 100%; 
            padding: 10px; 
            margin: 15px 0; 
            box-sizing: border-box; 
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }

        .modal-actions { 
            display: flex; 
            justify-content: flex-end; 
            gap: 10px; 
        }

        .btn-cancel { background: #e2e8f0; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-save { background: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="contact-header">
            <h3>Daftar Kontak</h3>
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Cari nama kontak...">
            </div>
        </div>

        <div class="action-bar">
            <label class="check-all-label">
                <input type="checkbox" id="checkAll"> Pilih Semua
            </label>
            <div class="action-buttons">
                <button id="deleteSelected" class="btn-delete" onclick="deleteChecked()">
                    <i class="fas fa-trash"></i> Hapus
                </button>
            </div>
        </div>

        <div id="contactList" class="contact-list">
            </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h4>Edit Kontak</h4>
            <input type="hidden" id="editId">
            <label style="font-size: 12px; color: #64748b;">Nama Kontak</label>
            <input type="text" id="editName" placeholder="Masukkan nama baru">
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-cancel">Batal</button>
                <button onclick="saveEdit()" class="btn-save">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        // Data Simulasi (Nanti data ini datang dari proses scanning/koneksi)
        let contacts = [
            { id: 101, name: "Boby Creative", photo: "https://ui-avatars.com/api/?name=Boby+Creative&background=0D8ABC&color=fff" },
            { id: 102, name: "Admin Pondok", photo: "https://ui-avatars.com/api/?name=Admin+Pondok&background=2563eb&color=fff" },
            { id: 103, name: "User Papua", photo: "https://ui-avatars.com/api/?name=User+Papua&background=059669&color=fff" }
        ];

        const contactList = document.getElementById('contactList');
        const searchInput = document.getElementById('searchInput');
        const checkAll = document.getElementById('checkAll');
        const deleteBtn = document.getElementById('deleteSelected');

        // Fungsi Render List
        function renderContacts(data) {
            contactList.innerHTML = '';
            if (data.length === 0) {
                contactList.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:20px;">Tidak ada kontak ditemukan.</p>';
                return;
            }

            data.forEach(c => {
                contactList.innerHTML += `
                    <div class="contact-item">
                        <input type="checkbox" class="contact-checkbox" data-id="${c.id}">
                        <img src="${c.photo}" alt="Profile" class="profile-img">
                        <div class="contact-info">
                            <div class="contact-name">${c.name}</div>
                        </div>
                        <i class="fas fa-edit edit-icon" title="Edit" onclick="openEdit(${c.id}, '${c.name}')"></i>
                    </div>
                `;
            });
            setupCheckboxListeners();
        }

        // Filter Pencarian
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = contacts.filter(c => c.name.toLowerCase().includes(term));
            renderContacts(filtered);
        });

        // Pilih Semua
        checkAll.addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.contact-checkbox');
            checkboxes.forEach(cb => cb.checked = e.target.checked);
            toggleDeleteBtn();
        });

        function setupCheckboxListeners() {
            document.querySelectorAll('.contact-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    toggleDeleteBtn();
                    // Jika satu uncheck, CheckAll juga uncheck
                    if (!cb.checked) checkAll.checked = false;
                });
            });
        }

        function toggleDeleteBtn() {
            const checkedCount = document.querySelectorAll('.contact-checkbox:checked').length;
            deleteBtn.style.display = checkedCount > 0 ? 'block' : 'none';
        }

        // Fungsi Hapus Kontak Terpilih
        function deleteChecked() {
            if (confirm('Hapus kontak yang dipilih?')) {
                const checkedIds = Array.from(document.querySelectorAll('.contact-checkbox:checked'))
                                       .map(cb => parseInt(cb.getAttribute('data-id')));
                
                contacts = contacts.filter(c => !checkedIds.includes(c.id));
                checkAll.checked = false;
                toggleDeleteBtn();
                renderContacts(contacts);
            }
        }

        // Logika Modal Edit
        function openEdit(id, name) {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveEdit() {
            const id = document.getElementById('editId').value;
            const newName = document.getElementById('editName').value;
            
            const index = contacts.findIndex(c => c.id == id);
            if (index !== -1 && newName.trim() !== "") {
                contacts[index].name = newName;
                renderContacts(contacts);
                closeModal();
            }
        }

        // Jalankan saat pertama kali buka
        renderContacts(contacts);
    </script>
</body>
</html>
