<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacak Domba - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --emas: #D4AF37;
            --putih: #f4f7fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--putih); margin: 0; padding: 0; }
        
        .header { background: var(--biru-tua); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--emas); }
        .btn-back { position: absolute; left: 15px; top: 15px; color: white; text-decoration: none; font-size: 18px; }
        
        .container { padding: 15px; }
        
        /* List Anggota */
        .card-lacak {
            background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 5px solid var(--biru-tua);
        }
        .info-nama { font-weight: 800; color: var(--biru-tua); font-size: 16px; margin-bottom: 5px; }
        .info-detail { font-size: 12px; color: #666; margin-bottom: 10px; }
        
        /* Tampilan Peta */
        .map-container {
            width: 100%; height: 200px; border-radius: 10px; overflow: hidden;
            background: #ddd; position: relative; border: 1px solid #ccc;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .status-online { color: #2ecc71; font-weight: bold; font-size: 11px; }
        .loading-text { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>

    <div class="header">
        <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <h3 style="margin:0;">LOKASI LIVE ANGGOTA</h3>
    </div>

    <div class="container" id="list-lacak">
        <div class="loading-text">Mencari data lokasi anggota...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
            authDomain: "boby-apps-project.firebaseapp.com", 
            projectId: "boby-apps-project", 
            storageBucket: "boby-apps-project.appspot.com", 
            messagingSenderId: "125984859692", 
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function renderLacak() {
            // Mengambil data dari koleksi live_tracking yang dibuat di menu.html
            db.collection("live_tracking").onSnapshot((querySnapshot) => {
                const listContainer = document.getElementById('list-lacak');
                listContainer.innerHTML = "";

                if (querySnapshot.empty) {
                    listContainer.innerHTML = "<div class='loading-text'>Belum ada anggota yang online.</div>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const lat = data.lat;
                    const lng = data.lng;
                    const nama = data.nama;
                    const lastSeen = data.lastSeen ? new Date(data.lastSeen.seconds * 1000).toLocaleString('id-ID') : "Baru saja";

                    // Membuat tampilan kartu untuk setiap anggota
                    const card = `
                        <div class="card-lacak">
                            <div class="info-nama"><i class="fa-solid fa-user-location"></i> ${nama}</div>
                            <div class="status-online"><i class="fa-solid fa-circle"></i> Terdeteksi: ${lastSeen}</div>
                            <div class="info-detail">Koordinat: ${lat}, ${lng}</div>
                            
                            <div class="map-container">
                                <iframe 
                                    src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed">
                                </iframe>
                            </div>
                            <div style="margin-top:10px; text-align:right;">
                                <a href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank" 
                                   style="font-size:12px; color:var(--biru-safir); text-decoration:none; font-weight:bold;">
                                   <i class="fa-solid fa-up-right-from-square"></i> Buka Navigasi
                                </a>
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += card;
                });
            });
        }

        // Jalankan fungsi
        renderLacak();
    </script>
</body>
</html>
