<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pope Shelter - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --emas: #D4AF37; --bg: #f4f7f6; --merah: #d9534f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .sticky-top-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-app { 
            background: var(--biru-tua); 
            color: white; 
            padding: 18px; 
            display: flex;
            align-items: center;
            position: relative;
        }

        .btn-back {
            color: white;
            font-size: 22px;
            text-decoration: none;
            position: absolute;
            left: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .header-title {
            width: 100%;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 16px;
            text-transform: uppercase;
        }
        
        .action-container { padding: 15px; max-width: 600px; margin: auto; }
        
        .btn-add { 
            width: 100%; 
            background: var(--biru-tua); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            font-size: 11px;
            text-align: center;
        }

        .content-scroll { padding: 0 15px 15px 15px; max-width: 600px; margin: auto; }

        .kesaksian-card { 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            border-top: 4px solid var(--emas); 
            position: relative;
        }

        .card-controls {
            display: flex;
            justify-content: flex-end; /* Hanya ada tombol hapus sekarang */
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }

        .btn-delete { color: var(--merah); cursor: pointer; font-size: 14px; background: none; border: none; font-weight: bold; }

        .kesaksian-text { font-size: 15px; color: #333; line-height: 1.6; margin-bottom: 15px; font-style: italic; white-space: pre-wrap; }
        
        .share-panel { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        
        .btn-share { 
            flex: 1; 
            padding: 10px; 
            border-radius: 8px; 
            border: none; 
            color: white; 
            font-size: 13px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            font-weight: bold;
        }
        .bg-wa { background: #25D366; }

        .kesaksian-footer { display: flex; align-items: center; gap: 12px; padding-top: 15px; border-top: 1px solid #eee; }
        .author-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--emas); }
        .author-info { flex: 1; }
        .author-name { font-weight: bold; font-size: 13px; color: var(--biru-tua); margin: 0; }
        .author-meta { font-size: 10px; color: #777; margin: 0; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .popup { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; }
        .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; height: 150px; resize: none; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--emas); color: var(--biru-tua); border: none; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        
        .success-toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: white; color: var(--biru-tua); padding: 15px 25px; 
            border-radius: 50px; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            display: flex; align-items: center; gap: 10px; font-weight: bold;
            transition: top 0.5s; border-bottom: 3px solid var(--emas);
        }
        .success-toast.show { top: 30px; }
    </style>
</head>
<body>

<div id="toast-success" class="success-toast">
    <i class="fa-solid fa-circle-check" style="color: green; font-size: 20px;"></i>
    <span id="toast-text">Berhasil!</span>
</div>

<div class="sticky-top-container">
    <div class="header-app">
        <a href="menu.html" class="btn-back"><i class="fa-solid fa-circle-chevron-left"></i></a>
        <div class="header-title">RUANG KESAKSIAN</div>
    </div>
    <div class="action-container">
        <button class="btn-add" onclick="bukaPopupAdd()">
            <i class="fa-solid fa-pen-fancy"></i> TULISKAN DAN CERITAKAN KESAKSIAN ANDA UNTUK MEMBERKATI ORANG LAIN
        </button>
    </div>
</div>

<div class="content-scroll">
    <div id="rubrik-kesaksian-container"></div>
</div>

<div id="popup-add" class="overlay">
    <div class="popup">
        <h3 style="text-align:center; color:var(--biru-tua)">Bagikan Kesaksian</h3>
        <div class="form-group">
            <textarea id="add-cerita" placeholder="Tuliskan kebaikan Tuhan..."></textarea>
        </div>
        <button class="btn-save" id="btnKirim" onclick="simpanKesaksian()">POSTING SEKARANG</button>
        <div style="text-align:center; margin-top:15px; color:#999; cursor:pointer;" onclick="tutupPopup()">Batal</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUserData = null;

    window.onload = function() {
        const email = localStorage.getItem("userEmail");
        if (!email) return window.location.href = "index.html";

        db.collection("users").where("email", "==", email).get().then(snap => {
            if (!snap.empty) {
                currentUserData = snap.docs[0].data();
                loadRubrikKesaksian();
            }
        });
    };

    function loadRubrikKesaksian() {
        db.collection("kesaksian").orderBy("timestamp", "desc").onSnapshot(snap => {
            let html = "";
            if (snap.empty) {
                html = "<p style='text-align:center; color:#888; margin-top:30px;'>Belum ada kesaksian.</p>";
            }
            snap.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                
                const isiMurni = data.isi_kesaksian ? data.isi_kesaksian.replace(/\n/g, " ") : "";
                const namaPenulis = data.author_nama || "Anonim";
                const nijPenulis = data.author_nij || "-";
                const komselPenulis = data.author_komsel || "Umum";
                const foto = data.author_foto || 'https://via.placeholder.com/100';
                const canDelete = data.author_email === (currentUserData ? currentUserData.email : "");

                html += `
                    <div class="kesaksian-card" id="card-${id}">
                        <div class="card-controls">
                            ${canDelete ? `<button class="btn-delete" onclick="hapusKesaksian('${id}')"><i class="fa-solid fa-trash-can"></i> Hapus</button>` : ''}
                        </div>

                        <div class="kesaksian-text">"${data.isi_kesaksian}"</div>

                        <div class="share-panel">
                            <button class="btn-share bg-wa" onclick="shareWA('${isiMurni}', '${namaPenulis}', '${nijPenulis}', '${komselPenulis}')">
                                <i class="fa-brands fa-whatsapp"></i> BAGIKAN KE WHATSAPP
                            </button>
                        </div>

                        <div class="kesaksian-footer">
                            <img src="${foto}" class="author-img" onerror="this.src='https://via.placeholder.com/100'">
                            <div class="author-info">
                                <p class="author-name">${namaPenulis}</p>
                                <p class="author-meta">NIJ: ${nijPenulis} • ${komselPenulis}</p>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('rubrik-kesaksian-container').innerHTML = html;
        });
    }

    function shareWA(isi, nama, nij, komsel) {
        const teks = `*SIPAPUA*\n(Sistem Informasi Pondok Pemulihan Papua)\n_Pope Shelter_\n\n*Kesaksian:*\n"${isi}"\n\n---\n*Penulis:* ${nama}\n*NIJ:* ${nij}\n*Komsel:* ${komsel}`;
        const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(teks)}`;
        window.open(url, '_blank');
    }

    async function hapusKesaksian(id) {
        if(confirm("Apakah Anda yakin ingin menghapus kesaksian ini?")) {
            try {
                await db.collection("kesaksian").doc(id).delete();
                showToast("Kesaksian telah dihapus");
            } catch (e) { console.error(e); }
        }
    }

    async function simpanKesaksian() {
        const cerita = document.getElementById('add-cerita').value.trim();
        if (!cerita) return;
        const btn = document.getElementById('btnKirim');
        btn.disabled = true;
        try {
            await db.collection("kesaksian").add({
                isi_kesaksian: cerita,
                author_nama: currentUserData.nama,
                author_nij: currentUserData.nij || "-",
                author_komsel: currentUserData.komsel || "Umum",
                author_foto: currentUserData.foto_profil || "", 
                author_email: currentUserData.email,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            tutupPopup();
            document.getElementById('add-cerita').value = "";
            showToast("Kesaksian Berhasil Diposting!");
        } catch (e) { console.error(e); }
        finally { btn.disabled = false; }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast-success');
        document.getElementById('toast-text').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function bukaPopupAdd() { document.getElementById('popup-add').style.display = 'flex'; }
    function tutupPopup() { document.getElementById('popup-add').style.display = 'none'; }
</script>
</body>
</html>
