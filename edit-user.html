<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #003366;
            --accent: #007bff;
            --emas: #D4AF37;
            --light: #f4f7f6;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo-section {
            margin-bottom: 25px;
        }

        .logo-section img {
            width: 70px;
            height: auto;
        }

        .logo-section h2 {
            color: var(--primary);
            font-size: 1.4rem;
            margin: 10px 0 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-section p {
            color: #666;
            font-size: 0.9rem;
            margin: 0;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #aaa;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1.5px solid #e1e1e1;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            outline: none;
        }

        textarea {
            padding-left: 15px;
            resize: vertical;
            min-height: 80px;
        }

        .btn-update {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-update:hover {
            background: #0056b3;
        }

        .btn-cancel {
            display: block;
            text-align: center;
            width: 100%;
            padding: 12px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .btn-cancel:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="logo-section">
        <img src="logo_pondok.png" alt="Logo"> <h2>Pondok Pemulihan Papua</h2>
        <p>Edit Data Anggota</p>
    </div>

    <form id="editForm">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="nama" placeholder="Contoh: Boby Daniel" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Contoh: email@gmail.com">
            </div>
        </div>

        <div class="form-group">
            <label>Nomor HP / WhatsApp</label>
            <div class="input-wrapper">
                <i class="fab fa-whatsapp"></i>
                <input type="text" id="whatsapp" placeholder="08xxxxxx">
            </div>
        </div>

        <div class="form-group">
            <label>Golongan Darah</label>
            <div class="input-wrapper">
                <i class="fas fa-tint"></i>
                <select id="golongan_darah">
                    <option value="">-- Pilih --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="AB">AB</option>
                    <option value="O">O</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Jabatan</label>
            <div class="input-wrapper">
                <i class="fas fa-briefcase"></i>
                <select id="jabatan">
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Anggota">Anggota</option>
                    <option value="Ketua Komsel">Ketua Komsel</option>
                    <option value="Pimpinan">Pimpinan</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Komsel JC</label>
            <div class="input-wrapper">
                <i class="fas fa-users"></i>
                <select id="komsel">
                    <option value="">-- Pilih Lokasi JC --</option>
                    <option value="1">JC 1</option>
                    <option value="2">JC 2</option>
                    <option value="3">JC 3</option>
                    <option value="4">JC 4</option>
                    <option value="5">JC 5</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Alamat Lengkap</label>
            <textarea id="alamat" placeholder="Masukkan alamat lengkap..."></textarea>
        </div>

        <button type="submit" class="btn-update"><i class="fas fa-save"></i> Update Data</button>
        <a href="admin.html" class="btn-cancel">Batal</a>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const docId = urlParams.get('id');

    if (docId) {
        db.collection("users").doc(docId).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById("nama").value = data.nama || "";
                document.getElementById("email").value = data.email || "";
                document.getElementById("whatsapp").value = data.whatsapp || "";
                document.getElementById("golongan_darah").value = data.golongan_darah || "";
                document.getElementById("jabatan").value = data.jabatan || "";
                document.getElementById("komsel").value = data.komsel || "";
                document.getElementById("alamat").value = data.alamat || "";
            }
        });
    }

    document.getElementById("editForm").onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection("users").doc(docId).update({
                nama: document.getElementById("nama").value,
                email: document.getElementById("email").value,
                whatsapp: document.getElementById("whatsapp").value,
                golongan_darah: document.getElementById("golongan_darah").value,
                jabatan: document.getElementById("jabatan").value,
                komsel: document.getElementById("komsel").value,
                alamat: document.getElementById("alamat").value
            });
            alert("Data berhasil diperbarui!");
            window.location.href = "admin.html";
        } catch (error) {
            alert("Gagal update: " + error.message);
        }
    };
</script>
</body>
</html>
