<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Kartu Jemaat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #555; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { width: 350px; height: 210px; background: white; border-radius: 10px; position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid #ccc; background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .card-header { background: #003366; color: white; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; border-bottom: 2px solid #D4AF37; }
        .card-body { padding: 10px; display: flex; gap: 10px; }
        .photo { width: 80px; height: 100px; border: 2px solid #003366; object-fit: cover; border-radius: 5px; background: #eee; }
        .info { font-size: 11px; color: #333; line-height: 1.4; }
        .info b { color: #003366; }
        .card-footer { position: absolute; bottom: 0; width: 100%; background: rgba(0,51,102,0.1); padding: 5px; font-size: 9px; text-align: center; }
        .no-print { position: fixed; bottom: 20px; right: 20px; z-index: 999; }
        .btn-print { background: #28a745; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        @media print { .no-print { display: none; } body { background: white; padding: 0; } }
    </style>
</head>
<body>

<div class="no-print">
    <button class="btn-print" onclick="window.print()">PRINT SEKARANG</button>
</div>

<div id="printArea" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;">
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadSelectedCards() {
        const urlParams = new URLSearchParams(window.location.search);
        const ids = urlParams.get('ids') ? urlParams.get('ids').split(',') : [];
        const container = document.getElementById('printArea');

        if (ids.length === 0) {
            container.innerHTML = "<h2 style='color:white'>Tidak ada data yang dipilih.</h2>";
            return;
        }

        for (const id of ids) {
            const doc = await db.collection("users").doc(id).get();
            if (doc.exists) {
                const d = doc.data();
                const cardHtml = `
                    <div class="card">
                        <div class="card-header">KARTU ANGGOTA JEMAAT</div>
                        <div class="card-body">
                            <img src="${d.url_foto || 'https://via.placeholder.com/80x100?text=FOTO'}" class="photo">
                            <div class="info">
                                <b>NIJ:</b> ${d.nij || '-'}<br>
                                <b>NAMA:</b> ${d.nama_lengkap || d.nama || '-'}<br>
                                <b>TTL:</b> ${d.kota || '-'}, ${d.tanggal_lahir || '-'}<br>
                                <b>KOMSEL:</b> ${d.komsel || '-'}<br>
                                <b>LOKASI:</b> ${d.lokasi_berjemaat || '-'}
                            </div>
                        </div>
                        <div class="card-footer">Pondok Pemulihan Papua - Unity In Diversity</div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            }
        }
    }

    window.onload = loadSelectedCards;
</script>
</body>
</html>
