<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cetak Kartu Jemaat - Pondok Pemulihan Papua</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: 'Arial', sans-serif; }
        
        #cardContainer { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }

        /* KONTINER KARTU + TOMBOL */
        .card-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }

        /* CARD STYLE */
        .card { 
            width: 480px; height: 305px; background: white; border-radius: 12px; 
            position: relative; overflow: hidden; border: 1px solid #999;
            background-image: linear-gradient(to bottom right, #ffffff, #f0f7ff);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* TOMBOL EDIT KECIL DI KARTU */
        .btn-edit-card {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            background: rgba(212, 175, 55, 0.9); color: white; border: none;
            border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 12px;
        }

        .card-header { 
            background: #003366; color: white; padding: 5px 15px; 
            display: flex; align-items: center; justify-content: space-between;
            border-top: 4px solid #D4AF37; border-bottom: 8px solid #D4AF37; height: 75px;
        }
        
        .header-logo { width: 70px; height: 70px; object-fit: contain; }
        .header-text { text-align: center; flex: 1; }
        .header-text h2 { margin: 0; font-size: 16px; letter-spacing: 1px; font-weight: 800; }
        .header-text p { margin: 2px 0 0 0; font-size: 11px; color: #D4AF37; font-weight: bold; }

        .card-body { padding: 12px 15px; display: flex; gap: 15px; align-items: flex-start; }
        .left-side { display: flex; flex-direction: column; align-items: center; width: 125px; }
        .photo-frame { width: 115px; height: 135px; border: 2px solid #003366; object-fit: cover; border-radius: 5px; background: #fff; }

        .right-side { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .info-row { display: flex; font-size: 10.5px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .label { width: 85px; font-weight: bold; color: #003366; }
        .value { flex: 1; color: #333; text-transform: uppercase; font-weight: 600; }

        .barcode-container { width: 200px; height: 40px; border: 1px solid #ccc; align-self: flex-end; margin-top: 5px; }

        .card-footer { position: absolute; bottom: 0; width: 100%; background: #003366; color: white; font-size: 10px; text-align: center; padding: 4px 0; }

        /* AREA TOMBOL DI BAWAH KARTU */
        .action-controls { display: none; gap: 10px; width: 480px; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-save-bottom { background: #28a745; color: white; }
        .btn-save-bottom:hover { background: #218838; }
        .btn-cancel-bottom { background: #dc3545; color: white; }
        .btn-cancel-bottom:hover { background: #c82333; }

        /* MODAL EDITOR TETAP ADA UNTUK INPUT DATA */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; color: #333; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        .no-print-zone { position: fixed; bottom: 20px; right: 20px; z-index: 99; }
        .btn-print { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        @media print { 
            .no-print-zone, .btn-edit-card, .action-controls { display: none !important; } 
            body { background: white; padding: 0; } 
            .card-wrapper { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="no-print-zone">
    <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> CETAK SEMUA KARTU</button>
</div>

<div id="cardContainer"></div>

<div id="editModal" class="modal-overlay">
    <div class="modal-box">
        <h3 style="margin-top:0; color:#003366;"><i class="fas fa-user-edit"></i> Edit Data Visual</h3>
        <input type="hidden" id="editCardId">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="editNama">
        </div>
        <div class="form-group">
            <label>TTL</label>
            <input type="text" id="editTTL">
        </div>
        <div class="form-group">
            <label>Jemaat</label>
            <input type="text" id="editJemaat">
        </div>
        <div class="form-group">
            <label>URL Foto</label>
            <input type="text" id="editFoto">
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-action btn-save-bottom" style="flex:1" onclick="applyChanges()">OK</button>
            <button class="btn-action btn-cancel-bottom" style="flex:1" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Simpan data asli untuk fungsi Batal
    const originalData = {};

    function openEditor(id) {
        document.getElementById('editCardId').value = id;
        document.getElementById('editNama').value = document.getElementById(`name-${id}`).innerText.replace(': ', '');
        document.getElementById('editTTL').value = document.getElementById(`ttl-${id}`).innerText.replace(': ', '');
        document.getElementById('editJemaat').value = document.getElementById(`jemaat-${id}`).innerText.replace(': ', '');
        document.getElementById('editFoto').value = document.getElementById(`img-${id}`).src;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    // Terapkan perubahan ke visual kartu dan munculkan tombol Simpan/Batal di bawah
    function applyChanges() {
        const id = document.getElementById('editCardId').value;
        
        // Simpan ke originalData jika belum ada (untuk fungsi batal)
        if (!originalData[id]) {
            originalData[id] = {
                nama: document.getElementById(`name-${id}`).innerText,
                ttl: document.getElementById(`ttl-${id}`).innerText,
                jemaat: document.getElementById(`jemaat-${id}`).innerText,
                foto: document.getElementById(`img-${id}`).src
            };
        }

        document.getElementById(`name-${id}`).innerText = ': ' + document.getElementById('editNama').value;
        document.getElementById(`ttl-${id}`).innerText = ': ' + document.getElementById('editTTL').value;
        document.getElementById(`jemaat-${id}`).innerText = ': ' + document.getElementById('editJemaat').value;
        document.getElementById(`img-${id}`).src = document.getElementById('editFoto').value;
        
        // Tampilkan tombol kontrol di bawah kartu
        document.getElementById(`controls-${id}`).style.display = 'flex';
        closeModal();
    }

    function saveToDatabase(id) {
        const nama = document.getElementById(`name-${id}`).innerText.replace(': ', '');
        const jemaat = document.getElementById(`jemaat-${id}`).innerText.replace(': ', '');
        
        db.collection("users").doc(id).update({
            nama_lengkap: nama,
            lokasi_berjemaat: jemaat
        }).then(() => {
            alert("Data berhasil disimpan ke Database!");
            document.getElementById(`controls-${id}`).style.display = 'none';
        });
    }

    function cancelChanges(id) {
        if (originalData[id]) {
            document.getElementById(`name-${id}`).innerText = originalData[id].nama;
            document.getElementById(`ttl-${id}`).innerText = originalData[id].ttl;
            document.getElementById(`jemaat-${id}`).innerText = originalData[id].jemaat;
            document.getElementById(`img-${id}`).src = originalData[id].foto;
        }
        document.getElementById(`controls-${id}`).style.display = 'none';
    }

    async function drawCards() {
        const urlParams = new URLSearchParams(window.location.search);
        const ids = urlParams.get('ids') ? urlParams.get('ids').split(',') : [];
        const container = document.getElementById('cardContainer');
        
        for (const id of ids) {
            const doc = await db.collection("users").doc(id).get();
            if (doc.exists) {
                const d = doc.data();
                const nij = d.nij || "NO-NIJ";
                const foto = d.foto_profil || 'https://via.placeholder.com/115x140?text=FOTO';
                
                const cardHtml = `
                    <div class="card-wrapper">
                        <div class="card" id="card-${id}">
                            <button class="btn-edit-card" onclick="openEditor('${id}')"><i class="fas fa-edit"></i> Edit</button>
                            <div class="card-header">
                                <img src="logo_pondok.png" class="header-logo" onerror="this.src='https://via.placeholder.com/70?text=LOGO'">
                                <div class="header-text">
                                    <h2>PONDOK PEMULIHAN PAPUA</h2>
                                    <p>KARTU ANGGOTA JEMAAT</p>
                                </div>
                                <img src="gbi.png" class="header-logo" onerror="this.src='https://via.placeholder.com/70?text=GBI'">
                            </div>
                            <div class="card-body">
                                <div class="left-side">
                                    <img src="${foto}" class="photo-frame" id="img-${id}">
                                    <div style="font-size:8px; font-weight:bold; color:#003366; margin-top:5px;">BERLAKU SEUMUR HIDUP</div>
                                </div>
                                <div class="right-side">
                                    <div class="info-row"><span class="label">NIJ</span><span class="value">: ${nij}</span></div>
                                    <div class="info-row"><span class="label">NAMA</span><span class="value" id="name-${id}">: ${d.nama_lengkap || '-'}</span></div>
                                    <div class="info-row"><span class="label">TTL</span><span class="value" id="ttl-${id}">: ${d.tempat_lahir || '-'}, ${d.tanggal_lahir || '-'}</span></div>
                                    <div class="info-row"><span class="label">ALAMAT</span><span class="value">: ${d.alamat || '-'}</span></div>
                                    <div class="info-row"><span class="label">JEMAAT</span><span class="value" id="jemaat-${id}">: ${d.lokasi_berjemaat || '-'}</span></div>
                                    <div class="barcode-container">
                                        <svg id="barcode-${id}" style="width:100%; height:100%;"></svg>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer">Pondok Pemulihan Papua - Blessing To The Nations</div>
                        </div>

                        <div class="action-controls" id="controls-${id}">
                            <button class="btn-action btn-save-bottom" onclick="saveToDatabase('${id}')">
                                <i class="fas fa-check"></i> SIMPAN KE DATABASE
                            </button>
                            <button class="btn-action btn-cancel-bottom" onclick="cancelChanges('${id}')">
                                <i class="fas fa-times"></i> BATAL
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;

                setTimeout(() => {
                    JsBarcode(`#barcode-${id}`, nij, { format: "CODE128", displayValue: false, height: 40 });
                }, 300);
            }
        }
    }
    window.onload = drawCards;
</script>
</body>
</html>
