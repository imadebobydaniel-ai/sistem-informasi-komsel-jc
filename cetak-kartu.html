<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cetak Kartu Jemaat - Pondok Pemulihan Papua</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        body { background: #333; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px; font-family: 'Arial', sans-serif; }
        
        .card { 
            width: 480px; height: 300px; background: white; border-radius: 12px; 
            position: relative; overflow: hidden; border: 1px solid #999;
            background-image: linear-gradient(to bottom right, #ffffff, #f0f7ff);
        }

        /* Header dengan Garis Emas Tebal di Bawah */
        .card-header { 
            background: #003366; color: white; padding: 10px 15px; 
            display: flex; align-items: center; justify-content: space-between;
            border-top: 4px solid #D4AF37; 
            border-bottom: 6px solid #D4AF37; /* PADDING GARIS EMAS DIPERTEBAL */
        }
        
        .header-logo { width: 55px; height: 55px; object-fit: contain; }
        
        .header-text { text-align: center; flex: 1; }
        .header-text h2 { margin: 0; font-size: 16px; letter-spacing: 1px; font-weight: 800; }
        .header-text p { margin: 2px 0 0 0; font-size: 11px; color: #D4AF37; font-weight: bold; }

        .card-body { padding: 15px; display: flex; gap: 15px; align-items: flex-start; }

        /* Sisi Kiri: Foto & Barcode dibawahnya */
        .left-side { display: flex; flex-direction: column; align-items: center; width: 120px; }
        .photo-frame { 
            width: 110px; height: 135px; border: 2px solid #003366; 
            object-fit: cover; border-radius: 5px; background: #fff; margin-bottom: 8px;
        }
        .barcode-container { width: 110px; height: 50px; background: white; padding: 2px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
        .barcode-svg { width: 100%; height: 100%; }

        /* Sisi Kanan: Detail Data */
        .right-side { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .info-row { display: flex; font-size: 11.5px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .label { width: 80px; font-weight: bold; color: #003366; }
        .value { flex: 1; color: #333; text-transform: uppercase; font-weight: 600; }

        .card-footer { 
            position: absolute; bottom: 0; width: 100%; background: #003366; 
            color: white; font-size: 10px; text-align: center; padding: 6px 0;
        }

        .no-print { position: fixed; bottom: 20px; right: 20px; z-index: 99; }
        .btn-print { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        @media print { .no-print { display: none; } body { background: white; padding: 0; } .card { box-shadow: none; border: 1px solid #000; margin: 10px; } }
    </style>
</head>
<body>

<div class="no-print">
    <button class="btn-print" onclick="window.print()">CETAK SEKARANG</button>
</div>

<div id="cardContainer"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function drawCards() {
        const urlParams = new URLSearchParams(window.location.search);
        const ids = urlParams.get('ids') ? urlParams.get('ids').split(',') : [];
        const container = document.getElementById('cardContainer');
        container.style.display = 'flex';
        container.style.flexWrap = 'wrap';
        container.style.gap = '20px';
        container.style.justifyContent = 'center';

        if (ids.length === 0) {
            container.innerHTML = "<h2 style='color:white'>Pilih data jemaat di Dashboard Admin.</h2>";
            return;
        }

        for (const id of ids) {
            const doc = await db.collection("users").doc(id).get();
            if (doc.exists) {
                const d = doc.data();
                const nijValue = d.nij || "NO-NIJ";
                
                // Perbaikan Tanggal Lahir: Cek berbagai kemungkinan key di database kamu
                const tglLahir = d.tanggal_lahir || d.tgl_lahir || d.lahir || "-";
                const tempatLahir = d.kota || d.tempat_lahir || "-";
                
                const cardHtml = `
                    <div class="card">
                        <div class="card-header">
                            <img src="logo_pondok.png" class="header-logo">
                            <div class="header-text">
                                <h2>PONDOK PEMULIHAN PAPUA</h2>
                                <p>KARTU ANGGOTA JEMAAT</p>
                            </div>
                            <img src="gbi.png" class="header-logo">
                        </div>
                        
                        <div class="card-body">
                            <div class="left-side">
                                <img src="${d.url_foto || d.foto || 'https://via.placeholder.com/110x135?text=FOTO'}" class="photo-frame">
                                <div class="barcode-container">
                                    <svg class="barcode-svg" id="barcode-${id}"></svg>
                                </div>
                            </div>
                            
                            <div class="right-side">
                                <div class="info-row"><span class="label">NIJ</span><span class="value">: ${nijValue}</span></div>
                                <div class="info-row"><span class="label">NAMA</span><span class="value">: ${d.nama_lengkap || d.nama || '-'}</span></div>
                                <div class="info-row"><span class="label">TTL</span><span class="value">: ${tempatLahir}, ${tglLahir}</span></div>
                                <div class="info-row"><span class="label">ALAMAT</span><span class="value">: ${d.alamat || '-'}</span></div>
                                <div class="info-row"><span class="label">JABATAN</span><span class="value">: ${d.jabatan || 'ANGGOTA JEMAAT'}</span></div>
                                <div class="info-row"><span class="label">JEMAAT</span><span class="value">: ${d.lokasi_berjemaat || '-'}</span></div>
                                <div class="info-row"><span class="label">KOMSEL</span><span class="value">: ${d.komsel || '-'}</span></div>
                            </div>
                        </div>
                        
                        <div class="card-footer">
                            Pondok Pemulihan Papua - Unity In Diversity
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;

                // Render Barcode Berdasarkan NIJ
                setTimeout(() => {
                    JsBarcode(`#barcode-${id}`, nijValue, {
                        format: "CODE128",
                        width: 1.5,
                        height: 35,
                        displayValue: false,
                        margin: 0
                    });
                }, 200);
            }
        }
    }

    window.onload = drawCards;
</script>
</body>
</html>
