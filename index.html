<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 80px; margin-bottom: 10px; }
        h2 { margin: 5px 0; font-size: 20px; color: #333; text-transform: uppercase; }
        h3 { margin: 0 0 20px; font-size: 16px; color: #ffcc00; text-shadow: 1px 1px #000; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; position: relative; text-align: left; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        
        /* Style Simbol Mata */
        .toggle-password { 
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            cursor: pointer; 
            color: #999; 
            font-size: 18px;
        }

        .btn-login { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-login:hover { background-color: #0056b3; }
        
        .footer-links { margin-top: 20px; font-size: 13px; color: #666; }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; }
        .admin-link { display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo_pondok.png" alt="Logo" class="logo">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <h3>Sistem Informasi Komsel JC</h3>
        <p>Login Anggota Komsel</p>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Anggota" required>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePass()"></i>
            </div>

            <button type="submit" class="btn-login">MASUK</button>
        </form>

        <div class="footer-links">
            Belum punya akun? <a href="registrasi.html">Daftar Sekarang</a>
            <a href="login_admin.html" class="admin-link">Masuk sebagai Admin</a>
        </div>
    </div>

    <script>
        // Fungsi Toggle Password (Sekali Tap Muncul Tulisan)
        function togglePass() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // Script login dasar (tetap sesuai sistem Anda)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            // Logika verifikasi Anda di sini
            console.log("Mencoba login:", email);
            // Contoh redirect: window.location.href = "menu.html";
        });
    </script>
</body>
</html>
