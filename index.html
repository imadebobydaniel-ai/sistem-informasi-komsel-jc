<!DOCTYPE html>

<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Index - Pondok Pemulihan Papua</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        :root { --biru-tua: #003366; --emas-lux: #D4AF37; --grey-bg: #4a4a4a; }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        

        /* Splash Screen */

        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--grey-bg); display: flex; justify-content: center; align-items: center; z-index: 999999; transition: opacity 0.8s ease, visibility 0.8s; }

        .logo-container { position: relative; width: 160px; height: 160px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }

        .gold-loader { position: absolute; width: 150px; height: 150px; border: 5px solid rgba(212, 175, 55, 0.1); border-top: 5px solid var(--emas-lux); border-radius: 50%; animation: spin 1.5s linear infinite; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }



        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }

        .btn-login { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }

    </style>

</head>

<body>



    <div id="splash-screen">

        <div class="splash-content">

            <div class="logo-container">

                <div class="gold-loader"></div>

                <img src="logo_pondok.png" alt="Logo" style="width:100px; z-index:2;">

            </div>

            <div style="color:var(--emas-lux); font-weight:bold;">PONDOK PEMULIHAN PAPUA</div>

        </div>

    </div>



    <div class="login-card">

        <img src="logo_pondok.png" alt="Logo" style="width:80px; margin-bottom:15px;">

        <h2>LOGIN ANGGOTA</h2>

        <form id="loginForm">

            <input type="email" id="email" placeholder="Email Anggota" required>

            <input type="password" id="pass" placeholder="Password" required>

            <button type="submit" class="btn-login">MASUK</button>

        </form>

        <div style="margin-top:20px; font-size:14px;">

            Belum punya akun? <a href="registrasi.html" style="color:#007bff; text-decoration:none;">Daftar</a>

        </div>

        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">

        <a href="login_cyber.html" style="color:#888; font-size:12px; text-decoration:none;">Masuk sebagai Admin</a>

    </div>



    <script>

        document.addEventListener("DOMContentLoaded", function() {

            setTimeout(() => {

                const splash = document.getElementById('splash-screen');

                if(splash) splash.classList.add('splash-hidden');

            }, 2000);

        });



        // Ingat untuk memasukkan kembali script Firebase milikmu di sini agar login bisa jalan

    </script>

</body>

</html>
