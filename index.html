<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
        }
        img { width: 80px; margin-bottom: 10px; border-radius: 50%; }
        h2 { color: #333; margin: 0 0 20px 0; font-size: 22px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #0084ff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            font-size: 15px;
            transition: 0.3s;
        }
        button:hover { background-color: #0073e6; }
        .btn-admin { 
            background-color: #ff003c; 
        }
        .btn-admin:hover { background-color: #d60032; }
        .link-daftar { 
            display: block; 
            margin-top: 15px; 
            color: #0084ff; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="logo_pondok.png" alt="Logo">
    <h2>Pondok Pemulihan</h2>
    
    <input type="email" id="emailUser" placeholder="Email Anggota">
    <input type="password" id="passUser" placeholder="Password">
    <button onclick="loginUser()">Masuk Sekarang</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <button class="btn-admin" onclick="aksesAdmin()">Akses Administrator</button>
    
    <a href="register.html" class="link-daftar">Daftar Anggota Baru</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    // Konfigurasi Firebase Abang
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    // Inisialisasi Firebase
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Fungsi Login untuk Anggota Biasa
    async function loginUser() {
        const email = document.getElementById("emailUser").value;
        const pass = document.getElementById("passUser").value;
        
        if(!email || !pass) return alert("Isi email dan password!");

        try {
            await auth.signInWithEmailAndPassword(email, pass);
            // Sesuai nama file di GitHub Abang: main.menu.html
            window.location.href = 'main.menu.html';
        } catch (error) {
            alert("Gagal Masuk: " + error.message);
        }
    }

    // Fungsi Akses Admin (Lompat langsung ke Database)
    function aksesAdmin() {
        var inputPass = prompt("Masukkan Password Khusus Administrator:");
        
        // Gunakan password: admin2026
        if (inputPass === "admin2026") {
            alert("Akses Diterima! Membuka Database...");
            // Sesuai nama file di GitHub Abang: admin_portal.html
            window.location.href = 'admin_portal.html';
        } else if (inputPass !== null) {
            alert("Password Salah! Akses Ditolak.");
        }
    }
</script>

</body>
</html>
