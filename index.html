<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        img.logo { width: 100px; margin-bottom: 15px; }
        h2 { color: #333; margin: 0; font-size: 22px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; background: #fafafa; }
        
        button { width: 100%; padding: 14px; background-color: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        button:hover { background-color: #218838; }

        .strength { font-size: 11px; text-align: left; margin-top: -5px; margin-bottom: 10px; font-weight: bold; }
        .weak { color: #dc3545; }
        .strong { color: #28a745; }
        
        #loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #ffd700; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <div class="spinner"></div>
    <p id="loading-text">Menghubungkan ke Pusat...</p>
</div>

<div id="auth-form" class="card">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <h2>Registrasi Anggota</h2>
    <p class="subtitle">Layanan Pondok Pemulihan Papua</p>
    
    <input type="text" id="nama" placeholder="Nama Lengkap Sesuai KTP">
    <input type="text" id="nohp" placeholder="No. WhatsApp (Contoh: 0812...)">
    
    <select id="wilayah">
        <option value="" disabled selected>Pilih Wilayah Komsel</option>
        <option value="JC 1">JC 1</option>
        <option value="JC 2">JC 2</option>
        <option value="JC 3">JC 3</option>
        <option value="JC 4">JC 4</option>
        <option value="JC 5">JC 5</option>
    </select>

    <select id="jabatan">
        <option value="" disabled selected>Pilih Jabatan</option>
        <option value="Ketua PKS">Ketua PKS</option>
        <option value="Anggota">Anggota Komsel</option>
    </select>

    <input type="email" id="email" placeholder="Email Aktif">
    <input type="password" id="pass" placeholder="Password Baru" oninput="validatePassword(this.value)">
    <div id="strength-text" class="strength">Kekuatan: -</div>
    
    <button onclick="prosesLogin()">DAFTAR & MASUK</button>
</div>

<script>
    function validatePassword(pass) {
        let text = document.getElementById('strength-text');
        let regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        if (pass.length === 0) { text.innerHTML = "Kekuatan: -"; text.className = "strength"; }
        else if (regex.test(pass)) { text.innerHTML = "Kekuatan: **STRONG**"; text.className = "strength strong"; }
        else { text.innerHTML = "Kekuatan: **WEAK** (Butuh Huruf Besar, Angka, Simbol)"; text.className = "strength weak"; }
    }

    function prosesLogin() {
        const data = {
            nama: document.getElementById('nama').value,
            nohp: document.getElementById('nohp').value,
            wilayah: document.getElementById('wilayah').value,
            jabatan: document.getElementById('jabatan').value,
            email: document.getElementById('email').value,
            pass: document.getElementById('pass').value
        };

        // GANTI INI dengan link Web App URL Google Script kamu yang sebelumnya
        const urlServer = "https://script.google.com/macros/s/AKfycbz2lNjzbAuUxxCE0vQpjUr8TvWFx20EtUHgQvg5i5APUhHjy8Iw-rHJpXtqJIm7te6M1Q/exec";

        // Admin Bypass
        if (data.email === "admin@mail.com" && data.pass === "admin2026") {
            tampilkanLoading("Membuka Akses Administrator...");
            setTimeout(() => { window.location.href = "main_menu.html"; }, 3000);
            return;
        }

        if (data.nama && data.wilayah && data.jabatan && data.email && data.pass) {
            tampilkanLoading("Mendaftarkan Identitas...");
            
            fetch(urlServer, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                alert("Pendaftaran Berhasil di " + data.wilayah);
                window.location.href = "main_menu.html";
            }).catch(() => alert("Gagal koneksi server"));
        } else {
            alert("Harap lengkapi semua data pendaftaran!");
        }
    }

    function tampilkanLoading(pesan) {
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        document.getElementById('loading-text').innerText = pesan;
    }
</script>
</body>
</html>
