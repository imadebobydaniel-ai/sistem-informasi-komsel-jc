<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        img { width: 70px; margin-bottom: 10px; border-radius: 50%; }
        h2 { color: #333; margin: 0 0 20px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0084ff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-admin { background-color: #ff003c; }
        .link-daftar { display: block; margin-top: 15px; color: #0084ff; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-container">
    <img src="logo_pondok.png" alt="Logo">
    <h2>Masuk Aplikasi</h2>
    
    <input type="email" id="emailUser" placeholder="Email">
    <input type="password" id="passUser" placeholder="Password">
    
    <button onclick="loginUser()">Masuk Sekarang</button>
    
    <button class="btn-admin" onclick="window.location.href='login.html'">Akses Administrator</button>
    
    <a href="register.html" class="link-daftar">Daftar Anggota Baru</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    async function loginUser() {
        const e = document.getElementById("emailUser").value;
        const p = document.getElementById("passUser").value;
        try {
            await auth.signInWithEmailAndPassword(e, p);
            window.location.href = 'main.menu.html';
        } catch (err) { alert("Login Gagal: " + err.message); }
    }
</script>
</body>
</html>
