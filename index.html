    // --- FUNGSI LOGIN (BARU) ---
    async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
            // Proses autentikasi resmi Firebase
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            console.log("Auth Berhasil:", userCredential.user.uid);
            
            // Setelah Auth berhasil, baru arahkan ke dashboard
            window.location.href = "dashboard.html";
        } catch (error) {
            console.error("Kode Error:", error.code);
            console.error("Pesan Error:", error.message);
            
            if (error.code === 'auth/wrong-password') {
                alert("Password yang Anda masukkan salah.");
            } else if (error.code === 'auth/user-not-found') {
                alert("Email tidak ditemukan di sistem autentikasi.");
            } else {
                alert("Terjadi kesalahan: " + error.message);
            }
        }
    }

    // --- LOGIKA FORM & REGISTRASI ---
    function handleStatusNikah() {
        const status = document.getElementById("status_pernikahan").value;
        const divMenikah = document.getElementById("form_menikah");
        const divSingle = document.getElementById("form_single");

        divMenikah.style.display = "none";
        divSingle.style.display = "none";

        if (status === "Menikah") {
            divMenikah.style.display = "block";
        } else if (status === "Single" || status === "Duda" || status === "Janda") {
            divSingle.style.display = "block";
        }
    }

    function nextStep(n) {
        const steps = document.querySelectorAll('.form-step');
        steps.forEach(step => { step.classList.remove('active'); step.style.display = 'none'; });
        const targetStep = document.getElementById('step-' + n);
        if (targetStep) { targetStep.classList.add('active'); targetStep.style.display = 'block'; }
        if (n === 2) updateNIJPreview();
        document.querySelectorAll('.step').forEach((bar, index) => {
            if (index < n) bar.classList.add('active');
            else bar.classList.remove('active');
        });
        window.scrollTo(0, 0);
    }

    function updateSubJabatan() {
        const jab = document.getElementById("jabatan_jemaat").value;
        const sub = document.getElementById("sub_jabatan");
        sub.innerHTML = '<option value="">-- Pilih Sub Bidang --</option>';
        if (dataSubJabatan[jab]) {
            dataSubJabatan[jab].forEach(i => sub.add(new Option(i, i)));
        }
        updateSpesifikPelayanan(); 
    }

    function updateSpesifikPelayanan() {
        const sub = document.getElementById("sub_jabatan").value;
        const pel = document.getElementById("pelayanan");
        pel.innerHTML = '<option value="">-- Pilih Fungsi Spesifik --</option>';
        if (dataSpesifik[sub]) {
            dataSpesifik[sub].forEach(i => pel.add(new Option(i, i)));
            if (dataSpesifik[sub].length === 1) pel.selectedIndex = 1;
        }
        updateNonStruktural();
    }

    function updateNonStruktural() {
        const pelVal = document.getElementById("pelayanan").value;

    function updateKomsel() {

    async function updateNIJPreview() {
        const lokasi = document.getElementById("lokasi").value;
        const displayInput = document.getElementById("nij-display");
        if (!lokasi) { displayInput.value = "Pilih lokasi dahulu..."; return; }
        try {
            const snap = await db.collection("users").get();
            const urut = String(snap.size + 1).padStart(3, '0');
            const tahun = new Date().getFullYear();
            displayInput.value = `NIJ-PPP-${lokasi}-${urut}-${tahun}`;
        } catch (error) { console.error("Gagal NIJ:", error); }
    }

    async function handleRegistrasi() {
        const btn = document.getElementById("btnSubmit");
        const fileInput = document.getElementById("berkas_jemaat");
        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("pass").value;

        if (fileInput.files.length === 0) return alert("Unggah foto KTP/KK!");

        btn.innerText = "Mendaftarkan...";
        btn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('upload_preset', 'pope_preset');
            const cloudResp = await fetch('https://api.cloudinary.com/v1_1/dxzllsbgi/upload', { method: 'POST', body: formData });
            const cloudData = await cloudResp.json();

            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await userCredential.user.sendEmailVerification();

            const userData = {
                uid: userCredential.user.uid,
                nama: document.getElementById("nama").value,
                email: email,
                whatsapp: document.getElementById("hp").value,
                status_pernikahan: document.getElementById("status_pernikahan").value,
                jumlah_anak: document.getElementById("jumlah_anak").value || 0,
                nama_pasangan: document.getElementById("nama_pasangan").value || "",
                nama_ayah: document.getElementById("nama_ayah").value || "",
                nama_ibu: document.getElementById("nama_ibu").value || "",
                lokasi_berjemaat: document.getElementById("lokasi").value,
                komsel: document.getElementById("komsel").value,
                jabatan: document.getElementById("jabatan_jemaat").value,
                sub_jabatan: document.getElementById("sub_jabatan").value,
                fungsi_pelayanan: document.getElementById("pelayanan").value,
                fungsi_non_struktural: document.getElementById("pelayanan_spesifik_non").value,
                nij: document.getElementById("nij-display").value,
                url_berkas: cloudData.secure_url,
                status: "Pending",
                tanggalDaftar: new Date().toLocaleString('id-ID')
            };

            await db.collection("users").doc(userCredential.user.uid).set(userData);
            document.getElementById('blocking-message').style.display = 'flex';
        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "FINALISASI & DAFTAR";
        }
    }

    async function loadProvinsi() {
        const resp = await fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json');
        const data = await resp.json();
        let options = '<option value="">Pilih Provinsi</option>';
        data.forEach(p => options += `<option value="${p.name}" data-id="${p.id}">${p.name}</option>`);
        document.getElementById('provinsi_lahir').innerHTML = options;
    }

    async function loadKota() {
        const provEl = document.getElementById('provinsi_lahir');
        const idProv = provEl.options[provEl.selectedIndex].getAttribute('data-id');
        if(!idProv) return;
        const resp = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${idProv}.json`);
        const data = await resp.json();
        let options = '<option value="">Pilih Kota</option>';
        data.forEach(k => options += `<option value="${k.name}">${k.name}</option>`);
        document.getElementById('kota_lahir').innerHTML = options;
    }

            const p = document.getElementById('pass'); // Untuk form daftar
            const loginP = document.getElementById('password'); // Untuk form login
            if(p) p.type = p.type === 'password' ? 'text' : 'password';
            if(loginP) loginP.type = loginP.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        });
