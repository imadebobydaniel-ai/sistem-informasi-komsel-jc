<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --emas-lux: #D4AF37; 
            --grey-bg: #2c2c2c; 
        }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Startup Styles */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--grey-bg); display: flex; justify-content: center; align-items: center; z-index: 999999; opacity: 1; visibility: visible; transition: opacity 0.8s ease, visibility 0.8s; }
        .splash-content { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .logo-wrapper { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .splash-logo { width: 110px; z-index: 2; animation: pulse 2s infinite ease-in-out; }
        .gold-loader { position: absolute; width: 160px; height: 160px; border: 5px solid rgba(212, 175, 55, 0.1); border-top: 5px solid var(--emas-lux); border-radius: 50%; animation: spin 1.5s linear infinite; z-index: 1; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }

        /* UI Card */
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; position: relative; z-index: 1; }
        .logo-login { width: 80px; margin-bottom: 15px; }
        h3 { color: #ffcc00; margin-bottom: 25px; font-size: 16px; background: #2c3e50; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-wrapper">
                <img src="logo_pondok.png" alt="Logo" class="splash-logo">
                <div class="gold-loader"></div>
            </div>
            <p style="color: var(--emas-lux); font-weight: bold;">Pondok Pemulihan Papua</p>
        </div>
    </div>

    <div class="login-card">
        <img src="logo_pondok.png" alt="Logo" class="logo-login">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <h3>Sistem Informasi Jemaat</h3>
        <form id="loginForm">
            <div class="form-group"><input type="email" id="email" placeholder="Email Anggota" required></div>
            <div class="form-group"><input type="password" id="pass" placeholder="Password" required></div>
            <button type="submit" class="btn-login">MASUK</button>
        </form>
        <div style="margin-top: 25px; font-size: 14px; color: #666;">
            Belum punya akun? <a href="registrasi.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Daftar Sekarang</a>
        </div>
        <a href="login_cyber.html" style="display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 12px;">Masuk sebagai Admin</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('splash-hidden');
            }, 3000);
        });
    </script>
</body>
</html>
