<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru: #003366; --emas: #D4AF37; --bg: #f4f7fa; }
        
        /* Mengatur agar konten selalu di tengah layar */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            border-top: 6px solid var(--biru); 
        }

        /* Perbaikan Logo */
        .logo-img { 
            width: 100px; 
            height: 100px; 
            margin-bottom: 20px; 
            border-radius: 50%; 
            object-fit: cover;
            border: 3px solid var(--bg);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h2 { 
            color: var(--biru); 
            margin-bottom: 25px; 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 800;
        }

        .input-group { margin-bottom: 15px; text-align: left; }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px;
            transition: 0.3s;
            background: #f9f9f9;
        }

        input:focus { 
            border-color: var(--biru); 
            background: white;
            box-shadow: 0 0 8px rgba(0,51,102,0.15); 
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--biru); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            border: 2px solid var(--emas); 
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: #002244; transform: translateY(-2px); }
        button:active { transform: scale(0.98); }

        .error { 
            color: #e74c3c; 
            font-size: 13px; 
            margin-top: 15px; 
            display: none; 
            font-weight: 600; 
            background: #ffe6e6; 
            padding: 10px; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT78Z0M-B4CjR6iF9xX0D0M5_B_m9FfXW9vDw&s" class="logo-img" alt="Logo">
    
    <h2>PORTAL KOMSEL JC</h2>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Email Terdaftar">
    </div>
    
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>
    
    <button onclick="prosesLogin()">MASUK SISTEM</button>
    
    <div id="error-msg" class="error"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Membersihkan data login lama
    window.onload = function() { localStorage.clear(); };

    async function prosesLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const passInput = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('error-msg');

        errorDiv.style.display = "none";

        if(!emailInput || !passInput) {
            errorDiv.innerText = "Email dan Password wajib diisi!";
            errorDiv.style.display = "block";
            return;
        }

        try {
            const userRef = db.collection("users")
                             .where("email", "==", emailInput)
                             .where("password", "==", passInput);
            
            const snapshot = await userRef.get();

            if (snapshot.empty) {
                errorDiv.innerText = "Akun tidak ditemukan atau Password salah!";
                errorDiv.style.display = "block";
                return;
            }

            const userDoc = snapshot.docs[0];
            const userData = userDoc.data();

            // Simpan data ke session HP
            localStorage.setItem("userEmail", userData.email);
            localStorage.setItem("userName", userData.nama);
            
            // Pindah ke menu utama
            window.location.href = "menu.html";

        } catch (e) {
            console.error(e);
            errorDiv.innerText = "Gagal login. Periksa koneksi internet.";
            errorDiv.style.display = "block";
        }
    }
</script>
</body>
</html>
