<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; padding-bottom: 80px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #333; font-size: 16px; text-transform: uppercase; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        .filter-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }

        .stat-box { text-align: center; padding: 10px 0; }
        .percentage { font-size: 48px; font-weight: 800; color: #007bff; margin: 10px 0; }
        .progress-container { background: #eee; border-radius: 20px; height: 15px; width: 100%; overflow: hidden; }
        .progress-bar { background: #007bff; height: 100%; width: 0%; transition: width 0.5s; }
        
        .label-komsel { font-weight: bold; color: #555; margin-top: 10px; display: block; }

        .btn-back { 
            display: flex; align-items: center; justify-content: center; text-decoration: none; 
            color: white; font-weight: bold; padding: 15px; background: #007bff; 
            border-radius: 15px; position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 1000; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fa-solid fa-book-bible"></i> Capaian Alkitab</h3>
        <div class="filter-group">
            <label>Pilih Periode:</label>
            <select id="periode-alkitab" onchange="updateStatistikAlkitab()">
                <option value="1">1 Bulan Terakhir</option>
                <option value="2">2 Bulan Terakhir</option>
                <option value="3">3 Bulan Terakhir</option>
                <option value="4">4 Bulan Terakhir</option>
                <option value="5">5 Bulan Terakhir</option>
                <option value="6">6 Bulan Terakhir</option>
            </select>
        </div>
        <div class="stat-box">
            <div class="percentage" id="pct-alkitab">0.0%</div>
            <div class="progress-container">
                <div class="progress-bar" id="bar-alkitab"></div>
            </div>
            <span class="label-komsel" id="label-alkitab">-</span>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-users"></i> Kehadiran Komsel</h3>
        <div class="filter-group">
            <label>Pilih Periode:</label>
            <select id="periode-kehadiran" onchange="updateStatistikKehadiran()">
                <option value="1">1 Bulan Terakhir</option>
                <option value="2">2 Bulan Terakhir</option>
                <option value="3">3 Bulan Terakhir</option>
                <option value="4">4 Bulan Terakhir</option>
                <option value="5">5 Bulan Terakhir</option>
                <option value="6">6 Bulan Terakhir</option>
            </select>
        </div>
        <div class="stat-box">
            <div class="percentage" id="pct-kehadiran" style="color: #28a745;">0.0%</div>
            <div class="progress-container">
                <div class="progress-bar" id="bar-kehadiran" style="background: #28a745;"></div>
            </div>
            <span class="label-komsel" id="label-kehadiran">-</span>
        </div>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> &nbsp; Kembali ke Menu Utama</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let userJC = "";
    let userEmailsInKomsel = [];

    async function initStatistik() {
        const email = localStorage.getItem("userEmail");
        const userSnap = await db.collection("users").where("email", "==", email).get();
        
        if (!userSnap.empty) {
            const userData = userSnap.docs[0].data();
            userJC = userData.komsel;
            document.getElementById('label-alkitab').innerText = "Capaian JC " + userJC;
            document.getElementById('label-kehadiran').innerText = "Capaian JC " + userJC;

            // Ambil semua email anggota di JC yang sama
            const allUsersSnap = await db.collection("users").where("komsel", "==", userJC).get();
            userEmailsInKomsel = allUsersSnap.docs.map(doc => doc.data().email);

            updateStatistikAlkitab();
            updateStatistikKehadiran();
        }
    }

    async function updateStatistikAlkitab() {
        const periode = parseInt(document.getElementById('periode-alkitab').value);
        const totalTargetPerUser = 30 * periode; // Asumsi target 30 laporan per bulan
        const totalTargetKomsel = userEmailsInKomsel.length * totalTargetPerUser;

        const snapLaporan = await db.collection("laporan_bacaan")
            .where("email", "in", userEmailsInKomsel)
            .get();

        // Sederhanakan filter periode berdasarkan data (Logic filter bulan di Firestore)
        const count = snapLaporan.size; 
        const pct = totalTargetKomsel > 0 ? Math.min((count / totalTargetKomsel) * 100, 100).toFixed(1) : 0;

        document.getElementById('pct-alkitab').innerText = pct + "%";
        document.getElementById('bar-alkitab').style.width = pct + "%";
    }

    async function updateStatistikKehadiran() {
        const periode = parseInt(document.getElementById('periode-kehadiran').value);
        const totalPertemuanPerBulan = 4; // Asumsi 4 kali komsel sebulan
        const totalTargetHadir = userEmailsInKomsel.length * totalPertemuanPerBulan * periode;

        const snapHadir = await db.collection("kehadiran")
            .where("email", "in", userEmailsInKomsel)
            .get();

        const count = snapHadir.size;
        const pct = totalTargetHadir > 0 ? Math.min((count / totalTargetHadir) * 100, 100).toFixed(1) : 0;

        document.getElementById('pct-kehadiran').innerText = pct + "%";
        document.getElementById('bar-kehadiran').style.width = pct + "%";
    }

    window.onload = initStatistik;
</script>
</body>
</html>
