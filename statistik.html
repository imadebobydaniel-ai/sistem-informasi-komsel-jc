<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .stats-container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { text-decoration: none; color: #333; font-weight: bold; font-size: 14px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #007bff; }
        .card h4 { margin: 0 0 10px 0; color: #555; font-size: 14px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: white; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #ddd; }
        .stat-item span { display: block; font-size: 18px; font-weight: bold; color: #333; }
        .stat-item label { font-size: 11px; color: #777; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="stats-container">
    <div class="header">
        <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
        <h3 style="margin:0;">Statistik Anggota</h3>
    </div>

    <label>Pilih Komsel:</label>
    <select id="select-komsel" onchange="loadStatistik(this.value)">
        <option value="5">JC 5 (Jayapura)</option>
        <option value="1">JC 1</option>
        <option value="2">JC 2</option>
        <option value="3">JC 3</option>
        <option value="4">JC 4</option>
    </select>

    <div class="card">
        <h4><i class="fa-solid fa-droplet" style="color:red;"></i> Distribusi Golongan Darah</h4>
        <div class="stat-grid">
            <div class="stat-item">
                <span id="count-a">0</span>
                <label>Golongan A</label>
            </div>
            <div class="stat-item">
                <span id="count-b">0</span>
                <label>Golongan B</label>
            </div>
            <div class="stat-item">
                <span id="count-ab">0</span>
                <label>Golongan AB</label>
            </div>
            <div class="stat-item">
                <span id="count-o">0</span>
                <label>Golongan O</label>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function loadStatistik(komselId) {
        // Menggunakan onSnapshot agar real-time
        db.collection("users").where("komsel", "==", komselId.toString())
        .onSnapshot((querySnapshot) => {
            let counts = { A: 0, B: 0, AB: 0, O: 0 };
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // Normalisasi field ke uppercase untuk menghindari error penulisan 'ab' atau 'AB'
                const goldar = data.gol_darah ? data.gol_darah.toUpperCase() : null;
                
                if (goldar && counts.hasOwnProperty(goldar)) {
                    counts[goldar]++;
                }
            });

            // Update DOM
            document.getElementById('count-a').innerText = counts.A;
            document.getElementById('count-b').innerText = counts.B;
            document.getElementById('count-ab').innerText = counts.AB;
            document.getElementById('count-o').innerText = counts.O;
        });
    }

    // Load default JC 5 saat pertama buka
    loadStatistik("5");
</script>
</body>
</html>
