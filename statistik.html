<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Pembacaan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .info { margin-bottom: 20px; color: #666; font-size: 14px; }
        .btn-back { display: inline-block; margin-top: 25px; text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-crown" style="color: gold;"></i> Peringkat Keaktifan JC</h2>
    <p class="info" id="total-info">Menarik data dari database...</p>
    
    <div style="position: relative; height:40vh; width:100%">
        <canvas id="chartJC"></canvas>
    </div>

    <a href="menu.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Menu</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function muatStatistik() {
        const sekarang = new Date();
        const awalBulan = new Date(sekarang.getFullYear(), sekarang.getMonth(), 1);
        const tsAwalBulan = firebase.firestore.Timestamp.fromDate(awalBulan);

        try {
            // Ambil semua laporan di bulan ini
            const snap = await db.collection("laporan_bacaan")
                .where("tanggal", ">=", tsAwalBulan)
                .get();

            let rekapJC = {
                "JC 1": 0, "JC 2": 0, "JC 3": 0, "JC 4": 0, "JC 5": 0,
                "JC 6": 0, "JC 7": 0, "JC 8": 0, "JC 9": 0, "JC 10": 0
            };

            let totalSeluruhLaporan = 0;

            snap.forEach(doc => {
                const d = doc.data();
                if (rekapJC.hasOwnProperty(d.komsel)) {
                    rekapJC[d.komsel]++;
                    totalSeluruhLaporan++;
                }
            });

            document.getElementById('total-info').innerText = `Total ${totalSeluruhLaporan} laporan terkumpul bulan ini`;
            tampilkanGrafik(rekapJC);
        } catch (e) { console.error(e); }
    }

    function tampilkanGrafik(dataLaporan) {
        const ctx = document.getElementById('chartJC').getContext('2d');
        
        // Warna warni supaya menarik
        const colors = [
            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', 
            '#FF9F40', '#C9CBCF', '#2ecc71', '#e74c3c', '#34495e'
        ];

        new Chart(ctx, {
            type: 'bar', // Grafik Batang
            data: {
                labels: Object.keys(dataLaporan),
                datasets: [{
                    label: 'Jumlah Laporan Terkirim',
                    data: Object.values(dataLaporan),
                    backgroundColor: colors,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true,
                        ticks: { stepSize: 1 } // Karena jumlah orang, angkanya bulat (1, 2, 3...)
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }

    window.onload = muatStatistik;
</script>
</body>
</html>
