<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-utama: #0056b3; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .setting-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; border-top: 5px solid var(--biru-utama); }
        .header { text-align: center; margin-bottom: 25px; color: var(--biru-utama); font-weight: bold; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        
        /* Switch Toggle untuk Notif */
        .switch { position: relative; display: inline-block; width: 45px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--biru-utama); }
        input:checked + .slider:before { transform: translateX(21px); }

        .flex-between { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn-save { background: var(--biru-utama); color: white; width: 100%; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        
        #notif-block {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); color: white; padding: 30px; border-radius: 15px;
            text-align: center; z-index: 10000; width: 80%; max-width: 300px; border: 2px solid var(--biru-utama);
        }
    </style>
</head>
<body>

<div id="notif-block">
    <i class="fa-solid fa-circle-check" style="font-size: 40px; color: #2ecc71; margin-bottom: 15px;"></i>
    <p style="margin: 0; font-weight: bold;">Password dan Email Berhasil diupdate</p>
    <p style="font-size: 12px; margin-top: 10px; color: #ccc;">Sesi berakhir, silakan login ulang...</p>
</div>

<div class="setting-container">
    <div class="header"><i class="fa-solid fa-user-gear"></i> PENGATURAN AKUN</div>
    
    <div class="form-group">
        <label>Email Baru</label>
        <input type="email" id="newEmail" placeholder="Masukkan email baru">
    </div>
    <div class="form-group">
        <label>Password Baru</label>
        <input type="password" id="newPassword" placeholder="Masukkan password baru">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="flex-between">
        <label style="margin: 0;">Suara Notifikasi Alkitab (22:00)</label>
        <label class="switch">
            <input type="checkbox" id="notifSound" onchange="saveSettings()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="form-group" style="margin-top: 15px;">
        <label>Logout Otomatis (Keamanan)</label>
        <select id="autoLogout" onchange="saveSettings()">
            <option value="0">Matikan</option>
            <option value="30">30 Menit</option>
            <option value="60">60 Menit</option>
        </select>
    </div>

    <button class="btn-save" onclick="updateAkun()">SIMPAN PERUBAHAN</button>
    <a href="menu.html" style="display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--biru-utama); font-weight: bold;">← Kembali ke Menu</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const oldEmail = localStorage.getItem("userEmail");

    // Load setingan yang sudah ada
    window.onload = function() {
        document.getElementById("notifSound").checked = localStorage.getItem("notifSound") === "true";
        document.getElementById("autoLogout").value = localStorage.getItem("autoLogoutTime") || "0";
    };

    function saveSettings() {
        localStorage.setItem("notifSound", document.getElementById("notifSound").checked);
        localStorage.setItem("autoLogoutTime", document.getElementById("autoLogout").value);
    }

    async function updateAkun() {
        const nEmail = document.getElementById("newEmail").value;
        const nPass = document.getElementById("newPassword").value;

        if (!nEmail || !nPass) { alert("Email & Password baru harus diisi!"); return; }

        try {
            const snap = await db.collection("users").where("email", "==", oldEmail).get();
            if (!snap.empty) {
                await db.collection("users").doc(snap.docs[0].id).update({
                    email: nEmail,
                    password: nPass
                });

                document.getElementById("notif-block").style.display = "block";
                setTimeout(() => {
                    localStorage.clear();
                    window.location.replace("index.html");
                }, 3000);
            }
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
