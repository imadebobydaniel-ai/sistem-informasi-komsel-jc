<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-header { text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 16px; color: #333; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-size: 14px; outline: none; }
        .stat-row { margin-bottom: 15px; }
        .stat-label-container { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .label-text { color: #333; }
        .label-pct { color: #007bff; }
        .progress-container { background: #eee; border-radius: 10px; height: 10px; width: 100%; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.8s ease-in-out; }
        .bar-jc { background: #00a8ff; }
        .bar-global { background: #6c5ce7; }
        .btn-back { display: flex; align-items: center; justify-content: center; text-decoration: none; color: #007bff; font-weight: bold; padding: 15px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h3><i class="fa-solid fa-chart-pie"></i> CAPAIAN BACA ALKITAB</h3>
        </div>
        <div class="filter-group">
            <label>Pilih Komsel</label>
            <select id="select-komsel-alkitab" onchange="loadStatistikAlkitab()">
                <option value="1">JC 1</option>
                <option value="2">JC 2</option>
                <option value="3">JC 3</option>
                <option value="4">JC 4</option>
                <option value="5" selected>JC 5</option>
            </select>
        </div>
        
        <div class="stat-row">
            <div class="stat-label-container">
                <span class="label-text" id="lbl-jc-name">Capaian JC 5</span>
                <span class="label-pct" id="pct-jc-val">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar bar-jc" id="bar-jc-val"></div>
            </div>
        </div>

        <div class="stat-row">
            <div class="stat-label-container">
                <span class="label-text">Seluruh Komsel (Global)</span>
                <span class="label-pct" id="pct-global-val" style="color: #6c5ce7;">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar bar-global" id="bar-global-val"></div>
            </div>
        </div>
    </div>

    <div id="other-sections">
        </div>

    <a href="menu.html" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i> &nbsp; Kembali ke Menu Utama
    </a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadStatistikAlkitab() {
        const jcTarget = document.getElementById('select-komsel-alkitab').value;
        document.getElementById('lbl-jc-name').innerText = "Capaian JC " + jcTarget;

        try {
            // 1. Hitung Total User di Komsel Terpilih untuk Pembagi Persentase
            const userSnap = await db.collection("users").where("komsel", "==", jcTarget).get();
            const totalUserJC = userSnap.size || 1; 

            // 2. Ambil Laporan Baca Alkitab dari koleksi 'laporan_bacaan'
            const laporanSnap = await db.collection("laporan_bacaan").where("komsel", "==", jcTarget).get();
            const jumlahLaporan = laporanSnap.size;

            // 3. Kalkulasi Persentase (Sinkronisasi: 1 orang dari JC 5 akan menghasilkan nilai riil)
            // Asumsi target adalah 1 laporan per user, jika 1 orang kirim dari JC 5:
            const persentaseJC = ((jumlahLaporan / totalUserJC) * 100).toFixed(1);

            // 4. Update UI JC
            document.getElementById('pct-jc-val').innerText = persentaseJC + "%";
            document.getElementById('bar-jc-val').style.width = persentaseJC + "%";

            // 5. Hitung Global (Semua Komsel)
            const globalLaporan = await db.collection("laporan_bacaan").get();
            const globalUsers = await db.collection("users").get();
            const persentaseGlobal = ((globalLaporan.size / globalUsers.size) * 100).toFixed(1);

            document.getElementById('pct-global-val').innerText = persentaseGlobal + "%";
            document.getElementById('bar-global-val').style.width = persentaseGlobal + "%";

        } catch (error) {
            console.error("Error sync firebase:", error);
        }
    }

    // Jalankan saat halaman dibuka
    window.onload = loadStatistikAlkitab;
</script>
</body>
</html>
