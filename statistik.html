<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-utama: #0056b3; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .setting-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; border-top: 5px solid var(--biru-utama); }
        .header { text-align: center; margin-bottom: 25px; color: var(--biru-utama); font-weight: bold; font-size: 1.2rem; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        
        /* Gaya Switch Toggle untuk Suara */
        .flex-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--biru-utama); }
        input:checked + .slider:before { transform: translateX(21px); }

        .btn-save { background: var(--biru-utama); color: white; width: 100%; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 15px; }
        
        #notif-block {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); color: white; padding: 30px; border-radius: 15px;
            text-align: center; z-index: 10000; width: 80%; max-width: 300px; border: 2px solid var(--biru-utama);
        }
    </style>
</head>
<body>

<div id="notif-block">
    <i class="fa-solid fa-circle-check" style="font-size: 40px; color: #2ecc71; margin-bottom: 15px;"></i>
    <p style="margin: 0; font-weight: bold; font-size: 16px;">Password dan Email Berhasil diupdate</p>
    <p style="font-size: 13px; margin-top: 10px; color: #ccc;">Data tersimpan ke sistem. Silakan login ulang untuk keamanan.</p>
</div>

<div class="setting-container">
    <div class="header"><i class="fa-solid fa-user-gear"></i> PENGATURAN AKUN</div>
    
    <div class="form-group">
        <label>Email Baru</label>
        <input type="email" id="newEmail" placeholder="Masukkan email baru">
    </div>
    <div class="form-group">
        <label>Password Baru</label>
        <input type="password" id="newPassword" placeholder="Masukkan password baru">
    </div>

    <button class="btn-save" onclick="updateAkun()">SIMPAN PERUBAHAN AKUN</button>

    <div style="margin-top: 30px; padding-top: 10px; border-top: 2px solid #eee;">
        <p style="font-size: 11px; color: #888; font-weight: bold; margin-bottom: 15px;">FITUR TAMBAHAN SISTEM</p>
        
        <div class="flex-row">
            <label style="margin: 0;">Suara Notifikasi Alkitab (22:00)</label>
            <label class="switch">
                <input type="checkbox" id="notifSound" onchange="updateSystemSettings()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>Limitasi Waktu / Logout Otomatis</label>
            <select id="autoLogout" onchange="updateSystemSettings()">
                <option value="0">Matikan Fitur</option>
                <option value="30">Aktifkan (30 Menit)</option>
                <option value="60">Aktifkan (60 Menit)</option>
            </select>
        </div>
    </div>

    <a href="menu.html" style="display: block; text-align: center; margin-top: 25px; text-decoration: none; color: var(--biru-utama); font-weight: bold; font-size: 14px;">← KEMBALI KE MENU UTAMA</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
