<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-utama: #007bff; --ungu-global: #6f42c1; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-header { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; border-bottom: 2px solid var(--biru-utama); padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; font-size: 14px; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-box { flex: 1; }
        label { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; }
        select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; font-weight: bold; background: #f9f9f9; }
        .stat-item { margin-top: 15px; }
        .stat-label-flex { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .progress-bar { height: 10px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; border-radius: 10px; }
        .blood-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; font-weight: 600; }
        .btn-back { display: block; text-align: center; padding: 15px; background: white; color: var(--biru-utama); text-decoration: none; font-weight: bold; border-radius: 12px; border: 1px solid #eee; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header"><i class="fa-solid fa-earth-americas"></i> CAPAIAN BACA ALKITAB</div>
    <div class="flex-row">
        <div class="input-box"><label>Pilih Komsel</label><select><option>JC 5</option></select></div>
        <div class="input-box"><label>Periode</label><select><option>1 Bulan Terakhir</option></select></div>
    </div>
    <div class="stat-item">
        <div class="stat-label-flex"><span>Capaian JC 5</span><span style="color:var(--biru-utama)">100.0%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 100%; background: var(--biru-utama);"></div></div>
        <div class="stat-label-flex"><span>Seluruh Komsel (Global)</span><span style="color:var(--ungu-global)">100.0%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 100%; background: var(--ungu-global);"></div></div>
    </div>
</div>

<div class="card">
    <div class="card-header"><i class="fa-solid fa-calendar-check"></i> STATISTIK KEHADIRAN</div>
    <div class="flex-row">
        <div class="input-box"><label>Pilih Komsel</label><select><option>JC 5</option></select></div>
        <div class="input-box"><label>Periode</label><select><option>1 Bulan Terakhir</option></select></div>
    </div>
    <div class="stat-item">
        <div class="stat-label-flex"><span>Kehadiran JC 5</span><span style="color:var(--biru-utama)">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 0%; background: var(--biru-utama);"></div></div>
        <div class="stat-label-flex"><span>Seluruh Komsel (Global)</span><span style="color:var(--ungu-global)">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 0%; background: var(--ungu-global);"></div></div>
    </div>
</div>

<div class="card">
    <div class="card-header"><i class="fa-solid fa-circle-dot" style="color:red"></i> KETIDAK HADIRAN</div>
    <div class="flex-row">
        <div class="input-box"><label>Pilih Komsel</label><select><option>JC 5</option></select></div>
        <div class="input-box"><label>Periode</label><select><option>1 Bulan Terakhir</option></select></div>
    </div>
    <div class="stat-item">
        <div class="stat-label-flex"><span>Ketidak Hadiran JC 5</span><span style="color:red">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 0%; background: red;"></div></div>
    </div>
</div>

<div class="card">
    <div class="card-header"><i class="fa-solid fa-droplet" style="color:black"></i> DATA GOLONGAN DARAH</div>
    <label>LIHAT DISTRIBUSI PER KOMSEL</label>
    <select style="margin-top:5px; margin-bottom:15px;"><option>Semua Komsel</option></select>
    <div class="blood-item"><span>A</span><span style="color:var(--biru-utama)">0 Orang</span></div>
    <div class="blood-item"><span>B</span><span style="color:var(--biru-utama)">0 Orang</span></div>
    <div class="blood-item"><span>O</span><span style="color:var(--biru-utama)">0 Orang</span></div>
    <div class="blood-item"><span>AB</span><span style="color:var(--biru-utama)">1 Orang</span></div>
</div>

<a href="menu.html" class="btn-back">← Kembali ke Menu Utama</a>

</body>
</html>
