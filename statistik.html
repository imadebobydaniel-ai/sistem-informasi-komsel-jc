<div class="card">
    <div class="card-header">FORM ABSENSI</div>
    
    <label>NAMA LENGKAP</label>
    <input type="text" id="input-nama" placeholder="Masukkan Nama">

    <label>PILIH JC (KOMSEL)</label>
    <select id="select-jc-input">
        <option value="JC 01">JC 1</option>
        <option value="JC 02">JC 2</option>
        <option value="JC 03">JC 3</option>
        <option value="JC 04">JC 4</option>
        <option value="JC 05">JC 5</option>
    </select>

    <label>STATUS</label>
    <select id="select-status">
        <option value="HADIR">HADIR</option>
        <option value="IZIN">IZIN</option>
        <option value="ALFA">ALFA</option>
    </select>

    <button onclick="simpanAbsensi()" style="width:100%; padding:10px; margin-top:10px; background:var(--success); color:white; border:none; border-radius:8px;">
        SIMPAN ABSENSI
    </button>
</div>

<script>
// FUNGSI SIMPAN YANG SUDAH DIPERBAIKI (TARUH DI BAWAH KONFIGURASI FIREBASE)
function simpanAbsensi() {
    const nama = document.getElementById('input-nama').value;
    const status = document.getElementById('select-status').value;
    // BARIS KRUSIAL: Mengambil nilai JC agar statistik tidak 0%
    const jc = document.getElementById('select-jc-input').value; 
    
    if(!nama) { alert("Nama harus diisi!"); return; }

    const dataKehadiran = {
        nama: nama,
        status: status,
        jc: jc, // SEKARANG FIELD JC MASUK KE DATABASE
        tanggal: firebase.firestore.FieldValue.serverTimestamp(),
        tanggal_str: new Date().toISOString().split('T')[0],
        email: "imade.bobydaniel@gmail.com" // Otomatis menggunakan email kamu
    };

    db.collection("kehadiran").add(dataKehadiran)
        .then(() => {
            alert("Absensi " + nama + " dari " + jc + " berhasil disimpan!");
            location.reload();
        })
        .catch((error) => {
            console.error("Error simpan data: ", error);
            alert("Gagal menyimpan data.");
        });
}
</script>
