<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Millionaire Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --biru-tua: #003366; --emas: #D4AF37; --bg: #001f3f; --putih: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: white; overflow: hidden; }

        .header-game { 
            background: var(--biru-tua); padding: 15px; display: flex; align-items: center; 
            border-bottom: 3px solid var(--emas); position: relative; height: 60px; box-sizing: border-box;
        }
        .btn-back { color: white; font-size: 20px; text-decoration: none; position: absolute; left: 15px; z-index: 10; }
        .header-title { width: 100%; text-align: center; font-weight: bold; font-size: 16px; letter-spacing: 1px; }

        /* Timer Styles */
        .timer-container {
            position: relative; width: 100px; height: 100px; margin: 0 auto 20px auto;
            display: flex; align-items: center; justify-content: center;
        }
        .timer-svg { transform: rotate(-90deg); width: 100px; height: 100px; }
        .timer-circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 8; }
        .timer-circle-progress {
            fill: none; stroke: var(--emas); stroke-width: 8; stroke-linecap: round;
            stroke-dasharray: 283; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear;
        }
        .timer-text { position: absolute; font-family: 'Courier New', Courier, monospace; font-size: 24px; font-weight: bold; color: var(--emas); }

        .game-container { padding: 20px; text-align: center; max-width: 600px; margin: auto; height: 90vh; display: flex; flex-direction: column; justify-content: center; }
        .prize-level { color: var(--emas); font-weight: bold; font-size: 18px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .question-box { background: rgba(0, 51, 102, 0.8); border: 2px solid var(--emas); padding: 20px; border-radius: 50px 0 50px 0; margin-bottom: 20px; font-size: 17px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-answer { background: transparent; border: 1px solid var(--emas); color: white; padding: 15px; border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.3s; text-align: left; }
        .btn-answer.correct { background: #28a745 !important; border-color: white; animation: blink 0.5s 2; }
        .btn-answer.wrong { background: #d9534f !important; border-color: white; }

        @keyframes blink { 50% { opacity: 0.5; } }

        /* Notification & Overlays */
        .notif-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .notif-box { background: var(--biru-tua); border: 2px solid var(--emas); border-radius: 20px; padding: 30px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 0 30px rgba(212,175,55,0.4); }
        .notif-title { font-size: 22px; font-weight: bold; color: var(--emas); margin-bottom: 15px; }
        .notif-msg { font-size: 16px; margin-bottom: 25px; line-height: 1.5; }
        .notif-btn { background: var(--emas); color: var(--biru-tua); border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .lifelines { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .lifeline-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--emas); background: var(--biru-tua); color: var(--emas); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
        .lifeline-btn.btn-rank { background: var(--emas); color: var(--biru-tua); border-radius: 10px; width: auto; padding: 0 15px; font-weight: bold; font-size: 12px; }
        .lifeline-btn.used { opacity: 0.3; pointer-events: none; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px; flex-direction: column; }
        .rank-card { background: white; border-radius: 15px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border-left: 5px solid var(--emas); }
        .rank-info { flex: 1; color: var(--biru-tua); text-align: left; }
        .rank-name { font-weight: bold; font-size: 14px; margin: 0; color: var(--biru-tua); }
        .rank-score { background: var(--biru-tua); color: var(--emas); padding: 6px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="custom-notif" class="notif-overlay">
    <div class="notif-box">
        <div id="notif-icon" style="font-size: 50px; margin-bottom: 15px;"></div>
        <div class="notif-title" id="notif-title">PEMBERITAHUAN</div>
        <div class="notif-msg" id="notif-message">Pesan...</div>
        <button class="notif-btn" id="notif-action" onclick="closeNotif()">OKE</button>
    </div>
</div>

<div id="leaderboard-overlay" class="overlay">
    <div class="leaderboard-content" style="max-width:500px; margin:auto; width:100%;">
        <h2 style="text-align: center; color: var(--emas);">Peringkat Tertinggi</h2>
        <div id="rank-list"></div>
        <div style="text-align:center; color:var(--emas); padding:20px; cursor:pointer;" onclick="toggleRank()">TUTUP</div>
    </div>
</div>

<div class="header-game">
    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="header-title">MILLIONAIRE ALKITAB</div>
</div>

<div class="game-container">
    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-circle-bg" cx="50" cy="50" r="45"></circle>
            <circle id="progress" class="timer-circle-progress" cx="50" cy="50" r="45"></circle>
        </svg>
        <div id="timer-text" class="timer-text">60</div>
    </div>

    <div class="prize-level" id="level-display">Level 1 - Poin: 0</div>
    <div class="question-box" id="question-text">Menyiapkan soal...</div>
    <div class="answers-grid" id="answers-container"></div>
    
    <div class="lifelines">
        <div class="lifeline-btn" onclick="use5050(this)">50:50</div>
        <div class="lifeline-btn" onclick="usePhone(this)"><i class="fa-solid fa-phone"></i></div>
        <div class="lifeline-btn" onclick="useAudience(this)"><i class="fa-solid fa-users"></i></div>
        <div class="lifeline-btn btn-rank" onclick="toggleRank()"><i class="fa-solid fa-trophy"></i> RANKING</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Soal (Lengkapi sampai 50)
    const quizRawData = [
        { q: "Siapa raja pertama bangsa Israel?", a: ["Daud", "Saul", "Salomo", "Yosua"], c: 1 },
        { q: "Apa arti nama 'Imanuel'?", a: ["Allah Mahakuasa", "Tuhan Raja kami", "Allah menyertai kita", "Gembala Baik"], c: 2 },
        { q: "Berapa hari Tuhan menciptakan alam semesta?", a: ["5 Hari", "7 Hari", "6 Hari", "40 Hari"], c: 2 },
        { q: "Siapa putra tertua dari Yakub?", a: ["Yusuf", "Benyamin", "Ruben", "Yehuda"], c: 2 },
        { q: "Dimana Yesus dilahirkan?", a: ["Yerusalem", "Nazaret", "Betlehem", "Yudea"], c: 2 },
        { q: "Siapa yang membelah Laut Teberau?", a: ["Harun", "Yosua", "Musa", "Kaleb"], c: 2 },
        { q: "Apa nama kitab pertama di Alkitab?", a: ["Keluaran", "Imamat", "Kejadian", "Bilangan"], c: 2 },
        { q: "Siapa murid yang mengkhianati Yesus?", a: ["Petrus", "Yohanes", "Yudas Iskariot", "Tomas"], c: 2 },
        { q: "Bahtera Nuh terdampar di gunung apa?", a: ["Sinai", "Nebo", "Ararat", "Zaitun"], c: 2 },
        { q: "Siapa manusia pertama yang diciptakan?", a: ["Habel", "Kain", "Adam", "Set"], c: 2 }
        // ... Tambahkan soal 11 s/d 50 di sini dengan format yang sama
    ];

    let quizData = [];
    let currentQ = 0;
    let score = 0;
    let timeLeft = 60;
    let timerInterval;
    let userData = null;
    let nextAction = null;

    // Timer Logic
    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 60;
        const circle = document.getElementById('progress');
        const text = document.getElementById('timer-text');
        
        timerInterval = setInterval(() => {
            timeLeft--;
            text.innerText = timeLeft;
            
            // Progress circle calculation
            const offset = (timeLeft / 60) * 283;
            circle.style.strokeDashoffset = 283 - offset;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameOver("WAKTU HABIS!");
            }
        }, 1000);
    }

    async function initGame() {
        const email = localStorage.getItem("userEmail");
        const snap = await db.collection("users").where("email", "==", email).get();
        if (!snap.empty) userData = snap.docs[0].data();
        
        quizData = shuffleArray([...quizRawData]).slice(0, 50); // Ambil 50 soal acak
        loadQuestion();
    }

    function loadQuestion() {
        const data = quizData[currentQ];
        document.getElementById('level-display').innerText = `Level ${currentQ + 1} - Poin: ${score}`;
        document.getElementById('question-text').innerText = data.q;
        const container = document.getElementById('answers-container');
        container.innerHTML = '';
        
        data.a.forEach((ans, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-answer';
            btn.innerHTML = `<b>${String.fromCharCode(65 + idx)}:</b> ${ans}`;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });
        startTimer();
    }

    function checkAnswer(idx, btn) {
        clearInterval(timerInterval);
        const correct = quizData[currentQ].c;
        if(idx === correct) {
            btn.classList.add('correct');
            score += 20;
            setTimeout(() => {
                currentQ++;
                if(currentQ < quizData.length) loadQuestion();
                else finishGame();
            }, 1200);
        } else {
            btn.classList.add('wrong');
            setTimeout(() => gameOver("JAWABAN SALAH"), 500);
        }
    }

    async function gameOver(reason) {
        await saveScore();
        showNotif(reason, `Skor akhir Anda: ${score}. Teruslah belajar Firman Tuhan!`, 'fail', () => {
            window.location.reload();
        });
    }

    async function saveScore() {
        if(userData) {
            await db.collection("game_scores").add({
                nama: userData.nama,
                email: userData.email,
                skor: score,
                waktu: 0, // Bisa ditambah durasi total jika mau
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }

    function shuffleArray(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    // Modal & UI Functions
    function showNotif(title, message, iconType, callback) {
        nextAction = callback;
        document.getElementById('notif-title').innerText = title;
        document.getElementById('notif-message').innerText = message;
        document.getElementById('notif-icon').innerHTML = iconType === 'success' ? "🏆" : "❌";
        document.getElementById('custom-notif').style.display = 'flex';
    }

    function closeNotif() {
        document.getElementById('custom-notif').style.display = 'none';
        if(nextAction) nextAction();
    }

    function toggleRank() {
        const overlay = document.getElementById('leaderboard-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        if(overlay.style.display === 'flex') loadLeaderboard();
    }

    function loadLeaderboard() {
        db.collection("game_scores").orderBy("skor", "desc").limit(10).get().then(snap => {
            let html = "";
            snap.forEach((doc, i) => {
                const d = doc.data();
                html += `<div class="rank-card">
                    <div style="font-weight:bold; color:var(--biru-tua)">#${i+1}</div>
                    <div class="rank-info">
                        <p class="rank-name">${d.nama}</p>
                        <p style="font-size:10px">${d.email}</p>
                    </div>
                    <div class="rank-score">${d.skor}</div>
                </div>`;
            });
            document.getElementById('rank-list').innerHTML = html;
        });
    }

    function use5050(btn) {
        btn.classList.add('used');
        const correct = quizData[currentQ].c;
        const btns = document.querySelectorAll('.btn-answer');
        let hidden = 0;
        btns.forEach((b, i) => { if(i !== correct && hidden < 2) { b.style.visibility = 'hidden'; hidden++; } });
    }

    function usePhone(btn) { btn.classList.add('used'); alert("Temanmu yakin jawabannya adalah " + String.fromCharCode(65 + quizData[currentQ].c)); }
    function useAudience(btn) { btn.classList.add('used'); alert("75% Jemaat memilih " + String.fromCharCode(65 + quizData[currentQ].c)); }

    window.onload = initGame;
</script>
</body>
</html>
