<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Millionaire Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        /* CSS ASLI ANDA TETAP DIJAGA */
        * { box-sizing: border-box; } 
        :root { --biru-tua: #003366; --emas: #D4AF37; --bg: #001f3f; --putih: #ffffff; --emas-lux: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: white; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* CSS Tambahan untuk Logo Startup */
        #start-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            z-index: 6000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column;
            text-align: center;
        }
        .logo-wrapper { position: relative; margin-bottom: 20px; }
        .splash-logo { width: 120px; position: relative; z-index: 10; }
        .gold-loader {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border: 3px solid transparent;
            border-top: 3px solid var(--emas);
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        
        /* Gaya tombol baru yang diminta */
        #start-app-btn {
            margin-top: 30px; 
            padding: 15px 40px; 
            background: var(--emas-lux); 
            color: black; 
            border: none; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); 
            z-index: 9999999; 
            display: none; /* Muncul via JS */
            animation: pulse 1.5s infinite;
        }

        /* Sisanya tetap sama dengan kode lama Anda */
        .header-game { background: var(--biru-tua); padding: 10px; display: flex; align-items: center; border-bottom: 3px solid var(--emas); height: 50px; }
        .btn-back { color: white; font-size: 18px; text-decoration: none; z-index: 10; }
        .header-title { flex: 1; text-align: center; font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        .game-container { padding: 15px; text-align: center; max-width: 500px; margin: auto; height: calc(100vh - 50px); display: flex; flex-direction: column; justify-content: space-between; }
        .timer-container { position: relative; width: 80px; height: 80px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .timer-circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .timer-circle-progress { fill: none; stroke: #ff4d4d; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; font-size: 20px; font-weight: bold; color: #ff4d4d; }
        .prize-level { color: var(--emas); font-weight: bold; font-size: 14px; margin: 5px 0; }
        .question-box { background: rgba(0, 51, 102, 0.8); border: 2px solid var(--emas); padding: 15px; border-radius: 30px 0 30px 0; font-size: 15px; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .btn-answer { background: transparent; border: 1px solid var(--emas); color: white; padding: 12px 8px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.3s; text-align: left; min-height: 45px; line-height: 1.2; }
        .btn-answer.correct { background: #28a745 !important; border-color: white; }
        .btn-answer.wrong { background: #d9534f !important; border-color: white; }
        .lifelines-container { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .btn-lifeline { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--emas); background: var(--biru-tua); color: var(--emas); font-size: 11px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; padding: 0; }
        .btn-lifeline.used { opacity: 0.3; cursor: default; }
        .notif-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .notif-box { background: var(--biru-tua); border: 2px solid var(--emas); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        .btn-notif-ok { background: var(--emas); color: var(--biru-tua); padding: 12px 30px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
        
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* LEADERBOARD */
        .leaderboard-section { display: none; height: 35vh; margin-top: 10px; background: rgba(0, 20, 40, 0.7); border-top: 2px solid var(--emas); overflow-y: auto; border-radius: 15px 15px 0 0; padding: 10px; }
        .lb-title { color: var(--emas); font-size: 14px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .lb-table td, .lb-table th { padding: 8px 5px; text-align: left; border-bottom: 1px solid rgba(212,175,55,0.1); }
    </style>
</head>
<body>

<div id="start-overlay">
    <div class="logo-wrapper">
        <img src="logo_pondok.png" alt="Logo" class="splash-logo">
        <div class="gold-loader"></div>
    </div>
    <h2 style="color:var(--emas); margin: 0;">SIPAPUA</h2>
    <p style="font-size: 12px; opacity: 0.8;">Sistem Informasi Pondok Pemulihan Papua</p>
    
    <button id="start-app-btn">
        MASUK APLIKASI <i class="fa-solid fa-right-to-bracket"></i>
    </button>

    <div style="margin-top: 20px;">
        <button onclick="location.href='menu.html'" style="background:transparent; color:#ff4d4d; border:none; cursor:pointer; font-size: 13px;">TIDAK, KEMBALI</button>
    </div>
</div>

<div id="custom-notif" class="notif-overlay">
    <div class="notif-box">
        <div id="notif-icon" style="font-size: 50px; margin-bottom: 10px;"></div>
        <h3 id="notif-title" style="color: var(--emas); margin: 0 0 10px 0;">INFO</h3>
        <p id="notif-message" style="font-size: 15px; line-height: 1.4; margin-bottom: 20px; color: white;"></p>
        <button id="btn-notif-action" class="btn-notif-ok">OKE</button>
    </div>
</div>

<div class="header-game">
    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="header-title">MILLIONAIRE ALKITAB</div>
</div>

<div class="game-container">
    <div id="start-btn-container" style="display:none;">
        <button onclick="realStart()" style="background:var(--emas); color:var(--biru-tua); padding:12px 30px; border:none; border-radius:25px; font-weight:bold; font-size: 16px; cursor:pointer;">
            <i class="fa-solid fa-play"></i> MULAI SEKARANG
        </button>
    </div>

    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-circle-bg" cx="40" cy="40" r="35"></circle>
            <circle id="progress" class="timer-circle-progress" cx="40" cy="40" r="35"></circle>
        </svg>
        <div id="timer-text" class="timer-text">180</div>
    </div>

    <div class="prize-level" id="level-display">Level 1 - Poin: 0</div>
    <div class="question-box" id="question-text">Memuat Soal...</div>
    <div class="answers-grid" id="answers-container"></div>

    <div class="lifelines-container">
        <button id="ll-5050" class="btn-lifeline" onclick="use5050()">50:50</button>
        <button id="ll-phone" class="btn-lifeline" onclick="usePhone()"><i class="fa-solid fa-phone"></i></button>
        <button id="ll-audience" class="btn-lifeline" onclick="useAudience()"><i class="fa-solid fa-users"></i></button>
    </div>

    <button id="btn-toggle-lb" onclick="toggleLeaderboard()" style="background: rgba(212, 175, 55, 0.2); color: var(--emas); border: 1px solid var(--emas); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 12px; margin: 10px auto; display: block;">
        <i class="fa-solid fa-list-ol"></i> PERINGKAT
    </button>

    <div id="leaderboard-container" class="leaderboard-section">
        <table class="lb-table">
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Audio
    const soundOpening = new Audio('opening_sound.mp3');
    const soundStart   = new Audio('star_sound.mp3');
    const soundCorrect = new Audio('jawaban_benar.mp3');
    const soundWin     = new Audio('pemenang.mp3');
    const soundBgGame  = new Audio('sound_full.mp3'); 
    const soundGagal   = new Audio('wrong_question.mp3');
    soundOpening.loop = true;
    soundBgGame.loop = true;

    // --- LOGIKA STARTUP BARU ---
    document.addEventListener("DOMContentLoaded", () => {
        const startBtn = document.getElementById('start-app-btn');
        const overlay = document.getElementById('start-overlay');
        const playContainer = document.getElementById('start-btn-container');

        // Munculkan tombol masuk setelah 2 detik loading logo
        setTimeout(() => {
            startBtn.style.display = 'block';
        }, 2000);

        startBtn.onclick = () => {
            // UNLOCK AUDIO: Memulai audio opening saat klik tombol
            soundOpening.play().catch(e => console.log("Audio diblokir browser"));
            
            // Sembunyikan Overlay
            overlay.style.transition = '0.5s';
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                playContainer.style.display = 'block'; // Munculkan tombol "MULAI SEKARANG"
                quizData = shuffleArray([...quizRawData]);
                loadQuestion();
            }, 500);
        };
    });

    // --- SISANYA LOGIKA GAME ANDA ---
    const quizRawData = [
        { q: "Siapa raja pertama bangsa Israel?", a: ["Daud", "Saul", "Salomo", "Yosua"], c: 1 },
        { q: "Apa arti nama 'Imanuel'?", a: ["Allah Mahakuasa", "Tuhan Raja kami", "Allah menyertai kita", "Gembala Baik"], c: 2 },
        // ... (Data soal lainnya tetap sama)
        { q: "Siapa yang menulis Kitab Kisah Para Rasul?", a: ["Paulus", "Lukas", "Petrus", "Yohanes"], c: 1 }
    ];

    let quizData = [];
    let currentQ = 0;
    let score = 0;
    let totalTime = 180;
    let timerInterval;
    let isGameStarted = false;
    let winStreak = parseInt(localStorage.getItem("winStreak")) || 0;
    let userData = JSON.parse(localStorage.getItem("userData")) || null;

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function realStart() {
        if(isGameStarted) return;
        isGameStarted = true;
        soundOpening.pause();
        soundStart.play();
        document.getElementById('start-btn-container').style.display = 'none';
        
        setTimeout(() => {
            soundBgGame.play();
            startGlobalTimer();
        }, 1500);
    }

    function startGlobalTimer() {
        const circle = document.getElementById('progress');
        const text = document.getElementById('timer-text');
        timerInterval = setInterval(() => {
            totalTime--;
            text.innerText = totalTime;
            const offset = (totalTime / 180) * 251;
            circle.style.strokeDashoffset = 251 - offset;
            if (totalTime <= 0) {
                clearInterval(timerInterval);
                handleFailure("WAKTU HABIS");
            }
        }, 1000);
    }

    function loadQuestion() {
        const data = quizData[currentQ];
        document.getElementById('level-display').innerText = `Level ${currentQ + 1} - Poin: ${score}`;
        document.getElementById('question-text').innerText = data.q;
        const container = document.getElementById('answers-container');
        container.innerHTML = '';
        data.a.forEach((ans, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-answer';
            btn.id = `ans-${idx}`;
            btn.innerHTML = `<b>${String.fromCharCode(65 + idx)}:</b> ${ans}`;
            btn.onclick = () => { if(!isGameStarted) return; checkAnswer(idx, btn); };
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const correct = quizData[currentQ].c;
        document.querySelectorAll('.btn-answer').forEach(b => b.style.pointerEvents = 'none');

        if(idx === correct) {
            soundCorrect.play();
            btn.classList.add('correct');
            score += 20;
            setTimeout(() => {
                currentQ++;
                if (currentQ < quizData.length) loadQuestion();
                else finishGame();
            }, 1000);
        } else {
            btn.classList.add('wrong');
            document.getElementById(`ans-${correct}`).classList.add('correct');
            handleFailure("JAWABAN SALAH");
        }
    }

    function handleFailure(title) {
        winStreak = 0;
        localStorage.setItem("winStreak", 0);
        soundBgGame.pause();
        soundGagal.play();
        clearInterval(timerInterval);
        setTimeout(() => {
            showNotif(title, `Skor: ${score}.`, "fail", () => location.reload());
        }, 1500);
    }

    async function finishGame() {
        clearInterval(timerInterval);
        soundBgGame.pause();
        soundWin.play();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        showNotif("LUAR BIASA!", `Selesai dengan skor ${score}`, "success", () => location.reload());
    }

    function showNotif(title, msg, type, callback) {
        const n = document.getElementById('custom-notif');
        document.getElementById('notif-title').innerText = title;
        document.getElementById('notif-message').innerText = msg;
        document.getElementById('notif-icon').innerHTML = type === 'success' ? '🎉' : '❌';
        n.style.display = 'flex';
        document.getElementById('btn-notif-action').onclick = () => {
            n.style.display = 'none';
            if(callback) callback();
        };
    }

    function toggleLeaderboard() {
        const lb = document.getElementById('leaderboard-container');
        lb.style.display = (lb.style.display === 'none' || lb.style.display === '') ? 'block' : 'none';
        if(lb.style.display === 'block') fetchLeaderboard();
    }

    function fetchLeaderboard() {
        db.collection("game_scores").orderBy("skor", "desc").limit(10).get().then(qs => {
            const body = document.getElementById('leaderboard-body');
            body.innerHTML = qs.docs.map(doc => {
                const d = doc.data();
                return `<tr><td>${d.nama}</td><td>${d.skor}</td><td>${d.streak}x</td></tr>`;
            }).join('');
        });
    }

    function use5050() {
        if(document.getElementById('ll-5050').classList.contains('used')) return;
        const correct = quizData[currentQ].c;
        let removed = 0;
        for(let i=0; i<4; i++) {
            if(i !== correct && removed < 2) {
                document.getElementById(`ans-${i}`).style.visibility = 'hidden';
                removed++;
            }
        }
        document.getElementById('ll-5050').classList.add('used');
    }

    function usePhone() {
        if(document.getElementById('ll-phone').classList.contains('used')) return;
        alert(`Teman Anda yakin jawabannya adalah ${String.fromCharCode(65 + quizData[currentQ].c)}`);
        document.getElementById('ll-phone').classList.add('used');
    }

    function useAudience() {
        if(document.getElementById('ll-audience').classList.contains('used')) return;
        alert("Penonton mendukung jawaban yang benar!");
        document.getElementById('ll-audience').classList.add('used');
    }
</script>
</body>
</html>
